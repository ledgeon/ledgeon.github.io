    if (col === 'hours') { va = Number(va) || 0; vb = Number(vb) || 0; }
    return (typeof va === 'number' ? (va - vb) : String(va || '').localeCompare(String(vb || ''))) * mult;
  });
}

function renderOverview() {
  const { year, month } = getViewMonth();
  const cur = getMonthlyStats(year, month); const stats = getIncomeStats();
  const { income, bills, tips } = cur;
  const isCurrentMonth = (() => { const n = new Date(); return n.getFullYear() === year && n.getMonth() === month; })();
  const pettySpent = state.petty.filter(p => p.date && p.date.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)).reduce((s, p) => s + (parseFloat(String(p.amount).replace(/[^\d.-]/g, '')) || 0), 0);
  const upcIso = isoDate(new Date(Date.now() + 14 * 86400000));
  const upcoming = state.bills.filter(b => b.dueDate && b.dueDate <= upcIso && !b.paid).sort((a,b) => a.dueDate.localeCompare(b.dueDate));
  const net = income - bills - pettySpent;
  // previous month delta
  let pMo = month - 1, pYr = year; if (pMo < 0) { pMo = 11; pYr -= 1; }
  const prev = getMonthlyStats(pYr, pMo);
  const incDelta = income - prev.income; const billDelta = bills - prev.bills; const netDelta = (income - bills) - (prev.income - prev.bills);
  // bills paid count (only for current month — paid is a flag, not month-scoped, but useful at a glance)
  const paidCount = state.bills.filter(b => b.paid).length;
  const unpaidUpcoming = upcoming.length;
  // savings rate
  const savingsPct = income > 0 ? Math.max(0, (income - bills - pettySpent) / income * 100) : 0;
  // daily budget remaining (only meaningful for current month)
  const today = todayStart();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysElapsed = isCurrentMonth ? today.getDate() : daysInMonth;
  const daysRemaining = Math.max(0, daysInMonth - daysElapsed);
  const dailyBudget = daysRemaining > 0 && net > 0 ? (net / daysRemaining) : 0;
  // largest bill / top cat / biggest income (use current month)
  const billCats = aggregateBillsByCategory(state.bills, year, month);
  const topCat = billCats[0] || null;
  const monthBillsSorted = [...state.bills].map(b => ({ b, mo: (() => {
    const amt = parseFloat(String(b.amount).replace(/[^\d.-]/g, '')) || 0;
    const isOnce = !b.recurring || b.recurring === 'once';
    return isOnce ? ((b.dueDate || b.createdAt || '').startsWith(`${year}-${String(month+1).padStart(2,'0')}`) ? amt : 0) : monthlyEq(amt, b.recurring);
  })() })).filter(x => x.mo > 0).sort((a,b) => b.mo - a.mo);
  const largestBill = monthBillsSorted[0] || null;
  // biggest income source for this month
  let biggestIncome = null; let biggestIncomeMo = 0;
  for (const i of state.income) {
    const amt = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
    const isOnce = i.frequency === 'once' || !i.frequency;
    let mo = 0;
    if (isOnce) {
      const dateStr = i.receivedAt || i.createdAt;
      if (dateStr && dateStr.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)) mo = amt;
    } else { mo = monthlyEq(amt, i.frequency); }
    if (mo > biggestIncomeMo) { biggestIncomeMo = mo; biggestIncome = { source: i.source, mo }; }
  }
  // open tasks
  const openTasks = state.tasks.filter(t => !t.done).sort((a,b) => {
    const ad = a.dueDate || '9999'; const bd = b.dueDate || '9999';
    return ad.localeCompare(bd);
  }).slice(0, 5);
  // year over year
  const yoy = getYoY(year, month);
  // cash flow heatmap (current/viewed month)
  const flow = getCashFlowDays(year, month);
  const maxAbs = Math.max(...flow.map(f => Math.max(f.income, f.spent)), 1);
  const firstDow = (new Date(year, month, 1).getDay() + 6) % 7; // Mon=0

  // delta helper
  const dh = (delta, invertColors = false) => {
    if (Math.abs(delta) < 0.5) return `<span class="kpi-delta flat">no change</span>`;
    const isUp = delta > 0;
    const isGood = invertColors ? !isUp : isUp;
    return `<span class="kpi-delta ${isGood ? 'up' : 'down'}">${isUp ? '↑' : '↓'} ${fmtMoney(Math.abs(delta), {round: true})}</span>`;
  };

  return `
    <div class="month-nav">
      <button data-action="prev-month">← prev</button>
      <div class="month-label">${new Date(year, month).toLocaleString('en-US',{month:'long',year:'numeric'}).toLowerCase()}</div>
      <button data-action="next-month">next →</button>
      ${(year !== new Date().getFullYear() || month !== new Date().getMonth()) ? '<button data-action="curr-month">jump to current</button>' : ''}
    </div>

    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">net · ${new Date(year, month).toLocaleString('en-US',{month:'short'}).toLowerCase()}</div>
        <div class="kpi-value ${net >= 0 ? 'warm' : 'bad'}">${fmtMoney(net, {round: true, sign: true})}</div>
        <div class="kpi-sub">after fixed + petty ${dh(netDelta)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">income</div>
        <div class="kpi-value ok">${income > 0 ? fmtMoney(income, {round: true}) : '—'}</div>
        <div class="kpi-sub">${state.income.length} source${state.income.length === 1 ? '' : 's'} ${dh(incDelta)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">expenses</div>
        <div class="kpi-value bad">${bills > 0 ? fmtMoney(bills, {round: true}) : '—'}</div>
        <div class="kpi-sub">${paidCount} paid · ${unpaidUpcoming} due soon ${dh(billDelta, true)}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">savings rate</div>
        <div class="kpi-value ${savingsPct >= 20 ? 'ok' : 'warm'}">${income > 0 ? savingsPct.toFixed(0) + '%' : '—'}</div>
        <div class="kpi-progress"><div class="fill ${savingsPct < 20 ? 'warn' : ''}" style="width:${Math.min(100, savingsPct).toFixed(1)}%;"></div></div>
        <div class="kpi-sub">${income > 0 ? (savingsPct >= 20 ? 'meets 20% target' : `${(20-savingsPct).toFixed(0)}% under target`) : 'add income'}</div>
      </div>
      ${isCurrentMonth ? `
      <div class="kpi-card">
        <div class="kpi-label">daily budget</div>
        <div class="kpi-value lime">${dailyBudget > 0 ? fmtMoney(dailyBudget, {round: true}) : '—'}</div>
        <div class="kpi-sub">${daysRemaining} day${daysRemaining===1?'':'s'} left this month</div>
      </div>` : ''}
      ${tips > 0 ? `
      <div class="kpi-card">
        <div class="kpi-label">cash tips</div>
        <div class="kpi-value lime">${fmtMoney(tips, {round: true})}</div>
        <div class="kpi-sub">unclaimed · ~${fmtMoney(tips * getTaxPct() / 100, {round: true})} tax setaside</div>
      </div>` : ''}
    </div>

    <div class="out">
      <h3>summary</h3>
      <div class="kv"><span class="k">monthly income</span><span class="v ok">${fmtMoney(income)}</span><span class="x">${tips > 0 ? `incl. ${fmtMoney(tips,{round:true})} tips` : ''}</span></div>
      <div class="kv"><span class="k">fixed expenses</span><span class="v bad">${fmtMoney(bills)}</span><span class="x">${income>0?(bills/income*100).toFixed(1)+'%':''}</span></div>
      <div class="kv"><span class="k">discretionary spent</span><span class="v warn">${fmtMoney(pettySpent)}</span><span class="x">${state.petty.filter(p => p.date && p.date.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)).length} entries</span></div>
      <div class="kv"><span class="k">net remaining</span><span class="v ${net>=0?'warm':'err'}">${fmtMoney(net, {sign: true})}</span><span class="x">available</span></div>
      <div style="margin-top: 16px;"></div>
      <div class="bar-line ok"><span class="lbl">income</span><span class="bar">${asciiBar(100)}</span><span class="va ok">${fmtMoney(income, {round:true})}</span></div>
      <div class="bar-line bad"><span class="lbl">expenses</span><span class="bar">${asciiBar(income ? (bills/income)*100 : 0)}</span><span class="va bad">${fmtMoney(bills, {round:true})}</span></div>
    </div>

    ${(largestBill || topCat || biggestIncome) ? `
    <div class="out" style="margin-top:32px;">
      <h3>highlights</h3>
      <div class="callouts">
        ${biggestIncome ? `<div class="callout"><div class="clo-label">biggest income</div><div class="clo-name">${escHTML(biggestIncome.source)}</div><div class="clo-amt">${fmtMoney(biggestIncome.mo, {round: true})}/mo · ${income > 0 ? (biggestIncome.mo/income*100).toFixed(0) + '%' : '—'} of total</div></div>` : ''}
        ${largestBill ? `<div class="callout"><div class="clo-label">largest bill</div><div class="clo-name">${escHTML(largestBill.b.name)}</div><div class="clo-amt">${fmtMoney(largestBill.mo, {round: true})}/mo · ${income > 0 ? (largestBill.mo/income*100).toFixed(0) + '%' : '—'} of income</div></div>` : ''}
        ${topCat ? `<div class="callout" style="border-left: 2px solid ${topCat.color};"><div class="clo-label">top category</div><div class="clo-name">${topCat.label}</div><div class="clo-amt">${fmtMoney(topCat.total, {round: true})}/mo · ${bills > 0 ? (topCat.total/bills*100).toFixed(0) + '%' : '—'} of expenses</div></div>` : ''}
      </div>
    </div>` : ''}

    <div class="out" style="margin-top:32px;">
      <h3>projections</h3>
      <div class="kv"><span class="k">est. yearly income</span><span class="v ok">${fmtMoney(stats.projAnnual,{round:true})}</span><span class="x">past avg</span></div>
      <div class="kv"><span class="k">est. yearly expenses</span><span class="v bad">${fmtMoney(stats.projAnnualBills,{round:true})}</span><span class="x">${stats.projAnnual>0?(stats.projAnnualBills/stats.projAnnual*100).toFixed(1)+'%':''}</span></div>
      ${yoy.hasPrev ? `
        <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line);"></div>
        <div class="kv"><span class="k">vs ${year - 1}</span><span class="v" style="color:${yoy.netDelta >= 0 ? 'var(--ok)' : 'var(--bad)'};">${yoy.netDelta >= 0 ? '+' : ''}${fmtMoney(yoy.netDelta, {round: true})}</span><span class="x">net change yoy</span></div>
        <div class="kv"><span class="k">income yoy</span><span class="v" style="color:${yoy.incomeDelta >= 0 ? 'var(--ok)' : 'var(--bad)'};">${yoy.incomeDelta >= 0 ? '+' : ''}${fmtMoney(yoy.incomeDelta, {round: true})}</span><span class="x">${yoy.prev.income > 0 ? ((yoy.incomeDelta/yoy.prev.income*100).toFixed(0) + '%') : '—'}</span></div>
        <div class="kv"><span class="k">expenses yoy</span><span class="v" style="color:${yoy.billsDelta >= 0 ? 'var(--bad)' : 'var(--ok)'};">${yoy.billsDelta >= 0 ? '+' : ''}${fmtMoney(yoy.billsDelta, {round: true})}</span><span class="x">${yoy.prev.bills > 0 ? ((yoy.billsDelta/yoy.prev.bills*100).toFixed(0) + '%') : '—'}</span></div>
      ` : ''}
    </div>

    <div class="out" style="margin-top:32px;">
      <h3>trend · 6 months</h3>
      ${chartLegend([{color:'var(--ok)', label:'income'}, {color:'var(--bad)', label:'expenses'}])}
      <div class="chart-box" style="padding:16px 12px 0;">${renderLineChart(getMonthlyHistory(6))}</div>
    </div>

    ${isCurrentMonth ? `
    <div class="out" style="margin-top:32px;">
      <h3>cash flow · ${new Date(year, month).toLocaleString('en-US',{month:'short'}).toLowerCase()}</h3>
      <div style="display: flex; gap: 18px; align-items: flex-start; flex-wrap: wrap;">
        <div style="flex: 1; min-width: 280px;">
          <div class="heatmap" style="margin-bottom: 6px;">
            ${['M','T','W','T','F','S','S'].map(d => `<div class="hm-dow">${d}</div>`).join('')}
            ${Array(firstDow).fill(0).map(() => `<div class="hm-day empty"></div>`).join('')}
            ${flow.map((f, i) => {
              const day = i + 1; const net = f.income - f.spent;
              const isToday = isCurrentMonth && day === today.getDate();
              const isFuture = isCurrentMonth && day > today.getDate();
              let bg = 'var(--bg-deep)';
              if (!isFuture) {
                if (net > 0) { const intensity = Math.min(1, f.income / maxAbs); bg = `rgba(134,201,138,${0.15 + intensity * 0.65})`; }
                else if (net < 0) { const intensity = Math.min(1, f.spent / maxAbs); bg = `rgba(229,159,124,${0.15 + intensity * 0.65})`; }
              }
              const titleParts = [];
              if (f.income > 0) titleParts.push(`+${fmtMoney(f.income, {round:true})} income`);
              if (f.spent > 0) titleParts.push(`−${fmtMoney(f.spent, {round:true})} spent`);
              const title = titleParts.length ? titleParts.join(', ') : 'no activity';
              return `<div class="hm-day ${isToday ? 'today' : ''}" style="background:${bg};" title="d${day} · ${title}">${day}</div>`;
            }).join('')}
          </div>
        </div>
        <div style="flex: 0 0 180px; font-size: 11.5px; color: var(--t-dim);">
          <div style="margin-bottom: 8px; color: var(--t-faint); text-transform: uppercase; letter-spacing: 1.5px; font-size: 10px;">legend</div>
          <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 4px;"><span style="width: 14px; height: 14px; background: rgba(134,201,138,0.7); border-radius: 2px;"></span>income received</div>
          <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 4px;"><span style="width: 14px; height: 14px; background: rgba(229,159,124,0.7); border-radius: 2px;"></span>petty spent</div>
          <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 4px;"><span style="width: 14px; height: 14px; background: var(--bg-deep); border: 1px solid var(--line); border-radius: 2px;"></span>no activity</div>
          <div style="display: flex; align-items: center; gap: 8px;"><span style="width: 14px; height: 14px; background: var(--bg-deep); border-radius: 2px; box-shadow: inset 0 0 0 1px var(--lime);"></span>today</div>
        </div>
      </div>
    </div>` : ''}

    <div class="out" style="margin-top:32px;">
      <h3>upcoming · 14 days</h3>
      ${upcoming.length ? `<table class="tbl"><tbody>${upcoming.slice(0,6).map(b=>`<tr class="row"><td><span class="tag ${isOverdue(b.dueDate)?'err':(isTodayDate(b.dueDate)?'warn':'info')}">${formatDate(b.dueDate)}</span></td><td>${escHTML(b.name)}</td><td class="r num bad">${fmtMoney(b.amount)}</td></tr>`).join('')}</tbody></table>${upcoming.length > 6 ? `<div style="margin-top:6px;font-size:11px;color:var(--t-faint);">+ ${upcoming.length - 6} more · <span class="action" data-action="goto" data-tab="expenses" style="cursor:pointer;">view all</span></div>` : ''}` : '<div class="empty-state">none.</div>'}
    </div>

    ${openTasks.length ? `
    <div class="out" style="margin-top:32px;">
      <h3>open tasks <span class="action" data-action="goto" data-tab="tasks">view all →</span></h3>
      ${openTasks.map(t => {
        const overdue = t.dueDate && isOverdue(t.dueDate);
        const isToday = t.dueDate && isTodayDate(t.dueDate);
        const meta = t.dueDate ? `${overdue ? 'overdue · ' : isToday ? 'today · ' : ''}${formatDate(t.dueDate)}` : (t.priority || '');
        const cls = overdue ? 'err' : isToday ? 'warn' : '';
        return `<div class="tprev-row"><span class="tprev-text">${escHTML(t.text)}</span><span class="tprev-meta ${cls}">${meta}</span></div>`;
      }).join('')}
    </div>` : ''}
  `;
}

function renderIncome() {
  const { year, month } = getViewMonth();
  const { income: monthInc, tips: monthTips } = getMonthlyStats(year, month);
  const stats = getIncomeStats();
  // hourly trend
  const hourlyHistory = getHourlyTrend(6);
  const hasHourlyData = hourlyHistory.some(h => h.hourly > 0);
  // source mix for the displayed month
  const sourceMix = []; let mixTotal = 0;
  const SOURCE_COLORS = ['#86c98a', '#7eb6f0', '#d4a574', '#b08bc7', '#f5c890', '#6dd0d0', '#c8a2ff', '#ff8a65'];
  let colorIdx = 0;
  for (const i of state.income) {
    const amt = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
    const isOnce = i.frequency === 'once' || !i.frequency;
    let mo = 0;
    if (isOnce) {
      const ds = i.receivedAt || i.createdAt;
      if (ds && ds.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)) mo = amt;
    } else mo = monthlyEq(amt, i.frequency);
    if (mo > 0) {
      sourceMix.push({ label: i.source, value: mo, color: SOURCE_COLORS[colorIdx % SOURCE_COLORS.length] });
      mixTotal += mo; colorIdx++;
    }
  }
  sourceMix.sort((a,b) => b.value - a.value);

  const taxPct = getTaxPct();
  const taxSetaside = stats.ytdTips * taxPct / 100;

  const rows = sortRows(state.income, 'income').map(i => {
    const amt = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
    const base = i.baseAmount !== undefined ? i.baseAmount : amt;
    const hrs = Number(i.hours) || 0; const rate = hrs > 0 ? base / hrs : 0;
    const hoursCell = hrs > 0 ? `${fmtHM(hrs)}<span style="font-size:10px;color:var(--t-faint);margin-left:6px;">$${rate.toFixed(2)}/hr</span>` : '<span style="color:var(--t-mute);">—</span>';
    return `<tr class="row"><td><span class="id">${i.id}</span></td><td>${escHTML(i.source)}</td><td class="num ok" style="white-space: nowrap;">${fmtMoney(amt)}${i.tipsEnabled&&amt>base?`<span style="font-size:10px;color:var(--lime);margin-left:4px;">(+${fmtMoney(amt-base)} tip)</span>`:''}</td><td class="num" style="white-space: nowrap;">${hoursCell}</td><td style="color:var(--t-faint);">${i.frequency||'once'}</td><td class="num">${formatDate(i.receivedAt||i.createdAt)}</td><td class="r num">${i.frequency==='once'?'—':fmtMoney(monthlyEq(amt,i.frequency),{round:true})}</td><td class="r tbl-actions"><button data-action="edit" data-type="income" data-id="${i.id}">edit</button><button class="err" data-action="rm" data-type="income" data-id="${i.id}">rm</button></td></tr>`;
  }).join('');

  return `
    <div class="out">
      <h3>ytd stats</h3>
      <div class="kv"><span class="k">ytd income</span><span class="v ok">${fmtMoney(stats.ytdIncome,{round:true})}</span><span class="x">this year</span></div>
      ${stats.ytdTips > 0 ? `
        <div class="kv"><span class="k">ytd cash tips</span><span class="v" style="color:var(--lime)">${fmtMoney(stats.ytdTips,{round:true})}</span><span class="x">unclaimed tips</span></div>
        <div class="kv"><span class="k">tax setaside <span style="color:var(--t-mute);font-size:10px;">est.</span></span><span class="v warn">${fmtMoney(taxSetaside, {round: true})}</span><span class="x"><input type="number" id="tax-pct-input" value="${taxPct}" min="0" max="100" step="1" style="width: 50px; background: var(--bg-deep); border: 1px solid var(--line); color: var(--t-bright); padding: 2px 6px; border-radius: 3px; font: inherit; font-size: 11px; text-align: center;" />% of tips</span></div>
      ` : ''}
      <div class="kv"><span class="k">ytd hours</span><span class="v">${fmtHM(stats.ytdHours)}</span><span class="x">logged</span></div>
      <div class="kv"><span class="k">avg hourly</span><span class="v" style="color:var(--cyan)">$${stats.ytdHourly.toFixed(2)}/hr</span><span class="x">effective</span></div>
    </div>

    ${hasHourlyData ? `
      <div class="out" style="margin-top:32px;">
        <h3>hourly rate trend · 6 months</h3>
        ${chartLegend([{color:'var(--cyan)', label:'effective $/hr (incl. tips)'}, {color:'var(--warm)', label:'base $/hr (paycheck only)'}])}
        <div class="chart-box" style="padding:16px 12px 0;">${renderLineChart(hourlyHistory, [{ key: 'hourly', color: 'var(--cyan)', label: 'eff $/hr' }, { key: 'baseHourly', color: 'var(--warm)', label: 'base $/hr' }], { format: 'plain', height: 180 })}</div>
      </div>
    ` : ''}

    ${sourceMix.length > 1 ? `
      <div class="out" style="margin-top:32px;">
        <h3>source mix · ${new Date(year,month).toLocaleString('en-US',{month:'long'}).toLowerCase()}</h3>
        <div class="chart-box pie-wrap">
          ${renderDonut(sourceMix, mixTotal, fmtMoney(mixTotal, {round: true}), 'monthly income')}
          <div class="pie-legend">${sourceMix.map(s => `<div class="pli"><div class="dot" style="background:${s.color}"></div><div style="color:var(--t-bright)">${escHTML(s.label)}</div><div class="num ok">${fmtMoney(s.value, {round: true})}</div><div class="num" style="color:var(--t-faint);">${(s.value/mixTotal*100).toFixed(1)}%</div></div>`).join('')}</div>
        </div>
      </div>
    ` : ''}

    <div class="out" style="margin-top:32px;">
      <h3>sources <span class="action" data-action="open-modal" data-type="income">+ add</span></h3>
      <div class="kv"><span class="k">total for ${new Date(year,month).toLocaleString('en-US',{month:'long'}).toLowerCase()}</span><span class="v ok">${fmtMoney(monthInc)}</span><span class="x">${monthTips>0?`incl. ${fmtMoney(monthTips)} tips`:''}</span></div>
      ${rows ? `<table class="tbl" style="margin-top:16px;"><thead><tr>${th('income','id','id')}${th('income','source','source')}${th('income','amount','amount')}${th('income','hours','hours')}<th>freq</th>${th('income','receivedAt','date')}<th class="r">monthly</th><th></th></tr></thead><tbody>${rows}</tbody></table>` : '<div class="empty-state">none.</div>'}
    </div>
  `;
}

function renderExpenses() {
  const { year, month } = getViewMonth();
  const { income: incTot, bills: total } = getMonthlyStats(year, month);
  const catData = aggregateBillsByCategory(state.bills, year, month);
  const pieData = catData.map(c => ({ label: c.label, value: c.total, color: c.color }));

  // Subscription audit: every recurring bill, sorted by annualized cost.
  const recurringBills = state.bills.filter(b => b.recurring && b.recurring !== 'once').map(b => {
    const amt = parseFloat(String(b.amount).replace(/[^\d.-]/g, '')) || 0;
    const annual = b.recurring === 'weekly' ? amt * 52 : b.recurring === 'biweekly' ? amt * 26 : b.recurring === 'monthly' ? amt * 12 : b.recurring === 'yearly' ? amt : 0;
    const monthly = monthlyEq(amt, b.recurring);
    return { ...b, _amt: amt, _annual: annual, _monthly: monthly };
  }).sort((a, b) => b._annual - a._annual);

  const rows = sortRows(state.bills, 'expenses').map(b => {
    const amt = parseFloat(String(b.amount).replace(/[^\d.-]/g, '')) || 0;
    const mo = (!b.recurring || b.recurring === 'once') ? ((b.dueDate || b.createdAt || isoDate(todayStart())).startsWith(`${year}-${String(month+1).padStart(2,'0')}`) ? amt : 0) : monthlyEq(amt, b.recurring);
    return `<tr class="row ${b.paid?'done':''}"><td><span class="id">${b.id}</span></td><td>${escHTML(b.name)} <span class="cat" style="color:${(CATEGORIES[b.category]||CATEGORIES.other).color}">${b.category||'none'}</span></td><td class="num bad">${fmtMoney(b.amount)}</td><td style="color:var(--t-faint);">${b.recurring||'once'}</td><td class="${b.dueDate&&!b.paid&&isOverdue(b.dueDate)?'err':''}">${formatDate(b.dueDate)}</td><td class="r num">${incTot&&mo>0?(mo/incTot*100).toFixed(1)+'%':'—'}</td><td class="r tbl-actions">${!b.paid?`<button class="ok" data-action="pay-bill" data-id="${b.id}">pay</button>`:`<button data-action="unpay-bill" data-id="${b.id}">undo</button>`}<button data-action="edit" data-type="expenses" data-id="${b.id}">edit</button><button class="err" data-action="rm" data-type="expenses" data-id="${b.id}">rm</button></td></tr>`;
  }).join('');

  const totalAnnual = recurringBills.reduce((s, b) => s + b._annual, 0);

  return `
    <div class="out">
      <h3>breakdown</h3>
      <div class="chart-box pie-wrap">
        ${renderDonut(pieData, total, fmtMoney(total, {round: true}))}
        <div class="pie-legend">${pieData.map(c => `<div class="pli"><div class="dot" style="background:${c.color}"></div><div style="color:var(--t-bright)">${c.label}</div><div class="num bad">${fmtMoney(c.value, {round: true})}</div><div class="num" style="color:var(--t-faint);">${(c.value/total*100).toFixed(1)}%</div></div>`).join('') || '<div class="empty-state">none.</div>'}</div>
      </div>
    </div>

    <div class="out">
      <h3>recurring <div style="display:flex;gap:16px"><span class="action" data-action="open-presets">+ presets</span><span class="action" data-action="open-modal" data-type="expenses">+ add</span></div></h3>
      <div class="kv"><span class="k">total monthly</span><span class="v bad">${fmtMoney(total)}</span><span class="x">${incTot ? (total/incTot*100).toFixed(1) + '%' : ''}</span></div>
      ${rows ? `<table class="tbl" style="margin-top:16px;"><thead><tr>${th('expenses','id','id')}${th('expenses','name','name')}${th('expenses','amount','amount')}<th>freq</th>${th('expenses','date','due')}<th class="r">% inc</th><th></th></tr></thead><tbody>${rows}</tbody></table>` : `<div class="empty-state">${incTot > 0 ? '<button class="btn-prominent" data-action="auto-fill-budget">auto-generate budget</button>' : 'add income to start.'}</div>`}
    </div>

    ${recurringBills.length ? `
    <div class="out" style="margin-top:32px;">
      <h3>subscription audit</h3>
      <div style="font-size:11.5px;color:var(--t-faint);margin-bottom:10px;line-height:1.6;">
        every recurring charge sorted by annualized cost — easy to spot creeping subs you forgot about.
      </div>
      <div class="kv"><span class="k">total recurring · annualized</span><span class="v bad">${fmtMoney(totalAnnual, {round: true})}</span><span class="x">${recurringBills.length} bill${recurringBills.length === 1 ? '' : 's'}</span></div>
      <div style="margin-top:12px;">
        ${recurringBills.map(b => `
          <div class="sub-row">
            <div class="sub-name">${escHTML(b.name)}<span class="freq">${b.recurring} · ${fmtMoney(b._amt)}</span></div>
            <div class="sub-mo">${fmtMoney(b._monthly, {round: true})}/mo</div>
            <div class="sub-yr">${fmtMoney(b._annual, {round: true})}/yr</div>
          </div>
        `).join('')}
      </div>
    </div>` : ''}
  `;
}

function renderBudget() {
  let { year, month } = getViewMonth();
  let cur = getMonthlyStats(year, month);
  let inc = cur.income; let fixed = cur.bills;

  // reference month fallback: if current view has no income, find the most recent month with data
  let basisLabel = null;
  if (inc === 0) {
    const ref = getReferenceMonth();
    if (ref) {
      year = ref.year; month = ref.month;
      inc = ref.income; fixed = ref.bills;
      basisLabel = ref.label;
    } else {
      // still no data — try the historical avg
      const s = getIncomeStats();
      if (s.avgMonthly > 0) { inc = s.avgMonthly; basisLabel = 'past avg'; }
    }
  }

  if (inc === 0) {
    return `
      <div class="out">
        <div class="empty-state" style="padding: 60px 20px;">
          <div style="font-size: 14px; color: var(--t-dim); margin-bottom: 12px;">no income data yet.</div>
          <button class="btn-prominent" data-action="open-modal" data-type="income">+ add income</button>
        </div>
      </div>`;
  }

  // savings target
  const savingsInfo = getSavingsTarget();
  const savings = savingsInfo.total;
  // mark each goal with its required monthly so rendering can show it
  state.goals.forEach(g => {
    const rem = Math.max(0, (parseFloat(g.targetAmount) || 0) - (parseFloat(g.currentAmount) || 0));
    if (rem > 0 && g.targetDate) {
      const td = new Date(g.targetDate + 'T00:00:00');
      if (td > todayStart()) g._reqMo = rem / Math.max(1, (td - todayStart()) / (30.44 * 86400000));
      else g._reqMo = 0;
    } else g._reqMo = 0;
  });

  const monthlyAllowance = Math.max(0, inc - fixed - savings);
  const weeklyAllowance = monthlyAllowance / 4.333;
  const dailyAllowance = monthlyAllowance / 30;

  // weekly category breakdown
  const billsByCat = aggregateBillsByCategory(state.bills, year, month);

  // petty: this week
  const weekEntries = getPettyThisWeek();
  const weekSpent = weekEntries.reduce((s, e) => s + (parseFloat(String(e.amount).replace(/[^\d.-]/g, '')) || 0), 0);
  const weekPct = weeklyAllowance > 0 ? (weekSpent / weeklyAllowance) * 100 : 0;
  let weekStatus = '';
  if (weeklyAllowance > 0) {
    if (weekPct >= 100) weekStatus = 'over';
    else if (weekPct >= 75) weekStatus = 'near';
  }
  const weekCats = aggregatePettyByCategory(weekEntries);
  // group week entries by date
  const byDay = {};
  for (const e of weekEntries) { (byDay[e.date] = byDay[e.date] || []).push(e); }
  const dayKeys = Object.keys(byDay).sort((a, b) => b.localeCompare(a));
  const todayIso = isoDate(todayStart());
  const yesterdayIso = isoDate(new Date(todayStart().getTime() - 86400000));
  const dayLabel = iso => iso === todayIso ? 'today' : iso === yesterdayIso ? 'yesterday' : formatDate(iso);

  // petty: this month total (for monthly stat)
  const monthPettyAll = state.petty.filter(p => p.date && p.date.startsWith(`${year}-${String(month+1).padStart(2,'0')}`));
  const monthPetty = monthPettyAll.reduce((s, p) => s + (parseFloat(String(p.amount).replace(/[^\d.-]/g, '')) || 0), 0);

  // burn-down (only meaningful for current month)
  const now = new Date();
  const isCurrentMonth = year === now.getFullYear() && month === now.getMonth();
  const burn = isCurrentMonth ? getBurnDown(year, month, monthlyAllowance) : null;

  // recommendations
  const recs = generateRecommendations(inc, fixed, state.bills, year, month);

  // category options for petty quick-add
  const pettyCatOptions = ['<option value="">— category —</option>']
    .concat(['food','transport','media','other'].map(k => `<option value="${k}"${k==='other'?' selected':''}>${CATEGORIES[k]?.label || k}</option>`)).join('');

  return `
    <div class="month-nav">
      <button data-action="prev-month">← prev</button>
      <div class="month-label">${new Date(year, month).toLocaleString('en-US',{month:'long',year:'numeric'}).toLowerCase()}${basisLabel ? ` <span style="color:var(--t-mute);font-size:11px;">· basis: ${basisLabel}</span>` : ''}</div>
      <button data-action="next-month">next →</button>
      ${(year !== now.getFullYear() || month !== now.getMonth()) ? '<button data-action="curr-month">jump to current</button>' : ''}
    </div>

    <div class="out">
      <h3>allowance</h3>
      <div class="kv"><span class="k">weekly</span><span class="v" style="color:var(--lime);font-size:18px;">${fmtMoney(weeklyAllowance)} / wk</span><span class="x">${fmtMoney(dailyAllowance)} / day</span></div>
      <div style="margin-top:12px;"></div>
      <div class="kv"><span class="k">income</span><span class="v ok">${fmtMoney(inc)}</span><span class="x">base</span></div>
      <div class="kv"><span class="k">− fixed</span><span class="v bad">−${fmtMoney(fixed)}</span><span class="x">${(fixed/inc*100).toFixed(1)}%</span></div>
      ${savings > 0 ? `<div class="kv"><span class="k">− savings target</span><span class="v bad">−${fmtMoney(savings)}</span><span class="x">${savingsInfo.breakdown.length} goal${savingsInfo.breakdown.length===1?'':'s'}</span></div>` : ''}
      <div class="kv"><span class="k">= available</span><span class="v warm">${fmtMoney(monthlyAllowance)}</span><span class="x">discretionary / mo</span></div>
      <div style="font-size:11px;color:var(--t-mute);margin-top:6px;font-style:italic;">÷ 4.33 weeks ≈ ${fmtMoney(weeklyAllowance)}/wk · ÷ 30 days ≈ ${fmtMoney(dailyAllowance)}/day</div>
    </div>

    ${billsByCat.length ? `
      <div class="out" style="margin-top:32px;">
        <h3>weekly budget by category <span style="font-size:10px;color:var(--t-faint);text-transform:none;letter-spacing:0;font-weight:400;">monthly bills ÷ 4.33 weeks</span></h3>
        ${billsByCat.map(c => `
          <div class="wkly-cat">
            <div class="swatch" style="background:${c.color};"></div>
            <span class="nm">${c.label}<span style="color:var(--t-faint);font-size:10px;margin-left:8px;">${c.names.length === 1 ? escHTML(c.names[0]) : `${c.names.length} bills`}</span></span>
            <span class="wkly">${fmtMoney(c.total/4.333, {round: true})}<span class="unit">/wk</span></span>
            <span class="mthly">${fmtMoney(c.total, {round: true})}/mo</span>
          </div>
        `).join('')}
        <div class="wkly-cat total">
          <div></div>
          <span class="nm">bills total</span>
          <span class="wkly">${fmtMoney(fixed/4.333, {round: true})}<span class="unit">/wk</span></span>
          <span class="mthly">${fmtMoney(fixed, {round: true})}/mo</span>
        </div>
        ${savings > 0 ? `
          <div class="wkly-cat" style="color:var(--cyan);">
            <div class="swatch" style="background:var(--cyan);"></div>
            <span class="nm" style="color:var(--cyan);">savings target</span>
            <span class="wkly" style="color:var(--cyan);">${fmtMoney(savings/4.333, {round: true})}<span class="unit">/wk</span></span>
            <span class="mthly" style="color:var(--cyan);">${fmtMoney(savings, {round: true})}/mo</span>
          </div>
        ` : ''}
        <div class="wkly-cat free ${monthlyAllowance < 0 ? 'over' : ''}">
          <div class="swatch" style="background:var(--lime);"></div>
          <span class="nm">${monthlyAllowance < 0 ? 'over budget' : 'free to spend'}</span>
          <span class="wkly">${fmtMoney(weeklyAllowance, {round: true})}<span class="unit">/wk</span></span>
          <span class="mthly">${fmtMoney(monthlyAllowance, {round: true})}/mo</span>
        </div>
      </div>
    ` : ''}

    <div class="out" style="margin-top:32px;">
      <h3>petty spending · this week <span class="action" data-action="goto-petty-form">+ log</span></h3>
      <div class="petty-card ${weekStatus}">
        <div class="petty-summary">
          <div>
            <div class="ps-label">spent this week</div>
            <div class="ps-value ${weekStatus === 'over' ? 'over' : ''}">${fmtMoney(weekSpent, {round: true})}</div>
            <div class="ps-sub">
              ${weeklyAllowance > 0
                ? (weekSpent <= weeklyAllowance
                    ? `${fmtMoney(weeklyAllowance - weekSpent, {round: true})} left of weekly allowance`
                    : `${fmtMoney(weekSpent - weeklyAllowance, {round: true})} over allowance`)
                : `${weekEntries.length} ${weekEntries.length === 1 ? 'entry' : 'entries'} this week`}
            </div>
          </div>
          ${weeklyAllowance > 0 ? `
            <div>
              <div class="ps-bar-label">
                <span>${fmtMoney(weekSpent, {round: true})} of ${fmtMoney(weeklyAllowance, {round: true})}</span>
                <span>${weekPct.toFixed(0)}%</span>
              </div>
              <div class="petty-progress"><div class="petty-progress-fill ${weekStatus}" style="width:${Math.min(100, weekPct).toFixed(1)}%;"></div></div>
              ${weekCats.length ? `<div class="petty-cats">${weekCats.map(c => `<span class="petty-cat-chip"><span class="dot" style="background:${(CATEGORIES[c.cat]||CATEGORIES.other).color};"></span>${(CATEGORIES[c.cat]||CATEGORIES.other).label} · ${fmtMoney(c.total, {round: true})}</span>`).join('')}</div>` : ''}
            </div>
          ` : `
            <div>
              ${weekCats.length ? `<div class="petty-cats">${weekCats.map(c => `<span class="petty-cat-chip"><span class="dot" style="background:${(CATEGORIES[c.cat]||CATEGORIES.other).color};"></span>${(CATEGORIES[c.cat]||CATEGORIES.other).label} · ${fmtMoney(c.total, {round: true})}</span>`).join('')}</div>` : ''}
            </div>
          `}
        </div>

        <form class="petty-add-form" id="petty-quick-add" autocomplete="off">
          <input type="text" name="amount" placeholder="$0.00" required inputmode="decimal" aria-label="Amount">
          <select name="category" aria-label="Category">${pettyCatOptions}</select>
          <input type="text" class="pa-note" name="note" placeholder="optional note (coffee, gas, etc)" maxlength="80" aria-label="Note">
          <input type="date" name="date" value="${todayIso}" aria-label="Date">
          <button type="submit">+ track</button>
        </form>

        <div class="petty-list">
          ${dayKeys.length === 0
            ? `<div class="petty-empty">no spends logged this week yet.</div>`
            : dayKeys.map(d => {
                const dayTotal = byDay[d].reduce((s, e) => s + (parseFloat(String(e.amount).replace(/[^\d.-]/g, '')) || 0), 0);
                return `
                  <div class="petty-day-head">
                    <span>${dayLabel(d)}</span>
                    <span class="pdh-total">${fmtMoney(dayTotal, {round: true})}</span>
                  </div>
                  ${byDay[d].map(e => `
                    <div class="petty-entry">
                      <span class="pe-cat"><span class="dot" style="background:${(CATEGORIES[e.category]||CATEGORIES.other).color};"></span>${(CATEGORIES[e.category]||CATEGORIES.other).label}</span>
                      <span class="pe-note ${e.note ? '' : 'empty'}">${e.note ? escHTML(e.note) : '—'}</span>
                      <span class="pe-amount">${fmtMoney(e.amount, {round: true})}</span>
                      <button class="pe-del" data-action="rm" data-type="petty" data-id="${e.id}" title="Delete">×</button>
                    </div>
                  `).join('')}
                `;
              }).join('')}
        </div>
      </div>
      ${monthPettyAll.length > weekEntries.length ? `<div style="font-size:11px;color:var(--t-faint);margin-top:6px;">+ ${monthPettyAll.length - weekEntries.length} earlier this month · total ${fmtMoney(monthPetty, {round: true})}</div>` : ''}
    </div>

    ${burn && monthlyAllowance > 0 ? `
      <div class="out" style="margin-top:32px;">
        <h3>discretionary burn-down</h3>
        ${chartLegend([{color:'var(--lime)', label:'actual'}, {color:'var(--t-faint)', label:'ideal pace'}])}
        <div class="chart-box" style="padding:16px 12px 0;">${renderBurnDown(burn)}</div>
        <div style="font-size:11.5px;color:var(--t-faint);margin-top:8px;line-height:1.5;">
          ${(() => {
            const today = todayStart(); const dayNum = today.getDate();
            const idealToday = (monthlyAllowance / new Date(year, month + 1, 0).getDate()) * dayNum;
            const actual = burn.points[dayNum - 1]?.actual || 0;
            const diff = actual - idealToday;
            if (Math.abs(diff) < 5) return `you're tracking right at the ideal pace.`;
            return diff > 0
              ? `you're <strong style="color:var(--err);">${fmtMoney(diff, {round: true})} over pace</strong> for the month — slow down to stay within budget.`
              : `you're <strong style="color:var(--ok);">${fmtMoney(-diff, {round: true})} under pace</strong> — room to spend.`;
          })()}
        </div>
      </div>
    ` : ''}

    <div class="out" style="margin-top:32px;">
      <h3>goals <span class="action" data-action="open-modal" data-type="goals">+ add</span></h3>
      ${state.goals.length
        ? state.goals.map(g => {
            const target = parseFloat(g.targetAmount) || 0; const saved = parseFloat(g.currentAmount) || 0;
            const p = target > 0 ? (saved / target) * 100 : 0;
            return `<div style="margin-bottom:16px;">
              <div class="kv" style="grid-template-columns:1fr auto;"><span class="v" style="color:var(--t-bright)">${escHTML(g.name)}${g.targetDate ? `<span style="color:var(--t-faint);font-size:11px;margin-left:8px;">by ${formatDate(g.targetDate)}</span>` : ''}</span><span class="v">${fmtMoney(saved, {round:true})} / ${fmtMoney(target, {round:true})}</span></div>
              <div class="bar-line ${p>=100?'ok':''}"><span class="bar" style="font-size:16px;">${asciiBar(p, 40)}</span><span class="x">${p.toFixed(1)}%</span></div>
              ${g._reqMo > 0 ? `<div class="x" style="color:var(--warn);margin-top:4px;">req ${fmtMoney(g._reqMo, {round: true})}/mo to hit target</div>` : ''}
              <div class="tbl-actions" style="margin-top:4px;text-align:right;"><button class="ok" data-action="goal-add" data-id="${g.id}">+ fund</button><button data-action="edit" data-type="goals" data-id="${g.id}">edit</button><button class="err" data-action="rm" data-type="goals" data-id="${g.id}">rm</button></div>
            </div>`;
          }).join('')
        : '<div class="empty-state">none.</div>'}
    </div>

    ${recs.length ? `
      <div class="out" style="margin-top:32px;">
        <h3>recommendations</h3>
        <div class="recs">
          ${recs.map(r => `<div class="rec-item ${r.type}"><div class="rec-icon ${r.type}">${r.type === 'warning' ? '!' : r.type === 'success' ? '✓' : 'i'}</div><div class="rec-text">${r.text}</div></div>`).join('')}
        </div>
      </div>
    ` : ''}
  `;
}

function renderTasks() {
  const rows = sortRows(state.tasks, 'tasks').map(t => `<tr class="row ${t.done?'done':''}"><td><span class="id">${t.id}</span></td><td>${escHTML(t.text)}</td><td><span class="tag ${t.priority==='high'?'err':(t.priority==='med'?'warn':'')}">${t.priority||'none'}</span></td><td class="${isOverdue(t.dueDate)&&!t.done?'err':''}">${formatDate(t.dueDate)}</td><td class="r tbl-actions"><button class="ok" data-action="toggle-task" data-id="${t.id}">${t.done?'undo':'done'}</button><button data-action="edit" data-type="tasks" data-id="${t.id}">edit</button><button class="err" data-action="rm" data-type="tasks" data-id="${t.id}">rm</button></td></tr>`).join('');
  return `<div class="out"><h3>tasks <span class="action" data-action="open-modal" data-type="tasks">+ add</span></h3>${rows?`<table class="tbl"><thead><tr>${th('tasks','id','id')}${th('tasks','text','task')}<th>priority</th>${th('tasks','date','due')}<th></th></tr></thead><tbody>${rows}</tbody></table>`:'<div class="empty-state">none.</div>'}</div>`;
}

document.addEventListener('click', e => {
  const tab = e.target.closest('.tab[data-tab]'); if (tab) { currentTab = tab.dataset.tab; localStorage.setItem(TAB_KEY, currentTab); render(); return; }
  const btn = e.target.closest('[data-action]'); if (!btn) return;
  const act = btn.dataset.action; if (act === 'goto') { currentTab = btn.dataset.tab; localStorage.setItem(TAB_KEY, currentTab); render(); }
  else if (act === 'open-modal') { openModal(btn.dataset.type); if(btn.dataset.type === 'petty') document.getElementById('petty-date-input').value = isoDate(todayStart()); }
  else if (act === 'close-modal') document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
  else if (act === 'sort') { const t = btn.dataset.type, c = btn.dataset.col; if (sortState[t].col === c) sortState[t].dir = sortState[t].dir === 'asc' ? 'desc' : 'asc'; else { sortState[t].col = c; sortState[t].dir = 'asc'; } render(); }
  else if (act === 'rm') { if (confirm('Delete?')) { const t = btn.dataset.type === 'expenses' ? 'bills' : btn.dataset.type; state[t] = state[t].filter(x => x.id !== btn.dataset.id); saveState(); render(); } }
  else if (act === 'edit') openModal(btn.dataset.type, btn.dataset.id);
  else if (act === 'pay-bill') { const b = state.bills.find(x => x.id === btn.dataset.id); if (b) { if (b.recurring && b.recurring !== 'once' && b.dueDate) { const d = new Date(b.dueDate); if (b.recurring==='monthly') d.setMonth(d.getMonth()+1); else if (b.recurring==='weekly') d.setDate(d.getDate()+7); else if (b.recurring==='yearly') d.setFullYear(d.getFullYear()+1); b.dueDate = isoDate(d); } else b.paid = true; saveState(); render(); } }
  else if (act === 'unpay-bill') { const b = state.bills.find(x => x.id === btn.dataset.id); if (b) { b.paid = false; saveState(); render(); } }
  else if (act === 'toggle-task') { const t = state.tasks.find(x => x.id === btn.dataset.id); if (t) { t.done = !t.done; saveState(); render(); } }
  else if (act === 'goal-add') { const g = state.goals.find(x => x.id === btn.dataset.id); if (g) { const a = parseFloat(prompt(`Fund "${g.name}":`)); if (a > 0) { g.currentAmount += a; saveState(); render(); } } }
  else if (act === 'prev-month') { const v=getViewMonth(); viewMonth={year:v.month===0?v.year-1:v.year, month:v.month===0?11:v.month-1}; render(); }
  else if (act === 'next-month') { const v=getViewMonth(); viewMonth={year:v.month===11?v.year+1:v.year, month:v.month===11?0:v.month+1}; render(); }
  else if (act === 'curr-month') { viewMonth = null; render(); }
  else if (act === 'open-presets') openPresetPicker();
  else if (act === 'auto-fill-budget') { const v=getViewMonth(); const { income: inc } = getMonthlyStats(v.year, v.month); if (inc > 0) { PRESET_BILLS.forEach(p => state.bills.push({ id: nextId('bills'), name: p.name, amount: Math.round(inc*(p.pct/100)), category: p.category, recurring: p.recurring, paid: false, createdAt: isoDate(todayStart()) })); saveState(); render(); } }
  else if (act === 'export') { const b = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'}); const u = URL.createObjectURL(b); const a = document.createElement('a'); a.href = u; a.download = 'ledgeon.json'; a.click(); URL.revokeObjectURL(u); }
  else if (act === 'import') document.getElementById('file-import').click();
  else if (act === 'goto-petty-form') { const f = document.getElementById('petty-quick-add'); if (f) { f.scrollIntoView({behavior:'smooth', block:'center'}); setTimeout(() => f.querySelector('input[name="amount"]')?.focus(), 250); } else { openModal('petty'); document.getElementById('petty-date-input').value = isoDate(todayStart()); } }
  else if (act === 'reset') { if(confirm('Wipe all data?')) { state = {tasks:[], bills:[], events:[], income:[], goals:[], petty:[]}; saveState(); render(); } }
});

// inline petty quick-add (lives in budget tab)
document.addEventListener('submit', e => {
  if (e.target.id !== 'petty-quick-add') return;
  e.preventDefault();
  const fd = new FormData(e.target);
  const amt = parseFloat(String(fd.get('amount')).replace(/[$,\s]/g, '')) || 0;
  if (amt <= 0) return;
  state.petty.push({
    id: nextId('petty'),
    amount: amt,
    category: fd.get('category') || 'other',
    note: fd.get('note') || '',
    date: fd.get('date') || isoDate(todayStart()),
    createdAt: isoDate(todayStart()),
  });
  saveState(); render();
});

// tax % control (lives in income tab) — fires on blur/enter so we don't kill focus mid-type
document.addEventListener('change', e => {
  if (e.target.id === 'tax-pct-input') {
    const v = parseFloat(e.target.value);
    if (!isNaN(v) && v >= 0 && v <= 100) { setTaxPct(v); render(); }
  }
});

document.getElementById('file-import').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = ev => { try { const imp = JSON.parse(ev.target.result); if(confirm('Import data?')) { state = { tasks: imp.tasks||[], bills: imp.bills||[], events: imp.events||[], income: imp.income||[], goals: imp.goals||[], petty: imp.petty||[] }; saveState(); render(); } } catch { alert('Error.'); } }; r.readAsText(f); e.target.value = '';
});

document.addEventListener('change', e => { if (e.target.id === 'tipsEnabled') { const g = document.getElementById('tipsInputGroup'); if (e.target.checked) { g.style.display = 'flex'; setTimeout(() => g.style.opacity = '1', 10); } else { g.style.opacity = '0'; setTimeout(() => g.style.display = 'none', 200); } } });

function openModal(type, id = null) {
  document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
  const f = document.querySelector(`#modal-${type} form`); if (!f) return; f.reset();
  editingItem = id ? { type, id } : null;
  const tArr = type === 'expenses' ? state.bills : state[type];
  if (id) {
    const item = tArr.find(x => x.id === id); if (item) {
      Object.keys(item).forEach(k => { if (f.elements[k]) f.elements[k].value = item[k]; });
      if (type==='income') {
        f.elements['amount'].value = item.baseAmount !== undefined ? item.baseAmount : item.amount;
        // split decimal hours into hours + minutes inputs
        if (item.hours != null && !isNaN(item.hours) && item.hours > 0) {
          const totalMin = Math.round(Number(item.hours) * 60);
          const h = Math.floor(totalMin / 60); const m = totalMin % 60;
          f.elements['hours'].value = h ? h : '';
          f.elements['minutes'].value = m ? m : '';
        } else { f.elements['hours'].value = ''; f.elements['minutes'].value = ''; }
        f.elements['tipsEnabled'].checked = !!item.tipsEnabled; f.elements['tipsValue'].value = item.tipsValue || 6; f.elements['tipsType'].value = item.tipsType || 'percent';
        f.elements['tipsEnabled'].dispatchEvent(new Event('change', {bubbles: true}));
      }
    }
  }
  document.getElementById('modal-'+type).classList.add('open');
  setTimeout(() => f.querySelector('input')?.focus(), 50);
}

document.querySelectorAll('form[data-type]').forEach(f => {
  f.addEventListener('submit', e => {
    e.preventDefault(); const fd = new FormData(f); const type = f.dataset.type;
    const isEdit = editingItem && editingItem.type === type;
    const tArr = type === 'expenses' ? state.bills : state[type];
    const item = isEdit ? tArr.find(x => x.id === editingItem.id) : { id: nextId(type==='expenses'?'bills':type), createdAt: isoDate(todayStart()) };
    const pAmt = v => { const n = parseFloat(String(v).replace(/[$,\s]/g,'')); return isNaN(n)?0:n; };

    if (type === 'income') {
      item.source = fd.get('source'); const base = pAmt(fd.get('amount')); item.baseAmount = base;
      const hVal = parseFloat(fd.get('hours')) || 0; const mVal = parseFloat(fd.get('minutes')) || 0;
      const totalHours = hVal + mVal / 60; item.hours = totalHours > 0 ? totalHours : null;
      item.tipsEnabled = f.elements['tipsEnabled'].checked; item.tipsType = f.elements['tipsType'].value;
      let final = base; if (item.tipsEnabled) { let tv = pAmt(f.elements['tipsValue'].value); if (tv === 0) tv = 6; item.tipsValue = tv; final += item.tipsType === 'percent' ? base * (tv / 100) : tv; } else item.tipsValue = 0;
      item.amount = final; item.frequency = fd.get('frequency') || 'monthly'; item.receivedAt = fd.get('receivedAt') || null;
    } else if (type === 'expenses') {
      item.name = fd.get('name'); item.amount = pAmt(fd.get('amount')); item.category = fd.get('category'); item.recurring = fd.get('recurring') || 'monthly'; item.dueDate = fd.get('date') || null; if (!isEdit) item.paid = false;
    } else if (type === 'tasks') { item.text = fd.get('text'); item.priority = fd.get('priority'); item.dueDate = fd.get('date') || null; if (!isEdit) item.done = false;
    } else if (type === 'goals') { item.name = fd.get('name'); item.targetAmount = pAmt(fd.get('targetAmount')); item.currentAmount = pAmt(fd.get('currentAmount')); item.targetDate = fd.get('targetDate') || null;
    } else if (type === 'petty') { item.amount = pAmt(fd.get('amount')); item.category = fd.get('category'); item.note = fd.get('note'); item.date = fd.get('date'); }

    if (!isEdit) tArr.push(item);
    if (!isEdit && type === 'income' && state.bills.length === 0) {
       if(confirm("Add starter budget based on this income?")) {
           const iMo = monthlyEq(item.amount, item.frequency);
           PRESET_BILLS.forEach(p => state.bills.push({ id: nextId('bills'), name: p.name, amount: Math.round(iMo*(p.pct/100)), category: p.category, recurring: p.recurring, paid: false, createdAt: isoDate(todayStart()) }));
           currentTab = 'expenses'; localStorage.setItem(TAB_KEY, currentTab);
       }
    }
    saveState(); document.querySelectorAll('.modal').forEach(m => m.classList.remove('open')); render();
  });
});

let presetSel = new Set();
function openPresetPicker() {
  presetSel.clear(); const { year, month } = getViewMonth(); const { income: inc } = getMonthlyStats(year, month);
  const list = document.getElementById('preset-list'); if (inc===0) list.innerHTML = `<div class="empty-state">add income first.</div>`;
  else {
    const ex = new Set(state.bills.map(b=>b.name.toLowerCase()));
    list.innerHTML = PRESET_BILLS.map((p, i) => `<div class="preset-row ${ex.has(p.name.toLowerCase())?'exists':''}" data-idx="${i}"><div class="box"></div><div class="nm">${p.name}</div><div class="pct">${fmtMoney(inc*(p.pct/100),{round:true})}<br>${p.pct}%</div></div>`).join('');
    list.querySelectorAll('.preset-row:not(.exists)').forEach(r => r.addEventListener('click', () => {
      const i = parseInt(r.dataset.idx); if (presetSel.has(i)) { presetSel.delete(i); r.classList.remove('sel'); } else { presetSel.add(i); r.classList.add('sel'); }
      document.getElementById('preset-apply-btn').disabled = presetSel.size===0;
    }));
  }
  document.getElementById('modal-presets').classList.add('open');
}

document.getElementById('preset-apply-btn').addEventListener('click', () => {
  const { year, month } = getViewMonth(); const { income: inc } = getMonthlyStats(year, month);
  presetSel.forEach(idx => { const p = PRESET_BILLS[idx]; state.bills.push({ id: nextId('bills'), name: p.name, amount: Math.round(inc*(p.pct/100)), category: p.category, recurring: p.recurring, paid: false, createdAt: isoDate(todayStart()) }); });
  saveState(); document.getElementById('modal-presets').classList.remove('open'); render();
});

render();
</script>
