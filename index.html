<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ledgeon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0e13;
    --bg-deep: #070a0f;
    --bg-soft: #11151c;
    --bg-input: #1a1f28;
    --line: #1e242e;
    --line-soft: #161b23;
    --line-strong: #2c3340;
    --t: #d6d9de;
    --t-bright: #fafafa;
    --t-dim: #a1a8b3;
    --t-faint: #6e7480;
    --t-mute: #4a4f5a;
    --warm: #d4a574;
    --lime: #b3dd44;
    --lime-soft: rgba(179,221,68,0.12);
    --ok: #86c98a;
    --bad: #e09f7c;
    --warn: #e0c46c;
    --err: #e57373;
    --cyan: #6dd0d0;
    --r: 4px;
  }

  html, body {
    background: var(--bg);
    color: var(--t);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 13.5px;
    line-height: 1.6;
    height: 100%;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background: radial-gradient(ellipse at 12% -10%, rgba(212,165,116,0.04), transparent 50%), radial-gradient(ellipse at 90% 110%, rgba(179,221,68,0.025), transparent 50%), var(--bg);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  button { cursor: pointer; font: inherit; color: inherit; background: none; border: none; }
  input, select, textarea { font: inherit; color: inherit; }
  .num { font-variant-numeric: tabular-nums; }

  header {
    flex-shrink: 0;
    display: flex; align-items: center; gap: 24px;
    padding: 12px 24px; border-bottom: 1px solid var(--line);
    background: rgba(11,14,19,0.85); backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 50; overflow-x: auto;
  }
  header .brand { color: var(--t-bright); font-weight: 600; letter-spacing: -0.2px; font-size: 14px; flex-shrink: 0; }
  header .brand b { color: var(--warm); }

  .tabs { display: flex; gap: 4px; flex: 1; }
  .tab {
    color: var(--t-faint); font-size: 12.5px; padding: 4px 12px; border-radius: var(--r);
    transition: all 0.15s; white-space: nowrap; display: flex; align-items: center; gap: 6px; text-transform: lowercase;
  }
  .tab:hover { color: var(--t-bright); background: var(--bg-soft); }
  .tab.active { color: var(--lime); background: var(--lime-soft); }
  .tab .badge { font-size: 10px; color: var(--bg); background: var(--t-mute); padding: 0 5px; border-radius: 999px; font-weight: 600; }
  .tab.active .badge { background: var(--lime); color: var(--bg); }

  .right-actions { display: flex; gap: 10px; }
  .right-actions button { color: var(--t-faint); border: 1px solid var(--line); padding: 4px 10px; border-radius: var(--r); font-size: 11.5px; transition: all 0.15s; text-transform: lowercase; }
  .right-actions button:hover { color: var(--lime); border-color: var(--lime); }

  main { flex: 1; max-width: 1000px; margin: 0 auto; width: 100%; padding: 32px 24px 60px; }

  .out { margin-bottom: 24px; animation: fadeIn 0.2s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  
  .out h3 {
    color: var(--warm); font-size: 11.5px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 2.5px; border-bottom: 1px solid var(--line); padding-bottom: 8px;
    margin-bottom: 16px; display: flex; justify-content: space-between; align-items: baseline;
  }
  .out h3 .action { color: var(--cyan); font-size: 10.5px; letter-spacing: 1px; text-transform: lowercase; font-weight: 400; cursor: pointer; }
  .out h3 .action:hover { color: var(--t-bright); text-decoration: underline; }

  .kv { display: grid; grid-template-columns: 220px 1fr auto; gap: 14px; align-items: baseline; padding: 4px 0; }
  .kv .k { color: var(--t-faint); font-size: 12.5px; text-transform: lowercase; }
  .kv .v { color: var(--t-bright); font-weight: 500; font-variant-numeric: tabular-nums; }
  .kv .v.ok { color: var(--ok); }
  .kv .v.bad { color: var(--bad); }
  .kv .v.warm { color: var(--warm); }
  .kv .v.warn { color: var(--warn); }
  .kv .x { color: var(--t-faint); font-size: 12px; text-align: right; }

  .bar-line { display: flex; align-items: center; gap: 12px; padding: 4px 0; }
  .bar-line .lbl { color: var(--t-dim); width: 140px; flex-shrink: 0; text-transform: lowercase; font-size: 12.5px; }
  .bar-line .bar { flex: 1; letter-spacing: -1px; line-height: 1; font-size: 14px; }
  .bar-line .bar .f { color: var(--cyan); }
  .bar-line .bar .e { color: var(--line-strong); }
  .bar-line.ok .bar .f { color: var(--ok); }
  .bar-line.bad .bar .f { color: var(--bad); }
  .bar-line.warm .bar .f { color: var(--warm); }
  .bar-line .va { color: var(--t-bright); font-weight: 500; min-width: 110px; text-align: right; font-variant-numeric: tabular-nums;}
  .bar-line .x { color: var(--t-faint); font-size: 11px; margin-left: 8px; }

  table.tbl { width: 100%; border-collapse: collapse; margin-bottom: 12px; font-size: 12.5px; }
  table.tbl th { text-align: left; color: var(--t-faint); font-weight: 400; font-size: 10.5px; text-transform: uppercase; letter-spacing: 1.5px; padding: 6px 12px 10px 0; border-bottom: 1px solid var(--line); cursor: pointer; user-select: none; }
  table.tbl th:hover { color: var(--lime); }
  table.tbl th.sorted { color: var(--lime); }
  table.tbl th.sorted::after { content: ' ↓'; }
  table.tbl th.sorted.asc::after { content: ' ↑'; }
  table.tbl th.r { text-align: right; }
  table.tbl td { padding: 8px 12px 8px 0; border-bottom: 1px solid var(--line-soft); }
  table.tbl td.r { text-align: right; }
  table.tbl tr.row:hover { background: var(--bg-soft); }
  table.tbl tr.row td:first-child { padding-left: 8px; }
  table.tbl tr.done td { opacity: 0.5; text-decoration: line-through; }
  table.tbl td .id { color: var(--t-mute); font-size: 11px; background: var(--bg-deep); padding: 1px 6px; border-radius: 3px; border: 1px solid var(--line); }
  table.tbl td .cat { color: var(--t-mute); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.6px; margin-left: 10px; }
  
  .tbl-actions button { color: var(--t-faint); border: 1px solid var(--line); padding: 2px 8px; border-radius: 3px; font-size: 11px; margin-left: 6px; transition: all 0.15s; }
  .tbl-actions button:hover { color: var(--lime); border-color: var(--lime); }
  .tbl-actions button.err:hover { color: var(--err); border-color: var(--err); }
  .tbl-actions button.ok:hover { color: var(--ok); border-color: var(--ok); }
  .btn-prominent { display: inline-block; padding: 8px 16px; background: rgba(179,221,68,0.1); border: 1px solid var(--lime); color: var(--lime); border-radius: 4px; font-weight: 500; transition: 0.15s; }
  .btn-prominent:hover { background: var(--lime); color: var(--bg-deep); }

  .tag { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 10.5px; text-transform: uppercase; letter-spacing: 1px; }
  .tag.ok { background: rgba(134,201,138,0.13); color: var(--ok); }
  .tag.warn { background: rgba(224,196,108,0.13); color: var(--warn); }
  .tag.err { background: rgba(229,115,115,0.13); color: var(--err); }
  .tag.info { background: rgba(109,208,208,0.13); color: var(--cyan); }

  .chart-box { background: var(--bg-deep); border: 1px dashed var(--line); border-radius: var(--r); padding: 24px; margin-bottom: 24px; }
  .trend-svg { width: 100%; height: 180px; display: block; }
  .pie-wrap { display: flex; align-items: center; gap: 32px; flex-wrap: wrap; }
  .pie-wrap svg.pie { width: 160px; height: 160px; flex-shrink: 0; }
  .pie-wrap .pie-center-label { fill: var(--t-bright); font-size: 24px; font-weight: 600; text-anchor: middle; font-family: 'JetBrains Mono', monospace; }
  .pie-wrap .pie-center-sub { fill: var(--t-faint); font-size: 10px; text-anchor: middle; letter-spacing: 1px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; }
  .pie-legend { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 200px; }
  .pie-legend .pli { display: grid; grid-template-columns: 14px 1fr auto auto; gap: 12px; align-items: baseline; font-size: 12.5px; }
  .pie-legend .pli .dot { width: 10px; height: 10px; border-radius: 2px; }

  .month-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; padding: 8px 12px; background: var(--bg-soft); border: 1px solid var(--line); border-radius: var(--r); }
  .month-nav .month-label { flex: 1; text-align: center; font-size: 13px; color: var(--t-bright); font-weight: 500; text-transform: lowercase; }
  .month-nav button { color: var(--t-dim); padding: 4px 12px; border: 1px solid var(--line); border-radius: 3px; font-size: 11.5px; transition: 0.15s; }
  .month-nav button:hover { color: var(--lime); border-color: var(--lime); background: var(--bg-input); }

  .modal { display: none; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .modal.open { display: flex; }
  .modal-backdrop { position: absolute; inset: 0; background: rgba(7, 10, 15, 0.85); backdrop-filter: blur(4px); }
  .modal-card { position: relative; background: var(--bg-soft); border: 1px solid var(--line-strong); border-radius: var(--r); width: 100%; max-width: 480px; padding: 24px; box-shadow: 0 12px 32px rgba(0,0,0,0.5); }
  .modal-title { color: var(--warm); font-size: 11.5px; text-transform: uppercase; letter-spacing: 2.5px; font-weight: 600; margin-bottom: 18px; border-bottom: 1px solid var(--line); padding-bottom: 8px; }

  .form-row { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .form-col { flex: 1; min-width: 140px; }
  .form-label { display: block; color: var(--t-faint); font-size: 11px; text-transform: lowercase; margin-bottom: 6px; }
  .input, .select, textarea { width: 100%; background: var(--bg-deep); border: 1px solid var(--line); color: var(--t-bright); font: inherit; font-size: 13px; padding: 8px 12px; border-radius: 3px; outline: none; }
  .input:focus, .select:focus, textarea:focus { border-color: var(--lime); }
  .input::placeholder, textarea::placeholder { color: var(--t-mute); }
  .form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; border-top: 1px solid var(--line); padding-top: 16px; }
  .form-actions button { padding: 6px 16px; border: 1px solid var(--line); color: var(--t-dim); border-radius: 3px; font-size: 12.5px; transition: 0.15s; text-transform: lowercase; }
  .form-actions button:hover { color: var(--t-bright); border-color: var(--t-dim); }
  .form-actions button.primary { color: var(--lime); border-color: var(--lime); }
  .form-actions button.primary:hover { background: var(--lime-soft); }

  .empty-state { padding: 40px 20px; text-align: center; color: var(--t-mute); font-style: italic; border: 1px dashed var(--line); border-radius: var(--r); }

  .hours-input {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg-deep); border: 1px solid var(--line);
    color: var(--t-bright); border-radius: 3px; padding: 0 12px;
    height: 36px; transition: border-color 0.15s;
  }
  .hours-input:focus-within { border-color: var(--lime); }
  .hours-input input {
    background: transparent; border: none; color: var(--t-bright);
    font: inherit; font-size: 13px; padding: 0; outline: none;
    width: 36px; text-align: center; font-variant-numeric: tabular-nums;
    -moz-appearance: textfield;
  }
  .hours-input input::-webkit-outer-spin-button,
  .hours-input input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .hours-input input::placeholder { color: var(--t-mute); }
  .hours-input span { color: var(--t-faint); font-size: 12px; }

  .preset-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border: 1px solid transparent; border-radius: 3px; cursor: pointer; transition: 0.15s; }
  .preset-row:hover { background: var(--bg-deep); border-color: var(--line); }
  .preset-row .box { width: 14px; height: 14px; border: 1px solid var(--t-faint); border-radius: 2px; display: flex; align-items: center; justify-content: center; }
  .preset-row.sel .box { background: var(--lime); border-color: var(--lime); }
  .preset-row.sel .box::after { content: ''; width: 7px; height: 4px; border-left: 2px solid var(--bg-deep); border-bottom: 2px solid var(--bg-deep); transform: rotate(-45deg) translate(0,-1px); }
  .preset-row.exists { opacity: 0.4; pointer-events: none; }
  .preset-row .nm { flex: 1; color: var(--t); font-size: 13px; }
  .preset-row .pct { color: var(--t-faint); font-size: 11px; text-align: right;}

  /* ─── kpi grid ─── */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .kpi-card {
    background: var(--bg-soft); border: 1px solid var(--line); border-radius: var(--r);
    padding: 14px 16px; transition: 0.15s;
  }
  .kpi-card:hover { border-color: var(--line-strong); }
  .kpi-card .kpi-label { color: var(--t-faint); font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 6px; }
  .kpi-card .kpi-value { color: var(--t-bright); font-size: 20px; font-weight: 600; font-variant-numeric: tabular-nums; line-height: 1.2; }
  .kpi-card .kpi-value.ok { color: var(--ok); }
  .kpi-card .kpi-value.bad { color: var(--bad); }
  .kpi-card .kpi-value.warm { color: var(--warm); }
  .kpi-card .kpi-value.cyan { color: var(--cyan); }
  .kpi-card .kpi-value.lime { color: var(--lime); }
  .kpi-card .kpi-sub { color: var(--t-faint); font-size: 11px; margin-top: 4px; }
  .kpi-delta { display: inline-block; font-size: 11px; margin-left: 6px; }
  .kpi-delta.up { color: var(--ok); }
  .kpi-delta.down { color: var(--bad); }
  .kpi-delta.flat { color: var(--t-faint); }
  .kpi-progress { height: 4px; background: var(--bg-deep); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .kpi-progress .fill { height: 100%; background: var(--lime); transition: width 0.3s; border-radius: 2px; }
  .kpi-progress .fill.bad { background: var(--bad); }
  .kpi-progress .fill.warn { background: var(--warn); }

  /* ─── chart legend ─── */
  .chart-legend { display: flex; gap: 16px; font-size: 11px; color: var(--t-faint); margin-bottom: 8px; flex-wrap: wrap; }
  .chart-legend .li { display: inline-flex; align-items: center; gap: 6px; }
  .chart-legend .dot { width: 10px; height: 2.5px; border-radius: 2px; }

  /* ─── callouts row (largest bill / top cat / biggest income) ─── */
  .callouts { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-top: 8px; }
  .callout {
    background: var(--bg-deep); border: 1px solid var(--line); border-radius: var(--r);
    padding: 10px 14px; font-size: 12px;
  }
  .callout .clo-label { color: var(--t-faint); font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
  .callout .clo-name { color: var(--t-bright); margin-bottom: 2px; }
  .callout .clo-amt { color: var(--t-dim); font-size: 11px; font-variant-numeric: tabular-nums; }

  /* ─── petty card (full rebuild) ─── */
  .petty-card {
    background: var(--bg-soft); border: 1px solid var(--line); border-radius: var(--r);
    padding: 16px; margin-bottom: 16px; border-left: 2px solid var(--lime);
  }
  .petty-card.near { border-left-color: var(--warn); }
  .petty-card.over { border-left-color: var(--err); }
  .petty-summary { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 14px; }
  .petty-summary > div { flex: 1; min-width: 180px; }
  .petty-summary .ps-label { color: var(--t-faint); font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
  .petty-summary .ps-value { color: var(--t-bright); font-size: 22px; font-weight: 600; font-variant-numeric: tabular-nums; }
  .petty-summary .ps-value.over { color: var(--err); }
  .petty-summary .ps-sub { color: var(--t-faint); font-size: 11px; margin-top: 4px; }
  .petty-summary .ps-bar-label { display: flex; justify-content: space-between; color: var(--t-faint); font-size: 11px; margin-bottom: 4px; }
  .petty-progress { height: 6px; background: var(--bg-deep); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
  .petty-progress-fill { height: 100%; background: var(--lime); transition: width 0.3s; border-radius: 3px; }
  .petty-progress-fill.near { background: var(--warn); }
  .petty-progress-fill.over { background: var(--err); }

  .petty-cats { display: flex; gap: 6px; flex-wrap: wrap; }
  .petty-cat-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--bg-deep); border: 1px solid var(--line);
    padding: 3px 10px; border-radius: 999px; font-size: 11px; color: var(--t-dim);
  }
  .petty-cat-chip .dot { width: 8px; height: 8px; border-radius: 50%; }

  .petty-add-form {
    display: grid; grid-template-columns: 110px 130px 1fr 130px auto; gap: 8px;
    margin-bottom: 14px; padding: 10px; background: var(--bg-deep);
    border: 1px dashed var(--line); border-radius: var(--r);
  }
  .petty-add-form input, .petty-add-form select {
    background: var(--bg-soft); border: 1px solid var(--line); color: var(--t-bright);
    font: inherit; font-size: 12.5px; padding: 6px 10px; border-radius: 3px; outline: none;
  }
  .petty-add-form input:focus, .petty-add-form select:focus { border-color: var(--lime); }
  .petty-add-form button {
    background: var(--lime-soft); border: 1px solid var(--lime); color: var(--lime);
    padding: 6px 14px; border-radius: 3px; font-size: 12px; transition: 0.15s; text-transform: lowercase;
  }
  .petty-add-form button:hover { background: var(--lime); color: var(--bg-deep); }
  @media (max-width: 720px) { .petty-add-form { grid-template-columns: 1fr 1fr; } .petty-add-form .pa-note { grid-column: 1 / -1; } .petty-add-form button { grid-column: 1 / -1; } }

  .petty-list { margin-top: 4px; }
  .petty-day-head {
    display: flex; justify-content: space-between; align-items: baseline;
    color: var(--t-faint); font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px;
    padding: 12px 0 6px; border-bottom: 1px solid var(--line); margin-bottom: 6px;
  }
  .petty-day-head .pdh-total { color: var(--t-dim); font-size: 11px; font-variant-numeric: tabular-nums; }
  .petty-entry {
    display: grid; grid-template-columns: 130px 1fr auto 26px; gap: 12px; align-items: center;
    padding: 6px 0; font-size: 12.5px; border-bottom: 1px solid var(--line-soft);
  }
  .petty-entry .pe-cat { display: inline-flex; align-items: center; gap: 6px; color: var(--t-dim); font-size: 11px; }
  .petty-entry .pe-cat .dot { width: 8px; height: 8px; border-radius: 2px; }
  .petty-entry .pe-note { color: var(--t-bright); }
  .petty-entry .pe-note.empty { color: var(--t-mute); font-style: italic; }
  .petty-entry .pe-amount { color: var(--bad); font-variant-numeric: tabular-nums; font-weight: 500; }
  .petty-entry .pe-del {
    color: var(--t-mute); border: 1px solid var(--line); padding: 0; width: 22px; height: 22px;
    border-radius: 3px; font-size: 13px; line-height: 1; transition: 0.15s;
  }
  .petty-entry .pe-del:hover { color: var(--err); border-color: var(--err); }
  .petty-empty { padding: 16px; text-align: center; color: var(--t-mute); font-style: italic; font-size: 12px; }

  /* ─── recommendations ─── */
  .recs { display: flex; flex-direction: column; gap: 8px; }
  .rec-item {
    display: flex; gap: 10px; padding: 10px 14px;
    background: var(--bg-deep); border: 1px solid var(--line);
    border-left-width: 2px; border-radius: var(--r); font-size: 12.5px; line-height: 1.5;
  }
  .rec-item.warning { border-left-color: var(--err); }
  .rec-item.success { border-left-color: var(--ok); }
  .rec-item.info { border-left-color: var(--cyan); }
  .rec-icon {
    width: 18px; height: 18px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 1px;
  }
  .rec-icon.warning { background: rgba(229,115,115,0.15); color: var(--err); }
  .rec-icon.success { background: rgba(134,201,138,0.15); color: var(--ok); }
  .rec-icon.info { background: rgba(109,208,208,0.15); color: var(--cyan); }
  .rec-text { color: var(--t); flex: 1; }
  .rec-text strong { color: var(--t-bright); font-weight: 600; }

  /* ─── weekly category breakdown ─── */
  .wkly-cat {
    display: grid; grid-template-columns: 12px 1fr auto auto;
    gap: 12px; align-items: baseline; padding: 6px 0; font-size: 12.5px;
    border-bottom: 1px solid var(--line-soft);
  }
  .wkly-cat .swatch { width: 10px; height: 10px; border-radius: 2px; }
  .wkly-cat .nm { color: var(--t-bright); }
  .wkly-cat .wkly { color: var(--t-bright); font-variant-numeric: tabular-nums; font-size: 13px; }
  .wkly-cat .wkly .unit { color: var(--t-faint); font-size: 10px; margin-left: 2px; }
  .wkly-cat .mthly { color: var(--t-faint); font-size: 11px; font-variant-numeric: tabular-nums; min-width: 70px; text-align: right; }
  .wkly-cat.total { border-top: 1px solid var(--line); border-bottom: none; padding-top: 10px; margin-top: 4px; font-weight: 500; }
  .wkly-cat.free { color: var(--lime); border-bottom: none; }
  .wkly-cat.free .nm, .wkly-cat.free .wkly, .wkly-cat.free .mthly { color: var(--lime); }
  .wkly-cat.free.over .nm, .wkly-cat.free.over .wkly, .wkly-cat.free.over .mthly { color: var(--err); }

  /* ─── heatmap calendar ─── */
  .heatmap { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; max-width: 380px; }
  .heatmap .hm-day {
    aspect-ratio: 1; border-radius: 2px; background: var(--bg-deep);
    border: 1px solid var(--line); font-size: 9px;
    display: flex; align-items: flex-start; justify-content: flex-end;
    padding: 2px 3px; color: var(--t-mute); position: relative;
  }
  .heatmap .hm-day.empty { background: transparent; border-color: transparent; }
  .heatmap .hm-day.today { box-shadow: inset 0 0 0 1px var(--lime); }
  .heatmap .hm-dow {
    font-size: 9px; color: var(--t-faint); text-transform: uppercase; letter-spacing: 1px;
    text-align: center; padding-bottom: 2px;
  }

  /* ─── subscription audit row ─── */
  .sub-row {
    display: grid; grid-template-columns: 1fr auto auto;
    gap: 12px; align-items: baseline; padding: 8px 0;
    border-bottom: 1px solid var(--line-soft); font-size: 12.5px;
  }
  .sub-row .sub-name { color: var(--t-bright); }
  .sub-row .sub-name .freq { color: var(--t-faint); font-size: 10px; margin-left: 8px; text-transform: uppercase; letter-spacing: 1px; }
  .sub-row .sub-mo { color: var(--t-dim); font-variant-numeric: tabular-nums; font-size: 11px; }
  .sub-row .sub-yr { color: var(--bad); font-variant-numeric: tabular-nums; font-weight: 500; }

  /* ─── tasks preview rows ─── */
  .tprev-row { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; font-size: 12.5px; border-bottom: 1px solid var(--line-soft); }
  .tprev-row:last-child { border-bottom: none; }
  .tprev-row .tprev-text { color: var(--t-bright); }
  .tprev-row .tprev-meta { font-size: 11px; color: var(--t-faint); }
  .tprev-row .tprev-meta.err { color: var(--err); }
  .tprev-row .tprev-meta.warn { color: var(--warn); }

  /* ─── burn-down chart ─── */
  .burn-svg { width: 100%; height: 160px; display: block; }

</style>
</head>
<body>

<script>
'use strict';

let state = { tasks: [], bills: [], events: [], income: [], goals: [], petty: [] };
const possibleKeys = ['ledgeon-state-v5', 'ledgeon-state-v4', 'ledgeon-prompt-v1', 'ledgeon-state-v3'];

for (const k of possibleKeys) {
  try {
    const raw = localStorage.getItem(k);
    if (raw) {
      const v = JSON.parse(raw);
      if (Array.isArray(v.bills) || Array.isArray(v.income)) { 
        state = {
          tasks:  Array.isArray(v.tasks)  ? v.tasks  : [],
          bills:  Array.isArray(v.bills)  ? v.bills  : [], 
          events: Array.isArray(v.events) ? v.events : [],
          income: Array.isArray(v.income) ? v.income : [],
          goals:  Array.isArray(v.goals)  ? v.goals  : [],
          petty:  Array.isArray(v.petty)  ? v.petty  : []
        };
        break;
      }
    }
  } catch {}
}

state.income.forEach(i => {
  if (i.hoursWorked !== undefined && i.hours === undefined) {
    i.hours = i.hoursWorked;
    delete i.hoursWorked;
  }
  if (i.cashTipPct || i.cashTipAmount) {
    // old format: amount was the base paycheck only; tips were stored separately.
    // new format: amount = base + tip, baseAmount = paycheck only.
    const base = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
    i.baseAmount = base;
    i.tipsEnabled = true;
    if (i.cashTipPct) {
      i.tipsType = 'percent';
      i.tipsValue = Number(i.cashTipPct);
      i.amount = base + (base * Number(i.cashTipPct) / 100);
    } else if (i.cashTipAmount) {
      i.tipsType = 'amount';
      i.tipsValue = Number(i.cashTipAmount);
      i.amount = base + Number(i.cashTipAmount);
    }
    delete i.cashTipPct; delete i.cashTipAmount;
  }
  // back-fill baseAmount for any record missing it (so tip math is consistent)
  if (i.baseAmount === undefined) {
    i.baseAmount = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
  }
});

const STORAGE_KEY = 'ledgeon-state-v4';
const TAB_KEY = 'ledgeon-tab';

let currentTab = localStorage.getItem(TAB_KEY) || 'overview';
if (!['overview', 'income', 'expenses', 'budget', 'tasks'].includes(currentTab)) currentTab = 'overview';

let sortState = { income: { col: 'amount', dir: 'desc' }, expenses: { col: 'date', dir: 'asc' }, tasks: { col: 'date', dir: 'asc' } };
let editingItem = null; let viewMonth = null;

const CATEGORIES = {
  housing: { label: 'housing', color: '#d4a574' },
  utilities: { label: 'utilities', color: '#7eb6f0' },
  transport: { label: 'transport', color: '#b08bc7' },
  insurance: { label: 'insurance', color: '#e57373' },
  food: { label: 'food', color: '#86c98a' },
  media: { label: 'media & subs', color: '#f5c890' },
  debt: { label: 'debt', color: '#ff8a65' },
  health: { label: 'health', color: '#c8a2ff' },
  other: { label: 'other', color: '#6b7280' }
};

const PRESET_BILLS = [
  { name: 'Housing (Rent/Mortgage)', recurring: 'monthly', category: 'housing', pct: 30 },
  { name: 'Utilities & Internet', recurring: 'monthly', category: 'utilities', pct: 5 },
  { name: 'Groceries', recurring: 'monthly', category: 'food', pct: 15 },
  { name: 'Transportation (Gas/Transit)', recurring: 'monthly', category: 'transport', pct: 10 },
  { name: 'Car/Health Insurance', recurring: 'monthly', category: 'insurance', pct: 5 },
  { name: 'Subscriptions & Media', recurring: 'monthly', category: 'media', pct: 2 },
  { name: 'Debt Repayment (Loans/Cards)', recurring: 'monthly', category: 'debt', pct: 10 }
];

function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); updateBadges(); } catch {} }

function nextId(col) {
  const pfx = { tasks: 't', bills: 'b', events: 'e', income: 'i', goals: 'g', petty: 'p' }[col];
  let max = 0;
  for (const item of state[col]) { 
    const n = parseInt(item.id?.slice(1), 10); 
    if (!isNaN(n) && n > max) max = n; 
  }
  return pfx + (max + 1);
}

function startOfDay(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }
function todayStart() { return startOfDay(new Date()); }
function isoDate(d) { const x = startOfDay(d); return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`; }
function formatDate(s) {
  if (!s) return '—';
  const d = new Date(s + (s.includes('T') ? '' : 'T00:00:00'));
  if (isNaN(d)) return s;
  const diff = Math.round((d - todayStart()) / 86400000);
  if (diff === 0) return 'today';
  if (diff === 1) return 'tomorrow';
  if (diff === -1) return 'yesterday';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toLowerCase();
}
function isOverdue(s) { return s && new Date(s + (s.includes('T') ? '' : 'T00:00:00')) < todayStart(); }
function isTodayDate(s) { return s && +new Date(s + (s.includes('T') ? '' : 'T00:00:00')) === +todayStart(); }
function fmtMoney(n, opts = {}) {
  const v = parseFloat(String(n).replace(/[^\d.-]/g, '')) || 0;
  const abs = Math.abs(v).toLocaleString('en-US', { minimumFractionDigits: opts.round ? 0 : 2, maximumFractionDigits: opts.round ? 0 : 2 });
  return (v < 0 ? '−$' : (opts.sign && v > 0 ? '+$' : '$')) + abs;
}
function fmtHM(decimal) {
  if (decimal == null || isNaN(decimal)) return '—';
  if (decimal === 0) return '0h';
  const totalMin = Math.round(decimal * 60);
  const h = Math.floor(totalMin / 60); const m = totalMin % 60;
  if (h === 0) return `${m}m`; if (m === 0) return `${h}h`;
  return `${h}h ${m}m`;
}

function monthlyEq(amount, freq) {
  const val = parseFloat(String(amount).replace(/[^\d.-]/g, '')) || 0;
  if (!val) return 0;
  switch (freq || 'monthly') {
    case 'weekly': return val * 4.333;
    case 'biweekly': return val * 2.166;
    case 'monthly': return val;
    case 'yearly': return val / 12;
    default: return 0;
  }
}

function getViewMonth() { if (viewMonth) return viewMonth; const d = new Date(); return { year: d.getFullYear(), month: d.getMonth() }; }

function getMonthlyStats(year, month) {
  let income = 0; let bills = 0; let tips = 0;
  for (const i of state.income) {
    const isOnce = i.frequency === 'once' || !i.frequency;
    const amt = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
    let base = i.baseAmount !== undefined ? parseFloat(String(i.baseAmount).replace(/[^\d.-]/g, '')) || 0 : amt;
    const tipAmt = Math.max(0, amt - base);
    if (isOnce) {
      const dateStr = i.receivedAt || i.createdAt || isoDate(todayStart());
      const d = new Date(dateStr + (dateStr.includes('T') ? '' : 'T00:00:00'));
      if (d.getFullYear() === year && d.getMonth() === month) { income += amt; tips += tipAmt; }
    } else { income += monthlyEq(amt, i.frequency); tips += monthlyEq(tipAmt, i.frequency); }
  }
  for (const b of state.bills) {
    const amt = parseFloat(String(b.amount).replace(/[^\d.-]/g, '')) || 0;
    const isOnce = !b.recurring || b.recurring === 'once';
    if (!isOnce) bills += monthlyEq(amt, b.recurring);
    else {
      const dateStr = b.dueDate || b.createdAt || isoDate(todayStart());
      const d = new Date(dateStr + (dateStr.includes('T') ? '' : 'T00:00:00'));
      if (d.getFullYear() === year && d.getMonth() === month) bills += amt;
    }
  }
  return { income, bills, net: income - bills, tips };
}

function getMonthlyHistory(monthsBack = 6) {
  const now = new Date(); const out = [];
  for (let i = monthsBack - 1; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const stats = getMonthlyStats(d.getFullYear(), d.getMonth());
    out.push({ label: d.toLocaleString('en-US', { month: 'short' }).toLowerCase(), income: stats.income, bills: stats.bills });
  }
  return out;
}

function getIncomeStats() {
  const now = new Date(); const curY = now.getFullYear(); const curM = now.getMonth();
  let rawInc = []; let rawBills = [];
  for (let i = 1; i <= 12; i++) {
     let m = curM - i; let y = curY; if (m < 0) { m += 12; y -= 1; }
     const st = getMonthlyStats(y, m);
     if (st.income > 0) rawInc.push(st.income);
     if (st.bills > 0) rawBills.push(st.bills);
  }
  let validInc = rawInc.length > 1 ? rawInc.filter(inc => inc >= Math.max(...rawInc) * 0.5) : rawInc;
  if (validInc.length === 0) { const cur = getMonthlyStats(curY, curM); if (cur.income > 0) validInc.push(cur.income); }
  const avgMonthly = validInc.length ? validInc.reduce((a,b)=>a+b,0) / validInc.length : 0;
  const projAnnual = avgMonthly * 12;

  let validBills = rawBills;
  if (validBills.length === 0) { const cur = getMonthlyStats(curY, curM); if (cur.bills > 0) validBills.push(cur.bills); }
  const avgMonthlyBills = validBills.length ? validBills.reduce((a,b)=>a+b,0) / validBills.length : 0;
  const projAnnualBills = avgMonthlyBills * 12;

  let ytdIncome = 0; let ytdHours = 0; let ytdTips = 0;
  const daysInCurMonth = new Date(curY, curM + 1, 0).getDate(); const daysElapsed = now.getDate();
  const monthsElapsedThisYear = curM + (daysElapsed / daysInCurMonth);

  for (const i of state.income) {
     const effective = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
     const base = i.baseAmount !== undefined ? parseFloat(String(i.baseAmount).replace(/[^\d.-]/g, '')) || 0 : effective;
     const tip = Math.max(0, effective - base);
     const h = Number(i.hours) || 0; const isOnce = i.frequency === 'once' || !i.frequency;
     if (isOnce) {
       const dateStr = i.receivedAt || i.createdAt || isoDate(todayStart());
       const d = new Date(dateStr + (dateStr.includes('T') ? '' : 'T00:00:00'));
       if (d.getFullYear() === curY) { ytdIncome += effective; ytdHours += h; ytdTips += tip; }
     } else {
       const dt = i.createdAt ? new Date(i.createdAt) : now;
       const startY = dt.getFullYear(); const startM = dt.getMonth();
       let startMonthsElapsed = 0;
       if (startY < curY) startMonthsElapsed = 0; 
       else if (startY === curY) {
           const daysInStartMonth = new Date(startY, startM + 1, 0).getDate();
           const startFraction = (daysInStartMonth - dt.getDate() + 1) / daysInStartMonth;
           startMonthsElapsed = startM + (1 - startFraction);
       } else continue; 
       const activeMonthsThisYear = Math.max(0, monthsElapsedThisYear - startMonthsElapsed);
       const monthlyInc = monthlyEq(effective, i.frequency); const monthlyTip = monthlyEq(tip, i.frequency);
       const f = i.frequency === 'weekly' ? 4.33333 : i.frequency === 'biweekly' ? 2.16667 : i.frequency === 'monthly' ? 1 : i.frequency === 'yearly' ? (1/12) : 0;
       ytdIncome += monthlyInc * activeMonthsThisYear; ytdTips += monthlyTip * activeMonthsThisYear; ytdHours += (h * f) * activeMonthsThisYear;
     }
  }
  return { ytdIncome, ytdHours, ytdHourly: ytdHours > 0 ? ytdIncome / ytdHours : 0, ytdTips, avgMonthly, projAnnual, avgMonthlyBills, projAnnualBills };
}

function renderLineChart(data, lines, opts = {}) {

  const innerW = W - pad.left - pad.right; const innerH = H - pad.top - pad.bottom;
  const xPos = (i) => pad.left + (data.length <= 1 ? innerW / 2 : (i / (data.length - 1)) * innerW);

// Find the most recent month with non-zero income, walking back up to 12 months.
function getReferenceMonth() {
  const now = new Date();
  for (let i = 0; i < 12; i++) {
    let m = now.getMonth() - i; let y = now.getFullYear();
    while (m < 0) { m += 12; y -= 1; }
    const s = getMonthlyStats(y, m);
    if (s.income > 0) return { year: y, month: m, ...s, label: new Date(y, m).toLocaleString('en-US', { month: 'short' }).toLowerCase() };
  }
  return null;
}

// Aggregate petty entries by category.
function aggregatePettyByCategory(entries) {
  const byCat = {};
  for (const e of entries) {
    const cat = e.category || 'other';
    const amt = parseFloat(String(e.amount).replace(/[^\d.-]/g, '')) || 0;
    byCat[cat] = (byCat[cat] || 0) + amt;
  }
  return Object.entries(byCat).map(([cat, total]) => ({ cat, total })).sort((a,b) => b.total - a.total);
}

// Aggregate the bills-monthly list by category (returns sorted array).
function aggregateBillsByCategory(bills, year, month) {
  const byCat = {};
  for (const b of bills) {
    const amt = parseFloat(String(b.amount).replace(/[^\d.-]/g, '')) || 0;
    const isOnce = !b.recurring || b.recurring === 'once';
    const mo = isOnce
      ? ((b.dueDate || b.createdAt || isoDate(todayStart())).startsWith(`${year}-${String(month+1).padStart(2,'0')}`) ? amt : 0)
      : monthlyEq(amt, b.recurring);
    if (mo <= 0) continue;
    const cat = b.category || 'other';
    if (!byCat[cat]) byCat[cat] = { total: 0, names: [] };
    byCat[cat].total += mo;
    byCat[cat].names.push(b.name);
  }
  return Object.entries(byCat).map(([cat, v]) => ({
    cat, total: v.total, names: v.names,
    label: CATEGORIES[cat]?.label || cat,
    color: CATEGORIES[cat]?.color || '#6b7280',
  })).sort((a,b) => b.total - a.total);
}

// Compute monthly required savings target from goals with target dates.
function getSavingsTarget() {
  let total = 0; const breakdown = [];
  for (const g of state.goals) {
    const target = parseFloat(g.targetAmount) || 0;
    const saved = parseFloat(g.currentAmount) || 0;
    const remaining = Math.max(0, target - saved);
    if (remaining === 0 || !g.targetDate) continue;
    const td = new Date(g.targetDate + 'T00:00:00');
    if (td <= todayStart()) continue;
    const monthsLeft = Math.max(1, (td - todayStart()) / (30.44 * 86400000));
    const monthly = remaining / monthsLeft;
    total += monthly;
    breakdown.push({ name: g.name, monthly });
  }
  return { total, breakdown };
}

// Petty entries for the current week (Mon-Sun).
function getPettyThisWeek() {
  const today = todayStart();
  const dow = (today.getDay() + 6) % 7; // monday-indexed
  const monday = new Date(today.getTime() - dow * 86400000);
  const sunday = new Date(monday.getTime() + 6 * 86400000);
  const startIso = isoDate(monday); const endIso = isoDate(sunday);
  return state.petty.filter(p => p.date && p.date >= startIso && p.date <= endIso)
    .sort((a,b) => b.date.localeCompare(a.date));
}

// Compute per-day net (income received - petty spent) for the given month.
function getCashFlowDays(year, month) {
  const days = new Date(year, month + 1, 0).getDate();
  const flow = Array(days).fill(0).map(() => ({ income: 0, spent: 0 }));
  // one-time income on a specific date
  for (const i of state.income) {
    const isOnce = i.frequency === 'once' || !i.frequency;
    if (!isOnce) continue;
    const dateStr = i.receivedAt || i.createdAt; if (!dateStr) continue;
    const d = new Date(dateStr + 'T00:00:00');
    if (d.getFullYear() === year && d.getMonth() === month) {
      const amt = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
      flow[d.getDate() - 1].income += amt;
    }
  }
  // petty spending
  for (const p of state.petty) {
    if (!p.date || !p.date.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)) continue;
    const day = parseInt(p.date.split('-')[2], 10);
    if (day >= 1 && day <= days) {
      flow[day - 1].spent += parseFloat(String(p.amount).replace(/[^\d.-]/g, '')) || 0;
    }
  }
  return flow;
}

// Effective $/hr per month for the past N months.
function getHourlyTrend(monthsBack = 6) {
  const now = new Date(); const out = [];
  for (let i = monthsBack - 1; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const y = d.getFullYear(); const m = d.getMonth();
    let monthIncome = 0; let monthBase = 0; let monthHours = 0;
    for (const inc of state.income) {
      const amt = parseFloat(String(inc.amount).replace(/[^\d.-]/g, '')) || 0;
      const base = inc.baseAmount !== undefined ? (parseFloat(String(inc.baseAmount).replace(/[^\d.-]/g, '')) || 0) : amt;
      const h = Number(inc.hours) || 0;
      const isOnce = inc.frequency === 'once' || !inc.frequency;
      if (isOnce) {
        const dateStr = inc.receivedAt || inc.createdAt;
        if (!dateStr) continue;
        const dd = new Date(dateStr + (dateStr.includes('T') ? '' : 'T00:00:00'));
        if (dd.getFullYear() === y && dd.getMonth() === m) {
          monthIncome += amt; monthBase += base; monthHours += h;
        }
      } else {
        const f = inc.frequency === 'weekly' ? 4.33333 : inc.frequency === 'biweekly' ? 2.16667 : inc.frequency === 'monthly' ? 1 : inc.frequency === 'yearly' ? (1/12) : 0;
        monthIncome += amt * f;
        monthBase += base * f;
        monthHours += h * f;
      }
    }
    out.push({
      label: d.toLocaleString('en-US', { month: 'short' }).toLowerCase(),
      hourly: monthHours > 0 ? monthIncome / monthHours : 0,
      baseHourly: monthHours > 0 ? monthBase / monthHours : 0,
      hours: monthHours,
    });
  }
  return out;
}

// Burn-down: actual cumulative discretionary spent vs the straight-line ideal pace.
function getBurnDown(year, month, monthlyAllowance) {
  const days = new Date(year, month + 1, 0).getDate();
  const today = todayStart();
  const isCurrent = today.getFullYear() === year && today.getMonth() === month;
  const lastDay = isCurrent ? today.getDate() : days;
  const dailyRate = monthlyAllowance / days;
  // gather petty by day
  const byDay = Array(days + 1).fill(0); // index 1..days
  for (const p of state.petty) {
    if (!p.date || !p.date.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)) continue;
    const day = parseInt(p.date.split('-')[2], 10);
    if (day >= 1 && day <= days) byDay[day] += parseFloat(String(p.amount).replace(/[^\d.-]/g, '')) || 0;
  }
  const points = []; let cum = 0;
  for (let d = 1; d <= days; d++) {
    cum += byDay[d];
    points.push({ day: d, actual: cum, ideal: dailyRate * d, isFuture: isCurrent && d > lastDay });
  }
  return { points, days, monthlyAllowance, lastDay };
}

// Year-over-year for a given month: returns this year's + last year's stats.
function getYoY(year, month) {
  const cur = getMonthlyStats(year, month);
  const prev = getMonthlyStats(year - 1, month);
  return {
    cur, prev,
    incomeDelta: cur.income - prev.income,
    billsDelta: cur.bills - prev.bills,
    netDelta: (cur.income - cur.bills) - (prev.income - prev.bills),
    hasPrev: prev.income > 0 || prev.bills > 0,
  };
}

// Personalized recommendations based on the current/reference month.
function generateRecommendations(income, bills, billsList, year, month) {
  const recs = [];
  if (income === 0) { recs.push({ type: 'info', text: 'Add income to see personalized recommendations.' }); return recs; }
  if (bills === 0) { recs.push({ type: 'info', text: 'Add your recurring bills (or use the preset picker on the expenses tab) to see how they compare against budgeting rules of thumb.' }); return recs; }
  const ratio = bills / income;
  if (ratio > 0.8) recs.push({ type: 'warning', text: `Your bills are <strong>${Math.round(ratio*100)}% of income</strong> — well above the typical 50% needs / 30% wants threshold. There's little room for savings or surprises.` });
  else if (ratio > 0.65) recs.push({ type: 'warning', text: `Your bills are <strong>${Math.round(ratio*100)}% of income</strong>. The 50/30/20 rule recommends keeping fixed expenses below ~50% to leave room for savings.` });
  else if (ratio > 0.5) recs.push({ type: 'info', text: `Your bills are <strong>${Math.round(ratio*100)}% of income</strong> — manageable but on the higher end of the recommended range.` });
  else recs.push({ type: 'success', text: `Your bills are only <strong>${Math.round(ratio*100)}% of income</strong> — strong position to save and invest the rest.` });
  // category overspending
  const byCat = aggregateBillsByCategory(billsList, year, month);
  const CAT_GUIDELINES = { housing: 30, transport: 15, food: 15, debt: 15, insurance: 10, utilities: 10 };
  const SUGGESTIONS = {
    housing: 'Refinancing, downsizing, or finding a roommate could free up significant room.',
    transport: 'Look at insurance shopping, fuel efficiency, or whether the car payment can be reduced.',
    insurance: 'Get fresh quotes from competitors annually — rates change a lot.',
    food: 'Meal planning and cooking at home tend to be the fastest cuts here.',
    media: 'Audit recurring subscriptions — most people forget at least one or two.',
    debt: 'Consolidating high-interest debt or following a payoff method (avalanche/snowball) can speed this up.',
    utilities: 'Energy-efficient adjustments and bundling can chip away at monthly costs.',
  };
  for (const c of byCat) {
    const max = CAT_GUIDELINES[c.cat]; if (!max) continue;
    const pct = (c.total / income) * 100;
    if (pct > max * 1.2) recs.push({ type: 'warning', text: `<strong>${c.label}</strong> is ${pct.toFixed(1)}% of income — above the ${max}% guideline. ${SUGGESTIONS[c.cat] || ''}` });
  }
  // savings / emergency fund
  const leftover = income - bills;
  if (leftover < 0) {
    recs.push({ type: 'warning', text: `You're spending <strong>${fmtMoney(-leftover, {round: true})}</strong> more than you earn each month. Reduce expenses or grow income to close the gap.` });
  } else {
    const target20 = income * 0.2; const targetEF = bills * 3; const targetEFUpper = bills * 6;
    if (leftover >= target20) recs.push({ type: 'success', text: `You have <strong>${fmtMoney(leftover, {round: true})}</strong> left after bills — enough to hit the 20% savings target (${fmtMoney(target20, {round: true})}/mo).` });
    else recs.push({ type: 'info', text: `You have <strong>${fmtMoney(leftover, {round: true})}</strong> available after bills. To hit the 20% target (${fmtMoney(target20, {round: true})}/mo), you'd need to trim ${fmtMoney(target20 - leftover, {round: true})}/mo from spending.` });
    if (target20 > 0) recs.push({ type: 'info', text: `Aim for <strong>${fmtMoney(targetEF, {round: true})}–${fmtMoney(targetEFUpper, {round: true})}</strong> in an emergency fund (3–6 months of bills). At ${fmtMoney(target20, {round: true})}/mo, that's ${Math.ceil(targetEF / target20)}–${Math.ceil(targetEFUpper / target20)} months of saving.` });
  }
  return recs;
}

function th(type, key, label) { const s = sortState[type]; return `<th class="${s.col === key ? `sorted ${s.dir}` : ''}" data-action="sort" data-type="${type}" data-col="${key}">${label}</th>`; }

function sortRows(arr, type) {
  const { col, dir } = sortState[type]; const mult = dir === 'asc' ? 1 : -1;
  return [...arr].sort((a,b) => {
    let va = a[col], vb = b[col];
    if (col === 'date' || col === 'dueDate' || col === 'receivedAt') { va = va || a.createdAt || '9999'; vb = vb || b.createdAt || '9999'; }
