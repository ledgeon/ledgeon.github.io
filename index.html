<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ledgeon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0e13;
    --bg-deep: #070a0f;
    --bg-soft: #11151c;
    --bg-input: #1a1f28;
    --line: #1e242e;
    --line-soft: #161b23;
    --line-strong: #2c3340;
    --t: #d6d9de;
    --t-bright: #fafafa;
    --t-dim: #a1a8b3;
    --t-faint: #6e7480;
    --t-mute: #4a4f5a;
    --warm: #d4a574;
    --lime: #b3dd44;
    --lime-soft: rgba(179,221,68,0.12);
    --ok: #86c98a;
    --bad: #e09f7c;
    --warn: #e0c46c;
    --err: #e57373;
    --cyan: #6dd0d0;
    --r: 4px;
  }

  html, body {
    background: var(--bg);
    color: var(--t);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 13.5px;
    line-height: 1.6;
    height: 100%;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background: radial-gradient(ellipse at 12% -10%, rgba(212,165,116,0.04), transparent 50%), radial-gradient(ellipse at 90% 110%, rgba(179,221,68,0.025), transparent 50%), var(--bg);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  button { cursor: pointer; font: inherit; color: inherit; background: none; border: none; }
  input, select, textarea { font: inherit; color: inherit; }
  .num { font-variant-numeric: tabular-nums; }

  header {
    flex-shrink: 0;
    display: flex; align-items: center; gap: 24px;
    padding: 12px 24px; border-bottom: 1px solid var(--line);
    background: rgba(11,14,19,0.85); backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 50; overflow-x: auto;
  }
  header .brand { color: var(--t-bright); font-weight: 600; letter-spacing: -0.2px; font-size: 14px; flex-shrink: 0; }
  header .brand b { color: var(--warm); }

  .tabs { display: flex; gap: 4px; flex: 1; }
  .tab {
    color: var(--t-faint); font-size: 12.5px; padding: 4px 12px; border-radius: var(--r);
    transition: all 0.15s; white-space: nowrap; display: flex; align-items: center; gap: 6px; text-transform: lowercase;
  }
  .tab:hover { color: var(--t-bright); background: var(--bg-soft); }
  .tab.active { color: var(--lime); background: var(--lime-soft); }
  .tab .badge { font-size: 10px; color: var(--bg); background: var(--t-mute); padding: 0 5px; border-radius: 999px; font-weight: 600; }
  .tab.active .badge { background: var(--lime); color: var(--bg); }

  .right-actions { display: flex; gap: 10px; }
  .right-actions button { color: var(--t-faint); border: 1px solid var(--line); padding: 4px 10px; border-radius: var(--r); font-size: 11.5px; transition: all 0.15s; text-transform: lowercase; }
  .right-actions button:hover { color: var(--lime); border-color: var(--lime); }

  main { flex: 1; max-width: 1000px; margin: 0 auto; width: 100%; padding: 32px 24px 60px; }

  .out { margin-bottom: 24px; animation: fadeIn 0.2s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  
  .out h3 {
    color: var(--warm); font-size: 11.5px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 2.5px; border-bottom: 1px solid var(--line); padding-bottom: 8px;
    margin-bottom: 16px; display: flex; justify-content: space-between; align-items: baseline;
  }
  .out h3 .action { color: var(--cyan); font-size: 10.5px; letter-spacing: 1px; text-transform: lowercase; font-weight: 400; cursor: pointer; }
  .out h3 .action:hover { color: var(--t-bright); text-decoration: underline; }

  .kv { display: grid; grid-template-columns: 220px 1fr auto; gap: 14px; align-items: baseline; padding: 4px 0; }
  .kv .k { color: var(--t-faint); font-size: 12.5px; text-transform: lowercase; }
  .kv .v { color: var(--t-bright); font-weight: 500; font-variant-numeric: tabular-nums; }
  .kv .v.ok { color: var(--ok); }
  .kv .v.bad { color: var(--bad); }
  .kv .v.warm { color: var(--warm); }
  .kv .v.warn { color: var(--warn); }
  .kv .x { color: var(--t-faint); font-size: 12px; text-align: right; }

  .bar-line { display: flex; align-items: center; gap: 12px; padding: 4px 0; }
  .bar-line .lbl { color: var(--t-dim); width: 140px; flex-shrink: 0; text-transform: lowercase; font-size: 12.5px; }
  .bar-line .bar { flex: 1; letter-spacing: -1px; line-height: 1; font-size: 14px; }
  .bar-line .bar .f { color: var(--cyan); }
  .bar-line .bar .e { color: var(--line-strong); }
  .bar-line.ok .bar .f { color: var(--ok); }
  .bar-line.bad .bar .f { color: var(--bad); }
  .bar-line.warm .bar .f { color: var(--warm); }
  .bar-line .va { color: var(--t-bright); font-weight: 500; min-width: 110px; text-align: right; font-variant-numeric: tabular-nums;}
  .bar-line .x { color: var(--t-faint); font-size: 11px; margin-left: 8px; }

  table.tbl { width: 100%; border-collapse: collapse; margin-bottom: 12px; font-size: 12.5px; }
  table.tbl th { text-align: left; color: var(--t-faint); font-weight: 400; font-size: 10.5px; text-transform: uppercase; letter-spacing: 1.5px; padding: 6px 12px 10px 0; border-bottom: 1px solid var(--line); cursor: pointer; user-select: none; }
  table.tbl th:hover { color: var(--lime); }
  table.tbl th.sorted { color: var(--lime); }
  table.tbl th.sorted::after { content: ' ↓'; }
  table.tbl th.sorted.asc::after { content: ' ↑'; }
  table.tbl th.r { text-align: right; }
  table.tbl td { padding: 8px 12px 8px 0; border-bottom: 1px solid var(--line-soft); }
  table.tbl td.r { text-align: right; }
  table.tbl tr.row:hover { background: var(--bg-soft); }
  table.tbl tr.row td:first-child { padding-left: 8px; }
  table.tbl tr.done td { opacity: 0.5; text-decoration: line-through; }
  table.tbl td .id { color: var(--t-mute); font-size: 11px; background: var(--bg-deep); padding: 1px 6px; border-radius: 3px; border: 1px solid var(--line); }
  table.tbl td .cat { color: var(--t-mute); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.6px; margin-left: 10px; }
  
  .tbl-actions button { color: var(--t-faint); border: 1px solid var(--line); padding: 2px 8px; border-radius: 3px; font-size: 11px; margin-left: 6px; transition: all 0.15s; }
  .tbl-actions button:hover { color: var(--lime); border-color: var(--lime); }
  .tbl-actions button.err:hover { color: var(--err); border-color: var(--err); }
  .tbl-actions button.ok:hover { color: var(--ok); border-color: var(--ok); }
  .btn-prominent { display: inline-block; padding: 8px 16px; background: rgba(179,221,68,0.1); border: 1px solid var(--lime); color: var(--lime); border-radius: 4px; font-weight: 500; transition: 0.15s; }
  .btn-prominent:hover { background: var(--lime); color: var(--bg-deep); }

  .tag { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 10.5px; text-transform: uppercase; letter-spacing: 1px; }
  .tag.ok { background: rgba(134,201,138,0.13); color: var(--ok); }
  .tag.warn { background: rgba(224,196,108,0.13); color: var(--warn); }
  .tag.err { background: rgba(229,115,115,0.13); color: var(--err); }
  .tag.info { background: rgba(109,208,208,0.13); color: var(--cyan); }

  .chart-box { background: var(--bg-deep); border: 1px dashed var(--line); border-radius: var(--r); padding: 24px; margin-bottom: 24px; }
  .trend-svg { width: 100%; height: 180px; display: block; }
  .pie-wrap { display: flex; align-items: center; gap: 32px; flex-wrap: wrap; }
  .pie-wrap svg.pie { width: 160px; height: 160px; flex-shrink: 0; }
  .pie-wrap .pie-center-label { fill: var(--t-bright); font-size: 24px; font-weight: 600; text-anchor: middle; font-family: 'JetBrains Mono', monospace; }
  .pie-wrap .pie-center-sub { fill: var(--t-faint); font-size: 10px; text-anchor: middle; letter-spacing: 1px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; }
  .pie-legend { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 200px; }
  .pie-legend .pli { display: grid; grid-template-columns: 14px 1fr auto auto; gap: 12px; align-items: baseline; font-size: 12.5px; }
  .pie-legend .pli .dot { width: 10px; height: 10px; border-radius: 2px; }

  .month-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; padding: 8px 12px; background: var(--bg-soft); border: 1px solid var(--line); border-radius: var(--r); }
  .month-nav .month-label { flex: 1; text-align: center; font-size: 13px; color: var(--t-bright); font-weight: 500; text-transform: lowercase; }
  .month-nav button { color: var(--t-dim); padding: 4px 12px; border: 1px solid var(--line); border-radius: 3px; font-size: 11.5px; transition: 0.15s; }
  .month-nav button:hover { color: var(--lime); border-color: var(--lime); background: var(--bg-input); }

  .modal { display: none; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .modal.open { display: flex; }
  .modal-backdrop { position: absolute; inset: 0; background: rgba(7, 10, 15, 0.85); backdrop-filter: blur(4px); }
  .modal-card { position: relative; background: var(--bg-soft); border: 1px solid var(--line-strong); border-radius: var(--r); width: 100%; max-width: 480px; padding: 24px; box-shadow: 0 12px 32px rgba(0,0,0,0.5); }
  .modal-title { color: var(--warm); font-size: 11.5px; text-transform: uppercase; letter-spacing: 2.5px; font-weight: 600; margin-bottom: 18px; border-bottom: 1px solid var(--line); padding-bottom: 8px; }

  .form-row { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .form-col { flex: 1; min-width: 140px; }
  .form-label { display: block; color: var(--t-faint); font-size: 11px; text-transform: lowercase; margin-bottom: 6px; }
  .input, .select, textarea { width: 100%; background: var(--bg-deep); border: 1px solid var(--line); color: var(--t-bright); font: inherit; font-size: 13px; padding: 8px 12px; border-radius: 3px; outline: none; }
  .input:focus, .select:focus, textarea:focus { border-color: var(--lime); }
  .input::placeholder, textarea::placeholder { color: var(--t-mute); }
  .form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; border-top: 1px solid var(--line); padding-top: 16px; }
  .form-actions button { padding: 6px 16px; border: 1px solid var(--line); color: var(--t-dim); border-radius: 3px; font-size: 12.5px; transition: 0.15s; text-transform: lowercase; }
  .form-actions button:hover { color: var(--t-bright); border-color: var(--t-dim); }
  .form-actions button.primary { color: var(--lime); border-color: var(--lime); }
  .form-actions button.primary:hover { background: var(--lime-soft); }

  .empty-state { padding: 40px 20px; text-align: center; color: var(--t-mute); font-style: italic; border: 1px dashed var(--line); border-radius: var(--r); }

  .hours-input {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg-deep); border: 1px solid var(--line);
    color: var(--t-bright); border-radius: 3px; padding: 0 12px;
    height: 36px; transition: border-color 0.15s;
  }
  .hours-input:focus-within { border-color: var(--lime); }
  .hours-input input {
    background: transparent; border: none; color: var(--t-bright);
    font: inherit; font-size: 13px; padding: 0; outline: none;
    width: 36px; text-align: center; font-variant-numeric: tabular-nums;
    -moz-appearance: textfield;
  }
  .hours-input input::-webkit-outer-spin-button,
  .hours-input input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .hours-input input::placeholder { color: var(--t-mute); }
  .hours-input span { color: var(--t-faint); font-size: 12px; }

  .preset-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border: 1px solid transparent; border-radius: 3px; cursor: pointer; transition: 0.15s; }
  .preset-row:hover { background: var(--bg-deep); border-color: var(--line); }
  .preset-row .box { width: 14px; height: 14px; border: 1px solid var(--t-faint); border-radius: 2px; display: flex; align-items: center; justify-content: center; }
  .preset-row.sel .box { background: var(--lime); border-color: var(--lime); }
  .preset-row.sel .box::after { content: ''; width: 7px; height: 4px; border-left: 2px solid var(--bg-deep); border-bottom: 2px solid var(--bg-deep); transform: rotate(-45deg) translate(0,-1px); }
  .preset-row.exists { opacity: 0.4; pointer-events: none; }
  .preset-row .nm { flex: 1; color: var(--t); font-size: 13px; }
  .preset-row .pct { color: var(--t-faint); font-size: 11px; text-align: right;}

</style>
</head>
<body>

<input type="file" id="file-import" style="display:none" accept=".json">

<header>
  <div class="brand"><b>ledgeon</b></div>
  <nav class="tabs" id="tabs">
    <button class="tab" data-tab="overview">overview</button>
    <button class="tab" data-tab="income">income <span class="badge badge-income">0</span></button>
    <button class="tab" data-tab="expenses">expenses <span class="badge badge-expenses">0</span></button>
    <button class="tab" data-tab="budget">budget</button>
    <button class="tab" data-tab="tasks">tasks <span class="badge badge-tasks">0</span></button>
  </nav>
  <div class="right-actions">
    <button id="btn-import" data-action="import">import</button>
    <button id="btn-export" data-action="export">export</button>
    <button id="btn-reset" data-action="reset" style="color: var(--err); border-color: var(--line);">reset</button>
  </div>
</header>

<main id="content"></main>

<div class="modal" id="modal-income">
  <div class="modal-backdrop" data-action="close-modal"></div>
  <div class="modal-card">
    <div class="modal-title">add income</div>
    <form data-type="income">
      <div class="form-row">
        <div class="form-col"><label class="form-label">source</label><input type="text" class="input" name="source" required></div>
        <div class="form-col" style="min-width: 100px;"><label class="form-label">base amount</label><input type="text" class="input" name="amount" placeholder="0.00" required></div>
      </div>
      <div class="form-row">
        <div class="form-col"><label class="form-label">frequency</label>
          <select class="select" name="frequency">
            <option value="monthly" selected>monthly</option><option value="biweekly">biweekly</option><option value="weekly">weekly</option><option value="yearly">yearly</option><option value="once">one-time</option>
          </select>
        </div>
        <div class="form-col"><label class="form-label">hours worked (optional)</label>
          <div class="hours-input">
            <input type="text" name="hours" placeholder="0" inputmode="numeric" maxlength="3"><span>h</span>
            <input type="text" name="minutes" placeholder="0" inputmode="numeric" maxlength="2"><span>m</span>
          </div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-col"><label class="form-label">date received (optional)</label><input type="date" class="input" name="receivedAt"></div>
      </div>
      <div class="form-row" style="align-items: center; background: var(--bg-deep); padding: 10px 12px; border-radius: 4px; border: 1px dashed var(--line);">
        <div class="form-col" style="flex:0 0 auto;">
          <label style="display:flex; align-items:center; gap:8px; font-size:12px; color:var(--t-bright); cursor:pointer;">
            <input type="checkbox" name="tipsEnabled" id="tipsEnabled"> + assumed cash tips
          </label>
        </div>
        <div class="form-col" id="tipsInputGroup" style="display:none; gap:8px; align-items:center; opacity: 0; transition: opacity 0.2s;">
          <input type="number" step="0.1" class="input" name="tipsValue" value="6" style="width:70px; padding: 4px 8px;">
          <select class="select" name="tipsType" style="width:60px; padding: 4px;">
            <option value="percent">%</option>
            <option value="amount">$</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button type="button" data-action="close-modal">cancel</button>
        <button type="submit" class="primary">save income</button>
      </div>
    </form>
  </div>
</div>

<div class="modal" id="modal-expenses">
  <div class="modal-backdrop" data-action="close-modal"></div>
  <div class="modal-card">
    <div class="modal-title">add expense</div>
    <form data-type="expenses">
      <div class="form-row">
        <div class="form-col"><label class="form-label">name</label><input type="text" class="input" name="name" required></div>
        <div class="form-col" style="min-width: 100px;"><label class="form-label">amount</label><input type="text" class="input" name="amount" placeholder="0.00" required></div>
      </div>
      <div class="form-row">
        <div class="form-col"><label class="form-label">category</label>
          <select class="select" name="category">
            <option value="housing">housing</option><option value="utilities">utilities</option><option value="transport">transport</option>
            <option value="insurance">insurance</option><option value="food">food</option><option value="media">media</option>
            <option value="debt">debt</option><option value="health">health</option><option value="other">other</option>
          </select>
        </div>
        <div class="form-col"><label class="form-label">recurrence</label>
          <select class="select" name="recurring">
            <option value="monthly" selected>monthly</option><option value="weekly">weekly</option><option value="yearly">yearly</option><option value="once">one-time</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-col"><label class="form-label">due date (optional)</label><input type="date" class="input" name="date"></div>
      </div>
      <div class="form-actions">
        <button type="button" data-action="close-modal">cancel</button>
        <button type="submit" class="primary">save expense</button>
      </div>
    </form>
  </div>
</div>

<div class="modal" id="modal-petty">
  <div class="modal-backdrop" data-action="close-modal"></div>
  <div class="modal-card">
    <div class="modal-title">log spending</div>
    <form data-type="petty">
      <div class="form-row">
        <div class="form-col"><label class="form-label">amount</label><input type="text" class="input" name="amount" placeholder="0.00" required></div>
        <div class="form-col"><label class="form-label">category</label>
          <select class="select" name="category">
            <option value="food">food / dining</option><option value="transport">transport</option><option value="media">entertainment</option><option value="other" selected>other</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-col"><label class="form-label">note / description (optional)</label><input type="text" class="input" name="note"></div>
      </div>
      <div class="form-row">
        <div class="form-col"><label class="form-label">date</label><input type="date" class="input" name="date" id="petty-date-input" required></div>
      </div>
      <div class="form-actions">
        <button type="button" data-action="close-modal">cancel</button>
        <button type="submit" class="primary">log purchase</button>
      </div>
    </form>
  </div>
</div>

<div class="modal" id="modal-tasks">
  <div class="modal-backdrop" data-action="close-modal"></div>
  <div class="modal-card">
    <div class="modal-title">add task</div>
    <form data-type="tasks">
      <div class="form-row"><div class="form-col"><label class="form-label">task description</label><input type="text" class="input" name="text" required></div></div>
      <div class="form-row">
        <div class="form-col"><label class="form-label">priority</label>
          <select class="select" name="priority"><option value="">none</option><option value="low">low</option><option value="med">medium</option><option value="high">high</option></select>
        </div>
        <div class="form-col"><label class="form-label">due date (optional)</label><input type="date" class="input" name="date"></div>
      </div>
      <div class="form-actions"><button type="button" data-action="close-modal">cancel</button><button type="submit" class="primary">save task</button></div>
    </form>
  </div>
</div>

<div class="modal" id="modal-goals">
  <div class="modal-backdrop" data-action="close-modal"></div>
  <div class="modal-card">
    <div class="modal-title">add savings goal</div>
    <form data-type="goals">
      <div class="form-row"><div class="form-col"><label class="form-label">goal name</label><input type="text" class="input" name="name" required></div></div>
      <div class="form-row">
        <div class="form-col"><label class="form-label">target amount</label><input type="text" class="input" name="targetAmount" required></div>
        <div class="form-col"><label class="form-label">currently saved</label><input type="text" class="input" name="currentAmount" value="0"></div>
      </div>
      <div class="form-row"><div class="form-col"><label class="form-label">target date (optional)</label><input type="date" class="input" name="targetDate"></div></div>
      <div class="form-actions"><button type="button" data-action="close-modal">cancel</button><button type="submit" class="primary">save goal</button></div>
    </form>
  </div>
</div>

<div class="modal" id="modal-presets">
  <div class="modal-backdrop" data-action="close-modal"></div>
  <div class="modal-card" style="max-width: 540px; max-height: 85vh; display: flex; flex-direction: column;">
    <div class="modal-title">add starter expenses</div>
    <div style="font-size: 12px; color: var(--t-faint); margin-bottom: 12px; line-height: 1.5;">
      select common expenses to add. these calculate typical rule-of-thumb amounts based on your reported income for the current month.
    </div>
    <div id="preset-list" style="overflow-y: auto; flex: 1; padding-right: 8px;"></div>
    <div class="form-actions">
      <button type="button" data-action="close-modal">cancel</button>
      <button type="button" class="primary" id="preset-apply-btn" data-action="apply-presets" disabled>add selected</button>
    </div>
  </div>
</div>

<script>
'use strict';

let state = { tasks: [], bills: [], events: [], income: [], goals: [], petty: [] };
const possibleKeys = ['ledgeon-state-v5', 'ledgeon-state-v4', 'ledgeon-prompt-v1', 'ledgeon-state-v3'];

for (const k of possibleKeys) {
  try {
    const raw = localStorage.getItem(k);
    if (raw) {
      const v = JSON.parse(raw);
      if (Array.isArray(v.bills) || Array.isArray(v.income)) { 
        state = {
          tasks:  Array.isArray(v.tasks)  ? v.tasks  : [],
          bills:  Array.isArray(v.bills)  ? v.bills  : [], 
          events: Array.isArray(v.events) ? v.events : [],
          income: Array.isArray(v.income) ? v.income : [],
          goals:  Array.isArray(v.goals)  ? v.goals  : [],
          petty:  Array.isArray(v.petty)  ? v.petty  : []
        };
        break;
      }
    }
  } catch {}
}

state.income.forEach(i => {
  if (i.hoursWorked !== undefined && i.hours === undefined) {
    i.hours = i.hoursWorked;
    delete i.hoursWorked;
  }
  if (i.cashTipPct || i.cashTipAmount) {
    // old format: amount was the base paycheck only; tips were stored separately.
    // new format: amount = base + tip, baseAmount = paycheck only.
    const base = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
    i.baseAmount = base;
    i.tipsEnabled = true;
    if (i.cashTipPct) {
      i.tipsType = 'percent';
      i.tipsValue = Number(i.cashTipPct);
      i.amount = base + (base * Number(i.cashTipPct) / 100);
    } else if (i.cashTipAmount) {
      i.tipsType = 'amount';
      i.tipsValue = Number(i.cashTipAmount);
      i.amount = base + Number(i.cashTipAmount);
    }
    delete i.cashTipPct; delete i.cashTipAmount;
  }
  // back-fill baseAmount for any record missing it (so tip math is consistent)
  if (i.baseAmount === undefined) {
    i.baseAmount = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
  }
});

function nextId(col) {
  const pfx = { tasks: 't', bills: 'b', events: 'e', income: 'i', goals: 'g', petty: 'p' }[col];
  let max = 0;
  for (const item of state[col]) { 
    const n = parseInt(item.id?.slice(1), 10); 
    if (!isNaN(n) && n > max) max = n; 
  }
  return pfx + (max + 1);
}

function startOfDay(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }
function todayStart() { return startOfDay(new Date()); }
function isoDate(d) { const x = startOfDay(d); return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`; }
function formatDate(s) {
  if (!s) return '—';
  const d = new Date(s + (s.includes('T') ? '' : 'T00:00:00'));
  if (isNaN(d)) return s;
  const diff = Math.round((d - todayStart()) / 86400000);
  if (diff === 0) return 'today';
  if (diff === 1) return 'tomorrow';
  if (diff === -1) return 'yesterday';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toLowerCase();
}
function isOverdue(s) { return s && new Date(s + (s.includes('T') ? '' : 'T00:00:00')) < todayStart(); }
function isTodayDate(s) { return s && +new Date(s + (s.includes('T') ? '' : 'T00:00:00')) === +todayStart(); }
function fmtMoney(n, opts = {}) {
  const v = parseFloat(String(n).replace(/[^\d.-]/g, '')) || 0;
  const abs = Math.abs(v).toLocaleString('en-US', { minimumFractionDigits: opts.round ? 0 : 2, maximumFractionDigits: opts.round ? 0 : 2 });
  return (v < 0 ? '−$' : (opts.sign && v > 0 ? '+$' : '$')) + abs;
}
function fmtHM(decimal) {
  if (decimal == null || isNaN(decimal)) return '—';
  if (decimal === 0) return '0h';
  const totalMin = Math.round(decimal * 60);
  const h = Math.floor(totalMin / 60); const m = totalMin % 60;
  if (h === 0) return `${m}m`; if (m === 0) return `${h}h`;
  return `${h}h ${m}m`;
}

function monthlyEq(amount, freq) {
  const val = parseFloat(String(amount).replace(/[^\d.-]/g, '')) || 0;
  if (!val) return 0;
  switch (freq || 'monthly') {
    case 'weekly': return val * 4.333;
    case 'biweekly': return val * 2.166;
    case 'monthly': return val;
    case 'yearly': return val / 12;
    default: return 0;
  }
}

function getViewMonth() { if (viewMonth) return viewMonth; const d = new Date(); return { year: d.getFullYear(), month: d.getMonth() }; }

function getMonthlyStats(year, month) {
  let income = 0; let bills = 0; let tips = 0;
  for (const i of state.income) {
    const isOnce = i.frequency === 'once' || !i.frequency;
    const amt = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
    let base = i.baseAmount !== undefined ? parseFloat(String(i.baseAmount).replace(/[^\d.-]/g, '')) || 0 : amt;
    const tipAmt = Math.max(0, amt - base);
    if (isOnce) {
      const dateStr = i.receivedAt || i.createdAt || isoDate(todayStart());
      const d = new Date(dateStr + (dateStr.includes('T') ? '' : 'T00:00:00'));
      if (d.getFullYear() === year && d.getMonth() === month) { income += amt; tips += tipAmt; }
    } else { income += monthlyEq(amt, i.frequency); tips += monthlyEq(tipAmt, i.frequency); }
  }
  for (const b of state.bills) {
    const amt = parseFloat(String(b.amount).replace(/[^\d.-]/g, '')) || 0;
    const isOnce = !b.recurring || b.recurring === 'once';
    if (!isOnce) bills += monthlyEq(amt, b.recurring);
    else {
      const dateStr = b.dueDate || b.createdAt || isoDate(todayStart());
      const d = new Date(dateStr + (dateStr.includes('T') ? '' : 'T00:00:00'));
      if (d.getFullYear() === year && d.getMonth() === month) bills += amt;
    }
  }
  return { income, bills, net: income - bills, tips };
}

function getMonthlyHistory(monthsBack = 6) {
  const now = new Date(); const out = [];
  for (let i = monthsBack - 1; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const stats = getMonthlyStats(d.getFullYear(), d.getMonth());
    out.push({ label: d.toLocaleString('en-US', { month: 'short' }).toLowerCase(), income: stats.income, bills: stats.bills });
  }
  return out;
}

function getIncomeStats() {
  const now = new Date(); const curY = now.getFullYear(); const curM = now.getMonth();
  let rawInc = []; let rawBills = [];
  for (let i = 1; i <= 12; i++) {
     let m = curM - i; let y = curY; if (m < 0) { m += 12; y -= 1; }
     const st = getMonthlyStats(y, m);
     if (st.income > 0) rawInc.push(st.income);
     if (st.bills > 0) rawBills.push(st.bills);
  }
  let validInc = rawInc.length > 1 ? rawInc.filter(inc => inc >= Math.max(...rawInc) * 0.5) : rawInc;
  if (validInc.length === 0) { const cur = getMonthlyStats(curY, curM); if (cur.income > 0) validInc.push(cur.income); }
  const avgMonthly = validInc.length ? validInc.reduce((a,b)=>a+b,0) / validInc.length : 0;
  const projAnnual = avgMonthly * 12;

  let validBills = rawBills;
  if (validBills.length === 0) { const cur = getMonthlyStats(curY, curM); if (cur.bills > 0) validBills.push(cur.bills); }
  const avgMonthlyBills = validBills.length ? validBills.reduce((a,b)=>a+b,0) / validBills.length : 0;
  const projAnnualBills = avgMonthlyBills * 12;

  let ytdIncome = 0; let ytdHours = 0; let ytdTips = 0;
  const daysInCurMonth = new Date(curY, curM + 1, 0).getDate(); const daysElapsed = now.getDate();
  const monthsElapsedThisYear = curM + (daysElapsed / daysInCurMonth);

  for (const i of state.income) {
     const effective = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
     const base = i.baseAmount !== undefined ? parseFloat(String(i.baseAmount).replace(/[^\d.-]/g, '')) || 0 : effective;
     const tip = Math.max(0, effective - base);
     const h = Number(i.hours) || 0; const isOnce = i.frequency === 'once' || !i.frequency;
     if (isOnce) {
       const dateStr = i.receivedAt || i.createdAt || isoDate(todayStart());
       const d = new Date(dateStr + (dateStr.includes('T') ? '' : 'T00:00:00'));
       if (d.getFullYear() === curY) { ytdIncome += effective; ytdHours += h; ytdTips += tip; }
     } else {
       const dt = i.createdAt ? new Date(i.createdAt) : now;
       const startY = dt.getFullYear(); const startM = dt.getMonth();
       let startMonthsElapsed = 0;
       if (startY < curY) startMonthsElapsed = 0; 
       else if (startY === curY) {
           const daysInStartMonth = new Date(startY, startM + 1, 0).getDate();
           const startFraction = (daysInStartMonth - dt.getDate() + 1) / daysInStartMonth;
           startMonthsElapsed = startM + (1 - startFraction);
       } else continue; 
       const activeMonthsThisYear = Math.max(0, monthsElapsedThisYear - startMonthsElapsed);
       const monthlyInc = monthlyEq(effective, i.frequency); const monthlyTip = monthlyEq(tip, i.frequency);
       const f = i.frequency === 'weekly' ? 4.33333 : i.frequency === 'biweekly' ? 2.16667 : i.frequency === 'monthly' ? 1 : i.frequency === 'yearly' ? (1/12) : 0;
       ytdIncome += monthlyInc * activeMonthsThisYear; ytdTips += monthlyTip * activeMonthsThisYear; ytdHours += (h * f) * activeMonthsThisYear;
     }
  }
  return { ytdIncome, ytdHours, ytdHourly: ytdHours > 0 ? ytdIncome / ytdHours : 0, ytdTips, avgMonthly, projAnnual, avgMonthlyBills, projAnnualBills };
}

function asciiBar(pct, width = 24) {
  const f = Math.max(0, Math.min(width, Math.round(width * (pct / 100))));
  return `<span class="f">${'█'.repeat(f)}</span><span class="e">${'░'.repeat(width - f)}</span>`;
}

function escHTML(s) { return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function renderLineChart(data) {
  const W = 700, H = 180, pad = { top: 10, right: 20, bottom: 20, left: 50 };
  const allValues = []; data.forEach(d => { allValues.push(d.income); allValues.push(d.bills); });
  const yMax = Math.ceil(Math.max(...allValues, 100) / 100) * 100;
  const innerW = W - pad.left - pad.right; const innerH = H - pad.top - pad.bottom;
  const xPos = (i) => pad.left + (data.length <= 1 ? innerW / 2 : (i / (data.length - 1)) * innerW);
  const yPos = (v) => pad.top + innerH - (v / yMax) * innerH;
  const grids = []; for (let i = 0; i <= 4; i++) {
    const v = (yMax / 4) * i; const y = yPos(v);
    grids.push(`<line x1="${pad.left}" y1="${y}" x2="${W - pad.right}" y2="${y}" stroke="var(--line-strong)" stroke-dasharray="2 4" /><text x="${pad.left - 8}" y="${y + 4}" fill="var(--t-faint)" font-size="11" text-anchor="end" font-family="monospace">$${v}</text>`);
  }
  const path = (key, col) => `<path d="${data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${xPos(i)} ${yPos(d[key])}`).join(' ')}" fill="none" stroke="${col}" stroke-width="2" />`;
  const dots = data.map((d, i) => `<circle cx="${xPos(i)}" cy="${yPos(d.income)}" r="3.5" fill="var(--bg-deep)" stroke="var(--ok)" stroke-width="1.5"></circle><circle cx="${xPos(i)}" cy="${yPos(d.bills)}" r="3.5" fill="var(--bg-deep)" stroke="var(--bad)" stroke-width="1.5"></circle>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" class="trend-svg">${grids.join('')}${path('income', 'var(--ok)')}${path('bills', 'var(--bad)')}${dots}${data.map((d, i) => `<text x="${xPos(i)}" y="${H - 5}" fill="var(--t-dim)" font-size="11" text-anchor="middle" font-family="monospace">${d.label}</text>`).join('')}</svg>`;
}

function renderDonut(slices, total, label) {
  if (total <= 0 || !slices.length) return `<svg class="pie" viewBox="0 0 200 200"><circle cx="100" cy="100" r="80" fill="none" stroke="var(--line)" stroke-width="15" /></svg>`;
  let cum = 0; return `<svg class="pie" viewBox="0 0 200 200">${slices.map(s => {
    const pct = (s.value / total) * 100; const seg = `<circle cx="100" cy="100" r="80" fill="none" stroke="${s.color}" stroke-width="15" pathLength="100" stroke-dasharray="${pct} 100" stroke-dashoffset="${-cum}" transform="rotate(-90 100 100)"></circle>`;
    cum += pct; return seg;
  }).join('')}<text x="100" y="105" class="pie-center-label">${label}</text><text x="100" y="125" class="pie-center-sub">total / mo</text></svg>`;
}

function th(type, key, label) { const s = sortState[type]; return `<th class="${s.col === key ? `sorted ${s.dir}` : ''}" data-action="sort" data-type="${type}" data-col="${key}">${label}</th>`; }

function sortRows(arr, type) {
  const { col, dir } = sortState[type]; const mult = dir === 'asc' ? 1 : -1;
  return [...arr].sort((a,b) => {
    let va = a[col], vb = b[col];
    if (col === 'date' || col === 'dueDate' || col === 'receivedAt') { va = va || a.createdAt || '9999'; vb = vb || b.createdAt || '9999'; }
    if (col === 'amount') { va = parseFloat(String(va).replace(/[^\d.-]/g, '')) || 0; vb = parseFloat(String(vb).replace(/[^\d.-]/g, '')) || 0; }
    if (col === 'hours') { va = Number(va) || 0; vb = Number(vb) || 0; }
    return (typeof va === 'number' ? (va - vb) : String(va || '').localeCompare(String(vb || ''))) * mult;
  });
}

function renderOverview() {
  const { year, month } = getViewMonth(); const { income, bills, tips } = getMonthlyStats(year, month); const stats = getIncomeStats();
  const pettySpent = state.petty.filter(p => p.date && p.date.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)).reduce((s, p) => s + (parseFloat(String(p.amount).replace(/[^\d.-]/g, '')) || 0), 0);
  const upcIso = isoDate(new Date(Date.now() + 14 * 86400000)); const upcoming = state.bills.filter(b => b.dueDate && b.dueDate <= upcIso && !b.paid).sort((a,b) => a.dueDate.localeCompare(b.dueDate));
  return `<div class="month-nav"><button data-action="prev-month">← prev</button><div class="month-label">${new Date(year, month).toLocaleString('en-US',{month:'long',year:'numeric'}).toLowerCase()}</div><button data-action="next-month">next →</button>${year!==new Date().getFullYear()||month!==new Date().getMonth()?'<button data-action="curr-month">jump to current</button>':''}</div><div class="out"><h3>summary</h3><div class="kv"><span class="k">monthly income</span><span class="v ok">${fmtMoney(income)}</span><span class="x">${tips > 0 ? `incl. ${fmtMoney(tips,{round:true})} unclaimed tips` : `${state.income.length} sources`}</span></div><div class="kv"><span class="k">fixed expenses</span><span class="v bad">${fmtMoney(bills)}</span><span class="x">${income>0?(bills/income*100).toFixed(1)+'%':''}</span></div><div class="kv"><span class="k">discretionary spent</span><span class="v warn">${fmtMoney(pettySpent)}</span><span class="x">petty entries</span></div><div class="kv"><span class="k">net remaining</span><span class="v ${income-bills-pettySpent>=0?'warm':'err'}">${fmtMoney(income-bills-pettySpent,{sign:true})}</span><span class="x">available</span></div><div style="margin-top:20px;"></div><div class="bar-line ok"><span class="lbl">income</span><span class="bar">${asciiBar(100)}</span><span class="va ok">${fmtMoney(income,{round:true})}</span></div><div class="bar-line bad"><span class="lbl">expenses</span><span class="bar">${asciiBar(income?(bills/income)*100:0)}</span><span class="va bad">${fmtMoney(bills,{round:true})}</span></div></div><div class="out" style="margin-top:32px;"><h3>projections</h3><div class="kv"><span class="k">est. yearly income</span><span class="v ok">${fmtMoney(stats.projAnnual,{round:true})}</span><span class="x">past avg</span></div><div class="kv"><span class="k">est. yearly expenses</span><span class="v bad">${fmtMoney(stats.projAnnualBills,{round:true})}</span><span class="x">${stats.projAnnual>0?(stats.projAnnualBills/stats.projAnnual*100).toFixed(1)+'%':''}</span></div></div><div class="out" style="margin-top:32px;"><h3>trend</h3><div class="chart-box" style="padding:16px 12px 0;">${renderLineChart(getMonthlyHistory(6))}</div></div><div class="out" style="margin-top:32px;"><h3>upcoming</h3>${upcoming.length?`<table class="tbl"><tbody>${upcoming.slice(0,5).map(b=>`<tr class="row"><td><span class="tag ${isOverdue(b.dueDate)?'err':(isTodayDate(b.dueDate)?'warn':'info')}">${formatDate(b.dueDate)}</span></td><td>${escHTML(b.name)}</td><td class="r num bad">${fmtMoney(b.amount)}</td></tr>`).join('')}</tbody></table>`:'<div class="empty-state">none.</div>'}</div>`;
}

function renderIncome() {
  const { year, month } = getViewMonth(); const { income: monthInc, tips: monthTips } = getMonthlyStats(year, month); const stats = getIncomeStats();
  const rows = sortRows(state.income, 'income').map(i => {
    const amt = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0; const base = i.baseAmount !== undefined ? i.baseAmount : amt;
    const hrs = Number(i.hours) || 0; const rate = hrs > 0 ? base / hrs : 0;
    const hoursCell = hrs > 0 ? `${fmtHM(hrs)}<span style="font-size:10px;color:var(--t-faint);margin-left:6px;">$${rate.toFixed(2)}/hr</span>` : '<span style="color:var(--t-mute);">—</span>';
    return `<tr class="row"><td><span class="id">${i.id}</span></td><td>${escHTML(i.source)}</td><td class="num ok" style="white-space: nowrap;">${fmtMoney(amt)}${i.tipsEnabled&&amt>base?`<span style="font-size:10px;color:var(--lime);margin-left:4px;">(+${fmtMoney(amt-base)} tip)</span>`:''}</td><td class="num" style="white-space: nowrap;">${hoursCell}</td><td style="color:var(--t-faint);">${i.frequency||'once'}</td><td class="num">${formatDate(i.receivedAt||i.createdAt)}</td><td class="r num">${i.frequency==='once'?'—':fmtMoney(monthlyEq(amt,i.frequency),{round:true})}</td><td class="r tbl-actions"><button data-action="edit" data-type="income" data-id="${i.id}">edit</button><button class="err" data-action="rm" data-type="income" data-id="${i.id}">rm</button></td></tr>`;
  }).join('');
  return `<div class="out"><h3>ytd stats</h3><div class="kv"><span class="k">ytd income</span><span class="v ok">${fmtMoney(stats.ytdIncome,{round:true})}</span><span class="x">this year</span></div>${stats.ytdTips>0?`<div class="kv"><span class="k">ytd cash tips</span><span class="v" style="color:var(--lime)">${fmtMoney(stats.ytdTips,{round:true})}</span><span class="x">unclaimed tips</span></div>`:''}<div class="kv"><span class="k">ytd hours</span><span class="v">${fmtHM(stats.ytdHours)}</span><span class="x">logged</span></div><div class="kv"><span class="k">avg hourly</span><span class="v" style="color:var(--cyan)">$${stats.ytdHourly.toFixed(2)}/hr</span><span class="x">effective</span></div></div><div class="out" style="margin-top:32px;"><h3>sources <span class="action" data-action="open-modal" data-type="income">+ add</span></h3><div class="kv"><span class="k">total for ${new Date(year,month).toLocaleString('en-US',{month:'long'}).toLowerCase()}</span><span class="v ok">${fmtMoney(monthInc)}</span><span class="x">${monthTips>0?`incl. ${fmtMoney(monthTips)} tips`:''}</span></div>${rows?`<table class="tbl" style="margin-top:16px;"><thead><tr>${th('income','id','id')}${th('income','source','source')}${th('income','amount','amount')}${th('income','hours','hours')}<th>freq</th>${th('income','receivedAt','date')}<th class="r">monthly</th><th></th></tr></thead><tbody>${rows}</tbody></table>`:'<div class="empty-state">none.</div>'}</div>`;
}

function renderExpenses() {
  const { year, month } = getViewMonth(); const { income: incTot, bills: total } = getMonthlyStats(year, month);
  const catMap = {}; state.bills.forEach(b => {
    const amt = parseFloat(String(b.amount).replace(/[^\d.-]/g, '')) || 0;
    const mo = (!b.recurring || b.recurring === 'once') ? (b.dueDate || b.createdAt || isoDate(todayStart())).startsWith(`${year}-${String(month+1).padStart(2,'0')}`) ? amt : 0 : monthlyEq(amt, b.recurring);
    if (mo > 0) catMap[b.category||'other'] = (catMap[b.category||'other'] || 0) + mo;
  });
  const pieData = Object.entries(catMap).map(([k, v]) => ({ label: CATEGORIES[k]?.label || k, value: v, color: CATEGORIES[k]?.color || '#6b7280' })).sort((a,b) => b.value - a.value);
  const rows = sortRows(state.bills, 'expenses').map(b => {
    const amt = parseFloat(String(b.amount).replace(/[^\d.-]/g, '')) || 0;
    const mo = (!b.recurring || b.recurring === 'once') ? (b.dueDate || b.createdAt || isoDate(todayStart())).startsWith(`${year}-${String(month+1).padStart(2,'0')}`) ? amt : 0 : monthlyEq(amt, b.recurring);
    return `<tr class="row ${b.paid?'done':''}"><td><span class="id">${b.id}</span></td><td>${escHTML(b.name)} <span class="cat" style="color:${(CATEGORIES[b.category]||CATEGORIES.other).color}">${b.category||'none'}</span></td><td class="num bad">${fmtMoney(b.amount)}</td><td style="color:var(--t-faint);">${b.recurring||'once'}</td><td class="${b.dueDate&&!b.paid&&isOverdue(b.dueDate)?'err':''}">${formatDate(b.dueDate)}</td><td class="r num">${incTot&&mo>0?(mo/incTot*100).toFixed(1)+'%':'—'}</td><td class="r tbl-actions">${!b.paid?`<button class="ok" data-action="pay-bill" data-id="${b.id}">pay</button>`:`<button data-action="unpay-bill" data-id="${b.id}">undo</button>`}<button data-action="edit" data-type="expenses" data-id="${b.id}">edit</button><button class="err" data-action="rm" data-type="expenses" data-id="${b.id}">rm</button></td></tr>`;
  }).join('');
  return `<div class="out"><h3>breakdown</h3><div class="chart-box pie-wrap">${renderDonut(pieData, total, fmtMoney(total,{round:true}))}<div class="pie-legend">${pieData.map(c=>`<div class="pli"><div class="dot" style="background:${c.color}"></div><div style="color:var(--t-bright)">${c.label}</div><div class="num bad">${fmtMoney(c.value,{round:true})}</div><div class="num" style="color:var(--t-faint);">${(c.value/total*100).toFixed(1)}%</div></div>`).join('')||'<div class="empty-state">none.</div>'}</div></div></div><div class="out"><h3>recurring <div style="display:flex;gap:16px"><span class="action" data-action="open-presets">+ presets</span><span class="action" data-action="open-modal" data-type="expenses">+ add</span></div></h3><div class="kv"><span class="k">total monthly</span><span class="v bad">${fmtMoney(total)}</span><span class="x">${incTot?(total/incTot*100).toFixed(1)+'%':''}</span></div>${rows?`<table class="tbl" style="margin-top:16px;"><thead><tr>${th('expenses','id','id')}${th('expenses','name','name')}${th('expenses','amount','amount')}<th>freq</th>${th('expenses','date','due')}<th class="r">% inc</th><th></th></tr></thead><tbody>${rows}</tbody></table>`:`<div class="empty-state">${incTot>0?'<button class="btn-prominent" data-action="auto-fill-budget">auto-generate budget</button>':'add income to start.'}</div>`}</div>`;
}

function renderBudget() {
  const { year, month } = getViewMonth(); let { income: inc, bills: fixed } = getMonthlyStats(year, month);
  if (inc === 0) { const s = getIncomeStats(); if (s.avgMonthly > 0) inc = s.avgMonthly; }
  if (inc === 0) return `<div class="out"><div class="empty-state">no data.</div></div>`;
  let savings = 0; state.goals.forEach(g => {
    const rem = Math.max(0, (parseFloat(g.targetAmount)||0) - (parseFloat(g.currentAmount)||0));
    if (rem > 0 && g.targetDate) { const td = new Date(g.targetDate); if (td > todayStart()) { g._reqMo = rem / Math.max(1, (td - todayStart()) / (30.44 * 86400000)); savings += g._reqMo; } }
  });
  const spent = state.petty.filter(p => p.date && p.date.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)).reduce((s, p) => s + (parseFloat(String(p.amount).replace(/[^\d.-]/g, '')) || 0), 0);
  return `<div class="out"><h3>allowance</h3><div class="kv"><span class="k">weekly</span><span class="v" style="color:var(--lime);font-size:16px;">${fmtMoney(Math.max(0, (inc-fixed-savings)/4.333))} / wk</span><span class="x">${fmtMoney(Math.max(0,(inc-fixed-savings)/30))} / day</span></div><div style="margin-top:16px;"></div><div class="kv"><span class="k">income</span><span class="v ok">${fmtMoney(inc)}</span><span class="x">base</span></div><div class="kv"><span class="k">fixed</span><span class="v bad">−${fmtMoney(fixed)}</span><span class="x">liability</span></div>${savings>0?`<div class="kv"><span class="k">savings</span><span class="v bad">−${fmtMoney(savings)}</span><span class="x">reserved</span></div>`:''}<div class="kv"><span class="k">net</span><span class="v warm">${fmtMoney(inc-fixed-savings)}</span><span class="x">discretionary</span></div></div><div class="out"><h3>petty spending <span class="action" data-action="open-modal" data-type="petty">+ log</span></h3><div class="kv"><span class="k">spent this month</span><span class="v warn">${fmtMoney(spent)}</span><span class="x">deducted</span></div>${state.petty.length?`<table class="tbl" style="margin-top:16px;"><thead><tr><th>id</th><th>date</th><th>desc</th><th class="r">amount</th><th></th></tr></thead><tbody>${[...state.petty].sort((a,b)=>b.date.localeCompare(a.date)).map(p=>`<tr class="row"><td><span class="id">${p.id}</span></td><td>${formatDate(p.date)}</td><td>${escHTML(p.note||'—')} <span class="cat" style="color:${(CATEGORIES[p.category]||CATEGORIES.other).color}">${p.category||'other'}</span></td><td class="num bad r">${fmtMoney(p.amount)}</td><td class="r tbl-actions"><button class="err" data-action="rm" data-type="petty" data-id="${p.id}">rm</button></td></tr>`).join('')}</tbody></table>`:'<div class="empty-state">none.</div>'}</div><div class="out" style="margin-top:32px;"><h3>goals <span class="action" data-action="open-modal" data-type="goals">+ add</span></h3>${state.goals.length?state.goals.map(g=>{const p=g.targetAmount>0?(g.currentAmount/g.targetAmount)*100:0;return `<div style="margin-bottom:16px;"><div class="kv" style="grid-template-columns:1fr auto;"><span class="v" style="color:var(--t-bright)">${escHTML(g.name)}</span><span class="v">${fmtMoney(g.currentAmount,{round:true})} / ${fmtMoney(g.targetAmount,{round:true})}</span></div><div class="bar-line ${p>=100?'ok':''}"><span class="bar" style="font-size:16px;">${asciiBar(p,40)}</span><span class="x">${p.toFixed(1)}%</span></div>${g._reqMo?`<div class="x" style="color:var(--warn);margin-top:4px;">req ${fmtMoney(g._reqMo)} / mo</div>`:''}<div class="tbl-actions" style="margin-top:4px;text-align:right;"><button class="ok" data-action="goal-add" data-id="${g.id}">+ fund</button><button data-action="edit" data-type="goals" data-id="${g.id}">edit</button><button class="err" data-action="rm" data-type="goals" data-id="${g.id}">rm</button></div></div>`;}).join(''):'<div class="empty-state">none.</div>'}</div>`;
}

function renderTasks() {
  const rows = sortRows(state.tasks, 'tasks').map(t => `<tr class="row ${t.done?'done':''}"><td><span class="id">${t.id}</span></td><td>${escHTML(t.text)}</td><td><span class="tag ${t.priority==='high'?'err':(t.priority==='med'?'warn':'')}">${t.priority||'none'}</span></td><td class="${isOverdue(t.dueDate)&&!t.done?'err':''}">${formatDate(t.dueDate)}</td><td class="r tbl-actions"><button class="ok" data-action="toggle-task" data-id="${t.id}">${t.done?'undo':'done'}</button><button data-action="edit" data-type="tasks" data-id="${t.id}">edit</button><button class="err" data-action="rm" data-type="tasks" data-id="${t.id}">rm</button></td></tr>`).join('');
  return `<div class="out"><h3>tasks <span class="action" data-action="open-modal" data-type="tasks">+ add</span></h3>${rows?`<table class="tbl"><thead><tr>${th('tasks','id','id')}${th('tasks','text','task')}<th>priority</th>${th('tasks','date','due')}<th></th></tr></thead><tbody>${rows}</tbody></table>`:'<div class="empty-state">none.</div>'}</div>`;
}

document.addEventListener('click', e => {
  const tab = e.target.closest('.tab[data-tab]'); if (tab) { currentTab = tab.dataset.tab; localStorage.setItem(TAB_KEY, currentTab); render(); return; }
  const btn = e.target.closest('[data-action]'); if (!btn) return;
  const act = btn.dataset.action; if (act === 'goto') { currentTab = btn.dataset.tab; localStorage.setItem(TAB_KEY, currentTab); render(); }
  else if (act === 'open-modal') { openModal(btn.dataset.type); if(btn.dataset.type === 'petty') document.getElementById('petty-date-input').value = isoDate(todayStart()); }
  else if (act === 'close-modal') document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
  else if (act === 'sort') { const t = btn.dataset.type, c = btn.dataset.col; if (sortState[t].col === c) sortState[t].dir = sortState[t].dir === 'asc' ? 'desc' : 'asc'; else { sortState[t].col = c; sortState[t].dir = 'asc'; } render(); }
  else if (act === 'rm') { if (confirm('Delete?')) { const t = btn.dataset.type === 'expenses' ? 'bills' : btn.dataset.type; state[t] = state[t].filter(x => x.id !== btn.dataset.id); saveState(); render(); } }
  else if (act === 'edit') openModal(btn.dataset.type, btn.dataset.id);
  else if (act === 'pay-bill') { const b = state.bills.find(x => x.id === btn.dataset.id); if (b) { if (b.recurring && b.recurring !== 'once' && b.dueDate) { const d = new Date(b.dueDate); if (b.recurring==='monthly') d.setMonth(d.getMonth()+1); else if (b.recurring==='weekly') d.setDate(d.getDate()+7); else if (b.recurring==='yearly') d.setFullYear(d.getFullYear()+1); b.dueDate = isoDate(d); } else b.paid = true; saveState(); render(); } }
  else if (act === 'unpay-bill') { const b = state.bills.find(x => x.id === btn.dataset.id); if (b) { b.paid = false; saveState(); render(); } }
  else if (act === 'toggle-task') { const t = state.tasks.find(x => x.id === btn.dataset.id); if (t) { t.done = !t.done; saveState(); render(); } }
  else if (act === 'goal-add') { const g = state.goals.find(x => x.id === btn.dataset.id); if (g) { const a = parseFloat(prompt(`Fund "${g.name}":`)); if (a > 0) { g.currentAmount += a; saveState(); render(); } } }
  else if (act === 'prev-month') { const v=getViewMonth(); viewMonth={year:v.month===0?v.year-1:v.year, month:v.month===0?11:v.month-1}; render(); }
  else if (act === 'next-month') { const v=getViewMonth(); viewMonth={year:v.month===11?v.year+1:v.year, month:v.month===11?0:v.month+1}; render(); }
  else if (act === 'curr-month') { viewMonth = null; render(); }
  else if (act === 'open-presets') openPresetPicker();
  else if (act === 'auto-fill-budget') { const v=getViewMonth(); const { income: inc } = getMonthlyStats(v.year, v.month); if (inc > 0) { PRESET_BILLS.forEach(p => state.bills.push({ id: nextId('bills'), name: p.name, amount: Math.round(inc*(p.pct/100)), category: p.category, recurring: p.recurring, paid: false, createdAt: isoDate(todayStart()) })); saveState(); render(); } }
  else if (act === 'export') { const b = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'}); const u = URL.createObjectURL(b); const a = document.createElement('a'); a.href = u; a.download = 'ledgeon.json'; a.click(); URL.revokeObjectURL(u); }
  else if (act === 'import') document.getElementById('file-import').click();
  else if (act === 'reset') { if(confirm('Wipe all data?')) { state = {tasks:[], bills:[], events:[], income:[], goals:[], petty:[]}; saveState(); render(); } }
});

document.getElementById('file-import').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = ev => { try { const imp = JSON.parse(ev.target.result); if(confirm('Import data?')) { state = { tasks: imp.tasks||[], bills: imp.bills||[], events: imp.events||[], income: imp.income||[], goals: imp.goals||[], petty: imp.petty||[] }; saveState(); render(); } } catch { alert('Error.'); } }; r.readAsText(f); e.target.value = '';
});

document.addEventListener('change', e => { if (e.target.id === 'tipsEnabled') { const g = document.getElementById('tipsInputGroup'); if (e.target.checked) { g.style.display = 'flex'; setTimeout(() => g.style.opacity = '1', 10); } else { g.style.opacity = '0'; setTimeout(() => g.style.display = 'none', 200); } } });

function openModal(type, id = null) {
  document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
  const f = document.querySelector(`#modal-${type} form`); if (!f) return; f.reset();
  editingItem = id ? { type, id } : null;
  const tArr = type === 'expenses' ? state.bills : state[type];
  if (id) {
    const item = tArr.find(x => x.id === id); if (item) {
      Object.keys(item).forEach(k => { if (f.elements[k]) f.elements[k].value = item[k]; });
      if (type==='income') {
        f.elements['amount'].value = item.baseAmount !== undefined ? item.baseAmount : item.amount;
        // split decimal hours into hours + minutes inputs
        if (item.hours != null && !isNaN(item.hours) && item.hours > 0) {
          const totalMin = Math.round(Number(item.hours) * 60);
          const h = Math.floor(totalMin / 60); const m = totalMin % 60;
          f.elements['hours'].value = h ? h : '';
          f.elements['minutes'].value = m ? m : '';
        } else { f.elements['hours'].value = ''; f.elements['minutes'].value = ''; }
        f.elements['tipsEnabled'].checked = !!item.tipsEnabled; f.elements['tipsValue'].value = item.tipsValue || 6; f.elements['tipsType'].value = item.tipsType || 'percent';
        f.elements['tipsEnabled'].dispatchEvent(new Event('change', {bubbles: true}));
      }
    }
  }
  document.getElementById('modal-'+type).classList.add('open');
  setTimeout(() => f.querySelector('input')?.focus(), 50);
}

document.querySelectorAll('form[data-type]').forEach(f => {
  f.addEventListener('submit', e => {
    e.preventDefault(); const fd = new FormData(f); const type = f.dataset.type;
    const isEdit = editingItem && editingItem.type === type;
    const tArr = type === 'expenses' ? state.bills : state[type];
    const item = isEdit ? tArr.find(x => x.id === editingItem.id) : { id: nextId(type==='expenses'?'bills':type), createdAt: isoDate(todayStart()) };
    const pAmt = v => { const n = parseFloat(String(v).replace(/[$,\s]/g,'')); return isNaN(n)?0:n; };

    if (type === 'income') {
      item.source = fd.get('source'); const base = pAmt(fd.get('amount')); item.baseAmount = base;
      const hVal = parseFloat(fd.get('hours')) || 0; const mVal = parseFloat(fd.get('minutes')) || 0;
      const totalHours = hVal + mVal / 60; item.hours = totalHours > 0 ? totalHours : null;
      item.tipsEnabled = f.elements['tipsEnabled'].checked; item.tipsType = f.elements['tipsType'].value;
      let final = base; if (item.tipsEnabled) { let tv = pAmt(f.elements['tipsValue'].value); if (tv === 0) tv = 6; item.tipsValue = tv; final += item.tipsType === 'percent' ? base * (tv / 100) : tv; } else item.tipsValue = 0;
      item.amount = final; item.frequency = fd.get('frequency') || 'monthly'; item.receivedAt = fd.get('receivedAt') || null;
    } else if (type === 'expenses') {
      item.name = fd.get('name'); item.amount = pAmt(fd.get('amount')); item.category = fd.get('category'); item.recurring = fd.get('recurring') || 'monthly'; item.dueDate = fd.get('date') || null; if (!isEdit) item.paid = false;
    } else if (type === 'tasks') { item.text = fd.get('text'); item.priority = fd.get('priority'); item.dueDate = fd.get('date') || null; if (!isEdit) item.done = false;
    } else if (type === 'goals') { item.name = fd.get('name'); item.targetAmount = pAmt(fd.get('targetAmount')); item.currentAmount = pAmt(fd.get('currentAmount')); item.targetDate = fd.get('targetDate') || null;
    } else if (type === 'petty') { item.amount = pAmt(fd.get('amount')); item.category = fd.get('category'); item.note = fd.get('note'); item.date = fd.get('date'); }

    if (!isEdit) tArr.push(item);
    if (!isEdit && type === 'income' && state.bills.length === 0) {
       if(confirm("Add starter budget based on this income?")) {
           const iMo = monthlyEq(item.amount, item.frequency);
           PRESET_BILLS.forEach(p => state.bills.push({ id: nextId('bills'), name: p.name, amount: Math.round(iMo*(p.pct/100)), category: p.category, recurring: p.recurring, paid: false, createdAt: isoDate(todayStart()) }));
           currentTab = 'expenses'; localStorage.setItem(TAB_KEY, currentTab);
       }
    }
    saveState(); document.querySelectorAll('.modal').forEach(m => m.classList.remove('open')); render();
  });
});

let presetSel = new Set();
function openPresetPicker() {
  presetSel.clear(); const { year, month } = getViewMonth(); const { income: inc } = getMonthlyStats(year, month);
  const list = document.getElementById('preset-list'); if (inc===0) list.innerHTML = `<div class="empty-state">add income first.</div>`;
  else {
    const ex = new Set(state.bills.map(b=>b.name.toLowerCase()));
    list.innerHTML = PRESET_BILLS.map((p, i) => `<div class="preset-row ${ex.has(p.name.toLowerCase())?'exists':''}" data-idx="${i}"><div class="box"></div><div class="nm">${p.name}</div><div class="pct">${fmtMoney(inc*(p.pct/100),{round:true})}<br>${p.pct}%</div></div>`).join('');
    list.querySelectorAll('.preset-row:not(.exists)').forEach(r => r.addEventListener('click', () => {
      const i = parseInt(r.dataset.idx); if (presetSel.has(i)) { presetSel.delete(i); r.classList.remove('sel'); } else { presetSel.add(i); r.classList.add('sel'); }
      document.getElementById('preset-apply-btn').disabled = presetSel.size===0;
    }));
  }
  document.getElementById('modal-presets').classList.add('open');
}

document.getElementById('preset-apply-btn').addEventListener('click', () => {
  const { year, month } = getViewMonth(); const { income: inc } = getMonthlyStats(year, month);
  presetSel.forEach(idx => { const p = PRESET_BILLS[idx]; state.bills.push({ id: nextId('bills'), name: p.name, amount: Math.round(inc*(p.pct/100)), category: p.category, recurring: p.recurring, paid: false, createdAt: isoDate(todayStart()) }); });
  saveState(); document.getElementById('modal-presets').classList.remove('open'); render();
});

render();
</script>
</body>
</html>
