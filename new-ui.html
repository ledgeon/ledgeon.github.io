<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ledgeon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0e13;
    --bg-deep: #070a0f;
    --bg-soft: #11151c;
    --bg-input: #1a1f28;

    --line: #1e242e;
    --line-soft: #161b23;
    --line-strong: #2c3340;

    --t: #d6d9de;
    --t-bright: #fafafa;
    --t-dim: #a1a8b3;
    --t-faint: #6e7480;
    --t-mute: #4a4f5a;

    --warm: #d4a574;
    --warm-soft: rgba(212,165,116,0.12);

    --lime: #b3dd44;
    --lime-soft: rgba(179,221,68,0.12);

    --ok: #86c98a;
    --bad: #e09f7c;
    --warn: #e0c46c;
    --err: #e57373;

    --cyan: #6dd0d0;
    --sky: #7aaef0;
    --rose: #e09fb4;
    --plum: #b89cd4;

    --r: 4px;
  }

  html, body {
    background: var(--bg);
    color: var(--t);
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 13.5px;
    line-height: 1.6;
    height: 100%;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background:
      radial-gradient(ellipse at 12% -10%, rgba(212,165,116,0.04), transparent 50%),
      radial-gradient(ellipse at 90% 110%, rgba(179,221,68,0.025), transparent 50%),
      var(--bg);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  button { cursor: pointer; font: inherit; color: inherit; background: none; border: none; }
  input, select, textarea { font: inherit; color: inherit; }
  .num { font-variant-numeric: tabular-nums; }

  /* ───────── header & tabs ───────── */
  header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 24px;
    padding: 12px 24px;
    border-bottom: 1px solid var(--line);
    background: rgba(11,14,19,0.85);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
    z-index: 50;
    overflow-x: auto;
  }
  header .brand {
    color: var(--t-bright);
    font-weight: 600;
    letter-spacing: -0.2px;
    font-size: 14px;
    flex-shrink: 0;
  }
  header .brand b { color: var(--warm); }

  .tabs {
    display: flex;
    gap: 4px;
    flex: 1;
  }
  .tab {
    color: var(--t-faint);
    font-size: 12.5px;
    padding: 4px 12px;
    border-radius: var(--r);
    transition: all 0.15s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
    text-transform: lowercase;
  }
  .tab:hover { color: var(--t-bright); background: var(--bg-soft); }
  .tab.active {
    color: var(--lime);
    background: var(--lime-soft);
  }
  .tab .badge {
    font-size: 10px;
    color: var(--bg);
    background: var(--t-mute);
    padding: 0 5px;
    border-radius: 999px;
    font-weight: 600;
  }
  .tab.active .badge { background: var(--lime); color: var(--bg); }

  .right-actions { display: flex; gap: 10px; }
  .right-actions button {
    color: var(--t-faint);
    border: 1px solid var(--line);
    padding: 4px 10px;
    border-radius: var(--r);
    font-size: 11.5px;
    transition: all 0.15s;
    text-transform: lowercase;
  }
  .right-actions button:hover { color: var(--lime); border-color: var(--lime); }

  /* ───────── main layout ───────── */
  main {
    flex: 1;
    max-width: 1000px;
    margin: 0 auto;
    width: 100%;
    padding: 32px 24px 60px;
  }

  /* ───────── terminal blocks ───────── */
  .out {
    margin-bottom: 24px;
    animation: fadeIn 0.2s ease-out;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  
  .out h3 {
    color: var(--warm);
    font-size: 11.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 8px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .out h3 .action {
    color: var(--cyan);
    font-size: 10.5px;
    letter-spacing: 1px;
    text-transform: lowercase;
    font-weight: 400;
    cursor: pointer;
  }
  .out h3 .action:hover { color: var(--t-bright); text-decoration: underline; }

  /* key-value rows */
  .kv {
    display: grid;
    grid-template-columns: 220px 1fr auto;
    gap: 14px;
    align-items: baseline;
    padding: 4px 0;
  }
  .kv .k { color: var(--t-faint); font-size: 12.5px; text-transform: lowercase; }
  .kv .v { color: var(--t-bright); font-weight: 500; font-variant-numeric: tabular-nums; }
  .kv .v.ok   { color: var(--ok); }
  .kv .v.bad  { color: var(--bad); }
  .kv .v.warm { color: var(--warm); }
  .kv .v.warn { color: var(--warn); }
  .kv .x { color: var(--t-faint); font-size: 12px; text-align: right; }

  /* ascii bars */
  .bar-line {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 4px 0;
  }
  .bar-line .lbl { color: var(--t-dim); width: 140px; flex-shrink: 0; text-transform: lowercase; font-size: 12.5px; }
  .bar-line .bar { flex: 1; letter-spacing: -1px; line-height: 1; font-size: 14px; }
  .bar-line .bar .f { color: var(--cyan); }
  .bar-line .bar .e { color: var(--line-strong); }
  .bar-line.ok .bar .f { color: var(--ok); }
  .bar-line.bad .bar .f { color: var(--bad); }
  .bar-line.warm .bar .f { color: var(--warm); }
  .bar-line .va { color: var(--t-bright); font-weight: 500; min-width: 110px; text-align: right; font-variant-numeric: tabular-nums;}
  .bar-line .x { color: var(--t-faint); font-size: 11px; margin-left: 8px; }

  /* tables */
  table.tbl { width: 100%; border-collapse: collapse; margin-bottom: 12px; font-size: 12.5px; }
  table.tbl th {
    text-align: left; color: var(--t-faint); font-weight: 400; font-size: 10.5px;
    text-transform: uppercase; letter-spacing: 1.5px; padding: 6px 12px 10px 0;
    border-bottom: 1px solid var(--line); cursor: pointer; user-select: none;
  }
  table.tbl th:hover { color: var(--lime); }
  table.tbl th.sorted { color: var(--lime); }
  table.tbl th.sorted::after { content: ' ↓'; }
  table.tbl th.sorted.asc::after { content: ' ↑'; }
  table.tbl th.r { text-align: right; }
  table.tbl td { padding: 8px 12px 8px 0; border-bottom: 1px solid var(--line-soft); }
  table.tbl td.r { text-align: right; }
  table.tbl tr.row:hover { background: var(--bg-soft); }
  table.tbl tr.row td:first-child { padding-left: 8px; }
  table.tbl tr.done td { opacity: 0.5; text-decoration: line-through; }
  table.tbl td .id { color: var(--t-mute); font-size: 11px; background: var(--bg-deep); padding: 1px 6px; border-radius: 3px; border: 1px solid var(--line); }
  table.tbl td .cat { color: var(--t-mute); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.6px; margin-left: 10px; }
  
  .tbl-actions button {
    color: var(--t-faint); border: 1px solid var(--line); padding: 2px 8px;
    border-radius: 3px; font-size: 11px; margin-left: 6px; transition: all 0.15s;
  }
  .tbl-actions button:hover { color: var(--lime); border-color: var(--lime); }
  .tbl-actions button.err:hover { color: var(--err); border-color: var(--err); }
  .tbl-actions button.ok:hover { color: var(--ok); border-color: var(--ok); }

  /* tags & status */
  .tag {
    display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 10.5px;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .tag.ok { background: rgba(134,201,138,0.13); color: var(--ok); }
  .tag.warn { background: rgba(224,196,108,0.13); color: var(--warn); }
  .tag.err { background: rgba(229,115,115,0.13); color: var(--err); }
  .tag.info { background: rgba(109,208,208,0.13); color: var(--cyan); }

  /* charts & visual stats */
  .chart-box {
    background: var(--bg-deep); border: 1px dashed var(--line); border-radius: var(--r);
    padding: 24px; margin-bottom: 24px;
  }
  
  .trend-svg { width: 100%; height: 180px; display: block; }
  .pie-wrap { display: flex; align-items: center; gap: 32px; flex-wrap: wrap; }
  .pie-wrap svg.pie { width: 160px; height: 160px; flex-shrink: 0; }
  .pie-wrap .pie-center-label { fill: var(--t-bright); font-size: 24px; font-weight: 600; text-anchor: middle; font-family: 'JetBrains Mono', monospace; }
  .pie-wrap .pie-center-sub { fill: var(--t-faint); font-size: 10px; text-anchor: middle; letter-spacing: 1px; font-family: 'JetBrains Mono', monospace; text-transform: uppercase; }
  .pie-legend { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 200px; }
  .pie-legend .pli { display: grid; grid-template-columns: 14px 1fr auto auto; gap: 12px; align-items: baseline; font-size: 12.5px; }
  .pie-legend .pli .dot { width: 10px; height: 10px; border-radius: 2px; }

  /* weekly calculator card */
  .weekly-card {
    display: grid; grid-template-columns: auto 1fr; gap: 32px;
    background: var(--bg-soft); border: 1px solid var(--line); border-radius: var(--r);
    padding: 24px 32px; margin-bottom: 32px; align-items: center;
  }
  .weekly-card .headline { display: flex; flex-direction: column; }
  .weekly-card .headline .label { font-size: 11.5px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--t-faint); margin-bottom: 8px; }
  .weekly-card .headline .value { font-size: 36px; font-weight: 600; color: var(--lime); font-variant-numeric: tabular-nums; line-height: 1; letter-spacing: -1px; }
  .weekly-card .headline .unit { font-size: 14px; color: var(--t-dim); font-weight: 400; letter-spacing: 0; }
  .weekly-card .headline .daily { font-size: 13px; color: var(--t-dim); margin-top: 8px; font-variant-numeric: tabular-nums; }
  .weekly-math { border-left: 1px dashed var(--line); padding-left: 32px; font-size: 13px; }
  .weekly-math .row { display: flex; justify-content: space-between; margin-bottom: 4px; gap: 32px; }
  .weekly-math .row.total { padding-top: 8px; margin-top: 8px; border-top: 1px dashed var(--line-soft); font-weight: 500; color: var(--t-bright); }
  .weekly-math .label { color: var(--t-faint); }
  .weekly-math .value { font-variant-numeric: tabular-nums; }
  .weekly-math .value.income { color: var(--ok); }
  .weekly-math .value.expense { color: var(--bad); }
  .weekly-math .formula { font-size: 11px; color: var(--t-mute); margin-top: 8px; font-style: italic; }

  @media (max-width: 600px) {
    .weekly-card { grid-template-columns: 1fr; gap: 16px; padding: 20px; }
    .weekly-math { border-left: none; padding-left: 0; border-top: 1px dashed var(--line); padding-top: 16px; }
  }

  /* month nav */
  .month-nav {
    display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
    padding: 8px 12px; background: var(--bg-soft); border: 1px solid var(--line); border-radius: var(--r);
  }
  .month-nav .month-label { flex: 1; text-align: center; font-size: 13px; color: var(--t-bright); font-weight: 500; text-transform: lowercase; }
  .month-nav button { color: var(--t-dim); padding: 4px 12px; border: 1px solid var(--line); border-radius: 3px; font-size: 11.5px; transition: 0.15s; }
  .month-nav button:hover { color: var(--lime); border-color: var(--lime); background: var(--bg-input); }

  /* modals */
  .modal {
    display: none; position: fixed; inset: 0; z-index: 100;
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal.open { display: flex; }
  .modal-backdrop { position: absolute; inset: 0; background: rgba(7, 10, 15, 0.85); backdrop-filter: blur(4px); }
  .modal-card {
    position: relative; background: var(--bg-soft); border: 1px solid var(--line-strong);
    border-radius: var(--r); width: 100%; max-width: 480px; padding: 24px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.5);
  }
  .modal-title { color: var(--warm); font-size: 11.5px; text-transform: uppercase; letter-spacing: 2.5px; font-weight: 600; margin-bottom: 18px; border-bottom: 1px solid var(--line); padding-bottom: 8px; }

  .form-row { display: flex; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .form-col { flex: 1; min-width: 140px; }
  .form-label { display: block; color: var(--t-faint); font-size: 11px; text-transform: lowercase; margin-bottom: 6px; }
  .input, .select, textarea {
    width: 100%; background: var(--bg-deep); border: 1px solid var(--line); color: var(--t-bright);
    font: inherit; font-size: 13px; padding: 8px 12px; border-radius: 3px; outline: none;
  }
  .input:focus, .select:focus, textarea:focus { border-color: var(--lime); }
  .input::placeholder, textarea::placeholder { color: var(--t-mute); }
  .form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; border-top: 1px solid var(--line); padding-top: 16px; }
  .form-actions button { padding: 6px 16px; border: 1px solid var(--line); color: var(--t-dim); border-radius: 3px; font-size: 12.5px; transition: 0.15s; text-transform: lowercase; }
  .form-actions button:hover { color: var(--t-bright); border-color: var(--t-dim); }
  .form-actions button.primary { color: var(--lime); border-color: var(--lime); }
  .form-actions button.primary:hover { background: var(--lime-soft); }

  .empty-state { padding: 40px 20px; text-align: center; color: var(--t-mute); font-style: italic; border: 1px dashed var(--line); border-radius: var(--r); }

  /* preset picker */
  .preset-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border: 1px solid transparent; border-radius: 3px; cursor: pointer; transition: 0.15s; }
  .preset-row:hover { background: var(--bg-deep); border-color: var(--line); }
  .preset-row .box { width: 14px; height: 14px; border: 1px solid var(--t-faint); border-radius: 2px; display: flex; align-items: center; justify-content: center; }
  .preset-row.sel .box { background: var(--lime); border-color: var(--lime); }
  .preset-row.sel .box::after { content: ''; width: 7px; height: 4px; border-left: 2px solid var(--bg-deep); border-bottom: 2px solid var(--bg-deep); transform: rotate(-45deg) translate(0,-1px); }
  .preset-row.exists { opacity: 0.4; pointer-events: none; }
  .preset-row .nm { flex: 1; color: var(--t); font-size: 13px; }
  .preset-row .pct { color: var(--t-faint); font-size: 11px; text-align: right;}

</style>
</head>
<body>

<header>
  <div class="brand"><b>ledgeon</b></div>
  <nav class="tabs" id="tabs">
    <button class="tab" data-tab="overview">overview</button>
    <button class="tab" data-tab="income">income <span class="badge badge-income">0</span></button>
    <button class="tab" data-tab="expenses">expenses <span class="badge badge-expenses">0</span></button>
    <button class="tab" data-tab="budget">budget</button>
    <button class="tab" data-tab="tasks">tasks <span class="badge badge-tasks">0</span></button>
  </nav>
  <div class="right-actions">
    <button id="btn-export">export</button>
    <button id="btn-reset" style="color: var(--err); border-color: var(--line);">reset</button>
  </div>
</header>

<main id="content"></main>

<div class="modal" id="modal-income">
  <div class="modal-backdrop" data-action="close-modal"></div>
  <div class="modal-card">
    <div class="modal-title">add income</div>
    <form data-type="income">
      <div class="form-row">
        <div class="form-col"><label class="form-label">source</label><input type="text" class="input" name="source" required></div>
        <div class="form-col" style="min-width: 100px;"><label class="form-label">base amount</label><input type="text" class="input" name="amount" placeholder="0.00" required></div>
      </div>
      <div class="form-row">
        <div class="form-col"><label class="form-label">frequency</label>
          <select class="select" name="frequency">
            <option value="monthly" selected>monthly</option><option value="biweekly">biweekly</option><option value="weekly">weekly</option><option value="yearly">yearly</option><option value="once">one-time</option>
          </select>
        </div>
        <div class="form-col"><label class="form-label">hours worked (optional)</label><input type="number" step="0.1" class="input" name="hours" placeholder="e.g. 40"></div>
      </div>
      <div class="form-row">
        <div class="form-col"><label class="form-label">date received (optional)</label><input type="date" class="input" name="receivedAt"></div>
      </div>
      <div class="form-row" style="align-items: center; background: var(--bg-deep); padding: 10px 12px; border-radius: 4px; border: 1px dashed var(--line);">
        <div class="form-col" style="flex:0 0 auto;">
          <label style="display:flex; align-items:center; gap:8px; font-size:12px; color:var(--t-bright); cursor:pointer;">
            <input type="checkbox" name="tipsEnabled" id="tipsEnabled"> + assumed cash tips
          </label>
        </div>
        <div class="form-col" id="tipsInputGroup" style="display:none; gap:8px; align-items:center; opacity: 0; transition: opacity 0.2s;">
          <input type="number" step="0.1" class="input" name="tipsValue" value="6" style="width:70px; padding: 4px 8px;">
          <select class="select" name="tipsType" style="width:60px; padding: 4px;">
            <option value="percent">%</option>
            <option value="amount">$</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button type="button" data-action="close-modal">cancel</button>
        <button type="submit" class="primary">save income</button>
      </div>
    </form>
  </div>
</div>

<div class="modal" id="modal-expenses">
  <div class="modal-backdrop" data-action="close-modal"></div>
  <div class="modal-card">
    <div class="modal-title">add expense</div>
    <form data-type="expenses">
      <div class="form-row">
        <div class="form-col"><label class="form-label">name</label><input type="text" class="input" name="name" required></div>
        <div class="form-col" style="min-width: 100px;"><label class="form-label">amount</label><input type="text" class="input" name="amount" placeholder="0.00" required></div>
      </div>
      <div class="form-row">
        <div class="form-col"><label class="form-label">category</label>
          <select class="select" name="category">
            <option value="housing">housing</option><option value="utilities">utilities</option><option value="transport">transport</option>
            <option value="insurance">insurance</option><option value="food">food</option><option value="media">media</option>
            <option value="debt">debt</option><option value="health">health</option><option value="other">other</option>
          </select>
        </div>
        <div class="form-col"><label class="form-label">recurrence</label>
          <select class="select" name="recurring">
            <option value="monthly" selected>monthly</option><option value="weekly">weekly</option><option value="yearly">yearly</option><option value="once">one-time</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-col"><label class="form-label">due date (optional)</label><input type="date" class="input" name="date"></div>
      </div>
      <div class="form-actions">
        <button type="button" data-action="close-modal">cancel</button>
        <button type="submit" class="primary">save expense</button>
      </div>
    </form>
  </div>
</div>

<div class="modal" id="modal-petty">
  <div class="modal-backdrop" data-action="close-modal"></div>
  <div class="modal-card">
    <div class="modal-title">log spending</div>
    <form data-type="petty">
      <div class="form-row">
        <div class="form-col"><label class="form-label">amount</label><input type="text" class="input" name="amount" placeholder="0.00" required></div>
        <div class="form-col"><label class="form-label">category</label>
          <select class="select" name="category">
            <option value="food">food / dining</option><option value="transport">transport</option><option value="media">entertainment</option><option value="other" selected>other</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-col"><label class="form-label">note / description (optional)</label><input type="text" class="input" name="note"></div>
      </div>
      <div class="form-row">
        <div class="form-col"><label class="form-label">date</label><input type="date" class="input" name="date" id="petty-date-input" required></div>
      </div>
      <div class="form-actions">
        <button type="button" data-action="close-modal">cancel</button>
        <button type="submit" class="primary">log purchase</button>
      </div>
    </form>
  </div>
</div>

<div class="modal" id="modal-tasks">
  <div class="modal-backdrop" data-action="close-modal"></div>
  <div class="modal-card">
    <div class="modal-title">add task</div>
    <form data-type="tasks">
      <div class="form-row"><div class="form-col"><label class="form-label">task description</label><input type="text" class="input" name="text" required></div></div>
      <div class="form-row">
        <div class="form-col"><label class="form-label">priority</label>
          <select class="select" name="priority"><option value="">none</option><option value="low">low</option><option value="med">medium</option><option value="high">high</option></select>
        </div>
        <div class="form-col"><label class="form-label">due date (optional)</label><input type="date" class="input" name="date"></div>
      </div>
      <div class="form-actions"><button type="button" data-action="close-modal">cancel</button><button type="submit" class="primary">save task</button></div>
    </form>
  </div>
</div>

<div class="modal" id="modal-goals">
  <div class="modal-backdrop" data-action="close-modal"></div>
  <div class="modal-card">

// migrate: any bill with no category but a name matching a preset gets its
// category (and maxPct, if missing) backfilled — handles bills that were
// added before category support, or via the bare "+ bill" form without picking
// a category. Case-insensitive name match.
{
  const presetByName = {};
  for (const p of PRESET_BILLS) presetByName[p.name.toLowerCase().trim()] = p;
  let touched = false;
  for (const b of state.bills) {
    if (!b.category) {
      const p = presetByName[(b.name || '').toLowerCase().trim()];
      if (p) {
        b.category = p.category;
        if (b.maxPct == null) b.maxPct = p.maxPct;
        touched = true;
      }
    }
  }
  if (touched) saveState();
}

// migrate: clean up duplicate recurring bills caused by the old auto-spawn-on-paid
// behavior. When you marked a recurring bill paid, the previous code created an
// unpaid copy for the next period — but the original kept its recurring flag, so
// BOTH bills counted toward monthly totals. New model: recurring bills have no
// permanent "paid" status; they track lastPaidAt and advance dueDate when paid.
{
  let touched = false;
  const recurring = state.bills.filter(b => b.recurring);
  const paidRecurring = recurring.filter(b => b.paid);
  const toRemove = new Set();

  for (const paid of paidRecurring) {
    if (toRemove.has(paid.id)) continue;
    // Find the auto-spawned unpaid sibling: same name+amount+freq, later dueDate
    const sibling = recurring.find(b =>
      !b.paid &&
      !toRemove.has(b.id) &&
      b.id !== paid.id &&
      (b.name || '').toLowerCase().trim() === (paid.name || '').toLowerCase().trim() &&
      Number(b.amount) === Number(paid.amount) &&
      b.recurring === paid.recurring &&
      b.dueDate && paid.dueDate && b.dueDate > paid.dueDate
    );
    if (sibling) {
      // Merge: keep the (unpaid, future-due) sibling, drop the (paid, past-due) original.
      // Preserve the paidAt timestamp on the sibling as lastPaidAt.
      sibling.lastPaidAt = paid.paidAt || Date.now();
      toRemove.add(paid.id);
      touched = true;
    } else {
      // No sibling — convert the standalone paid recurring to the new model
      paid.lastPaidAt = paid.paidAt || Date.now();
      paid.paid = false;
      paid.paidAt = null;
      touched = true;
    }
  }

  if (toRemove.size > 0) {
    state.bills = state.bills.filter(b => !toRemove.has(b.id));
  }
  if (touched) saveState();
}

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; }
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
}

// ════════════════════════════════════════════════════════════════
// dates
// ════════════════════════════════════════════════════════════════
function startOfDay(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }
function todayStart() { return startOfDay(new Date()); }
function isoDate(d) {
  const x = startOfDay(d);
  return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;
}
function formatDate(s) {
  if (!s) return '';
  const d = new Date(s + 'T00:00:00');
  if (isNaN(d)) return s;
  const today = todayStart();
  const diff = Math.round((startOfDay(d) - today) / 86400000);
  if (diff === 0) return 'today';
  if (diff === 1) return 'tomorrow';
  if (diff === -1) return 'yesterday';
  if (diff > 1 && diff < 7) return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
  if (diff < 0 && diff > -30) return `${-diff}d ago`;
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function isOverdue(s) { return s && startOfDay(new Date(s+'T00:00:00')) < todayStart(); }
function isTodayDate(s) { return s && +startOfDay(new Date(s+'T00:00:00')) === +todayStart(); }
function daysUntil(s) {
  if (!s) return null;
  return Math.round((startOfDay(new Date(s+'T00:00:00')) - todayStart()) / 86400000);
}
function fmtMoney(n, opts = {}) {
  const sign = opts.signed && n > 0 ? '+' : (n < 0 ? '−' : '');
  const abs = Math.abs(n);
  if (opts.round) return sign + '$' + Math.round(abs).toLocaleString();
  return sign + '$' + abs.toFixed(2);
}

// Format a decimal-hours value as "Xh Ym" (e.g. 18.1 → "18h 6m"). Returns '—' if null.
function fmtHM(decimal) {
  if (decimal == null || isNaN(decimal)) return '—';
  if (decimal === 0) return '0h';
  const totalMin = Math.round(decimal * 60);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  if (h === 0) return `${m}m`;
  if (m === 0) return `${h}h`;
  return `${h}h ${m}m`;
}

// ════════════════════════════════════════════════════════════════
// id generation
// ════════════════════════════════════════════════════════════════
function nextId(collection) {
  const prefix = { tasks: 't', bills: 'b', events: 'e', income: 'i', goals: 'g', petty: 'p' }[collection];
  let max = 0;
  for (const item of state[collection]) {
    const n = parseInt(item.id.slice(1), 10);
    if (!isNaN(n) && n > max) max = n;
  }
  return prefix + (max + 1);
}

// ════════════════════════════════════════════════════════════════
// monthly conversion & stats engine
// ════════════════════════════════════════════════════════════════
function monthlyEquivalent(amount, frequency) {
  if (!amount || isNaN(amount)) return 0;
  switch (frequency) {
    case 'weekly':   return amount * 4.33333;
    case 'biweekly': return amount * 2.16667;
    case 'monthly':  return amount;
    case 'yearly':   return amount / 12;
    case 'once':     return 0;     // one-time doesn't recur
    default:         return amount; // assume monthly
  }
}

function getMonthlyIncome() {
  return state.income.reduce((s, i) => s + monthlyEquivalent(i.amount, i.frequency), 0);
}
function getMonthlyBills() {
  return state.bills.reduce((s, b) => {
    if (!b.recurring) return s;
    return s + monthlyEquivalent(b.amount, b.recurring);
  }, 0);
}

// Calculate true averages and YTD stats
function getIncomeStats() {
  const now = new Date();
  const curY = now.getFullYear();
  const curM = now.getMonth();

  // 1. Average Monthly & Projected Annual
  // Look at the LAST 12 fully completed months. Ignore current month to prevent partial-month drag.
  let validMonths = [];
  for (let i = 1; i <= 12; i++) {
     let m = curM - i;
     let y = curY;
     if (m < 0) { m += 12; y -= 1; }
     const monthList = getIncomeForMonth(y, m);
     const monthTotal = monthList.reduce((s, x) => s + x.monthly, 0);
     if (monthTotal > 0) validMonths.push(monthTotal);
  }
  
  // Fallback if no past history exists: use current month
  if (validMonths.length === 0) {
      const curList = getIncomeForMonth(curY, curM);
      const curTotal = curList.reduce((s, x) => s + x.monthly, 0);
      if (curTotal > 0) validMonths.push(curTotal);
  }
  
  const avgMonthly = validMonths.length ? validMonths.reduce((a,b)=>a+b,0) / validMonths.length : 0;
  const projAnnual = avgMonthly * 12;

  // 2. YTD Calculations
  let ytdIncome = 0;
  let ytdHours = 0;

  const daysInCurMonth = new Date(curY, curM + 1, 0).getDate();
  const daysElapsed = now.getDate();
  const monthsElapsedThisYear = curM + (daysElapsed / daysInCurMonth);

  for (const i of state.income) {
     const effective = effectiveIncomeAmount(i);
     const h = Number(i.hours) || 0;
     const isOnce = i.frequency === 'once' || !i.frequency;

     if (isOnce) {
       if (i.receivedAt) {
         const d = new Date(i.receivedAt + (i.receivedAt.includes('T') ? '' : 'T00:00:00'));
         if (d.getFullYear() === curY) {
           ytdIncome += effective;
           ytdHours += h;
         }
       }
     } else {
       // Recurring items
       const dt = i.createdAt ? new Date(i.createdAt) : now;
       const startY = dt.getFullYear();
       const startM = dt.getMonth();

       let startMonthsElapsed = 0;
       if (startY < curY) {
           startMonthsElapsed = 0; // Started in a previous year, active for all of this year
       } else if (startY === curY) {
           const daysInStartMonth = new Date(startY, startM + 1, 0).getDate();
           const startFraction = (daysInStartMonth - dt.getDate() + 1) / daysInStartMonth;
           startMonthsElapsed = startM + (1 - startFraction);
       } else {
           continue; // Starts in the future
       }

       const activeMonthsThisYear = Math.max(0, monthsElapsedThisYear - startMonthsElapsed);
       const monthlyInc = monthlyEquivalent(effective, i.frequency);
       const f = i.frequency === 'weekly' ? 4.33333 : i.frequency === 'biweekly' ? 2.16667 : i.frequency === 'monthly' ? 1 : i.frequency === 'yearly' ? (1/12) : 0;
       const monthlyHrs = h * f;

       ytdIncome += monthlyInc * activeMonthsThisYear;
       ytdHours += monthlyHrs * activeMonthsThisYear;
     }
  }

  const ytdHourly = ytdHours > 0 ? ytdIncome / ytdHours : 0;

  return { ytdIncome, ytdHours, ytdHourly, avgMonthly, projAnnual };
}

// ── month-view helpers ──
// viewMonth = null → current month. Otherwise {year, month: 0-11}.
let viewMonth = null;

// ── theme system ──
const VALID_THEMES = ['default', 'phosphor', 'amber', 'solarized', 'synthwave'];
function applyTheme(name) {
  const theme = VALID_THEMES.includes(name) ? name : 'default';
  // remove any existing theme classes
  document.documentElement.classList.remove('theme-phosphor', 'theme-amber', 'theme-solarized', 'theme-synthwave');
  if (theme !== 'default') document.documentElement.classList.add('theme-' + theme);
  localStorage.setItem('ledgeon-theme', theme);
  // mark the active menu entry
  document.querySelectorAll('.menu-item.theme-pick').forEach(b => {
    b.classList.toggle('active', b.dataset.theme === theme);
  });
}
// apply saved theme on load (the menu items get their .active class set after the DOM exists)
applyTheme(localStorage.getItem('ledgeon-theme') || 'default');

function getViewMonth() {
  if (viewMonth) return viewMonth;
  const d = new Date();
  return { year: d.getFullYear(), month: d.getMonth() };
}
function getMonthLabel(y, m) {
  return new Date(y, m, 1).toLocaleString('en-US', { month: 'long', year: 'numeric' });
}
function getMonthShort(y, m) {
  return new Date(y, m, 1).toLocaleString('en-US', { month: 'short' });
}
function isCurrentViewMonth() {
  const { year, month } = getViewMonth();
  const d = new Date();
  return year === d.getFullYear() && month === d.getMonth();
}

// returns an array of {item, name, freq, monthly, isRecurring} representing
// every income source contributing to this month. Recurring entries always
// contribute (at their monthly equivalent). One-time entries only contribute
// if their receivedAt date falls within this month.
function getIncomeForMonth(year, month) {
  const out = [];
  const firstOfMonth = `${year}-${String(month + 1).padStart(2, '0')}-01`;
  for (const i of state.income) {
    const isOnce = i.frequency === 'once' || !i.frequency;
    const effective = effectiveIncomeAmount(i);
    const baseAmount = Number(i.amount) || 0;
    const tips = effective - baseAmount;
    if (isOnce) {
      if (!i.receivedAt) continue;
      const d = new Date(i.receivedAt + 'T00:00:00');
      if (d.getFullYear() === year && d.getMonth() === month) {
        out.push({ item: i, name: i.source, freq: formatDate(i.receivedAt), monthly: effective, base: baseAmount, tips, isRecurring: false, date: i.receivedAt });
      }
    } else {
      const monthly = monthlyEquivalent(effective, i.frequency);
      if (monthly > 0) {
        out.push({
          item: i, name: i.source, freq: i.frequency,
          monthly,
          base: monthlyEquivalent(baseAmount, i.frequency),
          tips: monthlyEquivalent(tips, i.frequency),
          isRecurring: true, date: firstOfMonth
        });
      }
    }
  }
  out.sort((a, b) => a.date.localeCompare(b.date));
  return out;
}

function getBillsForMonth(year, month) {
  const out = [];
  for (const b of state.bills) {
    if (b.recurring) {
      const monthly = monthlyEquivalent(b.amount, b.recurring);
      if (monthly > 0) out.push({ item: b, name: b.name, freq: b.recurring, monthly, isRecurring: true });
    } else if (b.dueDate) {
      const d = new Date(b.dueDate + 'T00:00:00');
      if (d.getFullYear() === year && d.getMonth() === month && b.amount > 0) {
        out.push({ item: b, name: b.name, freq: formatDate(b.dueDate), monthly: b.amount, isRecurring: false });
      }
    }
  }
  out.sort((a, b) => b.monthly - a.monthly);
  return out;
}

// returns the last N months (most recent last) with computed income and bills totals
function getMonthlyHistory(monthsBack = 6) {
  const now = new Date();
  const out = [];
  for (let i = monthsBack - 1; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const y = d.getFullYear();
    const m = d.getMonth();
    const income = getIncomeForMonth(y, m).reduce((s, x) => s + x.monthly, 0);
    const bills  = getBillsForMonth(y, m).reduce((s, x) => s + x.monthly, 0);
    out.push({
      year: y, month: m,
      label: getMonthShort(y, m),
      income, bills, net: income - bills
    });
  }
  return out;
}

// SVG line chart. data: [{label, ...keyValues}], lines: [{key, color, label}]
function renderLineChart(data, lines, opts = {}) {
  const W = 700;
  const H = opts.height || 240;
  const pad = { top: 14, right: 18, bottom: 32, left: 60, ...(opts.padding || {}) };
  const fmtY = (v) => {
    if (v === 0) return '$0';
    if (v >= 1000) return '$' + (v / 1000).toFixed(v % 1000 === 0 ? 0 : 1) + 'k';
    return '$' + Math.round(v);
  };

  // empty state
  const allValues = [];
  for (const d of data) for (const l of lines) allValues.push(Number(d[l.key]) || 0);
  const peak = Math.max(...allValues, 0);
  if (peak === 0) {
    return `<div class="chart-empty">no data yet — add income or bills to see trends</div>`;
  }

  // pick a nice round y-max (5 grid divisions = clean step)
  const niceList = [10, 25, 50, 100, 250, 500, 1000, 2500, 5000, 10000, 25000, 50000, 100000, 250000, 500000, 1000000];
  let yMax = niceList.find(n => peak <= n) || Math.pow(10, Math.ceil(Math.log10(peak)));

  const innerW = W - pad.left - pad.right;
  const innerH = H - pad.top - pad.bottom;
  const xPos = (i) => pad.left + (data.length <= 1 ? innerW / 2 : (i / (data.length - 1)) * innerW);
  const yPos = (v) => pad.top + innerH - (v / yMax) * innerH;

  // 5-step grid + Y labels
  const gridParts = [];
  for (let i = 0; i <= 5; i++) {
    const v = (yMax / 5) * i;
    const y = yPos(v);
    gridParts.push(`<line x1="${pad.left}" y1="${y.toFixed(1)}" x2="${W - pad.right}" y2="${y.toFixed(1)}" stroke="rgba(255,255,255,0.05)" />`);
    gridParts.push(`<text x="${(pad.left - 8).toFixed(1)}" y="${(y + 4).toFixed(1)}" fill="rgba(255,255,255,0.45)" font-size="11" text-anchor="end" font-family="'JetBrains Mono', monospace">${fmtY(v)}</text>`);
  }

  // X labels (months)
  const xLabels = data.map((d, i) =>
    `<text x="${xPos(i).toFixed(1)}" y="${(H - 10).toFixed(1)}" fill="rgba(255,255,255,0.6)" font-size="12" text-anchor="middle" font-family="'JetBrains Mono', monospace">${d.label}</text>`
  );

  // line paths
  const paths = lines.map(l => {
    const cmds = data.map((d, i) => {
      const x = xPos(i);
      const y = yPos(Number(d[l.key]) || 0);
      return `${i === 0 ? 'M' : 'L'} ${x.toFixed(1)} ${y.toFixed(1)}`;
    }).join(' ');
    return `<path d="${cmds}" fill="none" stroke="${l.color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />`;
  });

  // dots
  const dots = [];
  for (let i = 0; i < data.length; i++) {
    for (const l of lines) {
      const v = Number(data[i][l.key]) || 0;
      const x = xPos(i);
      const y = yPos(v);
      dots.push(`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4" fill="${l.color}" stroke="var(--bg)" stroke-width="2"><title>${l.label} · ${data[i].label}: ${fmtY(v)}</title></circle>`);
    }
  }

  return `<svg viewBox="0 0 ${W} ${H}" class="line-chart" preserveAspectRatio="xMidYMid meet">
    ${gridParts.join('')}
    ${paths.join('')}
    ${dots.join('')}
    ${xLabels.join('')}
  </svg>`;
}

function addTask(text, priority, dueDate) {

  state.tasks.push({ id: nextId('tasks'), text: text.trim(), priority: priority || null, dueDate: dueDate || null, done: false, createdAt: Date.now() });

}
function addBill(name, amount, dueDate, recurring, category, maxPct) {
  if (!name || isNaN(amount)) return;
  state.bills.push({
    id: nextId('bills'),
    name: name.trim(),
    amount,
    dueDate: dueDate || null,
    recurring: recurring || null,
    category: category || null,
    maxPct: (maxPct == null || isNaN(maxPct)) ? null : maxPct,
    paid: false,
    createdAt: Date.now()
  });
  saveState();
}
function addEvent(name, date, time) {
  if (!name || !date) return;
  state.events.push({ id: nextId('events'), name: name.trim(), date, time: time || null, createdAt: Date.now() });
  saveState();
}
function addIncome(source, amount, frequency, receivedAt, hours, cashTipPct, cashTipAmount) {
  if (!source || isNaN(amount)) return;
  // For "once" income, default receivedAt to today if blank
  // (otherwise the entry has no date and won't count toward any month's budget)
  const isOnce = (frequency === 'once' || !frequency);
  if (isOnce && !receivedAt) receivedAt = isoDate(todayStart());
  const h = (hours == null || hours === '' || isNaN(hours)) ? null : Number(hours);
  state.income.push({
    id: nextId('income'),
    source: source.trim(),
    amount,
    frequency: frequency || 'monthly',
    receivedAt: receivedAt || null,
    hours: h,
    cashTipPct:    (cashTipPct    != null && !isNaN(cashTipPct)    && cashTipPct    > 0) ? Number(cashTipPct)    : null,
    cashTipAmount: (cashTipAmount != null && !isNaN(cashTipAmount) && cashTipAmount > 0) ? Number(cashTipAmount) : null,
    createdAt: Date.now()
  });
  saveState();
}
function addGoal(name, targetAmount, targetDate, notes) {
  if (!name || isNaN(targetAmount) || targetAmount <= 0) return;
  state.goals.push({
    id: nextId('goals'),
    name: name.trim(),
    targetAmount: Number(targetAmount),
    currentAmount: 0,
    targetDate: targetDate || null,
    notes: notes ? notes.trim() : '',
    createdAt: Date.now()
  });
  saveState();
}
function addToGoalSaved(id, delta) {
  const g = state.goals.find(x => x.id === id);
  if (!g) return;
  const d = Number(delta);
  if (isNaN(d)) return;
  g.currentAmount = Math.max(0, (g.currentAmount || 0) + d);
  saveState();
}

// Categories surfaced in the petty quick-add. Drawn from CATEGORIES so
// labels/colors stay consistent with the rest of the app.
const PETTY_CATEGORIES = ['food', 'transport', 'entertainment', 'personal', 'pets', 'other'];

function addPetty(amount, category, note, date) {
  const a = Number(amount);
  if (isNaN(a) || a <= 0) return null;
  const item = {
    id: nextId('petty'),
    amount: a,
    category: category && CATEGORIES[category] ? category : null,
    note: (note || '').trim(),
    date: date || isoDate(todayStart()),
    createdAt: new Date().toISOString(),
  };
  state.petty.push(item);
  saveState();
  return item;
}

// Sunday-Saturday calendar week.
function getCurrentWeekRange() {
  const today = todayStart();
  const day = today.getDay(); // 0 = Sunday
  const start = new Date(today.getTime() - day * 86400000);
  const end = new Date(start.getTime() + 6 * 86400000);
  return { startIso: isoDate(start), endIso: isoDate(end), start, end };
}

function getPettyThisWeek() {
  const { startIso, endIso } = getCurrentWeekRange();
  return state.petty
    .filter(p => p.date && p.date >= startIso && p.date <= endIso)
    .sort((a, b) =>
      b.date.localeCompare(a.date) ||
      (b.createdAt || '').localeCompare(a.createdAt || '')
    );
}

function getPettyForMonth(year, month) {
  const start = isoDate(new Date(year, month, 1));
  const end = isoDate(new Date(year, month + 1, 0));
  return state.petty.filter(p => p.date && p.date >= start && p.date <= end);
}

function aggregatePettyByCategory(entries) {
  const map = {};
  for (const e of entries) {
    const cat = e.category || 'uncategorized';
    if (!map[cat]) map[cat] = { total: 0, count: 0 };
    map[cat].total += Number(e.amount) || 0;
    map[cat].count++;
  }
  return Object.entries(map)
    .map(([cat, v]) => ({ category: cat, total: v.total, count: v.count }))
    .sort((a, b) => b.total - a.total);
}

function toggleTask(id) {
  const t = state.tasks.find(x => x.id === id);
  if (!t) return;
  t.done = !t.done;
  if (t.done) t.completedAt = Date.now();
  saveState();
}
function payBill(id) {
  const b = state.bills.find(x => x.id === id);
  if (!b) return;
  if (b.recurring) {
    // Recurring: advance the due date forward one period and stamp lastPaidAt.
    // Don't create a new bill record — the same record represents the ongoing
    // commitment, with its dueDate pointing at the next time it's owed.
    if (b.dueDate) {
      const next = new Date(b.dueDate + 'T00:00:00');
      if (b.recurring === 'monthly')      next.setMonth(next.getMonth() + 1);
      else if (b.recurring === 'weekly')  next.setDate(next.getDate() + 7);
      else if (b.recurring === 'biweekly') next.setDate(next.getDate() + 14);
      else if (b.recurring === 'yearly')  next.setFullYear(next.getFullYear() + 1);
      b.dueDate = isoDate(next);
    }
    b.lastPaidAt = Date.now();
    b.paid = false;        // recurring bills are never permanently paid
    b.paidAt = null;
  } else {
    // One-time: lock as paid permanently
    if (b.paid) return;
    b.paid = true;
    b.paidAt = Date.now();
  }
  saveState();
}
function unpayBill(id) {
  const b = state.bills.find(x => x.id === id);
  if (!b) return;
  if (b.recurring) {
    // Recurring: roll the due date back one period and clear lastPaidAt
    if (!b.lastPaidAt && !b.paid) return;
    if (b.dueDate) {
      const prev = new Date(b.dueDate + 'T00:00:00');
      if (b.recurring === 'monthly')      prev.setMonth(prev.getMonth() - 1);
      else if (b.recurring === 'weekly')  prev.setDate(prev.getDate() - 7);
      else if (b.recurring === 'biweekly') prev.setDate(prev.getDate() - 14);
      else if (b.recurring === 'yearly')  prev.setFullYear(prev.getFullYear() - 1);
      b.dueDate = isoDate(prev);
    }
    b.lastPaidAt = null;
    b.paid = false;
    b.paidAt = null;
  } else {
    if (!b.paid) return;
    b.paid = false;
    b.paidAt = null;
  }
  saveState();
}
function removeItem(id) {
  const map = { t: 'tasks', b: 'bills', e: 'events', i: 'income', g: 'goals', p: 'petty' };
  const collection = map[id[0]];
  if (!collection) return;
  state[collection] = state[collection].filter(x => x.id !== id);
  saveState();
}

function typeLabel(type) {
  return { tasks: 'task', bills: 'bill', events: 'event', income: 'income', goals: 'goal', petty: 'spend' }[type] || type;
}

function prefillForm(type, item) {
  const form = document.querySelector(`#modal-${type} form`);
  if (!form || !item) return;
  if (type === 'tasks') {
    form.text.value = item.text || '';
    form.date.value = item.dueDate || '';
    formChips.tasks.priority = item.priority || '';
    form.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
    form.querySelector(`.chip[data-value="${item.priority || ''}"]`)?.classList.add('selected');
  } else if (type === 'bills') {
    form.name.value = item.name || '';
    form.amount.value = item.amount > 0 ? item.amount.toFixed(2) : '';
    form.date.value = item.dueDate || '';
    form.recurring.value = item.recurring || '';
    if (form.category) form.category.value = item.category || '';
  } else if (type === 'events') {
    form.name.value = item.name || '';
    form.date.value = item.date || '';
    form.time.value = item.time || '';
  } else if (type === 'income') {
    form.source.value = item.source || '';
    form.amount.value = item.amount > 0 ? item.amount.toFixed(2) : '';
    form.frequency.value = item.frequency || 'monthly';
    form.receivedAt.value = item.receivedAt || '';
    if (form.hours && form.minutes) {
      if (item.hours != null) {
        const totalMin = Math.round(item.hours * 60);
        const h = Math.floor(totalMin / 60);
        const m = totalMin % 60;
        form.hours.value = h || '';
        form.minutes.value = m || '';
      } else {
        form.hours.value = '';
        form.minutes.value = '';
      }
    }
    if (form.cashTipMode) {
      const mode = getCashTipMode(item);
      form.cashTipMode.value = mode;
      const row = form.cashTipMode.closest('.cashtip-row');
      if (row) row.dataset.mode = mode;
      form.cashTipPct.value    = (mode === 'percent' && item.cashTipPct    != null) ? item.cashTipPct    : '';
      form.cashTipAmount.value = (mode === 'amount'  && item.cashTipAmount != null) ? item.cashTipAmount.toFixed(2) : '';
    }
  } else if (type === 'goals') {
    form.name.value = item.name || '';
    form.targetAmount.value = item.targetAmount > 0 ? item.targetAmount.toFixed(2) : '';
    form.targetDate.value = item.targetDate || '';
    form.currentAmount.value = (item.currentAmount != null) ? item.currentAmount.toFixed(2) : '0';
    if (form.notes) form.notes.value = item.notes || '';
  }
}

let presetSelections = new Set(); // indices into PRESET_BILLS

function openPresetPicker() {
  presetSelections.clear();
  closeAllModals();
  document.getElementById('modal-presets').classList.add('open');
  renderPresetPicker();
}

function renderPresetPicker() {
  const existing = new Set(state.bills.map(b => b.name.toLowerCase()));
  const byCat = {};
  PRESET_BILLS.forEach((p, idx) => {
    if (!byCat[p.category]) byCat[p.category] = [];
    byCat[p.category].push({ ...p, idx, exists: existing.has(p.name.toLowerCase()) });
  });
  const html = Object.keys(CATEGORIES).map(cat => {
    const items = byCat[cat];
    if (!items || !items.length) return '';
    return `<div class="preset-cat-head">${getCategoryLabel(cat)}</div>` +
      items.map(p => `
        <button type="button" class="preset-row ${presetSelections.has(p.idx) ? 'selected' : ''} ${p.exists ? 'exists' : ''}"
                data-action="toggle-preset" data-idx="${p.idx}" ${p.exists ? 'disabled' : ''}>
          <div class="pcheck"></div>
          <div class="pname">${p.name}</div>
          <div class="ppct ${p.exists ? 'exists' : ''}">${p.exists ? 'already added' : (p.maxPct ? '≤ ' + p.maxPct + '%' : '')}</div>
        </button>
      `).join('');
  }).join('');
  document.getElementById('preset-list').innerHTML = html;
  const btn = document.getElementById('preset-apply-btn');
  btn.disabled = presetSelections.size === 0;
  btn.textContent = presetSelections.size === 0
    ? 'Pick at least one'
    : `Add ${presetSelections.size} ${presetSelections.size === 1 ? 'bill' : 'bills'}`;
}

function applyPresets() {
  let added = 0;
  for (const idx of presetSelections) {
    const p = PRESET_BILLS[idx];
    if (!p) continue;
    state.bills.push({
      id: nextId('bills'),
      name: p.name,
      amount: 0,
      dueDate: null,
      recurring: p.recurring,
      category: p.category,
      maxPct: p.maxPct,
      paid: false,
      createdAt: Date.now(),
    });
    added++;
  }
  if (added > 0) saveState();
  presetSelections.clear();
  closeAllModals();
  currentTab = 'bills';
  localStorage.setItem(TAB_KEY, currentTab);
  render();
}

function togglePresetAll() {
  // if any addable preset is unselected, select all addable; else clear
  const existing = new Set(state.bills.map(b => b.name.toLowerCase()));
  const addable = PRESET_BILLS
    .map((p, i) => ({ p, i }))
    .filter(({ p }) => !existing.has(p.name.toLowerCase()));
  const allSelected = addable.length > 0 && addable.every(({ i }) => presetSelections.has(i));
  if (allSelected) presetSelections.clear();
  else for (const { i } of addable) presetSelections.add(i);
  renderPresetPicker();
}

// rule-of-thumb % calculation
// Returns the income to compare bills against — prefers the *previous* completed
// month (the most recent fully-known data) and falls back to current month if
// previous has no data, then to "no data" if neither has anything.
// Returns { total, year, month, label, source: 'previous'|'current'|'none' }.
function getReferenceMonthIncome() {
  const now = new Date();
  // previous month
  const prevY = now.getMonth() === 0 ? now.getFullYear() - 1 : now.getFullYear();
  const prevM = now.getMonth() === 0 ? 11 : now.getMonth() - 1;
  const prevTotal = getIncomeForMonth(prevY, prevM).reduce((s, x) => s + x.monthly, 0);
  if (prevTotal > 0) {
    return { total: prevTotal, year: prevY, month: prevM, label: getMonthLabel(prevY, prevM), source: 'previous' };
  }
  const curY = now.getFullYear(), curM = now.getMonth();
  const curTotal = getIncomeForMonth(curY, curM).reduce((s, x) => s + x.monthly, 0);
  if (curTotal > 0) {
    return { total: curTotal, year: curY, month: curM, label: getMonthLabel(curY, curM), source: 'current' };
  }
  return { total: 0, year: curY, month: curM, label: getMonthLabel(curY, curM), source: 'none' };
}

// ── budgeting helpers ──

// for a given bill, returns its monthly equivalent dollar amount
function billMonthly(b) {
  if (b.recurring) return monthlyEquivalent(b.amount, b.recurring);
  return b.amount; // one-off — show as-is
}

// effective income amount = base paycheck + cash tips estimate (if any)
function effectiveIncomeAmount(i) {
  const base = Number(i.amount) || 0;
  const amt = Number(i.cashTipAmount);
  if (i.cashTipAmount != null && !isNaN(amt) && amt > 0) {
    return base + amt;
  }
  const pct = Number(i.cashTipPct);
  if (i.cashTipPct != null && !isNaN(pct) && pct > 0) {
    return base + (base * pct / 100);
  }
  return base;
}

// returns 'percent' | 'amount' | 'none'
function getCashTipMode(i) {
  if (i.cashTipAmount != null && Number(i.cashTipAmount) > 0) return 'amount';
  if (i.cashTipPct    != null && Number(i.cashTipPct) > 0)    return 'percent';
  return 'none';
}

// short label for table ("+8% cash" or "+$30 cash")
function cashTipNote(i) {
  const mode = getCashTipMode(i);
  if (mode === 'amount') return `+${fmtMoney(Number(i.cashTipAmount))} cash`;
  if (mode === 'percent') return `+${i.cashTipPct}% cash tips`;
  return '';
}

const BUDGET_BUCKETS = [
  {
    key: 'needs',
    label: 'Needs',
    targetPct: 50,
    color: 'var(--bill)',
    cats: ['housing', 'utilities', 'comms', 'transport', 'insurance', 'food', 'debt', 'childcare', 'pets', 'personal'],
    description: 'Essentials: rent/mortgage, utilities, food, insurance, transport, debt minimums.',
  },
  {
    key: 'wants',
    label: 'Wants',
    targetPct: 30,
    color: 'var(--accent)',
    cats: ['entertainment', 'subs'],
    description: 'Discretionary: streaming, hobbies, entertainment, subscriptions.',
  },
  {
    key: 'savings',
    label: 'Savings & extras',
    targetPct: 20,
    color: 'var(--income)',
    cats: [],
    isImplicit: true,
    description: 'What\'s left after needs + wants — emergency fund, retirement, goals.',
  },
];

function getBucketTotals(billsList, totalIncome) {
  const result = {};
  for (const bucket of BUDGET_BUCKETS) {
    if (bucket.isImplicit) continue;
    const sum = billsList
      .filter(b => bucket.cats.includes(b.item.category || 'uncategorized'))
      .reduce((s, x) => s + x.monthly, 0);
    result[bucket.key] = sum;
  }
  // implicit savings = income - needs - wants
  result.savings = Math.max(0, totalIncome - (result.needs || 0) - (result.wants || 0));
  return result;
}

// Sum the monthly contribution implied by each savings goal (remaining ÷ months left).
// Goals without a target date OR already met contribute zero — they're aspirational
// or done, not a binding monthly commitment.
function getMonthlySavingsTarget() {
  if (!Array.isArray(state.goals) || state.goals.length === 0) return 0;
  const today = todayStart();
  let total = 0;
  const breakdown = [];
  for (const g of state.goals) {
    const target = Number(g.targetAmount) || 0;
    const saved  = Number(g.currentAmount) || 0;
    const remaining = Math.max(0, target - saved);
    if (remaining === 0 || !g.targetDate) continue;
    const targetDate = new Date(g.targetDate + 'T00:00:00');
    if (targetDate <= today) continue; // past due, no further required pace
    const monthsLeft = Math.max(1, Math.round((targetDate - today) / (30 * 86400000)));
    const monthly = remaining / monthsLeft;
    total += monthly;
    breakdown.push({ name: g.name, monthly, monthsLeft });
  }
  return { total, breakdown };
}

// Compute per-week / per-day spending allowance after bills and required savings.
// Uses 4.33 = average weeks per month, 30 = average days per month.
function calculateWeeklyAllowance(monthlyIncome, monthlyBills) {
  const savingsInfo = getMonthlySavingsTarget();
  const monthlySavingsTarget = savingsInfo.total || 0;
  const monthlyAvailable = monthlyIncome - monthlyBills - monthlySavingsTarget;
  return {
    monthlyIncome,
    monthlyBills,
    monthlySavingsTarget,
    monthlyAvailable,
    weekly: monthlyAvailable / 4.33,
    daily:  monthlyAvailable / 30,
    savingsBreakdown: savingsInfo.breakdown || [],
    hasGoalsWithoutDate: Array.isArray(state.goals) && state.goals.some(g =>
      g.targetAmount > 0 && (g.currentAmount || 0) < g.targetAmount && !g.targetDate
    )
  };
}

// Aggregate recurring bills by category and return sorted weekly/monthly figures.
// Used to show "you can spend $X/wk on groceries" style breakdown.
function calculateWeeklyByCategory() {
  const map = {};
  for (const b of state.bills) {
    if (!b.recurring || !(b.amount > 0)) continue;
    const monthly = monthlyEquivalent(b.amount, b.recurring);
    const cat = b.category || 'uncategorized';
    if (!map[cat]) map[cat] = { monthly: 0, names: [] };
    map[cat].monthly += monthly;
    map[cat].names.push(b.name);
  }
  return Object.entries(map).map(([category, data]) => ({
    category,
    label: getCategoryLabel(category),
    color: getCategoryColor(category),
    monthly: data.monthly,
    weekly: data.monthly / 4.33,
    names: data.names,
  })).sort((a, b) => b.monthly - a.monthly);
}

function generateRecommendations(income, totalBills, billsList, buckets) {
  const recs = [];
  if (income === 0) {
    recs.push({ type: 'info', text: 'Add income to see personalized recommendations.' });
    return recs;
  }
  if (totalBills === 0) {
    recs.push({ type: 'info', text: 'Add your bills (or use the preset picker on the Bills tab) to see how they compare against budgeting rules of thumb.' });
    return recs;
  }
  // overall ratio
  const ratio = totalBills / income;
  if (ratio > 0.8) {
    recs.push({ type: 'warning', text: `Your bills are <strong>${Math.round(ratio*100)}% of income</strong> — well above the typical 50% needs / 30% wants threshold. There's little room for savings or surprises.` });
  } else if (ratio > 0.65) {
    recs.push({ type: 'warning', text: `Your bills are <strong>${Math.round(ratio*100)}% of income</strong>. The 50/30/20 rule recommends keeping fixed expenses below ~50% of income to leave room for savings.` });
  } else if (ratio > 0.5) {
    recs.push({ type: 'info', text: `Your bills are <strong>${Math.round(ratio*100)}% of income</strong> — manageable but on the higher end of the recommended range.` });
  } else {
    recs.push({ type: 'success', text: `Your bills are only <strong>${Math.round(ratio*100)}% of income</strong> — strong position to save and invest the rest.` });
  }
  // category over-spending
  const byCat = aggregateBillsByCategory(billsList);
  for (const c of byCat) {
    const meta = CATEGORIES[c.category];
    if (!meta || !meta.max) continue;
    const pct = (c.total / income) * 100;
    if (pct > meta.max * 1.2) {
      recs.push({
        type: 'warning',
        text: `<strong>${getCategoryLabel(c.category)}</strong> is ${pct.toFixed(1)}% of income — above the ${meta.max}% guideline. ${suggestForCategory(c.category)}`
      });
    }
  }
  // savings/leftover
  const leftover = income - totalBills;
  if (leftover < 0) {
    recs.push({ type: 'warning', text: `You're spending <strong>${fmtMoney(-leftover, {round: true})}</strong> more than you earn each month. Reduce expenses or grow income to close the gap.` });
  } else {
    const target20 = income * 0.2;
    const monthlyExpenses = totalBills;
    const targetEF = monthlyExpenses * 3;
    const targetEFUpper = monthlyExpenses * 6;
    if (leftover >= target20) {
      recs.push({
        type: 'success',
        text: `You have <strong>${fmtMoney(leftover, {round: true})}</strong> left after bills — enough to hit the 20% savings target (${fmtMoney(target20, {round: true})}/mo).`
      });
    } else {
      recs.push({
        type: 'info',
        text: `You have <strong>${fmtMoney(leftover, {round: true})}</strong> available after bills. To save the recommended 20% (${fmtMoney(target20, {round: true})}/mo) you'd need to trim ${fmtMoney(target20 - leftover, {round: true})}/mo from spending.`
      });
    }
    recs.push({
      type: 'info',
      text: `Aim for <strong>${fmtMoney(targetEF, {round: true})}–${fmtMoney(targetEFUpper, {round: true})}</strong> in an emergency fund (3–6 months of bills). At ${fmtMoney(target20, {round: true})}/mo, that's ${Math.ceil(targetEF / target20)}–${Math.ceil(targetEFUpper / target20)} months of saving.`
    });
  }
  return recs;
}

function suggestForCategory(cat) {
  const tips = {
    housing: 'Refinancing, downsizing, or finding a roommate could free up significant room.',
    transport: 'Look at insurance shopping, fuel efficiency, or whether the car payment can be reduced.',
    insurance: 'Get fresh quotes from competitors annually — rates change a lot.',
    food: 'Meal planning and cooking at home tend to be the fastest cuts here.',
    subs: 'Audit recurring subscriptions — most people forget at least one or two.',
    entertainment: 'Set a monthly cap and track against it.',
    debt: 'Consolidating high-interest debt or following a payoff method (avalanche/snowball) can speed this up.',
    utilities: 'Energy-efficient adjustments and bundling can chip away at monthly costs.',
    comms: 'Phone and internet plans are often easily downgraded once you check competitors.',
  };
  return tips[cat] || 'Review whether each line item is still needed.';
}

// compute the previous month's income for delta comparisons
function getPrevMonthBucket(year, month) {
  const py = month === 0 ? year - 1 : year;
  const pm = month === 0 ? 11 : month - 1;
  const incomeList = getIncomeForMonth(py, pm);
  const billsList = getBillsForMonth(py, pm);
  return {
    income: incomeList.reduce((s,x)=>s+x.monthly, 0),
    bills:  billsList.reduce((s,x)=>s+x.monthly, 0),
  };
}

function deltaHTML(curr, prev, opts = {}) {
  if (prev === 0 && curr === 0) return `<span class="kpi-delta">no change</span>`;
  const d = curr - prev;
  if (d === 0) return `<span class="kpi-delta">no change</span>`;
  const inverted = !!opts.invertColors; // for bills, "down" is good
  const isUp = d > 0;
  const isGood = inverted ? !isUp : isUp;
  return `<span class="kpi-delta ${isGood ? 'up' : 'down'}">${isUp ? '↑' : '↓'} ${fmtMoney(Math.abs(d), {round: true})} vs last month</span>`;
}

// aggregate a bills-for-month list into category buckets, sorted by total desc
function aggregateBillsByCategory(billsList) {
  const byCat = {};
  for (const b of billsList) {
    const cat = b.item.category || 'uncategorized';
    if (!byCat[cat]) byCat[cat] = { category: cat, total: 0, count: 0, items: [] };
    byCat[cat].total += b.monthly;
    byCat[cat].count += 1;
    byCat[cat].items.push(b);
  }
  return Object.values(byCat).sort((a, b) => b.total - a.total);
}

// render a donut chart given { label, value, color } slices and a center label
function renderDonut(slices, total, centerLabel, centerSub) {
  if (total <= 0 || slices.length === 0) {
    return `<div class="pie-wrap"><svg class="pie" viewBox="0 0 200 200">
      <circle cx="100" cy="100" r="70" fill="none" stroke="var(--border)" stroke-width="40" />
    </svg>
    <div class="pie-center"><div class="pie-total">—</div><div class="pie-sub">${centerSub}</div></div>
    </div>`;
  }
  let cumulative = 0;
  const segments = slices.map(s => {
    const pct = (s.value / total) * 100;
    const seg = `<circle class="slice" cx="100" cy="100" r="70"
                          fill="none"
                          stroke="${s.color}" stroke-width="40"
                          pathLength="100"
                          stroke-dasharray="${pct.toFixed(3)} 100"
                          stroke-dashoffset="${(-cumulative).toFixed(3)}"
                          transform="rotate(-90 100 100)"
                          stroke-linecap="butt">
                  <title>${s.label}: ${fmtMoney(s.value, {round: true})} (${pct.toFixed(1)}%)</title>
                 </circle>`;
    cumulative += pct;
    return seg;
  }).join('');
  return `<div class="pie-wrap">
    <svg class="pie" viewBox="0 0 200 200">${segments}</svg>
    <div class="pie-center">
      <div class="pie-total">${centerLabel}</div>
      <div class="pie-sub">${centerSub}</div>
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════════════════
// sorts
// ════════════════════════════════════════════════════════════════
function sortRows(rows, type) {
  const { col, dir } = sortState[type] || { col: 'date', dir: 'asc' };
  const sign = dir === 'desc' ? -1 : 1;
  return [...rows].sort((a, b) => {
    let av = a[col], bv = b[col];
    if (col === 'date') { av = av || '9999'; bv = bv || '9999'; }
    if (typeof av === 'number' && typeof bv === 'number') return sign * (av - bv);
    return sign * String(av || '').localeCompare(String(bv || ''));
  });
}

// ════════════════════════════════════════════════════════════════
// render
// ════════════════════════════════════════════════════════════════
function escHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── overview: shared context + style dispatcher ──
function buildOverviewContext() {
  const { year, month } = getViewMonth();
  const monthLabel = getMonthLabel(year, month);
  const isCurrent = isCurrentViewMonth();

  const prevY = month === 0 ? year - 1 : year;
  const prevM = month === 0 ? 11 : month - 1;
  const nextY = month === 11 ? year + 1 : year;
  const nextM = month === 11 ? 0 : month + 1;
  const prevLabel = getMonthShort(prevY, prevM);
  const nextLabel = getMonthShort(nextY, nextM);

  const incomeBreak = getIncomeForMonth(year, month);
  const billsBreak  = getBillsForMonth(year, month);
  const monthlyIncome = incomeBreak.reduce((s, x) => s + x.monthly, 0);
  const monthlyBills  = billsBreak.reduce((s, x) => s + x.monthly, 0);
  const net = monthlyIncome - monthlyBills;

  const datelessOnce = state.income.filter(i => (i.frequency === 'once' || !i.frequency) && !i.receivedAt).length;

  const todayIso = isoDate(todayStart());
  const upcomingCutoff = isoDate(new Date(todayStart().getTime() + 14 * 86400000));
  const upcoming = state.bills
    .filter(b => b.dueDate && b.dueDate <= upcomingCutoff)
    .filter(b => !b.paid || (b.dueDate >= todayIso))
    .sort((a, b) => a.dueDate < b.dueDate ? -1 : 1);
  const upcomingTotal = upcoming.filter(b => !b.paid).reduce((s, b) => s + b.amount, 0);

  return {
    year, month, monthLabel, isCurrent,
    prevLabel, nextLabel,
    incomeBreak, billsBreak,
    monthlyIncome, monthlyBills, net,
    datelessOnce, upcoming, upcomingTotal
  };
}
