// ── budget tab ──
function renderBudget() {
  // use the same view month as Overview, but if it has no income, fall back to most recent month with data
  let { year, month } = getViewMonth();
  let incomeList = getIncomeForMonth(year, month);
  let billsList  = getBillsForMonth(year, month);
  let totalIncome = incomeList.reduce((s,x)=>s+x.monthly, 0);
  let totalBills  = billsList.reduce((s,x)=>s+x.monthly, 0);

  // fall back if both are zero
  if (totalIncome === 0) {
    const ref = getReferenceMonthIncome();
    if (ref.total > 0) {
      year = ref.year; month = ref.month;
      incomeList = getIncomeForMonth(year, month);
      billsList  = getBillsForMonth(year, month);
      totalIncome = ref.total;
      totalBills  = billsList.reduce((s,x)=>s+x.monthly, 0);
    }
  }

  const monthLabel = getMonthLabel(year, month);
  const buckets = getBucketTotals(billsList, totalIncome);
  const recs = generateRecommendations(totalIncome, totalBills, billsList, buckets);

  // bucket cards
  const bucketHTML = BUDGET_BUCKETS.map(b => {
    const actual = buckets[b.key] || 0;
    const target = totalIncome * (b.targetPct / 100);
    const actualPct = totalIncome > 0 ? (actual / totalIncome * 100) : 0;
    const fillPct = target > 0 ? Math.min(100, (actual / target) * 100) : 0;

    let statusCls = 'under', statusLabel = '';
    if (b.isImplicit) {
      // "savings" — target is the floor, more is better
      if (actual >= target) {
        statusCls = 'under';
        statusLabel = `meets ${b.targetPct}% target`;
      } else {
        statusCls = 'over';
        statusLabel = `${fmtMoney(target - actual, {round: true})} below target`;
      }
    } else {
      // needs/wants — target is the ceiling
      if (actual <= target) {
        statusCls = 'under';
        statusLabel = `${fmtMoney(target - actual, {round: true})} under target`;
      } else if (actual <= target * 1.2) {
        statusCls = 'near';
        statusLabel = `${fmtMoney(actual - target, {round: true})} over target`;
      } else {
        statusCls = 'over';
        statusLabel = `${fmtMoney(actual - target, {round: true})} over target`;
      }
    }

    // categories in this bucket with non-zero spend
    const catsInBucket = b.cats.length
      ? b.cats.map(cat => {
          const total = billsList.filter(bb => (bb.item.category || 'uncategorized') === cat).reduce((s,x)=>s+x.monthly, 0);
          return total > 0 ? { cat, total } : null;
        }).filter(Boolean).sort((a,b) => b.total - a.total)
      : [];

    return `<div class="bucket-card" style="--bucket-color: ${b.color};">
      <div class="bucket-head">
        <span class="label">${b.label}</span>
        <span class="target-pct">target ${b.targetPct}%</span>
      </div>
      <div class="bucket-desc">${b.description}</div>
      <div class="bucket-row"><span>target</span><span>${totalIncome > 0 ? fmtMoney(target, {round: true}) : '—'}</span></div>
      <div class="bucket-row actual"><span>${b.isImplicit ? 'available' : 'spent'}</span><span>${fmtMoney(actual, {round: true})} · ${actualPct.toFixed(0)}%</span></div>
      <div class="bucket-progress">
        <div class="bucket-progress-fill" style="width: ${fillPct.toFixed(1)}%; background: ${b.color};"></div>
      </div>
      <div class="bucket-status ${statusCls}">${totalIncome > 0 ? statusLabel : 'add income to see targets'}</div>
      ${catsInBucket.length ? `<div class="bucket-cats">
        ${catsInBucket.map(c => `<div class="bucket-cat-line"><span>${getCategoryLabel(c.cat)}</span><span>${fmtMoney(c.total, {round: true})}</span></div>`).join('')}
      </div>` : (b.cats.length ? `<div class="bucket-cats" style="font-style: italic;">no spending in this bucket yet</div>` : '')}
    </div>`;
  }).join('');

  // recommendations
  const recsHTML = recs.length === 0 ? '' : recs.map(r => {
    const icon = r.type === 'warning' ? '!' : r.type === 'success' ? '✓' : 'i';
    return `<div class="rec-item">
      <div class="rec-icon ${r.type}">${icon}</div>
      <div class="rec-text">${r.text}</div>
    </div>`;
  }).join('');

  return `
    <div class="ov-month-nav">
      <button data-action="view-month-prev" title="Previous month">← prev</button>
      <span class="month-label">${monthLabel}</span>
      <button data-action="view-month-next" title="Next month">next →</button>
      ${(() => {
        const now = new Date();
        const isCurr = year === now.getFullYear() && month === now.getMonth();
        return !isCurr ? `<button class="today" data-action="view-month-today">jump to current</button>` : '';
      })()}
    </div>

    <div class="budget-intro">
      <strong>The 50/30/20 rule</strong> is a popular budgeting framework: aim for about <strong>50%</strong> of income going to needs (rent, utilities, food, transport), <strong>30%</strong> to wants (entertainment, subscriptions), and <strong>20%</strong> to savings (emergency fund, retirement, goals). The numbers below check your actual spending against those targets.
    </div>

    <div class="ov-stats" style="margin-bottom: 22px;">
      <div class="ov-stat">
        <div class="ov-stat-label">Income · ${monthLabel}</div>
        <div class="ov-stat-value income">${totalIncome > 0 ? fmtMoney(totalIncome, {round: true}) : '—'}</div>
        <div class="ov-stat-sub">${incomeList.length} source${incomeList.length === 1 ? '' : 's'}</div>
      </div>
      <div class="ov-stat">
        <div class="ov-stat-label">Bills · ${monthLabel}</div>
        <div class="ov-stat-value bill">${totalBills > 0 ? fmtMoney(totalBills, {round: true}) : '—'}</div>
        <div class="ov-stat-sub">${totalIncome > 0 ? Math.round(totalBills / totalIncome * 100) + '% of income' : '—'}</div>
      </div>
      <div class="ov-stat">
        <div class="ov-stat-label">Available</div>
        <div class="ov-stat-value ${totalIncome - totalBills >= 0 ? 'positive' : 'negative'}">${(totalIncome > 0 || totalBills > 0) ? fmtMoney(totalIncome - totalBills, {round: true}) : '—'}</div>
        <div class="ov-stat-sub">after fixed bills</div>
      </div>
    </div>

    ${renderWeeklyAllowance(totalIncome, totalBills)}

    ${renderPettySection(calculateWeeklyAllowance(totalIncome, totalBills).weekly)}

    ${renderWeeklyBreakdown(totalIncome, totalBills)}

    <div class="budget-buckets">
      ${bucketHTML}
    </div>

    <div class="ov-section-head">
      <span class="label">Savings goals</span>
      <button class="btn primary" data-action="open-modal" data-type="goals">+ goal</button>
    </div>
    ${renderGoalsSection()}

    <div class="ov-section-head">
      <span class="label">Recommendations</span>
    </div>
    <div class="recommendations">
      ${recsHTML || '<div class="rec-item"><div class="rec-text" style="color: var(--text-faint); font-style: italic;">Add income and bills to see personalized recommendations.</div></div>'}
    </div>
  `;
}

function renderWeeklyBreakdown(totalIncome, totalBills) {
  const cats = calculateWeeklyByCategory();
  if (cats.length === 0) {
    return ''; // skip section entirely if no recurring bills
  }
  const w = calculateWeeklyAllowance(totalIncome, totalBills);
  const savingsWeekly = w.monthlySavingsTarget / 4.33;
  const freeWeekly = w.weekly;
  const isOver = freeWeekly < 0;

  const catRows = cats.map(c => {
    const itemsLabel = c.names.length === 1
      ? c.names[0]
      : `${c.names.length} bills: ${c.names.slice(0, 2).join(', ')}${c.names.length > 2 ? '…' : ''}`;
    return `<div class="wb-row">
      <div class="swatch" style="background: ${c.color};"></div>
      <span class="cat">${c.label}</span>
      <span class="weekly">${fmtMoney(c.weekly, {round: true})}<span class="unit">/wk</span></span>
      <span class="monthly">${fmtMoney(c.monthly, {round: true})}/mo</span>
      <span class="items" title="${escHTML(c.names.join(', '))}">${escHTML(itemsLabel)}</span>
    </div>`;
  }).join('');

  return `
    <div class="ov-section-head">
      <span class="label">Weekly budget by category</span>
      <span class="sub">monthly bills ÷ 4.33 weeks</span>
    </div>
    <div class="weekly-breakdown">
      ${catRows}
      <div class="wb-row total">
        <div></div>
        <span class="cat">Bills total</span>
        <span class="weekly">${fmtMoney(totalBills/4.33, {round: true})}<span class="unit">/wk</span></span>
        <span class="monthly">${fmtMoney(totalBills, {round: true})}/mo</span>
        <span></span>
      </div>
      ${w.monthlySavingsTarget > 0 ? `
        <div class="wb-row savings">
          <div class="swatch"></div>
          <span class="cat">Savings target</span>
          <span class="weekly">${fmtMoney(savingsWeekly, {round: true})}<span class="unit">/wk</span></span>
          <span class="monthly">${fmtMoney(w.monthlySavingsTarget, {round: true})}/mo</span>
          <span class="items">${w.savingsBreakdown.map(b => escHTML(b.name)).join(', ') || ''}</span>
        </div>
      ` : ''}
      <div class="wb-row free ${isOver ? 'over' : ''}">
        <div class="swatch"></div>
        <span class="cat">${isOver ? 'Over budget' : 'Free to spend'}</span>
        <span class="weekly">${isOver ? '−' : ''}${fmtMoney(Math.abs(freeWeekly), {round: true})}<span class="unit">/wk</span></span>
        <span class="monthly">${isOver ? '−' : ''}${fmtMoney(Math.abs(w.monthlyAvailable), {round: true})}/mo</span>
        <span class="items">discretionary spending</span>
      </div>
    </div>
  `;
}

function renderWeeklyAllowanceMini(monthlyIncome, monthlyBills) {
  // If viewed month has no income (current month at start, future months), fall back
  // to the most recent reliable monthly income so the card always shows useful data.
  let income = monthlyIncome;
  let basisLabel = null;
  if (income === 0) {
    const ref = getReferenceMonthIncome();
    if (ref.total > 0) {
      income = ref.total;
      basisLabel = ref.label;
    }
  }

  if (income === 0 && monthlyBills === 0) return '';

  const w = calculateWeeklyAllowance(income, monthlyBills);
  const isNeg = w.monthlyAvailable < 0;
  const sign = isNeg ? '−' : '';

  let noteText;
  if (isNeg) {
    noteText = `Over budget — bills + savings exceed income by ${fmtMoney(Math.abs(w.monthlyAvailable), {round: true})}/mo`;
  } else if (w.monthlySavingsTarget > 0) {
    noteText = `After bills and ${fmtMoney(w.monthlySavingsTarget, {round: true})}/mo toward savings goals`;
  } else {
    noteText = 'After bills (no active savings goals with deadlines)';
  }
  if (basisLabel) noteText += ` · based on ${basisLabel} income`;

  return `
    <div class="weekly-mini${isNeg ? ' constrained' : ''}">
      <div class="head">
        <span class="label">Weekly spending allowance</span>
        <button class="link" data-action="goto-tab" data-tab="budget">budget breakdown →</button>
      </div>
      <div class="row">
        <span class="value">${sign}${fmtMoney(Math.abs(w.weekly), {round: true})}<span class="unit">/wk</span></span>
        <span class="daily">~${sign}${fmtMoney(Math.abs(w.daily), {round: true})}/day</span>
      </div>
      <div class="note">${noteText}</div>
    </div>
  `;
}

function renderWeeklyAllowance(totalIncome, totalBills) {
  if (totalIncome === 0 && totalBills === 0) {
    return `<div class="weekly-card" style="border-left-color: var(--border);">
      <div class="headline">
        <span class="label">Weekly allowance</span>
        <span class="value" style="color: var(--text-faint); font-size: 26px;">—</span>
        <span class="note">Add income and bills to see how much you can spend each week.</span>
      </div>
      <div class="weekly-math" style="border-left-color: var(--border-soft);">
        <div class="formula">income − bills − savings target ÷ 4.33 weeks/mo</div>
      </div>
    </div>`;
  }

  const w = calculateWeeklyAllowance(totalIncome, totalBills);
  const weeklyAbs = Math.abs(w.weekly);
  const dailyAbs  = Math.abs(w.daily);
  const isNegative = w.monthlyAvailable < 0;
  const sign = isNegative ? '−' : '';

  const breakdownLines = w.savingsBreakdown.length
    ? w.savingsBreakdown.map(b =>
        `<div class="row"><span class="label" style="padding-left: 12px;">${escHTML(b.name)}</span><span class="value savings">${fmtMoney(b.monthly, {round: true})}</span></div>`
      ).join('')
    : '';

  const noteParts = [];
  if (isNegative) {
    noteParts.push('You\'re over budget — bills + savings target exceed income.');
  } else if (w.monthlySavingsTarget === 0) {
    noteParts.push('No active savings goals with deadlines — set one to factor it in.');
  } else {
    noteParts.push(`After bills and ${fmtMoney(w.monthlySavingsTarget, {round: true})}/mo toward savings goals.`);
  }
  if (w.hasGoalsWithoutDate) {
    noteParts.push('Goals without target dates aren\'t included.');
  }

  return `
    <div class="weekly-card${isNegative ? ' constrained' : ''}">
      <div class="headline">
        <span class="label">Weekly spending allowance</span>
        <span class="value">${sign}${fmtMoney(weeklyAbs, {round: true})}<span class="unit">/wk</span></span>
        <span class="daily">~${sign}${fmtMoney(dailyAbs, {round: true})}/day</span>
        <span class="note">${noteParts.join(' ')}</span>
      </div>
      <div class="weekly-math">
        <div class="row"><span class="label">Income</span><span class="value income">${fmtMoney(w.monthlyIncome, {round: true})}</span></div>
        <div class="row"><span class="label">− Bills</span><span class="value bill">${fmtMoney(w.monthlyBills, {round: true})}</span></div>
        ${w.monthlySavingsTarget > 0 ? `
          <div class="row"><span class="label">− Savings target</span><span class="value savings">${fmtMoney(w.monthlySavingsTarget, {round: true})}</span></div>
          ${breakdownLines}
        ` : ''}
        <div class="row total"><span class="label">= Available / month</span><span class="value">${isNegative ? '−' : ''}${fmtMoney(Math.abs(w.monthlyAvailable), {round: true})}</span></div>
        <div class="formula">÷ 4.33 weeks ≈ ${sign}${fmtMoney(weeklyAbs, {round: true})}/wk · ÷ 30 days ≈ ${sign}${fmtMoney(dailyAbs, {round: true})}/day</div>
      </div>
    </div>
  `;
}

// Petty spending tracker for the budget tab. weeklyAllowance comes from
// calculateWeeklyAllowance() — pass 0 if income/bills aren't set yet and
// we'll just show the log without the comparison.
function renderPettySection(weeklyAllowance) {
  const allowance = Number(weeklyAllowance) || 0;
  const weekEntries = getPettyThisWeek();
  const spent = weekEntries.reduce((s, e) => s + (Number(e.amount) || 0), 0);
  const left = allowance - spent;
  const pct = allowance > 0 ? (spent / allowance) * 100 : 0;

  let statusCls = '';
  if (allowance > 0) {
    if (pct >= 100) statusCls = 'over';
    else if (pct >= 75) statusCls = 'near';
  }

  // category breakdown chips
  const catTotals = aggregatePettyByCategory(weekEntries);
  const catChipsHTML = catTotals.length
    ? `<div class="petty-cats">${catTotals.map(c => `
        <span class="petty-cat-chip">
          <span class="dot" style="background: ${getCategoryColor(c.category)};"></span>
          ${getCategoryLabel(c.category) || 'uncategorized'} · ${fmtMoney(c.total, {round: true})}
        </span>`).join('')}</div>`
    : '';

  // category options for the quick-add select
  const catOptions = ['<option value="">— category (optional) —</option>']
    .concat(PETTY_CATEGORIES.map(k =>
      `<option value="${k}">${getCategoryLabel(k)}</option>`
    )).join('');

  // group entries by date
  const byDay = {};
  for (const e of weekEntries) {
    if (!byDay[e.date]) byDay[e.date] = [];
    byDay[e.date].push(e);
  }
  const dayKeys = Object.keys(byDay).sort((a, b) => b.localeCompare(a));

  const todayIso = isoDate(todayStart());
  const yesterdayIso = isoDate(new Date(todayStart().getTime() - 86400000));
  const dayLabel = (iso) => {
    if (iso === todayIso) return 'Today';
    if (iso === yesterdayIso) return 'Yesterday';
    return formatDate(iso);
  };

  const listHTML = dayKeys.length === 0
    ? `<div class="petty-empty">No spends logged this week yet. Add one above to start tracking.</div>`
    : dayKeys.map(d => {
        const dayTotal = byDay[d].reduce((s, e) => s + (Number(e.amount) || 0), 0);
        return `<div class="petty-day-head">
            <span>${dayLabel(d)}</span>
            <span class="pdh-total">${fmtMoney(dayTotal, {round: true})}</span>
          </div>
          ${byDay[d].map(e => `
            <div class="petty-entry">
              <span class="pe-cat">
                <span class="dot" style="background: ${getCategoryColor(e.category)};"></span>
                ${e.category ? getCategoryLabel(e.category) : 'uncategorized'}
              </span>
              <span class="pe-note ${e.note ? '' : 'empty'}">${e.note ? escHTML(e.note) : '—'}</span>
              <span class="pe-amount">${fmtMoney(e.amount, {round: true})}</span>
              <button class="pe-del" data-action="remove" data-id="${e.id}" title="Delete">×</button>
            </div>`).join('')}`;
      }).join('');

  // The headline value: "$X spent" or fallback if no allowance yet
  const summaryRight = allowance > 0
    ? `<div class="ps-right">
        <div class="ps-bar-label">
          <span>${fmtMoney(spent, {round: true})} of ${fmtMoney(allowance, {round: true})} used</span>
          <span>${pct.toFixed(0)}%</span>
        </div>
        <div class="petty-progress">
          <div class="petty-progress-fill ${statusCls}" style="width: ${Math.min(100, pct).toFixed(1)}%;"></div>
        </div>
        ${catChipsHTML}
      </div>`
    : `<div class="ps-right">
        <div class="ps-sub" style="font-style: italic;">
          Add income and bills above to see how this stacks up against your weekly allowance.
        </div>
        ${catChipsHTML}
      </div>`;

  return `
    <div class="ov-section-head">
      <span class="label">Petty spending · this week</span>
    </div>
    <div class="petty-card ${statusCls}">
      <div class="petty-summary">
        <div>
          <div class="ps-label">Spent this week</div>
          <div class="ps-value ${statusCls === 'over' ? 'over' : ''}">${fmtMoney(spent, {round: true})}</div>
          <div class="ps-sub">
            ${allowance > 0
              ? (left >= 0
                  ? `${fmtMoney(left, {round: true})} left of weekly allowance`
                  : `${fmtMoney(-left, {round: true})} over weekly allowance`)
              : `${weekEntries.length} entr${weekEntries.length === 1 ? 'y' : 'ies'} this week`}
          </div>
        </div>
        ${summaryRight}
      </div>

      <form class="petty-add-form" data-type="petty" autocomplete="off">
        <div class="pa-amount">
          <input type="text" class="input" name="amount" id="petty-amount-input" placeholder="$0.00" required inputmode="decimal" aria-label="Amount">
        </div>
        <div class="pa-cat">
          <select class="select" name="category" aria-label="Category">${catOptions}</select>
        </div>
        <div class="pa-note">
          <input type="text" class="input" name="note" placeholder="optional note (e.g. coffee, gas)" maxlength="80" aria-label="Note">
        </div>
        <div class="pa-date">
          <input type="date" class="input" name="date" value="${todayIso}" aria-label="Date">
        </div>
        <button type="submit" class="btn primary pa-submit">+ track</button>
      </form>

      <div class="petty-list">${listHTML}</div>
    </div>
  `;
}

function renderGoalsSection() {
  if (!state.goals.length) {
    return `<div class="goal-empty">
      No savings goals yet. Click <strong>+ goal</strong> above to add one — common goals: emergency fund, winter buffer, vacation, debt payoff target.
    </div>`;
  }
  const today = todayStart();
  const cards = state.goals.map(g => {
    const target = Number(g.targetAmount) || 0;
    const saved = Number(g.currentAmount) || 0;
    const remaining = Math.max(0, target - saved);
    const pct = target > 0 ? Math.min(100, (saved / target) * 100) : 0;

    let monthsLeft = null;
    let pastDue = false;
    if (g.targetDate) {
      const targetDate = new Date(g.targetDate + 'T00:00:00');
      const diffMs = targetDate - today;
      const diffDays = Math.ceil(diffMs / 86400000);
      if (diffDays < 0) {
        pastDue = true;
      } else {
        monthsLeft = Math.max(1, Math.round(diffDays / 30));
      }
    }

    let statusCls = '';
    if (pct >= 100) statusCls = 'complete';
    else if (pastDue) statusCls = 'overdue';
    else if (g.targetDate && monthsLeft) {
      // expected monthly pace: target/months from goal creation to target date.
      // If actual saved is meaningfully behind expected, mark behind.
      const totalMs = new Date(g.targetDate + 'T00:00:00') - new Date(g.createdAt);
      const elapsedMs = today - new Date(g.createdAt);
      if (totalMs > 0) {
        const expectedPct = Math.min(100, (elapsedMs / totalMs) * 100);
        if (expectedPct - pct > 15) statusCls = 'behind';
      }
    }

    const monthlyNeed = (g.targetDate && !pastDue && monthsLeft && remaining > 0)
      ? remaining / monthsLeft
      : null;

    const targetLine = g.targetDate
      ? (pastDue
          ? `${fmtMoney(target, {round: true})} target · <span style="color: var(--error);">target date passed</span>`
          : `${fmtMoney(target, {round: true})} by ${formatDate(g.targetDate)}${monthsLeft ? ` · ${monthsLeft} month${monthsLeft === 1 ? '' : 's'} left` : ''}`)
      : `${fmtMoney(target, {round: true})} target · no deadline`;

    const monthlyLine = monthlyNeed != null
      ? `Need <strong>${fmtMoney(monthlyNeed, {round: true})}/mo</strong> to hit target on time`
      : (pct >= 100
          ? `<strong style="color: var(--success);">Goal reached.</strong> ${remaining > 0 ? '' : 'Nice work.'}`
          : remaining > 0
            ? `<strong>${fmtMoney(remaining, {round: true})}</strong> to go`
            : '');

    return `<div class="goal-card ${statusCls}">
      <div class="goal-head">
        <span class="name">${escHTML(g.name)}</span>
        <span class="pct">${pct.toFixed(0)}%</span>
      </div>
      <div class="goal-target-line">${targetLine}</div>
      <div class="goal-progress"><div class="goal-progress-fill" style="width: ${pct.toFixed(1)}%;"></div></div>
      <div class="goal-stats">
        <span class="saved">${fmtMoney(saved, {round: true})} saved</span>
        <span>of ${fmtMoney(target, {round: true})}</span>
      </div>
      ${monthlyLine ? `<div class="goal-monthly">${monthlyLine}</div>` : ''}
      ${g.notes ? `<div class="goal-notes">${escHTML(g.notes)}</div>` : ''}
      <div class="goal-actions">
        <button class="primary" data-action="goal-add" data-id="${g.id}" title="Add money to this goal">+ deposit</button>
        <button data-action="goal-subtract" data-id="${g.id}" title="Withdraw / correct">− withdraw</button>
        <button data-action="edit" data-type="goals" data-id="${g.id}">edit</button>
        <button class="danger" data-action="remove" data-id="${g.id}">delete</button>
      </div>
    </div>`;
  }).join('');

  return `<div class="goals-grid">${cards}</div>`;
}

// ── sheets ──
function sheetHeader(type, cols) {
  const sort = sortState[type];
  return cols.map(c => {
    const cls = [];
    if (c.num) cls.push('num');
    if (sort.col === c.key) {
      cls.push('sorted');
      if (sort.dir === 'asc') cls.push('asc');
    }
    if (c.key) {
      return `<th class="${cls.join(' ')}" data-action="sort" data-type="${type}" data-col="${c.key}">${c.label}</th>`;
    }
    return `<th></th>`;
  }).join('');
}

function renderIncomeSheet() {
  const rows = state.income.map(i => {
    const baseAmount = Number(i.amount) || 0;
    const effectiveAmount = effectiveIncomeAmount(i);
    const tips = effectiveAmount - baseAmount;
    const monthly = monthlyEquivalent(effectiveAmount, i.frequency);
    const hourly = (i.hours && i.hours > 0) ? (effectiveAmount / i.hours) : null;
    return {
      id: i.id, source: i.source,
      amount: effectiveAmount,    // sortable column uses effective
      base: baseAmount,
      tips,
      tipNote: cashTipNote(i),
      frequency: i.frequency,
      monthly,
      hours: (i.hours == null ? null : Number(i.hours)),
      hourly,
      date: i.receivedAt || '',
      raw: i
    };
  });
  const sorted = sortRows(rows, 'income');

  // New strict-math income stats Engine
  const stats = getIncomeStats();

  return `
    <div class="income-summary" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px;">
      <div class="group" style="flex-direction: column; align-items: flex-start; gap: 4px;">
        <span class="label">YTD Income</span>
        <span class="value income" style="font-size: 18px;">${fmtMoney(stats.ytdIncome, {round: true})}</span>
      </div>
      <div class="group" style="flex-direction: column; align-items: flex-start; gap: 4px;">
        <span class="label">YTD Hours</span>
        <span class="value" style="font-size: 18px;">${stats.ytdHours > 0 ? fmtHM(stats.ytdHours) : '0h'}</span>
      </div>
      <div class="group" style="flex-direction: column; align-items: flex-start; gap: 4px;">
        <span class="label">YTD Avg $/hr</span>
        <span class="value" style="font-size: 18px;">${stats.ytdHourly > 0 ? '$' + stats.ytdHourly.toFixed(2) : '—'}</span>
      </div>
      <div class="group" style="flex-direction: column; align-items: flex-start; gap: 4px;">
        <span class="label">Avg Monthly</span>
        <span class="value income" style="font-size: 18px;">${fmtMoney(stats.avgMonthly, {round: true})}</span>
      </div>
      <div class="group" style="flex-direction: column; align-items: flex-start; gap: 4px;">
        <span class="label">Projected Annual</span>
        <span class="value income" style="font-size: 18px;">${fmtMoney(stats.projAnnual, {round: true})}</span>

function renderBillsSheet() {
  const ref = getReferenceMonthIncome();
  const monthIncome = ref.total;
  const refMonthShort = getMonthShort(ref.year, ref.month);
  const rows = state.bills.map(b => ({
    id: b.id, name: b.name, amount: b.amount,
    date: b.dueDate || '',
    frequency: b.recurring || 'one-time',
    recurring: !!b.recurring,
    category: b.category || '',
    maxPct: (b.maxPct == null) ? null : b.maxPct,
    monthlyAmt: billMonthly(b),
    status: b.paid ? 'paid' : (isOverdue(b.dueDate) ? 'overdue' : (isTodayDate(b.dueDate) ? 'today' : (b.dueDate ? 'due' : 'no date'))),
    paid: b.paid, lastPaidAt: b.lastPaidAt || null, raw: b
  }));
  const sorted = sortRows(rows, 'bills');
  const totalDue = rows.filter(r => !r.paid).reduce((s, r) => s + r.amount, 0);
  const recurringMonthly = state.bills.filter(b => b.recurring).reduce((s, b) => s + monthlyEquivalent(b.amount, b.recurring), 0);
  const totalPct = monthIncome > 0 ? (recurringMonthly / monthIncome * 100) : 0;
  const pctSourceLabel = ref.source === 'previous'
    ? `% of ${refMonthShort} income`
    : ref.source === 'current'
      ? `% of ${refMonthShort} income (no prior month data)`
      : '';

  return `
    <div class="sheet-toolbar">
      <div class="info">
        ${rows.length} bill${rows.length === 1 ? '' : 's'} ·
        ${fmtMoney(totalDue)} unpaid ·
        ${fmtMoney(recurringMonthly, {round: true})}/mo recurring${monthIncome > 0 ? ` · <span style="color: ${totalPct > 70 ? 'var(--error)' : totalPct > 50 ? 'var(--accent)' : 'var(--success)'};">${totalPct.toFixed(1)}% ${pctSourceLabel}</span>` : ''}
      </div>
      <div class="actions">
        <button class="btn" data-action="preset-bills">+ presets</button>
        <button class="btn primary" data-action="open-modal" data-type="bills">+ bill</button>
      </div>
    </div>
    ${monthIncome === 0 ? `<div style="padding: 8px 12px; background: var(--bg-soft); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 14px; font-size: 12px; color: var(--text-faint);">
      Add some income on the Income tab to see each bill as a percentage of your monthly income (with rule-of-thumb comparison). Bills compare against your previous month's income, or current month if previous is empty.
    </div>` : ref.source === 'previous' ? `<div style="padding: 8px 12px; background: var(--bg-soft); border: 1px solid var(--border-soft); border-radius: var(--radius); margin-bottom: 14px; font-size: 11.5px; color: var(--text-faint);">
      Percentages compare each bill against ${ref.label}'s total income (${fmtMoney(monthIncome, {round: true})}).
    </div>` : ''}
    ${(() => {
      // pie chart of recurring bills by category (always visible at top of bills tab)
      const monthBills = state.bills
        .filter(b => b.recurring && b.amount > 0)
        .map(b => ({ item: b, monthly: monthlyEquivalent(b.amount, b.recurring) }));
      if (!monthBills.length) return '';
      const cats = aggregateBillsByCategory(monthBills);
      const totalBills = cats.reduce((s, c) => s + c.total, 0);
      const slices = cats.map(c => ({
        label: getCategoryLabel(c.category),
        value: c.total,
        color: getCategoryColor(c.category),
      }));
      const donut = renderDonut(slices, totalBills, fmtMoney(totalBills, {round: true}), 'monthly');
      const legend = cats.map(c => {
        const pct = totalBills > 0 ? (c.total / totalBills * 100) : 0;
        return `<div class="pie-legend-row">
          <div class="swatch" style="background: ${getCategoryColor(c.category)};"></div>
          <div class="name">${getCategoryLabel(c.category)}<span class="count">${c.count} bill${c.count === 1 ? '' : 's'}</span></div>
          <div class="amt">${fmtMoney(c.total, {round: true})}</div>
          <div class="pct">${pct.toFixed(1)}%</div>
        </div>`;
      }).join('');
      return `<div class="ov-section" style="margin-bottom: 22px;">
        <div class="ov-section-head">
          <span class="label">Recurring bills by category</span>
          <span class="sub">${cats.length} categor${cats.length === 1 ? 'y' : 'ies'}</span>
        </div>
        <div class="pie-section">
          ${donut}
          <div class="pie-legend">${legend}</div>
        </div>
      </div>`;
    })()}
    ${rows.length === 0 ? `
      <div class="sheet-empty">
        no bills tracked yet.<br>
        <button class="btn primary" data-action="open-modal" data-type="bills">+ add a bill</button>
        <button class="btn" data-action="preset-bills">+ start with common monthly bills</button>
      </div>
    ` : `
      <table class="sheet">
        <thead><tr>
          ${sheetHeader('bills', [
            { key: 'id', label: 'ID' },
            { key: 'name', label: 'Name' },
            { key: 'amount', label: 'Amount', num: true },
            { key: 'monthlyAmt', label: '% income', num: true },
            { key: 'frequency', label: 'Recurrence' },
            { key: 'date', label: 'Due' },
            { key: 'status', label: 'Status' },
            { label: '' }
          ])}
        </tr></thead>
        <tbody>
          ${sorted.map(r => {
            const dateCls = !r.paid && r.status === 'overdue' ? 'date overdue' : (r.status === 'today' ? 'date today' : 'date');
            const isEmpty = r.amount === 0;
            const editLabel = isEmpty ? 'set amount' : 'edit';
            const editCls = isEmpty ? 'primary' : '';
            // % of income calculation
            let pctHTML = '<span style="color: var(--text-faint);">—</span>';
            if (!isEmpty && monthIncome > 0) {
              const pct = (r.monthlyAmt / monthIncome) * 100;
              let pctCls = '';
              if (r.maxPct != null) {
                if (pct <= r.maxPct)        pctCls = 'under';
                else if (pct <= r.maxPct * 1.2) pctCls = 'near';
                else                            pctCls = 'over';
              }
              pctHTML = `<span class="${pctCls}">${pct.toFixed(1)}%</span>${r.maxPct != null ? `<span class="max">/ ${r.maxPct}%</span>` : ''}`;
            } else if (!isEmpty && monthIncome === 0) {
              pctHTML = '<span style="color: var(--text-faint);">—</span>';
            }
            const catCap = r.category ? `<span class="cat-cap">${getCategoryLabel(r.category)}</span>` : '';
            const lastPaidCap = (r.recurring && r.lastPaidAt)
              ? `<span class="last-paid-cap" title="Last paid ${new Date(r.lastPaidAt).toLocaleString()}">✓ paid ${formatDate(isoDate(new Date(r.lastPaidAt)))}</span>`
              : '';
            const showUnpaid = r.paid || (r.recurring && r.lastPaidAt);
            return `<tr class="${r.paid ? 'done' : ''}">
              <td class="id">${r.id}</td>
              <td class="name">${escHTML(r.name)}${catCap}${lastPaidCap}</td>
              <td class="num amount bill ${isEmpty ? 'amount-empty' : ''}">${isEmpty ? '— set —' : fmtMoney(r.amount)}</td>
              <td class="pct">${pctHTML}</td>
              <td class="freq">${r.frequency}</td>
              <td class="${dateCls}">${r.date ? formatDate(r.date) : '—'}</td>
              <td class="status ${r.status}">${r.status}</td>
              <td class="actions">
                ${!r.paid && !isEmpty ? `<button class="success" data-action="pay-bill" data-id="${r.id}">mark paid</button>` : ''}
                ${showUnpaid ? `<button data-action="unpay-bill" data-id="${r.id}">${r.recurring ? 'undo last paid' : 'mark unpaid'}</button>` : ''}
                <button class="${editCls}" data-action="edit" data-type="bills" data-id="${r.id}">${editLabel}</button>
                <button class="danger" data-action="remove" data-id="${r.id}">delete</button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    `}
  `;
}

// modal management
// ════════════════════════════════════════════════════════════════
function openModal(type, id = null) {
  closeAllModals();
  resetForm(type);
  editingItem = id ? { type, id } : null;

  const titleEl = document.querySelector(`#modal-${type} .modal-title`);
  const submitBtn = document.querySelector(`#modal-${type} button.btn.primary`);

  if (id) {
    const item = state[type].find(x => x.id === id);
    if (item) prefillForm(type, item);
    if (titleEl) {
      titleEl.classList.add('editing');
      titleEl.textContent = `Edit ${typeLabel(type)}`;
    }
    if (submitBtn) submitBtn.textContent = 'Save changes';
  } else {
    if (titleEl) {
      titleEl.classList.remove('editing');
      titleEl.textContent = `Add ${typeLabel(type)}`;
    }
    if (submitBtn) submitBtn.textContent = `Add ${typeLabel(type)}`;
  }

  document.getElementById('modal-' + type).classList.add('open');
  setTimeout(() => {
    document.querySelector(`#modal-${type} input,#modal-${type} select`)?.focus();
  }, 50);
}
function closeAllModals() {
  document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
}
function resetForm(type) {
  const form = document.querySelector(`#modal-${type} form`);
  if (!form) return;
  form.reset();
  if (type === 'tasks') {
    formChips.tasks = { priority: '' };
    form.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
    form.querySelector('.chip[data-value=""]')?.classList.add('selected');
  }
  if (type === 'income') {
    // resync the data-mode attribute that drives show/hide of the percent vs amount input
    const row = form.querySelector('.cashtip-row');
    if (row && form.cashTipMode) row.dataset.mode = form.cashTipMode.value;
  }
}

// ════════════════════════════════════════════════════════════════
// event handlers
// ════════════════════════════════════════════════════════════════
document.addEventListener('click', (e) => {
  // close menu on outside click
  if (!e.target.closest('#menu')) document.getElementById('menu').classList.remove('open');

  // tab clicks
  const tabBtn = e.target.closest('.tab[data-tab]');
  if (tabBtn) {
    currentTab = tabBtn.dataset.tab;
    localStorage.setItem(TAB_KEY, currentTab);
    render();
    return;
  }

  const target = e.target.closest('[data-action]');
  if (!target) return;
  const action = target.dataset.action;

  if (action === 'open-modal') openModal(target.dataset.type);
  else if (action === 'close-modal') closeAllModals();
  else if (action === 'toggle-task') { toggleTask(target.dataset.id); render(); }
  else if (action === 'pay-bill') { payBill(target.dataset.id); render(); }
  else if (action === 'unpay-bill') { unpayBill(target.dataset.id); render(); }
  else if (action === 'goal-add') {
    const id = target.dataset.id;
    const g = state.goals.find(x => x.id === id);
    if (!g) return;
    const input = prompt(`How much to add to "${g.name}"?`, '');
    if (input == null) return;
    const amt = parseFloat(String(input).replace(/[^0-9.\-]/g, ''));
    if (!isNaN(amt) && amt > 0) { addToGoalSaved(id, amt); render(); }
  }
  else if (action === 'goal-subtract') {
    const id = target.dataset.id;
    const g = state.goals.find(x => x.id === id);
    if (!g) return;
    const input = prompt(`How much to withdraw from "${g.name}"? (Will reduce saved amount.)`, '');
    if (input == null) return;
    const amt = parseFloat(String(input).replace(/[^0-9.\-]/g, ''));
    if (!isNaN(amt) && amt > 0) { addToGoalSaved(id, -amt); render(); }
  }
  else if (action === 'remove') {
    if (confirm('Delete this item?')) { removeItem(target.dataset.id); render(); }
  }
  else if (action === 'sort') {
    const t = target.dataset.type, col = target.dataset.col;
    if (sortState[t].col === col) sortState[t].dir = sortState[t].dir === 'asc' ? 'desc' : 'asc';
    else { sortState[t].col = col; sortState[t].dir = 'asc'; }
    render();
  }
  else if (action === 'edit') {
    openModal(target.dataset.type, target.dataset.id);
  }
  else if (action === 'goto-tab') {
    currentTab = target.dataset.tab;
    localStorage.setItem(TAB_KEY, currentTab);
    render();
  }
  else if (action === 'view-month-prev') {
    const v = getViewMonth();
    viewMonth = v.month === 0 ? { year: v.year - 1, month: 11 } : { year: v.year, month: v.month - 1 };
    render();
  }
  else if (action === 'view-month-next') {
    const v = getViewMonth();
    viewMonth = v.month === 11 ? { year: v.year + 1, month: 0 } : { year: v.year, month: v.month + 1 };
    render();
  }
  else if (action === 'view-month-today') {
    viewMonth = null;
    render();
  }
  else if (action === 'preset-bills') {
    document.getElementById('menu').classList.remove('open');
    openPresetPicker();
  }
  else if (action === 'toggle-preset') {
    const idx = parseInt(target.dataset.idx, 10);
    if (presetSelections.has(idx)) presetSelections.delete(idx);
    else presetSelections.add(idx);
    renderPresetPicker();
  }
  else if (action === 'preset-toggle-all') { togglePresetAll(); }
  else if (action === 'apply-presets') { applyPresets(); }
  else if (action === 'toggle-menu') document.getElementById('menu').classList.toggle('open');
  else if (action === 'export') { exportData(); document.getElementById('menu').classList.remove('open'); }
  else if (action === 'import') { document.getElementById('file-import').click(); document.getElementById('menu').classList.remove('open'); }
  else if (action === 'theme') { applyTheme(target.dataset.theme); }
  else if (action === 'reset') {
    if (confirm('Delete everything? This cannot be undone.')) {
      state = { tasks: [], bills: [], events: [], income: [] };
      saveState(); render();
    }
    document.getElementById('menu').classList.remove('open');
  }
});

// chip selection
document.addEventListener('click', (e) => {
  const chip = e.target.closest('.chip[data-value]');
  if (!chip) return;
  const group = chip.closest('[data-chip-group]');
  if (!group) return;
  group.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  chip.classList.add('selected');
  const form = chip.closest('form');
  if (form?.dataset.type === 'tasks') {
    formChips.tasks[group.dataset.chipGroup] = chip.dataset.value;
  }
});

// keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    closeAllModals();
    document.getElementById('menu').classList.remove('open');
  }
});

// form submit
document.addEventListener('submit', (e) => {
  const form = e.target.closest('form[data-type]');
  if (!form) return;
  e.preventDefault();
  const fd = new FormData(form);
  const type = form.dataset.type;

  // helpers
  const parseAmount = (v) => {
    const s = String(v || '').replace(/[$,\s]/g, '');
    return s === '' ? NaN : parseFloat(s);
  };

  if (editingItem && editingItem.type === type) {
    const item = state[type].find(x => x.id === editingItem.id);
    if (item) {
      if (type === 'tasks') {
        const text = (fd.get('text') || '').trim();
        if (!text) return;
        item.text = text;
        item.priority = formChips.tasks.priority || null;
        item.dueDate = fd.get('date') || null;
      } else if (type === 'bills') {
        const name = (fd.get('name') || '').trim();
        const amount = parseAmount(fd.get('amount'));
        if (!name || isNaN(amount)) { alert('Please enter a name and a valid amount.'); return; }
        item.name = name;
        item.amount = amount;
        item.dueDate = fd.get('date') || null;
        item.recurring = fd.get('recurring') || null;
        item.category = fd.get('category') || null;
      } else if (type === 'events') {
        const name = (fd.get('name') || '').trim();
        const date = fd.get('date');
        if (!name || !date) { alert('Please enter a name and pick a date.'); return; }
        item.name = name;
        item.date = date;
        item.time = fd.get('time') || null;
      } else if (type === 'income') {
        const source = (fd.get('source') || '').trim();
        const amount = parseAmount(fd.get('amount'));
        if (!source || isNaN(amount)) { alert('Please enter a source and a valid amount.'); return; }
        item.source = source;
        item.amount = amount;
        item.frequency = fd.get('frequency') || 'monthly';
        item.receivedAt = fd.get('receivedAt') || null;
        const h = parseInt(String(fd.get('hours') || '').trim(), 10) || 0;
        const m = parseInt(String(fd.get('minutes') || '').trim(), 10) || 0;
        item.hours = (h === 0 && m === 0) ? null : (h + m / 60);
        const cashTipMode = fd.get('cashTipMode') || 'none';
        if (cashTipMode === 'percent') {
          const v = parseFloat(String(fd.get('cashTipPct') || '').trim());
          item.cashTipPct = (!isNaN(v) && v > 0) ? v : null;
          item.cashTipAmount = null;
        } else if (cashTipMode === 'amount') {
          const v = parseAmount(fd.get('cashTipAmount'));
          item.cashTipAmount = (!isNaN(v) && v > 0) ? v : null;
          item.cashTipPct = null;
        } else {
          item.cashTipPct = null;
          item.cashTipAmount = null;
        }
      } else if (type === 'goals') {
        const name = (fd.get('name') || '').trim();
        const target = parseAmount(fd.get('targetAmount'));
        const current = parseAmount(fd.get('currentAmount'));
        if (!name || isNaN(target) || target <= 0) { alert('Please enter a name and a positive target amount.'); return; }
        item.name = name;
        item.targetAmount = target;
        item.currentAmount = isNaN(current) ? 0 : Math.max(0, current);
        item.targetDate = fd.get('targetDate') || null;
        item.notes = (fd.get('notes') || '').trim();
      }
      saveState();
    }
    editingItem = null;
  } else {
    // create new
    if (type === 'tasks') {
      addTask(fd.get('text'), formChips.tasks.priority, fd.get('date') || null);
    } else if (type === 'bills') {
      const amount = parseAmount(fd.get('amount'));
      if (isNaN(amount)) { alert('Please enter a valid amount.'); return; }
      addBill(fd.get('name'), amount, fd.get('date') || null, fd.get('recurring') || null, fd.get('category') || null, null);
    } else if (type === 'events') {
      const date = fd.get('date');
      if (!date) { alert('Please pick a date.'); return; }
      addEvent(fd.get('name'), date, fd.get('time') || null);
    } else if (type === 'income') {
      const amount = parseAmount(fd.get('amount'));
      if (isNaN(amount)) { alert('Please enter a valid amount.'); return; }
      const h = parseInt(String(fd.get('hours') || '').trim(), 10) || 0;
      const m = parseInt(String(fd.get('minutes') || '').trim(), 10) || 0;
      const hours = (h === 0 && m === 0) ? null : (h + m / 60);
      const cashTipMode = fd.get('cashTipMode') || 'none';
      let cashTipPct = null, cashTipAmount = null;
      if (cashTipMode === 'percent') {
        const v = parseFloat(String(fd.get('cashTipPct') || '').trim());
        if (!isNaN(v) && v > 0) cashTipPct = v;
      } else if (cashTipMode === 'amount') {
        const v = parseAmount(fd.get('cashTipAmount'));
        if (!isNaN(v) && v > 0) cashTipAmount = v;
      }
      addIncome(fd.get('source'), amount, fd.get('frequency') || 'monthly', fd.get('receivedAt') || null, hours, cashTipPct, cashTipAmount);
    } else if (type === 'goals') {
      const name = (fd.get('name') || '').trim();
      const target = parseAmount(fd.get('targetAmount'));
      const current = parseAmount(fd.get('currentAmount'));
      if (!name || isNaN(target) || target <= 0) { alert('Please enter a name and a positive target amount.'); return; }
      addGoal(name, target, fd.get('targetDate') || null, fd.get('notes') || '');
      // bump the just-added goal's currentAmount if user provided one
      if (!isNaN(current) && current > 0) {
        const newest = state.goals[state.goals.length - 1];
        if (newest) { newest.currentAmount = current; saveState(); }
      }
    } else if (type === 'petty') {
      const amount = parseAmount(fd.get('amount'));
      if (isNaN(amount) || amount <= 0) { alert('Please enter a valid amount.'); return; }
      addPetty(amount, fd.get('category') || null, fd.get('note') || '', fd.get('date') || null);
      // refocus amount field after re-render so the user can quickly log another
      setTimeout(() => {
        const el = document.getElementById('petty-amount-input');
        if (el) el.focus();
      }, 0);
    }
  }

  closeAllModals();
  render();
});

// ════════════════════════════════════════════════════════════════
// export / import
// ════════════════════════════════════════════════════════════════
function exportData() {
  try {
    const data = JSON.stringify({
      tasks: state.tasks, bills: state.bills, events: state.events,
      income: state.income, goals: state.goals, petty: state.petty,
      exportedAt: new Date().toISOString()
    }, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'ledgeon-budget-' + isoDate(todayStart()) + '.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (e) { alert('Export failed: ' + e.message); }
}

document.getElementById('file-import').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const imp = JSON.parse(ev.target.result);
      const counts = `${imp.tasks?.length || 0} tasks, ${imp.bills?.length || 0} bills, ${imp.events?.length || 0} events, ${imp.income?.length || 0} income sources, ${imp.goals?.length || 0} goals, ${imp.petty?.length || 0} petty entries`;
      if (!confirm(`Import ${counts}? This will replace your current data.`)) return;
      state = {
        tasks:  Array.isArray(imp.tasks)  ? imp.tasks  : [],
        bills:  Array.isArray(imp.bills)  ? imp.bills  : [],
        events: Array.isArray(imp.events) ? imp.events : [],
        income: Array.isArray(imp.income) ? imp.income : [],
        goals:  Array.isArray(imp.goals)  ? imp.goals  : [],
        petty:  Array.isArray(imp.petty)  ? imp.petty  : []
      };
      saveState(); render();
    } catch { alert('Invalid JSON file.'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ════════════════════════════════════════════════════════════════
// init
// ════════════════════════════════════════════════════════════════
resetForm('tasks');
render();

// re-render on day change to update relative dates / overdue flags
let lastDay = isoDate(todayStart());
setInterval(() => {
  const today = isoDate(todayStart());
  if (today !== lastDay) { lastDay = today; render(); }
}, 60000);
</script>
