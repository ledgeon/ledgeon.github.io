<script>
'use strict';

// ════════════════════════════════════════════════════════════════
// Core State & Migration Logic
// ════════════════════════════════════════════════════════════════
let state = { tasks: [], bills: [], events: [], income: [], goals: [], petty: [] };
const possibleKeys = ['ledgeon-state-v5', 'ledgeon-state-v4', 'ledgeon-prompt-v1', 'ledgeon-state-v3'];

for (const k of possibleKeys) {
  try {
    const raw = localStorage.getItem(k);
    if (raw) {
      const v = JSON.parse(raw);
      if (Array.isArray(v.bills) || Array.isArray(v.income)) { 
        state = {
          tasks:  Array.isArray(v.tasks)  ? v.tasks  : [],
          bills:  Array.isArray(v.bills)  ? v.bills  : [], 
          events: Array.isArray(v.events) ? v.events : [],
          income: Array.isArray(v.income) ? v.income : [],
          goals:  Array.isArray(v.goals)  ? v.goals  : [],
          petty:  Array.isArray(v.petty)  ? v.petty  : []
        };
        break;
      }
    }
  } catch {}
}

// Backwards compatibility migration for old data structures
state.income.forEach(i => {
  if (i.hoursWorked !== undefined && i.hours === undefined) {
    i.hours = i.hoursWorked;
    delete i.hoursWorked;
  }
  if (i.cashTipPct || i.cashTipAmount) {
    i.tipsEnabled = true;
    if (i.cashTipPct) { i.tipsType = 'percent'; i.tipsValue = i.cashTipPct; }
    else if (i.cashTipAmount) { i.tipsType = 'amount'; i.tipsValue = i.cashTipAmount; }
    delete i.cashTipPct; 
    delete i.cashTipAmount;
  }
});

const STORAGE_KEY = 'ledgeon-state-v4';
const TAB_KEY = 'ledgeon-tab';

let currentTab = localStorage.getItem(TAB_KEY) || 'overview';
if (!['overview', 'income', 'expenses', 'budget', 'tasks'].includes(currentTab)) {
  currentTab = 'overview';
}

let sortState = { 
  income: { col: 'amount', dir: 'desc' }, 
  expenses: { col: 'date', dir: 'asc' }, 
  tasks: { col: 'date', dir: 'asc' }
};
let editingItem = null; 
let viewMonth = null;

const CATEGORIES = {
  housing: { label: 'housing', color: '#d4a574' },
  utilities: { label: 'utilities', color: '#7eb6f0' },
  transport: { label: 'transport', color: '#b08bc7' },
  insurance: { label: 'insurance', color: '#e57373' },
  food: { label: 'food', color: '#86c98a' },
  media: { label: 'media & subs', color: '#f5c890' },
  debt: { label: 'debt', color: '#ff8a65' },
  health: { label: 'health', color: '#c8a2ff' },
  other: { label: 'other', color: '#6b7280' }
};

const PRESET_BILLS = [
  { name: 'Rent / Mortgage', recurring: 'monthly', category: 'housing', pct: 28 },
  { name: 'Electricity', recurring: 'monthly', category: 'utilities', pct: 3 },
  { name: 'Internet', recurring: 'monthly', category: 'utilities', pct: 1.5 },
  { name: 'Car Insurance', recurring: 'monthly', category: 'transport', pct: 3 },
  { name: 'Groceries', recurring: 'monthly', category: 'food', pct: 10 },
  { name: 'Streaming', recurring: 'monthly', category: 'media', pct: 1 }
];

function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); updateBadges(); } catch {} }

function nextId(col) {
  const pfx = { tasks: 't', bills: 'b', events: 'e', income: 'i', goals: 'g', petty: 'p' }[col];
  let max = 0;
  for (const item of state[col]) { 
    const n = parseInt(item.id?.slice(1), 10); 
    if (!isNaN(n) && n > max) max = n; 
  }
  return pfx + (max + 1);
}

function startOfDay(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }
function todayStart() { return startOfDay(new Date()); }
function isoDate(d) { const x = startOfDay(d); return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`; }
function formatDate(s) {
  if (!s) return '—';
  const d = new Date(s + (s.includes('T') ? '' : 'T00:00:00'));
  if (isNaN(d)) return s;
  const diff = Math.round((d - todayStart()) / 86400000);
  if (diff === 0) return 'today';
  if (diff === 1) return 'tomorrow';
  if (diff === -1) return 'yesterday';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toLowerCase();
}
function isOverdue(s) { return s && new Date(s + (s.includes('T') ? '' : 'T00:00:00')) < todayStart(); }
function isTodayDate(s) { return s && +new Date(s + (s.includes('T') ? '' : 'T00:00:00')) === +todayStart(); }
function fmtMoney(n, opts = {}) {
  const v = parseFloat(String(n).replace(/[^\d.-]/g, '')) || 0;
  const abs = Math.abs(v).toLocaleString('en-US', { minimumFractionDigits: opts.round ? 0 : 2, maximumFractionDigits: opts.round ? 0 : 2 });
  return (v < 0 ? '−$' : (opts.sign && v > 0 ? '+$' : '$')) + abs;
}

// Math Engine
function monthlyEq(amount, freq) {
  const val = parseFloat(String(amount).replace(/[^\d.-]/g, '')) || 0;
  if (!val) return 0;
  
  const f = freq || 'monthly';
  switch (f) {
    case 'weekly': return val * 4.333;
    case 'biweekly': return val * 2.166;
    case 'monthly': return val;
    case 'yearly': return val / 12;
    case 'once': return 0;
    default: return val;
  }
}

function getViewMonth() {
  if (viewMonth) return viewMonth;
  const d = new Date(); return { year: d.getFullYear(), month: d.getMonth() };
}

function getMonthlyStats(year, month) {
  let income = 0;
  let bills = 0;

  for (const i of state.income) {
    const isOnce = i.frequency === 'once' || !i.frequency;
    const amt = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
    if (isOnce) {
      const dateStr = i.receivedAt || i.createdAt || isoDate(todayStart());
      const d = new Date(dateStr + (dateStr.includes('T') ? '' : 'T00:00:00'));
      if (d.getFullYear() === year && d.getMonth() === month) income += amt;
    } else {
      income += monthlyEq(amt, i.frequency);
    }
  }

  for (const b of state.bills) {
    const amt = parseFloat(String(b.amount).replace(/[^\d.-]/g, '')) || 0;
    const isOnce = !b.recurring || b.recurring === 'once';
    if (!isOnce) {
      bills += monthlyEq(amt, b.recurring);
    } else if (b.dueDate) {
      const d = new Date(b.dueDate + (b.dueDate.includes('T') ? '' : 'T00:00:00'));
      if (d.getFullYear() === year && d.getMonth() === month) bills += amt;
    }
  }

  return { income, bills, net: income - bills };
}

function getMonthlyHistory(monthsBack = 6) {
  const now = new Date(); const out = [];
  for (let i = monthsBack - 1; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const stats = getMonthlyStats(d.getFullYear(), d.getMonth());
    out.push({ label: d.toLocaleString('en-US', { month: 'short' }).toLowerCase(), income: stats.income, bills: stats.bills });
  }
  return out;
}

// Calculates true average of PAST active months for more accurate annual projection
function getProjectedAnnual() {
  const d = new Date();
  let validMonths = [];
  
  // Start loop at 1 to skip the current (likely incomplete) month
  for (let i = 1; i <= 12; i++) {
    let m = d.getMonth() - i;
    let y = d.getFullYear();
    if (m < 0) { m += 12; y -= 1; }
    const st = getMonthlyStats(y, m);
    if (st.income > 0) validMonths.push(st.income);
  }
  
  // If there's literally no past history, fallback to the current month if it has data
  if (!validMonths.length) {
    const curr = getMonthlyStats(d.getFullYear(), d.getMonth());
    if (curr.income > 0) validMonths.push(curr.income);
  }
  
  if (!validMonths.length) return 0;
  const avg = validMonths.reduce((a, b) => a + b, 0) / validMonths.length;
  return avg * 12;
}

function asciiBar(pct, width = 24) {
  const f = Math.max(0, Math.min(width, Math.round(width * (pct / 100))));
  return `<span class="f">${'█'.repeat(f)}</span><span class="e">${'░'.repeat(width - f)}</span>`;
}

function escHTML(s) { return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// SVG Chart Renderers
function renderLineChart(data) {
  const W = 700, H = 180, pad = { top: 10, right: 20, bottom: 20, left: 50 };
  const allValues = []; data.forEach(d => { allValues.push(d.income); allValues.push(d.bills); });
  const peak = Math.max(...allValues, 100);
  const yMax = Math.ceil(peak / 100) * 100;
  const innerW = W - pad.left - pad.right; const innerH = H - pad.top - pad.bottom;
  const xPos = (i) => pad.left + (data.length <= 1 ? innerW / 2 : (i / (data.length - 1)) * innerW);
  const yPos = (v) => pad.top + innerH - (v / yMax) * innerH;

  const grids = [], xLabels = [];
  for (let i = 0; i <= 4; i++) {
    const v = (yMax / 4) * i; const y = yPos(v);
    grids.push(`<line x1="${pad.left}" y1="${y}" x2="${W - pad.right}" y2="${y}" stroke="var(--line-strong)" stroke-dasharray="2 4" />`);
    grids.push(`<text x="${pad.left - 8}" y="${y + 4}" fill="var(--t-faint)" font-size="11" text-anchor="end" font-family="monospace">$${v}</text>`);
  }
  data.forEach((d, i) => xLabels.push(`<text x="${xPos(i)}" y="${H - 5}" fill="var(--t-dim)" font-size="11" text-anchor="middle" font-family="monospace">${d.label}</text>`));

  const path = (key, col) => {
    const cmds = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${xPos(i)} ${yPos(d[key])}`).join(' ');
    return `<path d="${cmds}" fill="none" stroke="${col}" stroke-width="2" />`;
  };
  const dots = data.map((d, i) => `<circle cx="${xPos(i)}" cy="${yPos(d.income)}" r="3.5" fill="var(--bg-deep)" stroke="var(--ok)" stroke-width="1.5"></circle><circle cx="${xPos(i)}" cy="${yPos(d.bills)}" r="3.5" fill="var(--bg-deep)" stroke="var(--bad)" stroke-width="1.5"></circle>`).join('');

  return `<svg viewBox="0 0 ${W} ${H}" class="trend-svg">${grids.join('')}${path('income', 'var(--ok)')}${path('bills', 'var(--bad)')}${dots}${xLabels.join('')}</svg>`;
}

function renderDonut(slices, total, label) {
  if (total <= 0 || !slices.length) return `<svg class="pie" viewBox="0 0 200 200"><circle cx="100" cy="100" r="80" fill="none" stroke="var(--line)" stroke-width="15" /></svg>`;
  let cum = 0;
  const segs = slices.map(s => {
    const pct = (s.value / total) * 100;
    const seg = `<circle cx="100" cy="100" r="80" fill="none" stroke="${s.color}" stroke-width="15" pathLength="100" stroke-dasharray="${pct} 100" stroke-dashoffset="${-cum}" transform="rotate(-90 100 100)"></circle>`;
    cum += pct; return seg;
  }).join('');
  
  return `
    <svg class="pie" viewBox="0 0 200 200">
      ${segs}
      <text x="100" y="105" class="pie-center-label">${label}</text>
      <text x="100" y="125" class="pie-center-sub">total / mo</text>
    </svg>`;
}

// ════════════════════════════════════════════════════════════════
// Rendering
// ════════════════════════════════════════════════════════════════
function updateBadges() {
  document.querySelectorAll('.badge-income').forEach(el => el.textContent = state.income.length);
  document.querySelectorAll('.badge-expenses').forEach(el => el.textContent = state.bills.filter(b => !b.paid).length);
  document.querySelectorAll('.badge-tasks').forEach(el => el.textContent = state.tasks.filter(t => !t.done).length);
}

function render() {
  updateBadges();
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === currentTab));
  const main = document.getElementById('content');
  
  if (currentTab === 'overview') main.innerHTML = renderOverview();
  else if (currentTab === 'income') main.innerHTML = renderIncome();
  else if (currentTab === 'expenses') main.innerHTML = renderExpenses();
  else if (currentTab === 'budget') main.innerHTML = renderBudget();
  else if (currentTab === 'tasks') main.innerHTML = renderTasks();
}

// Sorting helpers
function th(type, key, label) {
  const s = sortState[type];
  const cls = s.col === key ? `sorted ${s.dir}` : '';
  return `<th class="${cls}" data-action="sort" data-type="${type}" data-col="${key}">${label}</th>`;
}

function sortRows(arr, type) {
  const { col, dir } = sortState[type];
  const mult = dir === 'asc' ? 1 : -1;
  return [...arr].sort((a,b) => {
    let va = a[col], vb = b[col];
    if (col === 'date' || col === 'dueDate' || col === 'receivedAt') { 
      va = va || a.createdAt || '9999'; 
      vb = vb || b.createdAt || '9999'; 
    }
    if (col === 'amount') {
      va = parseFloat(String(va).replace(/[^\d.-]/g, '')) || 0;
      vb = parseFloat(String(vb).replace(/[^\d.-]/g, '')) || 0;
    }
    if (typeof va === 'number') return (va - vb) * mult;
    return String(va || '').localeCompare(String(vb || '')) * mult;
  });
}

// ── Overview ──
function renderOverview() {
  const { year, month } = getViewMonth();
  const d = new Date(year, month, 1);
  const mLabel = d.toLocaleString('en-US', { month: 'long', year: 'numeric' }).toLowerCase();
  
  const { income, bills } = getMonthlyStats(year, month);
  
  const mStr = `${year}-${String(month+1).padStart(2,'0')}`;
  const pettySpent = state.petty.filter(p => p.date && p.date.startsWith(mStr))
    .reduce((s, p) => s + (parseFloat(String(p.amount).replace(/[^\d.-]/g, '')) || 0), 0);
  
  const net = income - bills - pettySpent;
  const isCurrent = year === new Date().getFullYear() && month === new Date().getMonth();

  const upcIso = isoDate(new Date(Date.now() + 14 * 86400000));
  const upcoming = state.bills.filter(b => b.dueDate && b.dueDate <= upcIso && !b.paid).sort((a,b) => a.dueDate.localeCompare(b.dueDate));

  const annIncome = getProjectedAnnual();
  const annBills = bills * 12;

  return `
    <div class="month-nav">
      <button data-action="prev-month">← prev</button>
      <div class="month-label">${mLabel}</div>
      <button data-action="next-month">next →</button>
      ${!isCurrent ? `<button data-action="curr-month">jump to current</button>` : ''}
    </div>

    <div class="out">
      <h3>${mLabel} · monthly summary <span class="action" data-tab="budget" data-action="goto">log spending →</span></h3>
      <div class="kv"><span class="k">monthly income</span><span class="v ok">${fmtMoney(income)}</span><span class="x">${state.income.length} sources</span></div>
      <div class="kv"><span class="k">fixed expenses</span><span class="v bad">${fmtMoney(bills)}</span><span class="x">${income > 0 ? (bills/income*100).toFixed(1) + '% of income' : ''}</span></div>
      <div class="kv"><span class="k">discretionary spent</span><span class="v warn">${fmtMoney(pettySpent)}</span><span class="x">logged out-of-pocket</span></div>
      <div class="kv"><span class="k">net remaining</span><span class="v ${net >= 0 ? 'warm' : 'err'}">${fmtMoney(net, {sign:true})}</span><span class="x">available cash</span></div>
      
      <div style="margin-top:20px;"></div>
      <div class="bar-line ok"><span class="lbl">income</span><span class="bar">${asciiBar(100)}</span><span class="va ok">${fmtMoney(income, {round:true})}</span></div>
      <div class="bar-line bad"><span class="lbl">expenses</span><span class="bar">${asciiBar(income ? (bills/income)*100 : 0)}</span><span class="va bad">${fmtMoney(bills, {round:true})}</span></div>
    </div>

    <div class="out" style="margin-top: 32px;">
      <h3>annual projections</h3>
      <div class="kv"><span class="k">estimated yearly income</span><span class="v ok">${fmtMoney(annIncome, {round:true})}</span><span class="x">based on tracked past avg</span></div>
      <div class="kv"><span class="k">estimated yearly expenses</span><span class="v bad">${fmtMoney(annBills, {round:true})}</span><span class="x">${annIncome > 0 ? (annBills/annIncome*100).toFixed(1) + '% of annual inc' : ''}</span></div>
      <div class="kv"><span class="k">annual discretionary</span><span class="v warm">${fmtMoney(annIncome - annBills, {round:true})}</span><span class="x">before petty spending</span></div>
    </div>

    <div class="out" style="margin-top: 32px;">
      <h3>6-month trend</h3>
      <div class="chart-box" style="padding: 16px 12px 0;">
        ${renderLineChart(getMonthlyHistory(6))}
      </div>
    </div>

    <div class="out" style="margin-top: 32px;">
      <h3>upcoming expenses · 14d <span class="action" data-tab="expenses" data-action="goto">manage expenses →</span></h3>
      ${upcoming.length ? `
        <table class="tbl">
          <tbody>
            ${upcoming.slice(0,5).map(b => `
              <tr class="row">
                <td><span class="tag ${isOverdue(b.dueDate) ? 'err' : (isTodayDate(b.dueDate) ? 'warn' : 'info')}">${formatDate(b.dueDate)}</span></td>
                <td>${escHTML(b.name)}</td>
                <td class="r num bad">${fmtMoney(b.amount)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      ` : `<div class="empty-state">no expenses due in the next 14 days.</div>`}
    </div>
  `;
}

// ── Income ──
function renderIncome() {
  const { year, month } = getViewMonth();
  const { income: totalMonthIncome } = getMonthlyStats(year, month);

  const rows = sortRows(state.income, 'income').map(i => {
    const amt = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
    const isOnce = i.frequency === 'once' || !i.frequency;
    
    // Explicitly show base and tip info
    const base = i.baseAmount !== undefined ? i.baseAmount : amt;
    const hourlyText = i.hours ? `<span style="font-size:10px; color:var(--t-faint); margin-left:4px;">(${fmtMoney(base / i.hours)}/hr)</span>` : '';
    const tipText = (i.tipsEnabled && amt > base) ? `<span style="font-size:10px; color:var(--lime); margin-left:4px;">(+${fmtMoney(amt-base)} tip)</span>` : '';
    
    const moText = isOnce ? '—' : fmtMoney(monthlyEq(amt, i.frequency), {round:true});
    const dateStr = i.receivedAt || (isOnce ? i.createdAt || isoDate(todayStart()) : '');

    return `<tr class="row">
      <td><span class="id">${i.id}</span></td>
      <td>${escHTML(i.source)}</td>
      <td class="num ok" style="white-space: nowrap;">${fmtMoney(amt)} ${hourlyText} ${tipText}</td>
      <td style="color:var(--t-faint);">${i.frequency || 'once'}</td>
      <td class="num">${dateStr ? formatDate(dateStr) : '—'}</td>
      <td class="r num">${moText}</td>
      <td class="r tbl-actions"><button data-action="edit" data-type="income" data-id="${i.id}">edit</button><button class="err" data-action="rm" data-type="income" data-id="${i.id}">rm</button></td>
    </tr>`;
  }).join('');

  return `
    <div class="out">
      <h3>income sources <span class="action" data-action="open-modal" data-type="income">+ add income</span></h3>
      <div class="kv"><span class="k">total for viewed month</span><span class="v ok">${fmtMoney(totalMonthIncome)}</span><span class="x">projected annual: ${fmtMoney(getProjectedAnnual(), {round:true})}</span></div>
      ${rows ? `
        <table class="tbl" style="margin-top: 16px;">
          <thead><tr>${th('income','id','id')}${th('income','source','source')}${th('income','amount','amount')}<th>freq</th>${th('income','receivedAt','date')}<th class="r">monthly</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      ` : `<div class="empty-state" style="margin-top: 16px;">no income sources added.</div>`}
    </div>
  `;
}

// ── Expenses ──
function renderExpenses() {
  const { year, month } = getViewMonth();
  const { income: incomeTotal, bills: total } = getMonthlyStats(year, month);
  
  const catMap = {};
  state.bills.forEach(b => {
    const amt = parseFloat(String(b.amount).replace(/[^\d.-]/g, '')) || 0;
    const isOnce = !b.recurring || b.recurring === 'once';
    let bMo = 0;
    if (!isOnce) {
        bMo = monthlyEq(amt, b.recurring);
    } else if (b.dueDate) {
        const d = new Date(b.dueDate + (b.dueDate.includes('T') ? '' : 'T00:00:00'));
        if (d.getFullYear() === year && d.getMonth() === month) bMo = amt;
    }
    if (bMo > 0) {
        const c = b.category || 'other';
        catMap[c] = (catMap[c] || 0) + bMo;
    }
  });

  const pieData = Object.entries(catMap).map(([k, v]) => ({ label: CATEGORIES[k]?.label || k, value: v, color: CATEGORIES[k]?.color || '#6b7280' })).sort((a,b) => b.value - a.value);

  const rows = sortRows(state.bills, 'expenses').map(b => {
    const amt = parseFloat(String(b.amount).replace(/[^\d.-]/g, '')) || 0;
    const isOnce = !b.recurring || b.recurring === 'once';
    
    let mo = 0;
    if (!isOnce) mo = monthlyEq(amt, b.recurring);
    else if (b.dueDate) {
         const d = new Date(b.dueDate + (b.dueDate.includes('T') ? '' : 'T00:00:00'));
         if (d.getFullYear() === year && d.getMonth() === month) mo = amt;
    }
    
    const p = incomeTotal && mo > 0 ? (mo / incomeTotal * 100) : 0;
    const isDue = b.dueDate && !b.paid && isOverdue(b.dueDate);
    
    return `<tr class="row ${b.paid ? 'done' : ''}">
      <td><span class="id">${b.id}</span></td>
      <td>${escHTML(b.name)} <span class="cat" style="color:${(CATEGORIES[b.category]||CATEGORIES.other).color}">${b.category||'none'}</span></td>
      <td class="num bad">${fmtMoney(b.amount)}</td>
      <td style="color:var(--t-faint);">${b.recurring || 'once'}</td>
      <td class="${isDue ? 'err' : ''}">${formatDate(b.dueDate)}</td>
      <td class="r num">${p > 0 ? p.toFixed(1)+'%' : '—'}</td>
      <td class="r tbl-actions">
        ${!b.paid ? `<button class="ok" data-action="pay-bill" data-id="${b.id}">pay</button>` : `<button data-action="unpay-bill" data-id="${b.id}">undo</button>`}
        <button data-action="edit" data-type="expenses" data-id="${b.id}">edit</button>
        <button class="err" data-action="rm" data-type="bills" data-id="${b.id}">rm</button>
      </td>
    </tr>`;
  }).join('');

  return `
    <div class="out">
      <h3>expense breakdown</h3>
      <div class="chart-box pie-wrap">
        ${renderDonut(pieData, total, fmtMoney(total, {round:true}))}
        <div class="pie-legend">
          ${pieData.map(c => `
            <div class="pli">
              <div class="dot" style="background:${c.color}"></div>
              <div style="color:var(--t-bright)">${c.label}</div>
              <div class="num bad">${fmtMoney(c.value, {round:true})}</div>
              <div class="num" style="color:var(--t-faint);">${(c.value/total*100).toFixed(1)}%</div>
            </div>
          `).join('') || '<div class="empty-state">no categorized expenses for this month.</div>'}
        </div>
      </div>
    </div>

    <div class="out">
      <h3>recurring expenses <div style="display:flex;gap:16px"><span class="action" data-action="open-presets">+ presets</span><span class="action" data-action="open-modal" data-type="expenses">+ add expense</span></div></h3>
      <div class="kv"><span class="k">total monthly liability</span><span class="v bad">${fmtMoney(total)}</span><span class="x">${incomeTotal ? (total/incomeTotal*100).toFixed(1)+'% of income' : ''}</span></div>
      ${rows ? `
        <table class="tbl" style="margin-top: 16px;">
          <thead><tr>${th('expenses','id','id')}${th('expenses','name','name')}${th('expenses','amount','amount')}<th>freq</th>${th('expenses','date','due')}<th class="r">% inc</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      ` : `<div class="empty-state" style="margin-top: 16px;">no expenses tracked yet.</div>`}
    </div>
  `;
}

// ── Budget (Includes Spending Log & Weekly Allowance) ──
function renderBudget() {
  const { year, month } = getViewMonth();
  let { income: inc, bills: fixedBills } = getMonthlyStats(year, month);
  
  let fallbackMsg = '';
  // Fallback to average of strictly valid past months if current is $0
  if (inc === 0) {
    let validPast = [];
    for (let i = 1; i <= 6; i++) {
      let m = month - i, y = year;
      if (m < 0) { m += 12; y -= 1; }
      let pastStats = getMonthlyStats(y, m);
      if (pastStats.income > 0) validPast.push(pastStats.income);
    }
    if (validPast.length > 0) {
      inc = validPast.reduce((a,b) => a+b, 0) / validPast.length;
      fallbackMsg = `<div class="kv" style="margin-bottom:16px;"><span class="k">note</span><span class="v warn">using average past income (${fmtMoney(inc)})</span><span class="x">current month incomplete</span></div>`;
    }
  }

  if (inc === 0) return `<div class="out"><div class="empty-state">no income recorded recently to build a budget against.</div></div>`;

  // Calculate Savings Goals Requirements & Expose for Display
  let savingsTarget = 0;
  const today = todayStart();
  state.goals.forEach(g => {
    const target = parseFloat(g.targetAmount) || 0;
    const saved = parseFloat(g.currentAmount) || 0;
    const remaining = Math.max(0, target - saved);
    let reqMo = 0;
    if (remaining > 0 && g.targetDate) {
      const td = new Date(g.targetDate + (g.targetDate.includes('T') ? '' : 'T00:00:00'));
      if (td > today) {
        // Average 30.44 days per month for math
        const monthsLeft = Math.max(1, (td - today) / (30.44 * 86400000));
        reqMo = remaining / monthsLeft;
        savingsTarget += reqMo;
      }
    }
    g._reqMo = reqMo; // Bind explicitly to the object for rendering
  });
  
  const net = inc - fixedBills - savingsTarget;
  const weekly = Math.max(0, net / 4.333);
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daily = Math.max(0, net / daysInMonth);

  const byCat = {};
  state.bills.forEach(b => {
    const amt = parseFloat(String(b.amount).replace(/[^\d.-]/g, '')) || 0;
    const isOnce = !b.recurring || b.recurring === 'once';
    let bMo = 0;
    if (!isOnce) {
        bMo = monthlyEq(amt, b.recurring);
    } else if (b.dueDate) {
        const d = new Date(b.dueDate + (b.dueDate.includes('T') ? '' : 'T00:00:00'));
        if (d.getFullYear() === year && d.getMonth() === month) bMo = amt;
    }
    if (bMo > 0) {
        const c = b.category || 'other';
        byCat[c] = (byCat[c] || 0) + bMo;
    }
  });

  const catRows = Object.keys(CATEGORIES).map(k => {
    const used = byCat[k] || 0; if (used === 0) return '';
    const pct = (used / inc) * 100;
    return `
      <div class="bar-line">
        <span class="lbl" style="color:${CATEGORIES[k].color}">${CATEGORIES[k].label}</span>
        <span class="bar">${asciiBar(Math.min(100, pct), 20)}</span>
        <span class="va">${fmtMoney(used, {round:true})}</span>
        <span class="x">${pct.toFixed(1)}% of inc</span>
      </div>
    `;
  }).join('');

  // Integrated Spending Log
  const mStr = `${year}-${String(month+1).padStart(2,'0')}`;
  const thisMonth = state.petty.filter(p => p.date && p.date.startsWith(mStr));
  const mTotal = thisMonth.reduce((s, p) => s + (parseFloat(String(p.amount).replace(/[^\d.-]/g, '')) || 0), 0);

  const spendingRows = [...state.petty].sort((a,b) => b.date.localeCompare(a.date)).map(p => `
    <tr class="row">
      <td><span class="id">${p.id}</span></td>
      <td>${formatDate(p.date)}</td>
      <td>${escHTML(p.note || '—')} <span class="cat" style="color:${(CATEGORIES[p.category]||CATEGORIES.other).color}">${p.category||'other'}</span></td>
      <td class="num bad r">${fmtMoney(p.amount)}</td>
      <td class="r tbl-actions"><button class="err" data-action="rm" data-type="petty" data-id="${p.id}">rm</button></td>
    </tr>
  `).join('');

  return `
    <div class="out">
      ${fallbackMsg}
      <div class="weekly-card">
        <div class="headline">
           <span class="label">weekly discretionary allowance</span>
           <span class="value">${fmtMoney(weekly)}<span class="unit">/wk</span></span>
           <span class="daily">${fmtMoney(daily)} / day</span>
        </div>
        <div class="weekly-math">
           <div class="row"><span class="label">monthly income</span><span class="value income">${fmtMoney(inc)}</span></div>
           <div class="row"><span class="label">fixed expenses</span><span class="value expense">−${fmtMoney(fixedBills)}</span></div>
           ${savingsTarget > 0 ? `<div class="row"><span class="label">savings goals target</span><span class="value expense">−${fmtMoney(savingsTarget)}</span></div>` : ''}
           <div class="row total"><span class="label">discretionary (net)</span><span class="value">${fmtMoney(net)}</span></div>
           <div class="formula">net ÷ 4.33 weeks</div>
        </div>
      </div>
    </div>

    <div class="out">
      <h3>discretionary spending <span class="action" data-action="open-modal" data-type="petty">+ log purchase</span></h3>
      <div class="kv"><span class="k">spent this month</span><span class="v warn">${fmtMoney(mTotal)}</span><span class="x">deducted from net</span></div>
      ${spendingRows ? `
        <table class="tbl" style="margin-top:16px;">
          <thead><tr><th>id</th><th>date</th><th>description & cat</th><th class="r">amount</th><th></th></tr></thead>
          <tbody>${spendingRows}</tbody>
        </table>
      ` : `<div class="empty-state">no spending logged.</div>`}
    </div>

    <div class="out" style="margin-top:32px;">
      <h3>fixed expense breakdown <span class="action" data-tab="expenses" data-action="goto">edit expenses →</span></h3>
      ${catRows || '<div class="empty-state" style="margin-top:10px;">no categorized expenses yet.</div>'}
    </div>

    <div class="out" style="margin-top:32px;">
      <h3>savings goals <span class="action" data-action="open-modal" data-type="goals">+ add goal</span></h3>
      ${state.goals.length ? state.goals.map(g => {
        const p = g.targetAmount > 0 ? (g.currentAmount / g.targetAmount) * 100 : 0;
        const reqText = g._reqMo > 0 ? `<div class="x" style="color:var(--warn); margin-top:4px;">requires ${fmtMoney(g._reqMo)} / mo</div>` : '';
        return `
          <div style="margin-bottom: 16px;">
            <div class="kv" style="grid-template-columns: 1fr auto;"><span class="v" style="color:var(--t-bright)">${escHTML(g.name)}</span><span class="v">${fmtMoney(g.currentAmount, {round:true})} / ${fmtMoney(g.targetAmount, {round:true})}</span></div>
            <div class="bar-line ${p>=100?'ok':''}"><span class="bar" style="font-size:16px;">${asciiBar(p, 40)}</span><span class="x">${p.toFixed(1)}%</span></div>
            ${reqText}
            <div class="tbl-actions" style="margin-top:4px; text-align:right;">
              <button class="ok" data-action="goal-add" data-id="${g.id}">+ fund</button>
              <button data-action="edit" data-type="goals" data-id="${g.id}">edit</button>
              <button class="err" data-action="rm" data-type="goals" data-id="${g.id}">rm</button>
            </div>
          </div>
        `;
      }).join('') : `<div class="empty-state">no goals set.</div>`}
    </div>
  `;
}

// ── Tasks ──
function renderTasks() {
  const rows = sortRows(state.tasks, 'tasks').map(t => {
    return `<tr class="row ${t.done ? 'done' : ''}">
      <td><span class="id">${t.id}</span></td>
      <td>${escHTML(t.text)}</td>
      <td><span class="tag ${t.priority==='high'?'err':(t.priority==='med'?'warn':'')}">${t.priority||'none'}</span></td>
      <td class="${isOverdue(t.dueDate)&&!t.done?'err':''}">${formatDate(t.dueDate)}</td>
      <td class="r tbl-actions">
        <button class="ok" data-action="toggle-task" data-id="${t.id}">${t.done?'undo':'done'}</button>
        <button data-action="edit" data-type="tasks" data-id="${t.id}">edit</button>
        <button class="err" data-action="rm" data-type="tasks" data-id="${t.id}">rm</button>
      </td>
    </tr>`;
  }).join('');
  return `
    <div class="out">
      <h3>tasks <span class="action" data-action="open-modal" data-type="tasks">+ add task</span></h3>
      ${rows ? `<table class="tbl"><thead><tr>${th('tasks','id','id')}${th('tasks','text','task')}<th>priority</th>${th('tasks','date','due')}<th></th></tr></thead><tbody>${rows}</tbody></table>` : `<div class="empty-state">no tasks.</div>`}
    </div>
  `;
}

// ════════════════════════════════════════════════════════════════
// Events & Actions
// ════════════════════════════════════════════════════════════════
document.addEventListener('click', e => {
  const tab = e.target.closest('.tab[data-tab]');
  if (tab) { currentTab = tab.dataset.tab; localStorage.setItem(TAB_KEY, currentTab); render(); return; }

  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;

  if (action === 'goto') { currentTab = btn.dataset.tab; localStorage.setItem(TAB_KEY, currentTab); render(); }
  else if (action === 'open-modal') {
    openModal(btn.dataset.type);
    if(btn.dataset.type === 'petty') document.getElementById('petty-date-input').value = isoDate(todayStart());
  }
  else if (action === 'close-modal') document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
  else if (action === 'sort') {
    const t = btn.dataset.type, c = btn.dataset.col;
    if (sortState[t].col === c) sortState[t].dir = sortState[t].dir === 'asc' ? 'desc' : 'asc';
    else { sortState[t].col = c; sortState[t].dir = 'asc'; }
    render();
  }
  else if (action === 'rm') {
    if (confirm('Delete this item?')) {
      state[btn.dataset.type] = state[btn.dataset.type].filter(x => x.id !== btn.dataset.id);
      saveState(); render();
    }
  }
  else if (action === 'edit') { openModal(btn.dataset.type, btn.dataset.id); }
  else if (action === 'pay-bill') {
    const b = state.bills.find(x => x.id === btn.dataset.id);
    if (b) {
      if (b.recurring && b.recurring !== 'once' && b.dueDate) {
        const d = new Date(b.dueDate + (b.dueDate.includes('T') ? '' : 'T00:00:00'));
        if (b.recurring==='monthly') d.setMonth(d.getMonth()+1); else if (b.recurring==='weekly') d.setDate(d.getDate()+7); else if (b.recurring==='yearly') d.setFullYear(d.getFullYear()+1);
        b.dueDate = isoDate(d);
      } else { b.paid = true; }
      saveState(); render();
    }
  }
  else if (action === 'unpay-bill') { const b = state.bills.find(x => x.id === btn.dataset.id); if (b) { b.paid = false; saveState(); render(); } }
  else if (action === 'toggle-task') { const t = state.tasks.find(x => x.id === btn.dataset.id); if (t) { t.done = !t.done; saveState(); render(); } }
  else if (action === 'goal-add') {
    const g = state.goals.find(x => x.id === btn.dataset.id);
    if (g) {
      const amt = parseFloat(prompt(`Fund "${g.name}" - Amount:`));
      if (amt && amt > 0) { g.currentAmount += amt; saveState(); render(); }
    }
  }
  else if (action === 'prev-month') { const v=getViewMonth(); viewMonth={year:v.month===0?v.year-1:v.year, month:v.month===0?11:v.month-1}; render(); }
  else if (action === 'next-month') { const v=getViewMonth(); viewMonth={year:v.month===11?v.year+1:v.year, month:v.month===11?0:v.month+1}; render(); }
  else if (action === 'curr-month') { viewMonth = null; render(); }
  else if (action === 'open-presets') { openPresetPicker(); }
});

// Manage Income Form Tips Toggle
document.addEventListener('change', e => {
  if (e.target.id === 'tipsEnabled') {
    const grp = document.getElementById('tipsInputGroup');
    if (e.target.checked) {
      grp.style.display = 'flex';
      setTimeout(() => grp.style.opacity = '1', 10);
    } else {
      grp.style.opacity = '0';
      setTimeout(() => grp.style.display = 'none', 200);
    }
  }
});

// Modals
function openModal(type, id = null) {
  document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
  const form = document.querySelector(`#modal-${type} form`);
  if (!form) return; form.reset();
  editingItem = id ? { type, id } : null;
  const title = document.querySelector(`#modal-${type} .modal-title`);
  if(title) title.textContent = (id ? 'edit ' : 'add ') + type.replace('bills','expense').replace('petty','spending');

  if (id) {
    const item = state[type].find(x => x.id === id);
    if (item) {
      Object.keys(item).forEach(k => {
        if (form.elements[k]) form.elements[k].value = item[k];
      });
      if (type==='goals') { form.elements.targetAmount.value=item.targetAmount; form.elements.currentAmount.value=item.currentAmount; }
      if (type==='income') {
        form.elements['amount'].value = item.baseAmount !== undefined ? item.baseAmount : item.amount;
        form.elements['hours'].value = item.hours || '';
        if(form.elements['tipsEnabled']) {
            form.elements['tipsEnabled'].checked = !!item.tipsEnabled;
            form.elements['tipsValue'].value = item.tipsValue !== undefined ? item.tipsValue : 6;
            form.elements['tipsType'].value = item.tipsType || 'percent';
            form.elements['tipsEnabled'].dispatchEvent(new Event('change', {bubbles: true}));
        }
      }
    }
  }
  document.getElementById('modal-'+type).classList.add('open');
  setTimeout(() => form.querySelector('input')?.focus(), 50);
}

document.querySelectorAll('form[data-type]').forEach(f => {
  f.addEventListener('submit', e => {
    e.preventDefault();
    const fd = new FormData(f);
    const type = f.dataset.type;
    const isEdit = editingItem && editingItem.type === type;
    const item = isEdit ? state[type].find(x => x.id === editingItem.id) : { id: nextId(type), createdAt: isoDate(todayStart()) };

    const parseAmt = v => { const n = parseFloat(String(v).replace(/[$,\s]/g,'')); return isNaN(n)?0:n; };

    if (type === 'income') {
      item.source = fd.get('source'); 
      const baseAmt = parseAmt(fd.get('amount'));
      item.baseAmount = baseAmt;
      item.hours = parseAmt(fd.get('hours')) || null;
      item.tipsEnabled = fd.get('tipsEnabled') === 'on';
      item.tipsType = fd.get('tipsType') || 'percent';
      
      let finalAmt = baseAmt;
      if (item.tipsEnabled) {
        // Fallback to 6 if blank or 0
        let tipVStr = fd.get('tipsValue');
        let tipV = parseAmt(tipVStr);
        if (!tipVStr || tipV === 0) tipV = 6; 
        item.tipsValue = tipV;

        if (item.tipsType === 'percent') {
          finalAmt += baseAmt * (tipV / 100);
        } else {
          finalAmt += tipV;
        }
      }
      
      item.amount = finalAmt;
      item.frequency = fd.get('frequency') || 'monthly'; 
      item.receivedAt = fd.get('receivedAt') || null;
      
    } else if (type === 'expenses') {
      item.name = fd.get('name'); item.amount = parseAmt(fd.get('amount'));
      item.category = fd.get('category'); item.recurring = fd.get('recurring') || 'monthly'; item.dueDate = fd.get('date') || null;
      if (!isEdit) item.paid = false;
      if (!isEdit) state.bills.push(item);
    } else if (type === 'tasks') {
      item.text = fd.get('text'); item.priority = fd.get('priority'); item.dueDate = fd.get('date') || null;
      if (!isEdit) item.done = false;
    } else if (type === 'goals') {
      item.name = fd.get('name'); item.targetAmount = parseAmt(fd.get('targetAmount')); 
      item.currentAmount = parseAmt(fd.get('currentAmount')); item.targetDate = fd.get('targetDate') || null;
    } else if (type === 'petty') {
      item.amount = parseAmt(fd.get('amount')); item.category = fd.get('category');
      item.note = fd.get('note'); item.date = fd.get('date');
    }

    if (!isEdit && type !== 'expenses') state[type].push(item);
    saveState(); document.querySelectorAll('.modal').forEach(m => m.classList.remove('open')); render();
  });
});

// Presets Logic
let presetSel = new Set();
function openPresetPicker() {
  presetSel.clear();
  const { year, month } = getViewMonth();
  const { income: inc } = getMonthlyStats(year, month);
  const list = document.getElementById('preset-list');
  if (inc===0) { list.innerHTML = `<div class="empty-state">add income first to compute preset limits based on your monthly income.</div>`; }
  else {
    const existing = new Set(state.bills.map(b=>b.name.toLowerCase()));
    list.innerHTML = PRESET_BILLS.map((p, i) => {
      const amt = inc * (p.pct/100);
      const ex = existing.has(p.name.toLowerCase());
      return `<div class="preset-row ${ex?'exists':''}" data-idx="${i}">
        <div class="box"></div><div class="nm">${p.name}</div><div class="pct">${fmtMoney(amt,{round:true})} limit<br>${p.pct}% of income</div>
      </div>`;
    }).join('');
    list.querySelectorAll('.preset-row:not(.exists)').forEach(r => r.addEventListener('click', () => {
      const i = parseInt(r.dataset.idx);
      if (presetSel.has(i)) { presetSel.delete(i); r.classList.remove('sel'); } else { presetSel.add(i); r.classList.add('sel'); }
      const btn = document.getElementById('preset-apply-btn');
      btn.disabled = presetSel.size===0; btn.textContent = `add ${presetSel.size} selected`;
    }));
  }
  document.getElementById('modal-presets').classList.add('open');
}

document.getElementById('preset-apply-btn').addEventListener('click', () => {
  const { year, month } = getViewMonth();
  const { income: inc } = getMonthlyStats(year, month);
  presetSel.forEach(idx => {
    const p = PRESET_BILLS[idx];
    state.bills.push({ id: nextId('bills'), name: p.name, amount: Math.round(inc*(p.pct/100)), category: p.category, recurring: p.recurring, paid: false, createdAt: isoDate(todayStart()) });
  });
  saveState(); document.getElementById('modal-presets').classList.remove('open'); render();
});

// Export / Reset
document.getElementById('btn-export').addEventListener('click', () => {
  const b = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const u = URL.createObjectURL(b); const a = document.createElement('a'); a.href = u;
  a.download = 'ledgeon-data.json'; document.body.appendChild(a); a.click(); URL.revokeObjectURL(u);
});
document.getElementById('btn-reset').addEventListener('click', () => {
  if(confirm('Wipe all data? Cannot be undone.')) { state = {tasks:[], bills:[], events:[], income:[], goals:[], petty:[]}; saveState(); render(); }
});

// Init
render();

</script>
