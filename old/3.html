<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0e0f">
<title>ledgeon · vim</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── vim/tmux palette ─────────────────────────────────── */
:root {
  --bg: #0d0e0f; --bg-soft: #15171a; --bg-deep: #08090a; --bg-input: #1a1c1f;
  --line: #1e2126; --line-soft: #161a1e; --line-strong: #2d3239;
  --t: #d4d4d4; --t-bright: #fafafa; --t-dim: #a8a8a8; --t-faint: #6a6f78; --t-mute: #4a4f5a;
  --warm: #d4a574; --lime: #b8bb26; --lime-soft: rgba(184,187,38,0.13);
  --ok: #b8bb26; --bad: #fb4934; --warn: #fabd2f; --err: #fb4934; --cyan: #83a598;
  --vim-bg: #282828; --vim-status: #458588; --vim-mode: #b8bb26;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg); color: var(--t);
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 13px; line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  min-height: 100%;
}
body {
  display: flex; flex-direction: column;
  min-height: 100vh; min-height: 100dvh;
  padding-bottom: calc(48px + env(safe-area-inset-bottom));
}
button { cursor: pointer; font: inherit; color: inherit; background: none; border: none; }
input, select, textarea { font: inherit; color: inherit; }

/* ── tab bar (top, like vim/tmux windows) ─────────────── */
header.tabbar {
  position: sticky; top: 0; z-index: 50;
  display: flex; align-items: stretch;
  background: var(--bg-deep);
  padding-top: env(safe-area-inset-top);
  border-bottom: 1px solid var(--line);
  font-size: 11px; overflow-x: auto;
}
header.tabbar .tab {
  padding: 6px 10px;
  color: var(--t-faint);
  border-right: 1px solid var(--line);
  white-space: nowrap;
  flex-shrink: 0;
}
header.tabbar .tab .num { color: var(--warm); margin-right: 4px; font-weight: 600; }
header.tabbar .tab.active {
  background: var(--bg-soft);
  color: var(--t-bright);
}
header.tabbar .tab.active .num { color: var(--lime); }
header.tabbar .tab.dirty .num::after { content: '*'; color: var(--warn); }
header.tabbar .actions {
  margin-left: auto; display: flex; gap: 4px;
  padding: 4px 8px; border-left: 1px solid var(--line);
  flex-shrink: 0;
}
header.tabbar .actions button {
  border: 1px solid var(--line); color: var(--t-faint);
  font-size: 10px; padding: 2px 6px; border-radius: 2px;
}
header.tabbar .actions button:hover { color: var(--lime); border-color: var(--lime); }
header.tabbar .actions button.danger:hover { color: var(--err); border-color: var(--err); }

/* ── buffer label (file path equivalent) ──────────────── */
.buf-label {
  font-size: 10px; color: var(--t-mute);
  padding: 4px 12px; background: var(--bg-soft);
  border-bottom: 1px dotted var(--line);
  font-family: inherit;
  user-select: none;
}
.buf-label .accent { color: var(--cyan); }
.buf-label .modified { color: var(--warn); }

/* ── main: vim buffer pane ────────────────────────────── */
main {
  flex: 1; padding: 0;
  background: var(--bg);
  display: flex;
}

/* line numbers gutter */
.gutter {
  background: var(--bg-deep);
  border-right: 1px solid var(--line);
  padding: 6px 6px 6px 8px;
  font-size: 11px;
  color: var(--t-mute);
  text-align: right;
  user-select: none;
  font-variant-numeric: tabular-nums;
  min-width: 38px;
}
.gutter .ln { line-height: 20px; }
.gutter .ln.tilde { color: var(--cyan); opacity: 0.6; }
.gutter .ln.cur { color: var(--warm); font-weight: 600; }

/* lines column */
.lines {
  flex: 1;
  padding: 6px 12px 60px;
  font-size: 12.5px;
  overflow-x: auto;
  min-width: 0;
}
.lines .ln {
  line-height: 20px;
  min-height: 20px;
  white-space: pre;
  overflow: hidden;
  text-overflow: ellipsis;
}
.lines .ln.empty { color: var(--cyan); opacity: 0.4; }

/* syntax highlighting */
.lines .kw { color: var(--warm); font-weight: 500; }
.lines .str { color: var(--ok); }
.lines .num { color: var(--bad); font-variant-numeric: tabular-nums; }
.lines .com { color: var(--t-faint); font-style: italic; }
.lines .lbl { color: var(--cyan); }
.lines .val { color: var(--t-bright); font-variant-numeric: tabular-nums; }
.lines .val.ok { color: var(--ok); }
.lines .val.bad { color: var(--bad); }
.lines .val.warm { color: var(--warm); }
.lines .val.warn { color: var(--warn); }
.lines .sec { color: var(--warm); font-weight: 600; }
.lines .sec::before { content: '" '; color: var(--cyan); }
.lines .id { color: var(--t-mute); }
.lines .acts {
  display: inline-flex; gap: 4px; margin-left: 6px;
  vertical-align: middle;
}
.lines .acts button {
  border: 1px solid var(--line); color: var(--t-faint);
  font-size: 10px; padding: 0 5px; border-radius: 2px;
  line-height: 14px;
}
.lines .acts button:hover { color: var(--lime); border-color: var(--lime); }
.lines .acts button.err:hover { color: var(--err); border-color: var(--err); }
.lines .acts button.ok:hover { color: var(--ok); border-color: var(--ok); }
.lines .ln.done { opacity: 0.5; text-decoration: line-through; }

/* bar viz inline */
.lines .bar {
  letter-spacing: -1px; font-size: 13px;
}
.lines .bar .f { color: var(--lime); }
.lines .bar .e { color: var(--line-strong); }
.lines .bar.ok .f { color: var(--ok); }
.lines .bar.bad .f { color: var(--bad); }
.lines .bar.warm .f { color: var(--warm); }
.lines .bar.warn .f { color: var(--warn); }

.lines .spark { letter-spacing: -2px; font-size: 14px; line-height: 1; }
.lines .spark.ok { color: var(--ok); }
.lines .spark.bad { color: var(--bad); }
.lines .spark.warm { color: var(--warm); }
.lines .spark.cyan { color: var(--cyan); }

.lines .tag {
  display: inline-block; padding: 0 4px; border-radius: 2px;
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 500;
  vertical-align: 1px;
}
.lines .tag.ok { background: rgba(184,187,38,0.18); color: var(--ok); }
.lines .tag.warn { background: rgba(250,189,47,0.18); color: var(--warn); }
.lines .tag.err { background: rgba(251,73,52,0.18); color: var(--err); }
.lines .tag.info { background: rgba(131,165,152,0.2); color: var(--cyan); }

.lines .month-nav {
  display: inline-flex; gap: 4px; margin-left: 8px;
  vertical-align: 1px;
}
.lines .month-nav button {
  border: 1px solid var(--line); color: var(--t-faint);
  font-size: 10px; padding: 0 5px; border-radius: 2px;
  line-height: 14px;
}
.lines .month-nav button:hover { color: var(--lime); border-color: var(--lime); }

.lines .empty-state { color: var(--t-mute); font-style: italic; }
.lines .lnk { color: var(--cyan); cursor: pointer; }
.lines .lnk:hover { text-decoration: underline; }

.tax-pct-input {
  width: 38px; background: var(--bg-deep); border: 1px solid var(--line);
  color: var(--t-bright); padding: 1px 3px; border-radius: 2px;
  font: inherit; font-size: 11px; text-align: center; outline: none;
  font-variant-numeric: tabular-nums;
}
.tax-pct-input:focus { border-color: var(--lime); }

.btn-pri {
  display: inline-block; padding: 4px 10px;
  background: var(--lime-soft); border: 1px solid var(--lime);
  color: var(--lime); border-radius: 3px; font-weight: 500;
  font-size: 11px; cursor: pointer;
}
.btn-pri:hover { background: var(--lime); color: var(--bg-deep); }

/* ── bottom status bar (vim/tmux style) ───────────────── */
nav.statusline {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  display: flex; align-items: stretch;
  background: var(--vim-bg);
  padding-bottom: env(safe-area-inset-bottom);
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  border-top: 2px solid var(--line-strong);
}
nav.statusline .mode {
  background: var(--vim-mode);
  color: var(--bg-deep);
  padding: 6px 10px;
  font-weight: 700;
  letter-spacing: 1px;
  font-size: 10px;
  text-transform: uppercase;
}
nav.statusline .mode::after {
  content: '';
  display: inline-block;
  border-left: 8px solid var(--vim-mode);
  border-top: 13px solid transparent;
  border-bottom: 13px solid transparent;
  position: relative;
  left: 10px; top: 0;
  margin-right: 8px;
}
nav.statusline .ctx {
  flex: 1; display: flex; align-items: center;
  padding: 6px 16px 6px 18px;
  color: var(--t-bright);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  font-size: 10.5px;
}
nav.statusline .ctx .sep { color: var(--t-faint); margin: 0 8px; }
nav.statusline .ctx .lab { color: var(--t-faint); }
nav.statusline .ctx .ok { color: var(--ok); }
nav.statusline .ctx .bad { color: var(--bad); }
nav.statusline .ctx .warm { color: var(--warm); }

nav.statusline .pos {
  background: var(--vim-status); color: var(--t-bright);
  padding: 6px 10px;
  font-size: 10px; font-weight: 600;
  position: relative;
}
nav.statusline .pos::before {
  content: ''; position: absolute;
  left: -8px; top: 0; bottom: 0;
  border-right: 8px solid var(--vim-status);
  border-top: 13px solid transparent;
  border-bottom: 13px solid transparent;
}

/* btm class for compatibility with event layer */
nav.btm.statusline button { background: none; border: none; cursor: pointer; }

/* ── modals ───────────────────────────────────────────── */
.modal { display: none; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; padding: 14px; }
.modal.open { display: flex; }
.modal-bd { position: absolute; inset: 0; background: rgba(13,14,15,0.85); backdrop-filter: blur(4px); }
.modal-c {
  position: relative; background: var(--bg-soft);
  border: 1px solid var(--line-strong); border-radius: 3px;
  width: 100%; max-width: 440px; padding: 16px 18px 18px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.6); max-height: 85vh; overflow-y: auto;
}
.modal-t {
  color: var(--warm); font-size: 10.5px; text-transform: uppercase;
  letter-spacing: 2px; font-weight: 600; margin-bottom: 12px;
  padding-bottom: 8px;
}
.modal-t::before { content: ':'; color: var(--lime); margin-right: 4px; }
.frow { display: flex; gap: 10px; margin-bottom: 11px; flex-wrap: wrap; }
.fcol { flex: 1; min-width: 130px; }
.flbl { display: block; color: var(--cyan); font-size: 10px; text-transform: lowercase; margin-bottom: 4px; letter-spacing: 0.5px; }
.input, .select, textarea {
  width: 100%; background: var(--bg-deep); border: 1px solid var(--line);
  color: var(--t-bright); font: inherit; font-size: 12.5px; padding: 6px 9px;
  border-radius: 2px; outline: none;
}
.input:focus, .select:focus, textarea:focus { border-color: var(--lime); }
.input::placeholder { color: var(--t-mute); }
.hours-input { display: flex; align-items: center; gap: 6px; background: var(--bg-deep); border: 1px solid var(--line); color: var(--t-bright); border-radius: 2px; padding: 0 9px; height: 31px; }
.hours-input:focus-within { border-color: var(--lime); }
.hours-input input { background: transparent; border: none; color: var(--t-bright); font: inherit; font-size: 12.5px; padding: 0; outline: none; width: 30px; text-align: center; font-variant-numeric: tabular-nums; -moz-appearance: textfield; }
.hours-input input::-webkit-outer-spin-button, .hours-input input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.hours-input span { color: var(--t-faint); font-size: 11px; }
.tip-box { background: var(--bg-deep); padding: 10px 12px; border-radius: 3px; border: 1px solid var(--line); margin-bottom: 11px; }
.tip-toggle { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--t-bright); cursor: pointer; }
.tip-input-grp { display: none; gap: 8px; align-items: center; margin-top: 8px; opacity: 0; transition: opacity 0.2s; }
.tip-input-grp input { width: 60px; padding: 4px 6px; }
.tip-input-grp select { width: 56px; padding: 4px; }
.factions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; padding-top: 11px; border-top: 1px solid var(--line-strong); }
.factions button { padding: 5px 13px; border: 1px solid var(--line); color: var(--t-dim); border-radius: 2px; font-size: 11.5px; transition: 0.15s; text-transform: lowercase; }
.factions button:hover { color: var(--t-bright); border-color: var(--t-dim); }
.factions button.primary { color: var(--lime); border-color: var(--lime); }
.factions button.primary:hover { background: var(--lime-soft); }
.preset-row { display: flex; align-items: center; gap: 10px; padding: 6px 9px; border: 1px solid transparent; border-radius: 2px; cursor: pointer; font-size: 11.5px; }
.preset-row:hover { background: var(--bg-deep); border-color: var(--line); }
.preset-row .box { width: 13px; height: 13px; border: 1px solid var(--t-faint); border-radius: 2px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.preset-row.sel .box { background: var(--lime); border-color: var(--lime); }
.preset-row.sel .box::after { content: ''; width: 6px; height: 3px; border-left: 2px solid var(--bg-deep); border-bottom: 2px solid var(--bg-deep); transform: rotate(-45deg) translate(0,-1px); }
.preset-row.exists { opacity: 0.4; pointer-events: none; }
.preset-row .nm { flex: 1; color: var(--t); }
.preset-row .pct { color: var(--t-faint); font-size: 10px; text-align: right; }

</style>
</head>
<body>

<input type="file" id="file-import" style="display:none" accept=".json">

<header class="tabbar" id="tabs">
  <button class="tab" data-tab="overview"><span class="num">1:</span>ov</button>
  <button class="tab" data-tab="income"><span class="num">2:</span>in</button>
  <button class="tab" data-tab="expenses"><span class="num">3:</span>ex</button>
  <button class="tab" data-tab="budget"><span class="num">4:</span>bd</button>
  <button class="tab" data-tab="tasks"><span class="num">5:</span>tk</button>
  <div class="actions">
    <button data-action="import">:imp</button>
    <button data-action="export">:exp</button>
    <button class="danger" data-action="reset">:rst</button>
  </div>
</header>

<div class="buf-label">
  <span class="accent">ledgeon</span>/<span id="buf-name">overview</span>.ldg <span class="modified" id="buf-mod"></span>
</div>

<main id="content"></main>

<nav class="btm statusline" id="statusline">
  <div class="mode">NORMAL</div>
  <div class="ctx" id="status-ctx"><span class="lab">net:</span> <span class="ok" id="status-net">—</span><span class="sep">|</span><span class="lab">tab:</span> <span class="warm" id="status-tab">overview</span><span class="sep">|</span><span class="lab" id="status-extra"></span></div>
  <div class="pos" id="status-pos">1,1</div>
</nav>

<!-- modals -->
<div class="modal" id="modal-income">
  <div class="modal-bd" data-action="close-modal"></div>
  <div class="modal-c">
    <div class="modal-t">add income</div>
    <form data-type="income">
      <div class="frow">
        <div class="fcol"><label class="flbl">source</label><input type="text" class="input" name="source" required></div>
        <div class="fcol" style="min-width: 100px;"><label class="flbl">base amount</label><input type="text" class="input" name="amount" placeholder="0.00" required></div>
      </div>
      <div class="frow">
        <div class="fcol"><label class="flbl">frequency</label>
          <select class="select" name="frequency">
            <option value="monthly" selected>monthly</option><option value="biweekly">biweekly</option><option value="weekly">weekly</option><option value="yearly">yearly</option><option value="once">one-time</option>
          </select>
        </div>
        <div class="fcol"><label class="flbl">hours worked</label>
          <div class="hours-input">
            <input type="text" name="hours" placeholder="0" inputmode="numeric" maxlength="3"><span>h</span>
            <input type="text" name="minutes" placeholder="0" inputmode="numeric" maxlength="2"><span>m</span>
          </div>
        </div>
      </div>
      <div class="frow">
        <div class="fcol"><label class="flbl">date received</label><input type="date" class="input" name="receivedAt"></div>
      </div>
      <div class="tip-box">
        <label class="tip-toggle">
          <input type="checkbox" name="tipsEnabled" id="tipsEnabled"> + assumed cash tips
        </label>
        <div class="tip-input-grp" id="tipsInputGroup">
          <input type="number" step="0.1" class="input" name="tipsValue" value="6">
          <select class="select" name="tipsType">
            <option value="percent">%</option>
            <option value="amount">$</option>
          </select>
        </div>
      </div>
      <div class="factions">
        <button type="button" data-action="close-modal">cancel</button>
        <button type="submit" class="primary">save</button>
      </div>
    </form>
  </div>
</div>

<div class="modal" id="modal-expenses">
  <div class="modal-bd" data-action="close-modal"></div>
  <div class="modal-c">
    <div class="modal-t">add expense</div>
    <form data-type="expenses">
      <div class="frow">
        <div class="fcol"><label class="flbl">name</label><input type="text" class="input" name="name" required></div>
        <div class="fcol" style="min-width: 100px;"><label class="flbl">amount</label><input type="text" class="input" name="amount" placeholder="0.00" required></div>
      </div>
      <div class="frow">
        <div class="fcol"><label class="flbl">category</label>
          <select class="select" name="category">
            <option value="housing">housing</option><option value="utilities">utilities</option><option value="transport">transport</option>
            <option value="insurance">insurance</option><option value="food">food</option><option value="media">media</option>
            <option value="debt">debt</option><option value="health">health</option><option value="other">other</option>
          </select>
        </div>
        <div class="fcol"><label class="flbl">recurrence</label>
          <select class="select" name="recurring">
            <option value="monthly" selected>monthly</option><option value="weekly">weekly</option><option value="yearly">yearly</option><option value="once">one-time</option>
          </select>
        </div>
      </div>
      <div class="frow">
        <div class="fcol"><label class="flbl">due date</label><input type="date" class="input" name="date"></div>
      </div>
      <div class="factions">
        <button type="button" data-action="close-modal">cancel</button>
        <button type="submit" class="primary">save</button>
      </div>
    </form>
  </div>
</div>

<div class="modal" id="modal-petty">
  <div class="modal-bd" data-action="close-modal"></div>
  <div class="modal-c">
    <div class="modal-t">log spending</div>
    <form data-type="petty">
      <div class="frow">
        <div class="fcol"><label class="flbl">amount</label><input type="text" class="input" name="amount" placeholder="0.00" required></div>
        <div class="fcol"><label class="flbl">category</label>
          <select class="select" name="category">
            <option value="food">food</option><option value="transport">transport</option><option value="media">entertainment</option><option value="other" selected>other</option>
          </select>
        </div>
      </div>
      <div class="frow">
        <div class="fcol"><label class="flbl">note</label><input type="text" class="input" name="note"></div>
      </div>
      <div class="frow">
        <div class="fcol"><label class="flbl">date</label><input type="date" class="input" name="date" id="petty-date-input" required></div>
      </div>
      <div class="factions">
        <button type="button" data-action="close-modal">cancel</button>
        <button type="submit" class="primary">log</button>
      </div>
    </form>
  </div>
</div>

<div class="modal" id="modal-tasks">
  <div class="modal-bd" data-action="close-modal"></div>
  <div class="modal-c">
    <div class="modal-t">add task</div>
    <form data-type="tasks">
      <div class="frow"><div class="fcol"><label class="flbl">task</label><input type="text" class="input" name="text" required></div></div>
      <div class="frow">
        <div class="fcol"><label class="flbl">priority</label>
          <select class="select" name="priority"><option value="">none</option><option value="low">low</option><option value="med">medium</option><option value="high">high</option></select>
        </div>
        <div class="fcol"><label class="flbl">due date</label><input type="date" class="input" name="date"></div>
      </div>
      <div class="factions"><button type="button" data-action="close-modal">cancel</button><button type="submit" class="primary">save</button></div>
    </form>
  </div>
</div>

<div class="modal" id="modal-goals">
  <div class="modal-bd" data-action="close-modal"></div>
  <div class="modal-c">
    <div class="modal-t">add goal</div>
    <form data-type="goals">
      <div class="frow"><div class="fcol"><label class="flbl">goal name</label><input type="text" class="input" name="name" required></div></div>
      <div class="frow">
        <div class="fcol"><label class="flbl">target</label><input type="text" class="input" name="targetAmount" required></div>
        <div class="fcol"><label class="flbl">saved</label><input type="text" class="input" name="currentAmount" value="0"></div>
      </div>
      <div class="frow"><div class="fcol"><label class="flbl">target date</label><input type="date" class="input" name="targetDate"></div></div>
      <div class="factions"><button type="button" data-action="close-modal">cancel</button><button type="submit" class="primary">save</button></div>
    </form>
  </div>
</div>

<div class="modal" id="modal-presets">
  <div class="modal-bd" data-action="close-modal"></div>
  <div class="modal-c" style="display: flex; flex-direction: column;">
    <div class="modal-t">starter expenses</div>
    <div style="font-size: 11px; color: var(--t-faint); margin-bottom: 10px; line-height: 1.5;">
      typical rule-of-thumb amounts based on your monthly income.
    </div>
    <div id="preset-list" style="overflow-y: auto; flex: 1;"></div>
    <div class="factions">
      <button type="button" data-action="close-modal">cancel</button>
      <button type="button" class="primary" id="preset-apply-btn" data-action="apply-presets" disabled>add selected</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ──── Constants ──────────────────────────────────────────────
const ART = `

       ▄▄
      ████
     ██████
$$$  ██████
     ██████
     ██████
      ████
       ▀▀

     ledgeon`;

const STORAGE_KEY = 'ledgeon-state-v4';
const TAB_KEY = 'ledgeon-tab';
const TAX_KEY = 'ledgeon-tax-pct';
const TABS = ['overview', 'income', 'expenses', 'budget', 'tasks'];

const CATEGORIES = {
  housing:   { label: 'housing',   color: '#d4a574' },
  utilities: { label: 'utilities', color: '#7eb6f0' },
  transport: { label: 'transport', color: '#b08bc7' },
  insurance: { label: 'insurance', color: '#e57373' },
  food:      { label: 'food',      color: '#86c98a' },
  media:     { label: 'media',     color: '#f5c890' },
  debt:      { label: 'debt',      color: '#ff8a65' },
  health:    { label: 'health',    color: '#c8a2ff' },
  other:     { label: 'other',     color: '#6b7280' },
};

const PRESET_BILLS = [
  { name: 'Housing (Rent/Mortgage)',     recurring: 'monthly', category: 'housing',   pct: 30 },
  { name: 'Utilities & Internet',        recurring: 'monthly', category: 'utilities', pct: 5 },
  { name: 'Groceries',                   recurring: 'monthly', category: 'food',      pct: 15 },
  { name: 'Transportation',              recurring: 'monthly', category: 'transport', pct: 10 },
  { name: 'Insurance',                   recurring: 'monthly', category: 'insurance', pct: 5 },
  { name: 'Subscriptions & Media',       recurring: 'monthly', category: 'media',     pct: 2 },
  { name: 'Debt Repayment',              recurring: 'monthly', category: 'debt',      pct: 10 },
];

// ──── State ──────────────────────────────────────────────────
let state = { tasks: [], bills: [], events: [], income: [], goals: [], petty: [] };
const possibleKeys = ['ledgeon-state-v5', 'ledgeon-state-v4', 'ledgeon-prompt-v1', 'ledgeon-state-v3'];
for (const k of possibleKeys) {
  try {
    const raw = localStorage.getItem(k);
    if (raw) {
      const v = JSON.parse(raw);
      if (Array.isArray(v.bills) || Array.isArray(v.income)) {
        state = {
          tasks:  Array.isArray(v.tasks)  ? v.tasks  : [],
          bills:  Array.isArray(v.bills)  ? v.bills  : [],
          events: Array.isArray(v.events) ? v.events : [],
          income: Array.isArray(v.income) ? v.income : [],
          goals:  Array.isArray(v.goals)  ? v.goals  : [],
          petty:  Array.isArray(v.petty)  ? v.petty  : [],
        };
        break;
      }
    }
  } catch {}
}

// migrate income data
state.income.forEach(i => {
  if (i.hoursWorked !== undefined && i.hours === undefined) { i.hours = i.hoursWorked; delete i.hoursWorked; }
  if (i.cashTipPct || i.cashTipAmount) {
    const base = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
    i.baseAmount = base; i.tipsEnabled = true;
    if (i.cashTipPct) {
      i.tipsType = 'percent'; i.tipsValue = Number(i.cashTipPct);
      i.amount = base + (base * Number(i.cashTipPct) / 100);
    } else if (i.cashTipAmount) {
      i.tipsType = 'amount'; i.tipsValue = Number(i.cashTipAmount);
      i.amount = base + Number(i.cashTipAmount);
    }
    delete i.cashTipPct; delete i.cashTipAmount;
  }
  if (i.baseAmount === undefined) {
    i.baseAmount = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
  }
});

let currentTab = localStorage.getItem(TAB_KEY) || 'overview';
if (!TABS.includes(currentTab)) currentTab = 'overview';
let editingItem = null;
let viewMonth = null;

function getTaxPct() { const v = parseFloat(localStorage.getItem(TAX_KEY)); return isNaN(v) ? 25 : v; }
function setTaxPct(v) { localStorage.setItem(TAX_KEY, String(v)); }

// ──── Helpers ────────────────────────────────────────────────
function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); updateBadges(); } catch {} }
function nextId(col) {
  const pfx = { tasks: 't', bills: 'b', events: 'e', income: 'i', goals: 'g', petty: 'p' }[col];
  let max = 0;
  for (const item of state[col]) { const n = parseInt(item.id?.slice(1), 10); if (!isNaN(n) && n > max) max = n; }
  return pfx + (max + 1);
}
function startOfDay(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }
function todayStart() { return startOfDay(new Date()); }
function isoDate(d) { const x = startOfDay(d); return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`; }
function formatDate(s) {
  if (!s) return '—';
  const d = new Date(s + (s.includes('T') ? '' : 'T00:00:00'));
  if (isNaN(d)) return s;
  const diff = Math.round((d - todayStart()) / 86400000);
  if (diff === 0) return 'today';
  if (diff === 1) return 'tomorrow';
  if (diff === -1) return 'yesterday';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toLowerCase();
}
function isOverdue(s) { return s && new Date(s + (s.includes('T') ? '' : 'T00:00:00')) < todayStart(); }
function isTodayDate(s) { return s && +new Date(s + (s.includes('T') ? '' : 'T00:00:00')) === +todayStart(); }
function fmtMoney(n, opts = {}) {
  const v = parseFloat(String(n).replace(/[^\d.-]/g, '')) || 0;
  const abs = Math.abs(v).toLocaleString('en-US', { minimumFractionDigits: opts.round ? 0 : 2, maximumFractionDigits: opts.round ? 0 : 2 });
  return (v < 0 ? '−$' : (opts.sign && v > 0 ? '+$' : '$')) + abs;
}
function fmtHM(decimal) {
  if (decimal == null || isNaN(decimal)) return '—';
  if (decimal === 0) return '0h';
  const totalMin = Math.round(decimal * 60);
  const h = Math.floor(totalMin / 60); const m = totalMin % 60;
  if (h === 0) return `${m}m`; if (m === 0) return `${h}h`;
  return `${h}h${m}m`;
}
function escHTML(s) { return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function sparkline(values) {
  if (!values || values.length === 0) return '─'.repeat(8);
  const chars = ['▁','▂','▃','▄','▅','▆','▇','█'];
  const min = Math.min(...values); const max = Math.max(...values);
  if (max === min) return (max > 0 ? '▄' : '▁').repeat(values.length);
  return values.map(v => {
    if (v <= 0) return '▁';
    const idx = Math.round(((v - min) / (max - min)) * (chars.length - 1));
    return chars[Math.max(0, Math.min(chars.length - 1, idx))];
  }).join('');
}
function asciiBar(pct, width = 20) {
  const f = Math.max(0, Math.min(width, Math.round(width * (pct / 100))));
  return `<span class="f">${'█'.repeat(f)}</span><span class="e">${'░'.repeat(width - f)}</span>`;
}
function monthlyEq(amount, freq) {
  const val = parseFloat(String(amount).replace(/[^\d.-]/g, '')) || 0;
  if (!val) return 0;
  switch (freq || 'monthly') {
    case 'weekly': return val * 4.333;
    case 'biweekly': return val * 2.166;
    case 'monthly': return val;
    case 'yearly': return val / 12;
    default: return 0;
  }
}
function getViewMonth() { if (viewMonth) return viewMonth; const d = new Date(); return { year: d.getFullYear(), month: d.getMonth() }; }

// ──── Calculations ───────────────────────────────────────────
function getMonthlyStats(year, month) {
  let income = 0; let bills = 0; let tips = 0;
  for (const i of state.income) {
    const isOnce = i.frequency === 'once' || !i.frequency;
    const amt = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
    let base = i.baseAmount !== undefined ? parseFloat(String(i.baseAmount).replace(/[^\d.-]/g, '')) || 0 : amt;
    const tipAmt = Math.max(0, amt - base);
    if (isOnce) {
      const dateStr = i.receivedAt || i.createdAt || isoDate(todayStart());
      const d = new Date(dateStr + (dateStr.includes('T') ? '' : 'T00:00:00'));
      if (d.getFullYear() === year && d.getMonth() === month) { income += amt; tips += tipAmt; }
    } else { income += monthlyEq(amt, i.frequency); tips += monthlyEq(tipAmt, i.frequency); }
  }
  for (const b of state.bills) {
    const amt = parseFloat(String(b.amount).replace(/[^\d.-]/g, '')) || 0;
    const isOnce = !b.recurring || b.recurring === 'once';
    if (!isOnce) bills += monthlyEq(amt, b.recurring);
    else {
      const dateStr = b.dueDate || b.createdAt || isoDate(todayStart());
      const d = new Date(dateStr + (dateStr.includes('T') ? '' : 'T00:00:00'));
      if (d.getFullYear() === year && d.getMonth() === month) bills += amt;
    }
  }
  return { income, bills, net: income - bills, tips };
}

function getMonthlyHistory(monthsBack = 6) {
  const now = new Date(); const out = [];
  for (let i = monthsBack - 1; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const stats = getMonthlyStats(d.getFullYear(), d.getMonth());
    out.push({ label: d.toLocaleString('en-US', { month: 'short' }).toLowerCase(), income: stats.income, bills: stats.bills });
  }
  return out;
}

function getIncomeStats() {
  const now = new Date(); const curY = now.getFullYear(); const curM = now.getMonth();
  let rawInc = []; let rawBills = [];
  for (let i = 1; i <= 12; i++) {
    let m = curM - i; let y = curY; if (m < 0) { m += 12; y -= 1; }
    const st = getMonthlyStats(y, m);
    if (st.income > 0) rawInc.push(st.income);
    if (st.bills > 0) rawBills.push(st.bills);
  }
  let validInc = rawInc.length > 1 ? rawInc.filter(inc => inc >= Math.max(...rawInc) * 0.5) : rawInc;
  if (validInc.length === 0) { const cur = getMonthlyStats(curY, curM); if (cur.income > 0) validInc.push(cur.income); }
  const avgMonthly = validInc.length ? validInc.reduce((a,b)=>a+b,0) / validInc.length : 0;
  const projAnnual = avgMonthly * 12;

  let validBills = rawBills;
  if (validBills.length === 0) { const cur = getMonthlyStats(curY, curM); if (cur.bills > 0) validBills.push(cur.bills); }
  const avgMonthlyBills = validBills.length ? validBills.reduce((a,b)=>a+b,0) / validBills.length : 0;
  const projAnnualBills = avgMonthlyBills * 12;

  let ytdIncome = 0; let ytdHours = 0; let ytdTips = 0;
  const daysInCurMonth = new Date(curY, curM + 1, 0).getDate(); const daysElapsed = now.getDate();
  const monthsElapsedThisYear = curM + (daysElapsed / daysInCurMonth);

  for (const i of state.income) {
    const effective = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
    const base = i.baseAmount !== undefined ? parseFloat(String(i.baseAmount).replace(/[^\d.-]/g, '')) || 0 : effective;
    const tip = Math.max(0, effective - base);
    const h = Number(i.hours) || 0; const isOnce = i.frequency === 'once' || !i.frequency;
    if (isOnce) {
      const dateStr = i.receivedAt || i.createdAt || isoDate(todayStart());
      const d = new Date(dateStr + (dateStr.includes('T') ? '' : 'T00:00:00'));
      if (d.getFullYear() === curY) { ytdIncome += effective; ytdHours += h; ytdTips += tip; }
    } else {
      const dt = i.createdAt ? new Date(i.createdAt) : now;
      const startY = dt.getFullYear(); const startM = dt.getMonth();
      let startMonthsElapsed = 0;
      if (startY < curY) startMonthsElapsed = 0;
      else if (startY === curY) {
        const daysInStartMonth = new Date(startY, startM + 1, 0).getDate();
        const startFraction = (daysInStartMonth - dt.getDate() + 1) / daysInStartMonth;
        startMonthsElapsed = startM + (1 - startFraction);
      } else continue;
      const activeMonthsThisYear = Math.max(0, monthsElapsedThisYear - startMonthsElapsed);
      const monthlyInc = monthlyEq(effective, i.frequency); const monthlyTip = monthlyEq(tip, i.frequency);
      const f = i.frequency === 'weekly' ? 4.33333 : i.frequency === 'biweekly' ? 2.16667 : i.frequency === 'monthly' ? 1 : i.frequency === 'yearly' ? (1/12) : 0;
      ytdIncome += monthlyInc * activeMonthsThisYear; ytdTips += monthlyTip * activeMonthsThisYear; ytdHours += (h * f) * activeMonthsThisYear;
    }
  }
  return { ytdIncome, ytdHours, ytdHourly: ytdHours > 0 ? ytdIncome / ytdHours : 0, ytdTips, avgMonthly, projAnnual, avgMonthlyBills, projAnnualBills };
}

function getReferenceMonth() {
  const now = new Date();
  for (let i = 0; i < 12; i++) {
    let m = now.getMonth() - i; let y = now.getFullYear();
    while (m < 0) { m += 12; y -= 1; }
    const s = getMonthlyStats(y, m);
    if (s.income > 0) return { year: y, month: m, ...s, label: new Date(y, m).toLocaleString('en-US', { month: 'short' }).toLowerCase() };
  }
  return null;
}

function aggregateBillsByCategory(bills, year, month) {
  const byCat = {};
  for (const b of bills) {
    const amt = parseFloat(String(b.amount).replace(/[^\d.-]/g, '')) || 0;
    const isOnce = !b.recurring || b.recurring === 'once';
    const mo = isOnce ? ((b.dueDate || b.createdAt || isoDate(todayStart())).startsWith(`${year}-${String(month+1).padStart(2,'0')}`) ? amt : 0) : monthlyEq(amt, b.recurring);
    if (mo <= 0) continue;
    const cat = b.category || 'other';
    if (!byCat[cat]) byCat[cat] = { total: 0, names: [] };
    byCat[cat].total += mo; byCat[cat].names.push(b.name);
  }
  return Object.entries(byCat).map(([cat, v]) => ({
    cat, total: v.total, names: v.names,
    label: CATEGORIES[cat]?.label || cat,
    color: CATEGORIES[cat]?.color || '#6b7280',
  })).sort((a,b) => b.total - a.total);
}

function getSavingsTarget() {
  let total = 0; const breakdown = [];
  for (const g of state.goals) {
    const target = parseFloat(g.targetAmount) || 0;
    const saved = parseFloat(g.currentAmount) || 0;
    const remaining = Math.max(0, target - saved);
    if (remaining === 0 || !g.targetDate) continue;
    const td = new Date(g.targetDate + 'T00:00:00');
    if (td <= todayStart()) continue;
    const monthsLeft = Math.max(1, (td - todayStart()) / (30.44 * 86400000));
    const monthly = remaining / monthsLeft;
    total += monthly; breakdown.push({ name: g.name, monthly });
  }
  return { total, breakdown };
}

function getPettyThisWeek() {
  const today = todayStart();
  const dow = (today.getDay() + 6) % 7;
  const monday = new Date(today.getTime() - dow * 86400000);
  const sunday = new Date(monday.getTime() + 6 * 86400000);
  const startIso = isoDate(monday); const endIso = isoDate(sunday);
  return state.petty.filter(p => p.date && p.date >= startIso && p.date <= endIso)
    .sort((a,b) => b.date.localeCompare(a.date));
}

function getMonthlyHoursHistory(year, month, monthsBack = 6) {
  const out = [];
  for (let i = monthsBack - 1; i >= 0; i--) {
    const d = new Date(year, month - i, 1);
    const y = d.getFullYear(); const m = d.getMonth();
    let mh = 0;
    for (const inc of state.income) {
      const h = Number(inc.hours) || 0;
      const isOnce = inc.frequency === 'once' || !inc.frequency;
      if (isOnce) {
        const ds = inc.receivedAt || inc.createdAt;
        if (ds) {
          const dd = new Date(ds + (ds.includes('T') ? '' : 'T00:00:00'));
          if (dd.getFullYear() === y && dd.getMonth() === m) mh += h;
        }
      } else {
        const f = inc.frequency === 'weekly' ? 4.33 : inc.frequency === 'biweekly' ? 2.17 : inc.frequency === 'monthly' ? 1 : inc.frequency === 'yearly' ? (1/12) : 0;
        mh += h * f;
      }
    }
    out.push(mh);
  }
  return out;
}

function getWeeklyPettyHistory(weeksBack = 6) {
  const today = todayStart();
  const out = [];
  for (let w = weeksBack - 1; w >= 0; w--) {
    const wkStart = new Date(today.getTime() - ((today.getDay() + 6) % 7 + 7 * w) * 86400000);
    const wkEnd = new Date(wkStart.getTime() + 6 * 86400000);
    const startIso = isoDate(wkStart); const endIso = isoDate(wkEnd);
    const spent = state.petty.filter(p => p.date && p.date >= startIso && p.date <= endIso)
      .reduce((s, p) => s + (parseFloat(String(p.amount).replace(/[^\d.-]/g, '')) || 0), 0);
    out.push(spent);
  }
  return out;
}

// ──── UI helpers (vim) ───────────────────────────────────────
// Build a vim-style buffer: array of "lines" rendered with line numbers + tildes
// Each line is a string of HTML
function vimBuffer(lines, padTo = 28) {
  const gutter = [];
  const linesHTML = [];
  for (let i = 0; i < lines.length; i++) {
    gutter.push(`<div class="ln">${(i + 1).toString().padStart(2)}</div>`);
    linesHTML.push(`<div class="ln">${lines[i]}</div>`);
  }
  // Pad with tildes for vim feel
  for (let i = lines.length; i < padTo; i++) {
    gutter.push(`<div class="ln tilde">~</div>`);
    linesHTML.push(`<div class="ln empty">~</div>`);
  }
  return `<aside class="gutter">${gutter.join('')}</aside><div class="lines">${linesHTML.join('')}</div>`;
}

// section header line: " === name ==="
function vsec(name) { return `<span class="sec">=== ${name} ===</span>`; }
// comment line
function vcom(text) { return `<span class="com">" ${text}</span>`; }
// kv line: "  income ......... $2,839"
function vkv(label, value, valColor = '', sparkChars = '', sparkColor = '') {
  const sp = sparkChars ? ` <span class="spark ${sparkColor}">${sparkChars}</span>` : '';
  return `  <span class="lbl">${label}</span>${sp}  <span class="val ${valColor}">${value}</span>`;
}
function vBar(label, pct, barColor, value, valColor) {
  return `  <span class="lbl">${label.padEnd(10)}</span><span class="bar ${barColor}">${asciiBar(pct, 16)}</span>  <span class="val ${valColor}">${value}</span>`;
}

// month nav as inline buttons
function monthNav(year, month) {
  const isCurr = year === new Date().getFullYear() && month === new Date().getMonth();
  return `<span class="month-nav"><button data-action="prev-month">←</button><button data-action="next-month">→</button>${!isCurr ? '<button data-action="curr-month">~</button>' : ''}</span>`;
}

// ──── Render: overview (vim) ─────────────────────────────────
function renderOverview() {
  const { year, month } = getViewMonth();
  const cur = getMonthlyStats(year, month);
  const monthKey = `${year}-${String(month+1).padStart(2,'0')}`;
  const pettySpent = state.petty.filter(p => p.date && p.date.startsWith(monthKey))
    .reduce((s, p) => s + (parseFloat(String(p.amount).replace(/[^\d.-]/g, '')) || 0), 0);
  const net = cur.income - cur.bills - pettySpent;
  const savingsPct = cur.income > 0 ? Math.max(0, (cur.income - cur.bills - pettySpent) / cur.income * 100) : 0;
  const history = getMonthlyHistory(6);
  const incSeries = history.map(h => h.income);
  const billSeries = history.map(h => h.bills);
  const savSeries = history.map(h => h.income > 0 ? Math.max(0, (h.income - h.bills) / h.income * 100) : 0);
  const ctx = new Date(year, month).toLocaleString('en-US', { month: 'long', year: 'numeric' }).toLowerCase();

  const upcIso = isoDate(new Date(Date.now() + 14 * 86400000));
  const upcoming = state.bills.filter(b => b.dueDate && b.dueDate <= upcIso && !b.paid)
    .sort((a,b) => a.dueDate.localeCompare(b.dueDate));

  const openTasks = state.tasks.filter(t => !t.done).sort((a,b) => {
    const ad = a.dueDate || '9999'; const bd = b.dueDate || '9999';
    return ad.localeCompare(bd);
  });

  const lines = [
    vcom('overview · ' + ctx + ' ' + monthNav(year, month)),
    '',
    vsec('summary'),
    vBar('income',   cur.income > 0 ? 100 : 0, 'ok', fmtMoney(cur.income, {round:true}), 'ok'),
    vBar('expenses', cur.income > 0 ? Math.min(100, cur.bills/cur.income*100) : 0, 'bad', fmtMoney(cur.bills, {round:true}), 'bad'),
    vBar('savings',  savingsPct, 'warm', savingsPct.toFixed(0) + '%', 'warm'),
    `  <span class="lbl">net</span>      <span class="val ${net>=0?'ok':'bad'}">${fmtMoney(net, {sign:true, round:true})}</span> <span class="com">" ${state.income.length} sources, ${state.bills.filter(b=>!b.paid).length} unpaid</span>`,
    '',
    vsec('trend · 6mo'),
    `  <span class="lbl">income  </span><span class="spark ok">${sparkline(incSeries)}</span>`,
    `  <span class="lbl">expenses</span><span class="spark bad">${sparkline(billSeries)}</span>`,
    `  <span class="lbl">savings </span><span class="spark warm">${sparkline(savSeries)}</span>`,
  ];

  if (upcoming.length) {
    lines.push('');
    lines.push(vsec(`upcoming · 14d · ${upcoming.length}`));
    upcoming.slice(0, 5).forEach(b => {
      const overdue = isOverdue(b.dueDate); const today = isTodayDate(b.dueDate);
      const tagCls = overdue ? 'err' : today ? 'warn' : 'info';
      lines.push(`  <span class="tag ${tagCls}">${formatDate(b.dueDate)}</span> <span class="val">${escHTML(b.name).padEnd(20)}</span> <span class="num">${fmtMoney(b.amount, {round:true})}</span>`);
    });
    if (upcoming.length > 5) lines.push(`  <span class="com">" + ${upcoming.length - 5} more · :tabnext expenses</span>`);
  }

  if (openTasks.length) {
    lines.push('');
    lines.push(vsec(`tasks · ${openTasks.length} open`));
    openTasks.slice(0, 5).forEach(t => {
      const overdue = t.dueDate && isOverdue(t.dueDate);
      const today = t.dueDate && isTodayDate(t.dueDate);
      const pri = t.priority || '';
      const priCls = pri === 'high' ? 'err' : pri === 'med' ? 'warn' : 'info';
      const dateCls = overdue ? 'err' : today ? 'warn' : 'info';
      const dateLabel = t.dueDate ? formatDate(t.dueDate) : (pri || 'task');
      lines.push(`  <span class="tag ${dateCls}">${dateLabel}</span> ${escHTML(t.text)}${pri ? ` <span class="tag ${priCls}">${pri}</span>` : ''}`);
    });
    if (openTasks.length > 5) lines.push(`  <span class="com">" + ${openTasks.length - 5} more · :tabnext tasks</span>`);
  }

  return vimBuffer(lines, Math.max(28, lines.length + 2));
}

// ──── Render: income (vim) ───────────────────────────────────
function renderIncome() {
  const stats = getIncomeStats();
  const taxPct = getTaxPct();
  const taxSetaside = stats.ytdTips * taxPct / 100;
  const sources = state.income.slice().sort((a,b) => monthlyEq(b.amount, b.frequency) - monthlyEq(a.amount, a.frequency));
  const history = getMonthlyHistory(6);
  const incSeries = history.map(h => h.income);

  const lines = [
    vcom('income · ytd stats'),
    '',
    vsec('totals'),
    `  <span class="lbl">ytd income</span> <span class="spark ok">${sparkline(incSeries)}</span>  <span class="val ok">${fmtMoney(stats.ytdIncome, {round:true})}</span>`,
  ];
  if (stats.ytdTips > 0) lines.push(`  <span class="lbl">ytd tips  </span>          <span class="val warm">${fmtMoney(stats.ytdTips, {round:true})}</span>`);
  lines.push(`  <span class="lbl">ytd hours </span>          <span class="val">${fmtHM(stats.ytdHours)}</span>`);
  lines.push(`  <span class="lbl">avg/hr    </span>          <span class="val warm">$${stats.ytdHourly.toFixed(2)}</span>`);
  lines.push(`  <span class="lbl">avg/month </span>          <span class="val">${fmtMoney(stats.avgMonthly, {round:true})}</span>`);

  if (stats.ytdTips > 0) {
    lines.push('');
    lines.push(vsec('tax setaside'));
    lines.push(`  <span class="lbl">est. owed </span>          <span class="val warn">${fmtMoney(taxSetaside, {round:true})}</span> <span class="com">" set aside <input type="number" class="tax-pct-input" id="tax-pct-input" value="${taxPct}" min="0" max="100" step="1" />% of tips</span>`);
  }

  lines.push('');
  lines.push(vsec(`sources · ${sources.length} <span class="acts"><button data-action="open-modal" data-type="income">+ add</button></span>`));
  if (sources.length === 0) {
    lines.push(`  <span class="empty-state">no income tracked. <button class="btn-pri" data-action="open-modal" data-type="income">+ add income</button></span>`);
  } else {
    sources.forEach(i => {
      const amt = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
      const base = i.baseAmount !== undefined ? i.baseAmount : amt;
      const hrs = Number(i.hours) || 0;
      const monthly = i.frequency === 'once' ? amt : monthlyEq(amt, i.frequency);
      const tipBadge = i.tipsEnabled && amt > base ? ` <span class="tag info">+tip</span>` : '';
      lines.push(`  <span class="id">${i.id}</span> <span class="kw">${escHTML(i.source)}</span>${tipBadge} <span class="val ok">${fmtMoney(amt, {round:true})}</span> <span class="com">${i.frequency || 'once'}${hrs > 0 ? ` · ${fmtHM(hrs)}` : ''}${i.frequency !== 'once' ? ` · ${fmtMoney(monthly,{round:true})}/mo` : ''}</span> <span class="acts"><button data-action="edit" data-type="income" data-id="${i.id}">edit</button><button class="err" data-action="rm" data-type="income" data-id="${i.id}">x</button></span>`);
    });
  }

  return vimBuffer(lines, Math.max(28, lines.length + 2));
}

// ──── Render: expenses (vim) ─────────────────────────────────
function renderExpenses() {
  const { year, month } = getViewMonth();
  const cur = getMonthlyStats(year, month);
  const total = cur.bills; const incTot = cur.income;
  const catData = aggregateBillsByCategory(state.bills, year, month);
  const ctx = new Date(year, month).toLocaleString('en-US', { month: 'long', year: 'numeric' }).toLowerCase();
  const billsHistory = getMonthlyHistory(6).map(h => h.bills);
  const paidCount = state.bills.filter(b => b.paid).length;
  const unpaidCount = state.bills.filter(b => !b.paid).length;

  const recurring = state.bills.filter(b => b.recurring && b.recurring !== 'once').map(b => {
    const amt = parseFloat(String(b.amount).replace(/[^\d.-]/g, '')) || 0;
    const annual = b.recurring === 'weekly' ? amt * 52 : b.recurring === 'biweekly' ? amt * 26 : b.recurring === 'monthly' ? amt * 12 : amt;
    return { ...b, _annual: annual };
  });
  const totalAnnual = recurring.reduce((s, b) => s + b._annual, 0);

  const billsSorted = state.bills.slice().sort((a, b) => {
    if (a.paid !== b.paid) return a.paid ? 1 : -1;
    const ad = a.dueDate || '9999'; const bd = b.dueDate || '9999';
    return ad.localeCompare(bd);
  });

  const lines = [
    vcom('expenses · ' + ctx + ' ' + monthNav(year, month)),
    '',
    vsec('summary'),
    `  <span class="lbl">total/mo  </span><span class="spark bad">${sparkline(billsHistory)}</span>  <span class="val bad">${fmtMoney(total, {round:true})}</span>`,
    `  <span class="lbl">% income  </span>          <span class="val ${total/incTot > 0.6 ? 'warn' : ''}">${incTot > 0 ? (total/incTot*100).toFixed(0)+'%' : '—'}</span>`,
    `  <span class="lbl">annual    </span>          <span class="val warm">${fmtMoney(totalAnnual, {round:true})}</span>`,
    `  <span class="lbl">paid      </span>          <span class="val ok">${paidCount}/${paidCount+unpaidCount}</span>`,
  ];

  if (catData.length && total > 0) {
    lines.push('');
    lines.push(vsec('by category'));
    catData.forEach(c => {
      const pct = (c.total / total) * 100;
      lines.push(`  <span class="lbl" style="color:${c.color};">${c.label.padEnd(10)}</span><span class="bar"><span class="f" style="color:${c.color};">${'█'.repeat(Math.round(pct/100*16))}</span><span class="e">${'░'.repeat(16 - Math.round(pct/100*16))}</span></span>  <span class="val">${fmtMoney(c.total, {round:true})}</span> <span class="com">${pct.toFixed(0)}%</span>`);
    });
  }

  lines.push('');
  lines.push(vsec(`bills · ${state.bills.length} <span class="acts"><button data-action="open-modal" data-type="expenses">+ add</button> <button data-action="open-presets">+ presets</button></span>`));
  if (state.bills.length === 0) {
    if (incTot > 0) lines.push(`  <span class="empty-state"><button class="btn-pri" data-action="open-presets">+ presets</button> <button class="btn-pri" data-action="open-modal" data-type="expenses">+ add</button></span>`);
    else lines.push(`  <span class="empty-state">add income first</span>`);
  } else {
    billsSorted.forEach(b => {
      const isPaid = !!b.paid;
      const overdue = b.dueDate && !b.paid && isOverdue(b.dueDate);
      const today = b.dueDate && !b.paid && isTodayDate(b.dueDate);
      const dateCls = overdue ? 'err' : today ? 'warn' : 'info';
      const cat = (CATEGORIES[b.category] || CATEGORIES.other);
      const status = isPaid ? '<span class="tag ok">paid</span>' : (b.dueDate ? `<span class="tag ${dateCls}">${formatDate(b.dueDate)}</span>` : '');
      lines.push(`  <span class="ln${isPaid ? ' done' : ''}"></span><span class="id">${b.id}</span> <span class="kw">${escHTML(b.name)}</span> <span class="num">${fmtMoney(b.amount, {round:true})}</span> ${status} <span class="com">${b.recurring || 'once'} · ${cat.label}</span> <span class="acts">${!isPaid ? `<button class="ok" data-action="pay-bill" data-id="${b.id}">pay</button>` : `<button data-action="unpay-bill" data-id="${b.id}">undo</button>`}<button data-action="edit" data-type="expenses" data-id="${b.id}">e</button><button class="err" data-action="rm" data-type="expenses" data-id="${b.id}">x</button></span>`);
    });
  }

  return vimBuffer(lines, Math.max(28, lines.length + 2));
}

// ──── Render: budget (vim) ───────────────────────────────────
function renderBudget() {
  let { year, month } = getViewMonth();
  let cur = getMonthlyStats(year, month);
  let inc = cur.income; let fixed = cur.bills;
  let basisLabel = null;
  if (inc === 0) {
    const ref = getReferenceMonth();
    if (ref) { year = ref.year; month = ref.month; inc = ref.income; fixed = ref.bills; basisLabel = ref.label; }
    else { const s = getIncomeStats(); if (s.avgMonthly > 0) { inc = s.avgMonthly; basisLabel = 'avg'; } }
  }

  if (inc === 0) {
    const lines = [vcom('budget · empty'), '', '  <span class="empty-state">no income data. <button class="btn-pri" data-action="open-modal" data-type="income">+ add income</button></span>'];
    return vimBuffer(lines, 28);
  }

  const savingsInfo = getSavingsTarget();
  const savings = savingsInfo.total;
  state.goals.forEach(g => {
    const rem = Math.max(0, (parseFloat(g.targetAmount) || 0) - (parseFloat(g.currentAmount) || 0));
    if (rem > 0 && g.targetDate) {
      const td = new Date(g.targetDate + 'T00:00:00');
      if (td > todayStart()) g._reqMo = rem / Math.max(1, (td - todayStart()) / (30.44 * 86400000));
      else g._reqMo = 0;
    } else g._reqMo = 0;
  });

  const monthlyAllowance = Math.max(0, inc - fixed - savings);
  const weeklyAllowance = monthlyAllowance / 4.333;
  const dailyAllowance = monthlyAllowance / 30;
  const weekEntries = getPettyThisWeek();
  const weekSpent = weekEntries.reduce((s, e) => s + (parseFloat(String(e.amount).replace(/[^\d.-]/g, '')) || 0), 0);
  const weekPct = weeklyAllowance > 0 ? (weekSpent / weeklyAllowance) * 100 : 0;
  const monthKey = `${year}-${String(month+1).padStart(2,'0')}`;
  const monthPettyAll = state.petty.filter(p => p.date && p.date.startsWith(monthKey)).sort((a,b) => b.date.localeCompare(a.date));
  const ctx = new Date(year, month).toLocaleString('en-US', { month: 'long', year: 'numeric' }).toLowerCase();

  const lines = [
    vcom(`budget · ${ctx}${basisLabel ? ' · basis: ' + basisLabel : ''} ${monthNav(year, month)}`),
    '',
    vsec('allocation'),
    `  <span class="lbl">income    </span>          <span class="val ok">${fmtMoney(inc, {round:true})}</span>`,
    `  <span class="lbl">- fixed   </span>          <span class="val bad">${fmtMoney(fixed, {round:true})}</span>`,
  ];
  if (savings > 0) lines.push(`  <span class="lbl">- savings </span>          <span class="val warm">${fmtMoney(savings, {round:true})}</span>`);
  lines.push(`  <span class="lbl">= avail   </span>          <span class="val warm">${fmtMoney(monthlyAllowance, {round:true})}</span>`);
  lines.push('');
  lines.push(vsec('discretionary'));
  lines.push(`  <span class="lbl">weekly    </span>          <span class="val warm">${fmtMoney(weeklyAllowance, {round:true})}</span>`);
  lines.push(`  <span class="lbl">daily     </span>          <span class="val warm">${fmtMoney(dailyAllowance, {round:true})}</span>`);
  const weekCls = weekPct >= 100 ? 'bad' : weekPct >= 75 ? 'warn' : 'ok';
  lines.push(`  <span class="lbl">this week </span><span class="bar ${weekCls}">${asciiBar(Math.min(100, weekPct), 14)}</span>  <span class="val ${weekCls}">${fmtMoney(weekSpent, {round:true})}</span> <span class="com">${weekPct.toFixed(0)}% used</span>`);

  lines.push('');
  lines.push(vsec(`petty · ${monthPettyAll.length} <span class="acts"><button data-action="open-modal" data-type="petty">+ log</span></button>`));
  if (monthPettyAll.length === 0) {
    lines.push(`  <span class="empty-state">no transactions logged</span>`);
  } else {
    monthPettyAll.forEach(p => {
      const cat = (CATEGORIES[p.category] || CATEGORIES.other);
      lines.push(`  <span class="id">${p.id}</span> <span class="kw">${escHTML(p.note || '—')}</span> <span class="num">${fmtMoney(p.amount, {round:true})}</span> <span class="com">${cat.label} · ${formatDate(p.date)}</span> <span class="acts"><button class="err" data-action="rm" data-type="petty" data-id="${p.id}">x</button></span>`);
    });
  }

  lines.push('');
  lines.push(vsec(`goals · ${state.goals.length} <span class="acts"><button data-action="open-modal" data-type="goals">+ add</button></span>`));
  if (state.goals.length === 0) {
    lines.push(`  <span class="empty-state">no goals set</span>`);
  } else {
    state.goals.forEach(g => {
      const target = parseFloat(g.targetAmount) || 0;
      const saved = parseFloat(g.currentAmount) || 0;
      const p = target > 0 ? Math.min(100, (saved / target) * 100) : 0;
      lines.push(`  <span class="kw">${escHTML(g.name)}</span> <span class="bar"><span class="f">${'█'.repeat(Math.round(p/100*16))}</span><span class="e">${'░'.repeat(16-Math.round(p/100*16))}</span></span> <span class="val">${p.toFixed(0)}%</span> <span class="com">${fmtMoney(saved, {round:true})}/${fmtMoney(target, {round:true})}${g._reqMo > 0 ? ` · need ${fmtMoney(g._reqMo, {round:true})}/mo` : ''}</span> <span class="acts"><button class="ok" data-action="goal-add" data-id="${g.id}">+fund</button><button data-action="edit" data-type="goals" data-id="${g.id}">e</button><button class="err" data-action="rm" data-type="goals" data-id="${g.id}">x</button></span>`);
    });
  }

  return vimBuffer(lines, Math.max(28, lines.length + 2));
}

// ──── Render: tasks (vim) ────────────────────────────────────
function renderTasks() {
  const total = state.tasks.length;
  const open = state.tasks.filter(t => !t.done);
  const done = state.tasks.filter(t => t.done);
  const overdue = state.tasks.filter(t => !t.done && isOverdue(t.dueDate));
  const todayCnt = state.tasks.filter(t => !t.done && isTodayDate(t.dueDate));
  const completionPct = total > 0 ? (done.length / total) * 100 : 0;

  const sorted = state.tasks.slice().sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    const ad = a.dueDate || '9999'; const bd = b.dueDate || '9999';
    return ad.localeCompare(bd);
  });

  const lines = [
    vcom('tasks · todo list'),
    '',
    vsec('summary'),
    `  <span class="lbl">open      </span>          <span class="val warm">${open.length}</span>`,
  ];
  if (overdue.length > 0) lines.push(`  <span class="lbl">overdue   </span>          <span class="val bad">${overdue.length}</span>`);
  if (todayCnt.length > 0) lines.push(`  <span class="lbl">today     </span>          <span class="val warn">${todayCnt.length}</span>`);
  lines.push(`  <span class="lbl">completion</span><span class="bar ok">${asciiBar(completionPct, 14)}</span>  <span class="val ok">${completionPct.toFixed(0)}% (${done.length}/${total})</span>`);

  lines.push('');
  lines.push(vsec(`all · ${total} <span class="acts"><button data-action="open-modal" data-type="tasks">+ add</button></span>`));
  if (sorted.length === 0) {
    lines.push(`  <span class="empty-state">no tasks. <button class="btn-pri" data-action="open-modal" data-type="tasks">+ add task</button></span>`);
  } else {
    sorted.forEach(t => {
      const isOver = !t.done && isOverdue(t.dueDate);
      const isToday = !t.done && isTodayDate(t.dueDate);
      const pri = t.priority || '';
      const priCls = pri === 'high' ? 'err' : pri === 'med' ? 'warn' : 'info';
      const dateCls = isOver ? 'err' : isToday ? 'warn' : 'info';
      const dateTag = t.dueDate ? `<span class="tag ${dateCls}">${formatDate(t.dueDate)}</span>` : '';
      const priTag = pri ? `<span class="tag ${priCls}">${pri}</span>` : '';
      const checkbox = t.done ? '[x]' : '[ ]';
      lines.push(`  <span class="${t.done ? 'com' : 'lbl'}">${checkbox}</span> <span class="${t.done ? 'com' : 'val'}">${escHTML(t.text)}</span> ${dateTag} ${priTag} <span class="acts"><button class="ok" data-action="toggle-task" data-id="${t.id}">${t.done ? 'undo' : 'done'}</button><button data-action="edit" data-type="tasks" data-id="${t.id}">e</button><button class="err" data-action="rm" data-type="tasks" data-id="${t.id}">x</button></span>`);
    });
  }

  return vimBuffer(lines, Math.max(28, lines.length + 2));
}


// ──── Master render ──────────────────────────────────────────
function updateBadges() {
  const e = state.bills.filter(b => !b.paid).length;
  const t = state.tasks.filter(t => !t.done).length;
  const set = (cls, v) => document.querySelectorAll(cls).forEach(el => {
    el.textContent = v; el.style.display = v > 0 ? 'inline-block' : 'none';
  });
  set('.badge-e', e); set('.badge-t', t);
}

function render() {
  updateBadges();
  // vim-specific: update status bar + buffer label + tabbar active state
  const ctxTab = document.getElementById('status-tab');
  if (ctxTab) ctxTab.textContent = currentTab;
  const bufName = document.getElementById('buf-name');
  if (bufName) bufName.textContent = currentTab;
  const netEl = document.getElementById('status-net');
  if (netEl) {
    const { year, month } = getViewMonth();
    const { income, bills } = getMonthlyStats(year, month);
    const monthKey = `${year}-${String(month+1).padStart(2,'0')}`;
    const petty = state.petty.filter(p => p.date && p.date.startsWith(monthKey)).reduce((s, p) => s + (parseFloat(String(p.amount).replace(/[^\d.-]/g, '')) || 0), 0);
    const net = income - bills - petty;
    netEl.textContent = fmtMoney(net, {sign: true, round: true});
    netEl.className = net >= 0 ? 'ok' : 'bad';
  }
  // vim uses .tab buttons (not nav.btm button) for the tab bar
  document.querySelectorAll('header.tabbar .tab').forEach(b => b.classList.toggle('active', b.dataset.tab === currentTab));
  document.querySelectorAll('nav.btm button').forEach(b => b.classList.toggle('active', b.dataset.tab === currentTab));
  const main = document.getElementById('content');
  if (currentTab === 'overview') main.innerHTML = renderOverview();
  else if (currentTab === 'income') main.innerHTML = renderIncome();
  else if (currentTab === 'expenses') main.innerHTML = renderExpenses();
  else if (currentTab === 'budget') main.innerHTML = renderBudget();
  else if (currentTab === 'tasks') main.innerHTML = renderTasks();
  window.scrollTo({ top: 0, behavior: 'instant' });
}

// ──── Event handlers ─────────────────────────────────────────
document.addEventListener('click', e => {
  const tab = e.target.closest('nav.btm button[data-tab], header.tabbar .tab[data-tab]');
  if (tab) { currentTab = tab.dataset.tab; localStorage.setItem(TAB_KEY, currentTab); render(); return; }

  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const act = btn.dataset.action;

  if (act === 'goto') { currentTab = btn.dataset.tab; localStorage.setItem(TAB_KEY, currentTab); render(); }
  else if (act === 'open-modal') { openModal(btn.dataset.type); if (btn.dataset.type === 'petty') document.getElementById('petty-date-input').value = isoDate(todayStart()); }
  else if (act === 'close-modal') document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
  else if (act === 'rm') {
    if (confirm('Delete?')) {
      const t = btn.dataset.type === 'expenses' ? 'bills' : btn.dataset.type;
      state[t] = state[t].filter(x => x.id !== btn.dataset.id);
      saveState(); render();
    }
  }
  else if (act === 'edit') openModal(btn.dataset.type, btn.dataset.id);
  else if (act === 'pay-bill') {
    const b = state.bills.find(x => x.id === btn.dataset.id);
    if (b) {
      if (b.recurring && b.recurring !== 'once' && b.dueDate) {
        const d = new Date(b.dueDate);
        if (b.recurring === 'monthly') d.setMonth(d.getMonth()+1);
        else if (b.recurring === 'weekly') d.setDate(d.getDate()+7);
        else if (b.recurring === 'yearly') d.setFullYear(d.getFullYear()+1);
        b.dueDate = isoDate(d);
      } else b.paid = true;
      saveState(); render();
    }
  }
  else if (act === 'unpay-bill') { const b = state.bills.find(x => x.id === btn.dataset.id); if (b) { b.paid = false; saveState(); render(); } }
  else if (act === 'toggle-task') { const t = state.tasks.find(x => x.id === btn.dataset.id); if (t) { t.done = !t.done; saveState(); render(); } }
  else if (act === 'goal-add') {
    const g = state.goals.find(x => x.id === btn.dataset.id);
    if (g) { const a = parseFloat(prompt(`Fund "${g.name}":`)); if (a > 0) { g.currentAmount = (parseFloat(g.currentAmount) || 0) + a; saveState(); render(); } }
  }
  else if (act === 'prev-month') { const v = getViewMonth(); viewMonth = { year: v.month === 0 ? v.year - 1 : v.year, month: v.month === 0 ? 11 : v.month - 1 }; render(); }
  else if (act === 'next-month') { const v = getViewMonth(); viewMonth = { year: v.month === 11 ? v.year + 1 : v.year, month: v.month === 11 ? 0 : v.month + 1 }; render(); }
  else if (act === 'curr-month') { viewMonth = null; render(); }
  else if (act === 'open-presets') openPresetPicker();
  else if (act === 'export') {
    const b = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const u = URL.createObjectURL(b); const a = document.createElement('a');
    a.href = u; a.download = 'ledgeon.json'; a.click(); URL.revokeObjectURL(u);
  }
  else if (act === 'import') document.getElementById('file-import').click();
  else if (act === 'reset') { if (confirm('Wipe all data?')) { state = { tasks:[], bills:[], events:[], income:[], goals:[], petty:[] }; saveState(); render(); } }
});

document.getElementById('file-import').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const imp = JSON.parse(ev.target.result);
      if (confirm('Import data? Replaces current.')) {
        state = {
          tasks: imp.tasks||[], bills: imp.bills||[], events: imp.events||[],
          income: imp.income||[], goals: imp.goals||[], petty: imp.petty||[]
        };
        saveState(); render();
      }
    } catch { alert('Error importing.'); }
  };
  r.readAsText(f); e.target.value = '';
});

document.addEventListener('change', e => {
  if (e.target.id === 'tipsEnabled') {
    const g = document.getElementById('tipsInputGroup');
    if (e.target.checked) { g.style.display = 'flex'; setTimeout(() => g.style.opacity = '1', 10); }
    else { g.style.opacity = '0'; setTimeout(() => g.style.display = 'none', 200); }
  }
  else if (e.target.id === 'tax-pct-input') {
    const v = parseFloat(e.target.value);
    if (!isNaN(v) && v >= 0 && v <= 100) { setTaxPct(v); render(); }
  }
});

function openModal(type, id = null) {
  document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
  const f = document.querySelector(`#modal-${type} form`);
  if (!f) return;
  f.reset();
  editingItem = id ? { type, id } : null;
  const tArr = type === 'expenses' ? state.bills : state[type];
  if (id) {
    const item = tArr.find(x => x.id === id);
    if (item) {
      Object.keys(item).forEach(k => { if (f.elements[k]) f.elements[k].value = item[k]; });
      if (type === 'income') {
        f.elements['amount'].value = item.baseAmount !== undefined ? item.baseAmount : item.amount;
        if (item.hours != null && !isNaN(item.hours) && item.hours > 0) {
          const totalMin = Math.round(Number(item.hours) * 60);
          const h = Math.floor(totalMin / 60); const m = totalMin % 60;
          f.elements['hours'].value = h ? h : '';
          f.elements['minutes'].value = m ? m : '';
        } else { f.elements['hours'].value = ''; f.elements['minutes'].value = ''; }
        f.elements['tipsEnabled'].checked = !!item.tipsEnabled;
        f.elements['tipsValue'].value = item.tipsValue || 6;
        f.elements['tipsType'].value = item.tipsType || 'percent';
        f.elements['tipsEnabled'].dispatchEvent(new Event('change', { bubbles: true }));
      }
    }
  }
  document.getElementById('modal-' + type).classList.add('open');
  setTimeout(() => f.querySelector('input')?.focus(), 50);
}

document.querySelectorAll('form[data-type]').forEach(f => {
  f.addEventListener('submit', e => {
    e.preventDefault();
    const fd = new FormData(f); const type = f.dataset.type;
    const isEdit = editingItem && editingItem.type === type;
    const tArr = type === 'expenses' ? state.bills : state[type];
    const item = isEdit ? tArr.find(x => x.id === editingItem.id) : { id: nextId(type === 'expenses' ? 'bills' : type), createdAt: isoDate(todayStart()) };
    const pAmt = v => { const n = parseFloat(String(v).replace(/[$,\s]/g, '')); return isNaN(n) ? 0 : n; };

    if (type === 'income') {
      item.source = fd.get('source');
      const base = pAmt(fd.get('amount'));
      item.baseAmount = base;
      const hVal = parseFloat(fd.get('hours')) || 0; const mVal = parseFloat(fd.get('minutes')) || 0;
      const totalHours = hVal + mVal / 60;
      item.hours = totalHours > 0 ? totalHours : null;
      item.tipsEnabled = f.elements['tipsEnabled'].checked;
      item.tipsType = f.elements['tipsType'].value;
      let final = base;
      if (item.tipsEnabled) {
        let tv = pAmt(f.elements['tipsValue'].value);
        if (tv === 0) tv = 6;
        item.tipsValue = tv;
        final += item.tipsType === 'percent' ? base * (tv / 100) : tv;
      } else item.tipsValue = 0;
      item.amount = final;
      item.frequency = fd.get('frequency') || 'monthly';
      item.receivedAt = fd.get('receivedAt') || null;
    } else if (type === 'expenses') {
      item.name = fd.get('name'); item.amount = pAmt(fd.get('amount'));
      item.category = fd.get('category'); item.recurring = fd.get('recurring') || 'monthly';
      item.dueDate = fd.get('date') || null; if (!isEdit) item.paid = false;
    } else if (type === 'tasks') {
      item.text = fd.get('text'); item.priority = fd.get('priority');
      item.dueDate = fd.get('date') || null; if (!isEdit) item.done = false;
    } else if (type === 'goals') {
      item.name = fd.get('name'); item.targetAmount = pAmt(fd.get('targetAmount'));
      item.currentAmount = pAmt(fd.get('currentAmount')); item.targetDate = fd.get('targetDate') || null;
    } else if (type === 'petty') {
      item.amount = pAmt(fd.get('amount')); item.category = fd.get('category');
      item.note = fd.get('note'); item.date = fd.get('date');
    }

    if (!isEdit) tArr.push(item);

    if (!isEdit && type === 'income' && state.bills.length === 0) {
      if (confirm('Add starter budget based on this income?')) {
        const iMo = monthlyEq(item.amount, item.frequency);
        PRESET_BILLS.forEach(p => state.bills.push({
          id: nextId('bills'), name: p.name, amount: Math.round(iMo*(p.pct/100)),
          category: p.category, recurring: p.recurring, paid: false,
          createdAt: isoDate(todayStart())
        }));
        currentTab = 'expenses'; localStorage.setItem(TAB_KEY, currentTab);
      }
    }

    saveState();
    document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
    render();
  });
});

let presetSel = new Set();
function openPresetPicker() {
  presetSel.clear();
  const { year, month } = getViewMonth();
  const { income: inc } = getMonthlyStats(year, month);
  const list = document.getElementById('preset-list');
  if (inc === 0) list.innerHTML = `<div class="empty">add income first</div>`;
  else {
    const ex = new Set(state.bills.map(b => b.name.toLowerCase()));
    list.innerHTML = PRESET_BILLS.map((p, i) => `<div class="preset-row ${ex.has(p.name.toLowerCase())?'exists':''}" data-idx="${i}"><div class="box"></div><div class="nm">${p.name}</div><div class="pct">${fmtMoney(inc*(p.pct/100),{round:true})} · ${p.pct}%</div></div>`).join('');
    list.querySelectorAll('.preset-row:not(.exists)').forEach(r => r.addEventListener('click', () => {
      const i = parseInt(r.dataset.idx);
      if (presetSel.has(i)) { presetSel.delete(i); r.classList.remove('sel'); }
      else { presetSel.add(i); r.classList.add('sel'); }
      document.getElementById('preset-apply-btn').disabled = presetSel.size === 0;
    }));
  }
  document.getElementById('modal-presets').classList.add('open');
}

document.getElementById('preset-apply-btn').addEventListener('click', () => {
  const { year, month } = getViewMonth();
  const { income: inc } = getMonthlyStats(year, month);
  presetSel.forEach(idx => {
    const p = PRESET_BILLS[idx];
    state.bills.push({
      id: nextId('bills'), name: p.name, amount: Math.round(inc*(p.pct/100)),
      category: p.category, recurring: p.recurring, paid: false,
      createdAt: isoDate(todayStart())
    });
  });
  saveState();
  document.getElementById('modal-presets').classList.remove('open');
  render();
});

render();
</script>
