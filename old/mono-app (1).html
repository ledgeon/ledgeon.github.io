<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ledgeon · mono</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0d0c;--card:#11140f;--card-hi:#161a13;--input:#0d100b;
  --line:rgba(168,217,88,0.08);--line-hi:rgba(168,217,88,0.16);
  --t:#d8e0c8;--t-bright:#fff;--t-dim:#7c8a6e;--t-faint:#4f5a44;--t-mute:#353d2c;
  --accent:#9fcc4d;--accent-soft:rgba(159,204,77,0.12);
  --bad:#d2685c;--warn:#e2c25a;--info:#5cc7c5;--plum:#c97cc5;
  --ink:#0b0d0c;
}
html,body{height:100%;background:var(--bg);color:var(--t);font-family:'JetBrains Mono',ui-monospace,monospace;font-size:13px;-webkit-font-smoothing:antialiased;line-height:1.5}
body{padding-bottom:64px;min-height:100vh}
button{cursor:pointer;font:inherit;color:inherit;background:none;border:none}
input,select,textarea{font:inherit}
.num{font-variant-numeric:tabular-nums}

/* header */
.app-h{padding:max(36px,env(safe-area-inset-top)) 18px 10px;display:flex;align-items:center;justify-content:space-between;background:rgba(11,13,12,0.96);position:sticky;top:0;z-index:10;backdrop-filter:blur(8px)}
.app-h .logo{display:flex;align-items:center;gap:8px}
.app-h .logo-box{width:22px;height:22px;background:var(--accent);color:var(--ink);border-radius:4px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px}
.app-h .logo-txt{color:var(--accent);font-weight:700;font-size:13px}
.month-sw{font-size:11px;color:var(--t-dim);display:flex;align-items:center;gap:4px}
.month-sw button{padding:2px 6px;color:var(--t-dim);font-size:14px;line-height:1}
.month-sw button:hover{color:var(--accent)}
.month-sw .lbl{color:var(--accent);font-weight:700;margin:0 4px;min-width:90px;text-align:center}

/* title bars */
.title{padding:0 18px;font-size:11px;color:var(--t-faint);text-transform:uppercase;letter-spacing:1.6px;margin:8px 0 10px;display:flex;align-items:center;gap:8px;font-weight:600}
.title-bar{width:3px;height:12px;background:var(--accent);display:inline-block}
.title .sp{flex:1;border-top:1px dashed var(--line-hi);height:1px;margin-top:6px}
.title .add{color:var(--accent);font-size:11px;text-transform:lowercase;font-weight:500}

/* panels */
.panel{margin:0 14px 14px;padding:14px 16px;background:var(--card);border:1px solid var(--line);border-radius:6px}
.panel.tight{padding:0;overflow:hidden}
.net-lbl{font-size:9.5px;color:var(--t-faint);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.net-num{font-size:36px;font-weight:700;color:var(--accent);letter-spacing:-0.8px;line-height:1;font-variant-numeric:tabular-nums}
.net-num.bad{color:var(--bad)}
.net-sub{font-size:11px;color:var(--t-dim);margin-top:6px}
.net-divider{margin-top:14px;padding-top:12px;border-top:1px dashed var(--line-hi)}

/* ascii bar lines */
.bar-line{display:grid;grid-template-columns:60px 1fr auto;gap:8px;align-items:center;padding:6px 0;font-size:12px}
.bar-line .lbl{color:var(--t-dim);text-transform:uppercase;font-size:10px;letter-spacing:0.5px;font-weight:600}
.bar-line .ascii{color:var(--t-mute);white-space:nowrap;overflow:hidden;letter-spacing:-0.5px;font-size:12px}
.bar-line .ascii .f{letter-spacing:-0.5px}
.bar-line .ascii .accent{color:var(--accent)}
.bar-line .ascii .bad{color:var(--bad)}
.bar-line .ascii .warn{color:var(--warn)}
.bar-line .ascii .info{color:var(--info)}
.bar-line .ascii .plum{color:var(--plum)}
.bar-line .ascii .mute{color:var(--t-dim)}
.bar-line .val{font-variant-numeric:tabular-nums;font-weight:700;font-size:12px}
.bar-line .val small{color:var(--t-faint);font-weight:500;margin-left:8px;font-size:10px}

/* kpis */
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:1px;margin:0 14px 14px;background:var(--line);border:1px solid var(--line);border-radius:6px;overflow:hidden}
.kpi{background:var(--card);padding:12px 14px}
.kpi .l{font-size:9.5px;color:var(--t-faint);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px}
.kpi .v{font-size:18px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;line-height:1}
.kpi .v.bad{color:var(--bad)}.kpi .v.warn{color:var(--warn)}.kpi .v.mute{color:var(--t-dim)}
.kpi .s{font-size:10.5px;color:var(--t-dim);margin-top:4px}

/* proc-style tables (mobile-tuned) */
.proc-h{display:grid;padding:8px 16px;background:var(--card-hi);color:var(--t-faint);font-size:9.5px;text-transform:uppercase;letter-spacing:0.6px;font-weight:600;border-bottom:1px solid var(--line)}
.proc-row{display:grid;padding:10px 16px;font-size:12px;border-bottom:1px solid rgba(168,217,88,0.06);align-items:center}
.proc-row:last-child{border-bottom:none}
.proc-row.bills{grid-template-columns:50px 1fr 80px}
.proc-row.bills .when{color:var(--t-faint);font-size:11px}
.proc-row.bills .name{color:var(--t-bright)}
.proc-row.bills .name .tag{font-size:9.5px;color:var(--t-dim);background:var(--card-hi);padding:1px 5px;border-radius:2px;margin-left:6px;text-transform:uppercase;letter-spacing:0.4px;font-weight:700}
.proc-row.bills .name .tag.err{color:var(--bad);background:rgba(210,104,92,0.15)}
.proc-row.bills .name .tag.warn{color:var(--warn);background:rgba(226,194,90,0.15)}
.proc-row.bills .amt{text-align:right;font-variant-numeric:tabular-nums;font-weight:700}
.proc-h.bills{grid-template-columns:50px 1fr 80px}
.proc-h.bills .ah{text-align:right}
.proc-row.act{grid-template-columns:1fr 80px}
.proc-row.act .name{color:var(--t-bright)}
.proc-row.act .name .tag{font-size:9.5px;color:var(--t-dim);background:var(--card-hi);padding:1px 5px;border-radius:2px;margin-left:6px;text-transform:uppercase;letter-spacing:0.4px;font-weight:700}
.proc-row.act .amt{text-align:right;font-variant-numeric:tabular-nums;font-weight:700;color:var(--bad)}

.empty{padding:18px;text-align:center;color:var(--t-faint);font-size:11.5px}

/* tab bar */
.tabs{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--line);display:flex;padding:8px 0 max(20px,env(safe-area-inset-bottom));z-index:20}
.tabs .tab{flex:1;text-align:center;font-size:10px;color:var(--t-faint);text-transform:uppercase;letter-spacing:0.6px;padding:6px 0;font-family:inherit}
.tabs .tab.active{color:var(--accent);border-top:2px solid var(--accent);margin-top:-8px;padding-top:12px}

/* command hint */
.cmd{padding:8px 18px 14px;color:var(--t-faint);font-size:10.5px;display:flex;align-items:center;gap:4px}
.cmd::before{content:'›';color:var(--accent);font-weight:700;margin-right:4px}
.cmd b{color:var(--accent);font-weight:700;background:var(--accent-soft);padding:1px 6px;border-radius:3px;margin:0 2px}

/* list (bills/income/spending tabs) */
.list-card{margin:0 14px 14px;background:var(--card);border:1px solid var(--line);border-radius:6px;overflow:hidden}
.li{display:grid;grid-template-columns:1fr auto;gap:4px 8px;padding:12px 16px;border-bottom:1px solid rgba(168,217,88,0.06);align-items:start}
.li:last-child{border-bottom:none}
.li .nm{color:var(--t-bright);font-size:13px;font-weight:600}
.li .meta{color:var(--t-dim);font-size:11px;margin-top:2px}
.li .amt{text-align:right;font-variant-numeric:tabular-nums;font-weight:700;font-size:14px}
.li .amt.neg{color:var(--bad)}
.li .acts{grid-column:1/-1;display:flex;gap:6px;margin-top:8px;justify-content:flex-end}
.li .acts button{border:1px solid var(--line-hi);color:var(--t-dim);border-radius:3px;padding:3px 8px;font-size:10px;text-transform:lowercase}
.li .acts button.ok{color:var(--accent);border-color:rgba(159,204,77,0.3)}
.li .acts button.err{color:var(--bad);border-color:rgba(210,104,92,0.3)}
.li.paid .nm{opacity:0.55;text-decoration:line-through}
.li.paid .amt{opacity:0.55}

/* FAB */
.fab{position:fixed;right:18px;bottom:calc(72px + env(safe-area-inset-bottom));width:52px;height:52px;border-radius:14px;background:var(--accent);color:var(--ink);font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(159,204,77,0.35);z-index:15}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:30;display:none;align-items:flex-end;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:var(--card);border:1px solid var(--line-hi);border-radius:10px;width:100%;max-width:420px;padding:18px;max-height:90vh;overflow:auto}
.modal h2{font-size:13px;color:var(--accent);text-transform:lowercase;margin-bottom:14px;font-weight:700}
.modal h2 span{color:var(--t-faint);font-size:10.5px;text-transform:uppercase;letter-spacing:1px;font-weight:500;margin-left:6px}
.field{margin-bottom:12px}
.field label{display:block;font-size:9.5px;color:var(--t-faint);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px;font-weight:600}
.field input,.field select{width:100%;background:var(--input);border:1px solid var(--line-hi);border-radius:4px;color:var(--t);padding:9px 11px;font-size:13px;font-family:inherit}
.field input:focus,.field select:focus{border-color:var(--accent);outline:none}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.actions{display:flex;gap:8px;margin-top:6px}
.actions button{flex:1;padding:10px;border-radius:4px;font-size:12px;font-weight:700;text-transform:lowercase;font-family:inherit;border:1px solid var(--line-hi);color:var(--t-dim)}
.actions button.primary{background:var(--accent);color:var(--ink);border:none}
.actions button.danger{color:var(--bad);border-color:rgba(210,104,92,0.3)}
.modal .footer-link{text-align:center;margin-top:8px;font-size:11px;color:var(--t-faint)}
.modal .footer-link button{color:var(--bad);font-size:11px;text-transform:lowercase}

/* tablet */
@media(min-width:720px){
  body{max-width:520px;margin:0 auto;border-left:1px solid var(--line);border-right:1px solid var(--line);min-height:100vh}
}
</style>
</head>
<body>
<header class="app-h">
  <div class="logo">
    <div class="logo-box">L</div>
    <div class="logo-txt">ledgeon</div>
  </div>
  <div class="month-sw">
    <button id="prev-mo">←</button>
    <span class="lbl" id="mo-lbl"></span>
    <button id="next-mo">→</button>
  </div>
</header>

<main id="app"></main>

<button class="fab" id="fab">+</button>

<nav class="tabs">
  <button class="tab" data-tab="ov">ov</button>
  <button class="tab" data-tab="bil">bills</button>
  <button class="tab" data-tab="spd">spd</button>
  <button class="tab" data-tab="inc">inc</button>
</nav>

<!-- Bill modal -->
<div class="modal-bg" id="modal-bill">
  <div class="modal">
    <h2><span id="bill-mode">+ add</span> bill</h2>
    <form id="form-bill">
      <input type="hidden" name="id">
      <div class="field"><label>name</label><input name="name" required placeholder="e.g. rent, electric"></div>
      <div class="field-row">
        <div class="field"><label>amount</label><input name="amount" type="number" step="0.01" required></div>
        <div class="field"><label>category</label>
          <select name="category">
            <option value="housing">housing</option><option value="utilities">utilities</option>
            <option value="food">food</option><option value="transport">transport</option>
            <option value="insurance">insurance</option><option value="health">health</option>
            <option value="media">media</option><option value="debt">debt</option>
            <option value="other">other</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label>due date</label><input name="dueDate" type="date"></div>
        <div class="field"><label>recurring</label>
          <select name="recurring">
            <option value="monthly">monthly</option><option value="weekly">weekly</option>
            <option value="yearly">yearly</option><option value="once">once</option>
          </select>
        </div>
      </div>
      <div class="actions">
        <button type="button" data-close>cancel</button>
        <button type="button" class="danger" id="bill-del" style="display:none">delete</button>
        <button type="submit" class="primary">save</button>
      </div>
    </form>
  </div>
</div>

<!-- Income modal -->
<div class="modal-bg" id="modal-inc">
  <div class="modal">
    <h2><span id="inc-mode">+ add</span> income</h2>
    <form id="form-inc">
      <input type="hidden" name="id">
      <div class="field"><label>source</label><input name="source" required placeholder="e.g. salary"></div>
      <div class="field-row">
        <div class="field"><label>amount</label><input name="amount" type="number" step="0.01" required></div>
        <div class="field"><label>frequency</label>
          <select name="frequency">
            <option value="monthly">monthly</option><option value="weekly">weekly</option>
            <option value="biweekly">biweekly</option><option value="yearly">yearly</option>
            <option value="once">one-time</option>
          </select>
        </div>
      </div>
      <div class="field"><label>date received</label><input name="receivedAt" type="date"><div style="font-size:10px;color:var(--t-faint);margin-top:4px;text-transform:lowercase;letter-spacing:0.3px">used for one-time · optional for recurring</div></div>
      <div class="actions">
        <button type="button" data-close>cancel</button>
        <button type="button" class="danger" id="inc-del" style="display:none">delete</button>
        <button type="submit" class="primary">save</button>
      </div>
    </form>
  </div>
</div>

<!-- Petty (spending) modal -->
<div class="modal-bg" id="modal-spd">
  <div class="modal">
    <h2><span id="spd-mode">+ add</span> spending</h2>
    <form id="form-spd">
      <input type="hidden" name="id">
      <div class="field-row">
        <div class="field"><label>amount</label><input name="amount" type="number" step="0.01" required></div>
        <div class="field"><label>date</label><input name="date" type="date" required></div>
      </div>
      <div class="field"><label>category</label>
        <select name="category">
          <option value="food">food</option><option value="transport">transport</option>
          <option value="health">health</option><option value="media">media</option>
          <option value="housing">housing</option><option value="other">other</option>
        </select>
      </div>
      <div class="field"><label>note</label><input name="note" placeholder="optional"></div>
      <div class="actions">
        <button type="button" data-close>cancel</button>
        <button type="button" class="danger" id="spd-del" style="display:none">delete</button>
        <button type="submit" class="primary">save</button>
      </div>
    </form>
  </div>
</div>

<script>
// ── State ── (shared with main site)
const KEY = 'ledgeon-state-v4';
const TAB_KEY = 'ledgeon-mono-tab';
const defaultState = () => ({ income:[], bills:[], petty:[], tasks:[], events:[], goals:[] });
let state = defaultState();
let currentTab = localStorage.getItem(TAB_KEY) || 'ov';
let viewMonth = null; // null = current
let editing = { type:null, id:null };

// Robust numeric parser: handles legacy data with strings like "$1,200.00", " 45 ", etc.
const num = (v) => { if(v==null) return 0; const n = parseFloat(String(v).replace(/[^\d.-]/g,'')); return isFinite(n)?n:0; };

try {
  const s = localStorage.getItem(KEY);
  if (s) {
    const parsed = JSON.parse(s);
    state = Object.assign(defaultState(), parsed);
    ['income','bills','petty','tasks','events','goals'].forEach(k=>{ if(!Array.isArray(state[k])) state[k]=[]; });
    // normalize numeric fields (old data may have stringy amounts like "$1,200.00")
    ['income','bills','petty'].forEach(arr => state[arr].forEach(it => { if(it.amount!=null) it.amount = num(it.amount); }));
    // Backfill missing receivedAt for one-time income from createdAt (legacy migration)
    state.income.forEach(it => {
      if ((it.frequency==='once' || !it.frequency) && !it.receivedAt && it.createdAt) {
        it.receivedAt = String(it.createdAt).slice(0,10);
      }
    });
    state.goals.forEach(g => { if(g.currentAmount!=null) g.currentAmount=num(g.currentAmount); if(g.targetAmount!=null) g.targetAmount=num(g.targetAmount); });
  }
} catch(e){}
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

// ── Helpers ──
const CAT = {
  housing:{lbl:'housing',c:'accent'}, utilities:{lbl:'utilities',c:'info'},
  transport:{lbl:'transport',c:'plum'}, insurance:{lbl:'insurance',c:'bad'},
  food:{lbl:'food',c:'warn'}, media:{lbl:'media',c:'plum'},
  debt:{lbl:'debt',c:'bad'}, health:{lbl:'health',c:'info'}, other:{lbl:'other',c:'mute'},
};
const fmt = (n, round) => {
  const v = Math.abs(Number(n)||0);
  return '$' + v.toLocaleString('en-US',{minimumFractionDigits:round?0:2, maximumFractionDigits:round?0:2});
};
const fmtSign = (n, round) => (n<0?'−':(n>0?'+':'')) + fmt(n, round);
const today = () => { const d = new Date(); d.setHours(0,0,0,0); return d; };
const iso = (d) => d.toISOString().slice(0,10);
const todayISO = () => iso(today());
const monthlyEq = (amt, freq) => {
  amt = Number(amt)||0;
  return { monthly:amt, weekly:amt*4.33, biweekly:amt*2.17, yearly:amt/12, once:0 }[freq||'monthly'] || amt;
};
function getView(){
  if (viewMonth) return viewMonth;
  const d = new Date(); return { year:d.getFullYear(), month:d.getMonth() };
}
function inMonth(dateStr, y, m){
  if (!dateStr) return false;
  const d = new Date(dateStr+'T00:00:00');
  return d.getFullYear()===y && d.getMonth()===m;
}
function isoMonthStr(y,m){ return y+'-'+String(m+1).padStart(2,'0'); }
function ascii(pct, len){
  len = len||22; pct = Math.max(0,Math.min(100,pct||0));
  const f = Math.round(pct/100*len);
  return '█'.repeat(f) + '·'.repeat(len-f);
}
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// Get the effective date string for an income entry (legacy fields supported)
function incDate(i){ return i.receivedAt || i.date || (i.createdAt ? String(i.createdAt).slice(0,10) : null); }

// ── Compute month figures ──
function getMonthData(){
  const {year, month} = getView();
  // Income: recurring sources' monthly equivalent + one-time entries received this month
  const incomeRec = state.income.filter(i=>i.frequency!=='once').reduce((s,i)=>s+monthlyEq(i.amount, i.frequency), 0);
  const incomeOnce = state.income.filter(i=>i.frequency==='once' && incDate(i) && inMonth(incDate(i),year,month)).reduce((s,i)=>s+(Number(i.amount)||0),0);
  const income = incomeRec + incomeOnce;
  // fixed = recurring bills' monthly equivalents
  const fixed = state.bills.filter(b=>b.recurring && b.recurring!=='once').reduce((s,b)=>s+monthlyEq(b.amount, b.recurring), 0);
  // one-time bills due this month
  const oneTime = state.bills.filter(b=>b.recurring==='once' && b.dueDate && inMonth(b.dueDate,year,month)).reduce((s,b)=>s+Number(b.amount||0),0);
  const fixedTotal = fixed + oneTime;
  // variable spending logged this month
  const mStr = isoMonthStr(year,month);
  const spent = state.petty.filter(p=>p.date && p.date.startsWith(mStr)).reduce((s,p)=>s+Number(p.amount||0),0);
  const net = income - fixedTotal - spent;
  return { income, fixed:fixedTotal, spent, net };
}

// ── Render: Overview ──
function renderOv(){
  const {year, month} = getView();
  const mLbl = new Date(year, month, 1).toLocaleString('en-US',{month:'short',year:'numeric'}).toUpperCase();
  document.getElementById('mo-lbl').textContent = mLbl;

  const {income, fixed, spent, net} = getMonthData();
  const savingsRate = income>0 ? Math.max(0, net/income*100) : 0;
  const fixedPct = income>0 ? fixed/income*100 : 0;
  const spentPct = income>0 ? spent/income*100 : 0;
  const netPct = income>0 ? Math.max(0, net/income*100) : 0;

  // due 7d / overdue
  const t = today();
  const in7 = iso(new Date(t.getTime()+7*86400000));
  const due7n = state.bills.filter(b=>b.dueDate && b.dueDate>=todayISO() && b.dueDate<=in7 && !b.paid);
  const due7sum = due7n.reduce((s,b)=>s+Number(b.amount||0),0);
  const overdue = state.bills.filter(b=>b.dueDate && b.dueDate<todayISO() && !b.paid);
  const overdueSum = overdue.reduce((s,b)=>s+Number(b.amount||0),0);

  // upcoming bills (next 14d)
  const in14 = iso(new Date(t.getTime()+14*86400000));
  const upcoming = state.bills.filter(b=>b.dueDate && b.dueDate<=in14 && !b.paid).sort((a,b)=>a.dueDate.localeCompare(b.dueDate)).slice(0,5);

  // recent activity (last 5 petty)
  const mStr = isoMonthStr(year,month);
  const recent = [...state.petty].filter(p=>p.date && p.date.startsWith(mStr)).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);

  const rows = [

function renderSpd(){
  const {year, month} = getView();
  const mStr = isoMonthStr(year,month);
  const list = state.petty.filter(p=>p.date && p.date.startsWith(mStr)).sort((a,b)=>b.date.localeCompare(a.date));
  const total = list.reduce((s,p)=>s+Number(p.amount||0),0);
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);
  const isCurMonth = today.getFullYear()===year && today.getMonth()===month;
  const daysSoFar = isCurMonth ? today.getDate() : daysInMonth;
  const dailyAvg = daysSoFar>0 ? total/daysSoFar : 0;
  // build daily totals for sparkline
  const daily = new Array(daysInMonth).fill(0);
  list.forEach(p => { const d=parseInt(p.date.slice(8,10)); if(d>=1&&d<=daysInMonth) daily[d-1]+=Number(p.amount||0); });
  const dMax = Math.max(...daily, 1);
  // category breakdown
  const byCat = {};
  list.forEach(p=>{ const k=p.category||'other'; byCat[k]=(byCat[k]||0)+Number(p.amount||0); });
  const cats = Object.entries(byCat).map(([k,v])=>({k,v,pct:v/(total||1)*100})).sort((a,b)=>b.v-a.v);
  let h = '<div class="title"><span class="title-bar"></span>spending · '+new Date(year,month,1).toLocaleString('en-US',{month:'long'}).toLowerCase()+' <span class="sp"></span><button class="add" data-add="spd">+ log</button></div>';
  // total + avg panel
  h += '<div class="panel">';
  h += '<div class="net-lbl">TOTAL SPENT</div>';
  h += '<div class="net-num">$'+Math.round(total).toLocaleString('en-US')+'</div>';
  h += '<div class="net-sub">avg '+fmt(dailyAvg,true)+'/day · '+list.length+' txn'+(list.length===1?'':'s')+'</div>';
  // daily mini chart
  h += '<div class="net-divider"><div class="net-lbl" style="margin-bottom:8px">DAILY · '+daysInMonth+'d</div>';
  h += '<div style="display:flex;align-items:flex-end;gap:1px;height:48px;">';
  for (let i=0;i<daysInMonth;i++) {
    const v = daily[i];
    const pct = v/dMax*100;
    const isFuture = isCurMonth && (i+1)>today.getDate();
    const color = v===0 ? 'var(--t-mute)' : (i+1===today.getDate() && isCurMonth ? 'var(--accent)' : 'var(--warn)');
    h += '<div style="flex:1;height:'+(v===0?2:pct)+'%;min-height:2px;background:'+(isFuture?'transparent':color)+';border-bottom:1px solid var(--t-mute);opacity:'+(isFuture?0.3:1)+'"></div>';
  }
  h += '</div></div></div>';
  // category breakdown
  if (cats.length) {
    h += '<div class="title"><span class="title-bar"></span>by category</div>';
    h += '<div class="panel">';
    const palette=['warn','info','plum','accent','bad','warn','info','mute'];
    cats.forEach((c,i)=>{
      h += '<div class="bar-line"><span class="lbl">'+(CAT[c.k]||CAT.other).lbl+'</span>';
      h += '<span class="ascii"><span class="f '+palette[i%palette.length]+'">'+ascii(c.pct,22)+'</span></span>';
      h += '<span class="val">'+fmt(c.v,true)+'<small>'+c.pct.toFixed(0)+'%</small></span></div>';
    });
    h += '</div>';
  }
  h += '<div class="title"><span class="title-bar"></span>transactions</div>';
  if (!list.length) return h + '<div class="panel"><div class="empty">no spending this month.</div></div>';
  h += '<div class="list-card">';
  list.forEach(p => {
    const cat = (CAT[p.category]||CAT.other).lbl;
    h += '<div class="li">';
    h += '<div><div class="nm">'+esc(p.note||cat)+'</div><div class="meta">'+cat+' · '+p.date+'</div></div>';
    h += '<div class="amt neg">−'+fmt(p.amount,true).slice(1)+'</div>';
    h += '<div class="acts"><button data-edit="spd" data-id="'+p.id+'">edit</button></div>';
    h += '</div>';
  });
  h += '</div>';
  return h;
}
// Compute monthly income totals for the last N months (anchored to view month)
function getIncomeHistory(monthsBack){
  const v = getView();
  const today = new Date(); today.setHours(0,0,0,0);
  const curKey = today.getFullYear()*12 + today.getMonth();
  const out = [];
  for (let i = monthsBack-1; i >= 0; i--) {
    const d = new Date(v.year, v.month - i, 1);
    const y = d.getFullYear(), m = d.getMonth();
    let total = 0;
    state.income.forEach(inc => {
      if (inc.frequency === 'once') {
        const ds = incDate(inc);
        if (ds && inMonth(ds, y, m)) total += Number(inc.amount)||0;
      } else {
        const startStr = inc.createdAt ? String(inc.createdAt).slice(0,10) : null;
        if (startStr) {
          const sd = new Date(startStr+'T00:00:00');
          if (sd.getFullYear()*12 + sd.getMonth() > y*12 + m) return;
        }
        total += monthlyEq(inc.amount, inc.frequency);
      }
    });
    out.push({
      label: d.toLocaleString('en-US',{month:'short'}).toLowerCase(),
      year: y, month: m, value: total,
      isFuture: (y*12+m) > curKey,
      isCurrent: (y*12+m) === curKey
    });
  }
  return out;
}

// SVG line chart for income history (mono / terminal style)
function renderIncomeLineChart(history){
  if (!history.length) return '';
  const W = 320, H = 150;
  const pad = { top: 14, right: 10, bottom: 24, left: 48 };
  const innerW = W - pad.left - pad.right;
  const innerH = H - pad.top - pad.bottom;
  const n = history.length;
  const xPos = i => pad.left + (n===1 ? innerW/2 : (i/(n-1))*innerW);
  const niceMax = (v) => {
    if (v <= 0) return 100;
    const pow = Math.pow(10, Math.floor(Math.log10(v)));
    const norm = v / pow;
    const nice = norm <= 1 ? 1 : norm <= 2 ? 2 : norm <= 2.5 ? 2.5 : norm <= 5 ? 5 : 10;
    return nice * pow;
  };
  const rawMax = Math.max(...history.map(p=>p.value), 0);
  if (rawMax === 0) return '<div class="empty" style="padding:20px 0">no income recorded in this period</div>';
  const yMax = niceMax(rawMax * 1.1);
  const yPos = v => pad.top + innerH - (yMax>0 ? (v/yMax)*innerH : 0);

  const fmtCompact = (v) => v >= 1000 ? '$'+(v/1000).toFixed(v>=10000?0:1)+'k' : '$'+Math.round(v);

  // Dashed grid + y labels
  let grid = '';
  for (let i = 0; i <= 4; i++) {
    const v = (yMax/4)*i;
    const y = yPos(v);
    grid += '<line x1="'+pad.left+'" y1="'+y.toFixed(1)+'" x2="'+(W-pad.right)+'" y2="'+y.toFixed(1)+'" stroke="rgba(168,217,88,0.16)" stroke-width="1" stroke-dasharray="2 4"></line>';
    grid += '<text x="'+(pad.left-6)+'" y="'+(y+3).toFixed(1)+'" fill="#7c8a6e" font-size="9.5" font-family="JetBrains Mono, monospace" text-anchor="end">'+fmtCompact(v)+'</text>';
  }

  // Tick marks
  let ticks = '';
  history.forEach((p,i)=>{
    ticks += '<line x1="'+xPos(i).toFixed(1)+'" y1="'+(pad.top+innerH).toFixed(1)+'" x2="'+xPos(i).toFixed(1)+'" y2="'+(pad.top+innerH+3).toFixed(1)+'" stroke="#7c8a6e" stroke-width="1" opacity="0.5"></line>';
  });

  // Stipple-style area fill
  const defs = '<defs><pattern id="stipple-acc" width="3" height="3" patternUnits="userSpaceOnUse">'+
    '<rect width="3" height="3" fill="#9fcc4d" opacity="0.04"></rect>'+
    '<circle cx="1.5" cy="1.5" r="0.5" fill="#9fcc4d" opacity="0.55"></circle></pattern></defs>';

  let area = '';
  if (n >= 2) {
    const pts = history.map((p,i)=>xPos(i).toFixed(1)+','+yPos(p.value).toFixed(1)).join(' L');
    const xS = xPos(0).toFixed(1);
    const xE = xPos(n-1).toFixed(1);
    const yB = (pad.top + innerH).toFixed(1);
    area = '<path d="M'+xS+','+yB+' L'+pts+' L'+xE+','+yB+' Z" fill="url(#stipple-acc)"></path>';
  }

  // Line
  let line = '';
  if (n >= 2) {
    const d = 'M' + history.map((p,i)=>xPos(i).toFixed(1)+','+yPos(p.value).toFixed(1)).join(' L');
    line = '<path d="'+d+'" stroke="#9fcc4d" stroke-width="1.5" fill="none"></path>';
  }

  // Square markers (terminal feel)
  let markers = '';
  history.forEach((p,i)=>{
    const sz = p.isCurrent ? 6 : 4;
    const x = xPos(i) - sz/2;
    const y = yPos(p.value) - sz/2;
    if (p.isCurrent) {
      markers += '<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+sz+'" height="'+sz+'" fill="#9fcc4d" stroke="#0b0d0c" stroke-width="1"></rect>';
    } else {
      markers += '<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+sz+'" height="'+sz+'" fill="#0b0d0c" stroke="#9fcc4d" stroke-width="1.2"'+(p.isFuture?' opacity="0.3"':'')+'></rect>';
    }
  });

  // X-axis labels
  let xLbls = '';
  history.forEach((p,i)=>{
    xLbls += '<text x="'+xPos(i).toFixed(1)+'" y="'+(H-7)+'" fill="'+(p.isCurrent?'#9fcc4d':'#7c8a6e')+'" font-size="10" font-family="JetBrains Mono, monospace" text-anchor="middle" font-weight="'+(p.isCurrent?'700':'500')+'">'+p.label+'</text>';
  });

  const baseline = '<line x1="'+pad.left+'" y1="'+(pad.top+innerH).toFixed(1)+'" x2="'+(W-pad.right)+'" y2="'+(pad.top+innerH).toFixed(1)+'" stroke="rgba(168,217,88,0.3)" stroke-width="1"></line>';

  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block;overflow:visible" preserveAspectRatio="xMidYMid meet">'+
    defs + grid + baseline + ticks + area + line + markers + xLbls + '</svg>';
}

function renderInc(){
  const monthlyTotal = state.income.filter(i=>i.frequency!=='once').reduce((s,i)=>s+monthlyEq(i.amount,i.frequency),0);
  const annualTotal = monthlyTotal*12;
  const onceCount = state.income.filter(i=>i.frequency==='once').length;
  let h = '<div class="title"><span class="title-bar"></span>income <span class="sp"></span><button class="add" data-add="inc">+ add</button></div>';
  if (!state.income.length) return h + '<div class="panel"><div class="empty">no income sources. tap + to add.</div></div>';
  // total panel
  h += '<div class="panel">';
  h += '<div class="net-lbl">MONTHLY INCOME</div>';
  h += '<div class="net-num">$'+Math.round(monthlyTotal).toLocaleString('en-US')+'</div>';
  h += '<div class="net-sub">'+fmt(annualTotal,true)+' / year · '+state.income.length+' source'+(state.income.length===1?'':'s')+(onceCount?' · '+onceCount+' one-time':'')+'</div>';
  // Line chart — 6 months
  const history = getIncomeHistory(6);
  h += '<div class="net-divider"><div class="net-lbl" style="margin-bottom:8px">TREND · 6mo</div>';
  h += renderIncomeLineChart(history);
  h += '</div></div>';

  h += '<div class="title"><span class="title-bar"></span>sources</div>';
  h += '<div class="list-card">';
  const sorted = [...state.income].sort((a,b)=>{
    const aOnce = a.frequency==='once', bOnce = b.frequency==='once';
    if (aOnce !== bOnce) return aOnce ? 1 : -1;
    if (aOnce) return (incDate(b)||'').localeCompare(incDate(a)||'');
    return monthlyEq(b.amount,b.frequency) - monthlyEq(a.amount,a.frequency);
  });
  sorted.forEach(i => {
    const isOnce = i.frequency==='once';
    const eq = monthlyEq(i.amount, i.frequency);
    const ds = incDate(i);
    const dateStr = ds ? new Date(ds+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}).toLowerCase() : '';
    h += '<div class="li">';
    h += '<div><div class="nm">'+esc(i.source||'(unnamed)')+'</div><div class="meta">'+(i.frequency||'monthly');
    if (isOnce) h += ' · '+(dateStr || '<span style="color:var(--warn)">no date</span>');
    else h += ' · '+fmt(eq,true)+'/mo';
    h += '</div></div>';
    h += '<div class="amt" style="color:var(--accent)">+'+fmt(i.amount,true).slice(1)+'</div>';
    h += '<div class="acts"><button data-edit="inc" data-id="'+i.id+'">edit</button></div>';
    h += '</div>';
  });
  h += '</div>';
  return h;
}

// ── Events ──
document.addEventListener('click', (e) => {
  const tab = e.target.closest('.tab[data-tab]');
  if (tab) { currentTab = tab.dataset.tab; localStorage.setItem(TAB_KEY, currentTab); render(); return; }
  const add = e.target.closest('[data-add]');
  if (add) { openModal(add.dataset.add); return; }
  const edit = e.target.closest('[data-edit]');
  if (edit) { openModal(edit.dataset.edit, edit.dataset.id); return; }
  const pay = e.target.closest('[data-pay]');
  if (pay) { const b = state.bills.find(x=>x.id===pay.dataset.pay); if(b){ b.paid=!b.paid; save(); render(); } return; }
  if (e.target.matches('[data-close]') || e.target.classList.contains('modal-bg')) {
    document.querySelectorAll('.modal-bg').forEach(m=>m.classList.remove('open'));
  }
});

// ── Modals ──
function openModal(type, id) {
  document.querySelectorAll('.modal-bg').forEach(m=>m.classList.remove('open'));
  editing = { type, id: id||null };
  const modalId = type==='bill' ? 'modal-bill' : (type==='inc' ? 'modal-inc' : 'modal-spd');
  const formId = type==='bill' ? 'form-bill' : (type==='inc' ? 'form-inc' : 'form-spd');
  const modeId = type==='bill' ? 'bill-mode' : (type==='inc' ? 'inc-mode' : 'spd-mode');
  const delId = type==='bill' ? 'bill-del' : (type==='inc' ? 'inc-del' : 'spd-del');
  const f = document.getElementById(formId);
  f.reset();
  document.getElementById(modeId).textContent = id ? 'edit' : '+ add';
  document.getElementById(delId).style.display = id ? '' : 'none';
  if (id) {
    const arr = type==='bill'?state.bills:(type==='inc'?state.income:state.petty);
    const item = arr.find(x=>x.id===id);
    if (item) Object.keys(item).forEach(k=>{ if(f.elements[k]) f.elements[k].value = item[k]; });
  } else if (type==='spd') {
    f.elements.date.value = todayISO();
  }
  document.getElementById(modalId).classList.add('open');
  setTimeout(()=>f.querySelector('input,select')?.focus(), 80);
}

function bindForm(type, formId, arrName) {
  document.getElementById(formId).addEventListener('submit', (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const obj = {};
    fd.forEach((v,k)=>{
      if (k==='amount') obj[k] = Number(v)||0;
      else if (v === '' && (k==='receivedAt' || k==='dueDate' || k==='note')) obj[k] = null;
      else obj[k] = v;
    });
    const isEdit = editing.type===type && editing.id;
    if (isEdit) {
      const item = state[arrName].find(x=>x.id===editing.id);
      Object.assign(item, obj);
    } else {
      obj.id = uid();
      obj.createdAt = todayISO();
      if (type==='bill') obj.paid = false;
      if (type==='inc' && obj.frequency==='once' && !obj.receivedAt) obj.receivedAt = todayISO();
      state[arrName].push(obj);
    }
    save();
    document.querySelectorAll('.modal-bg').forEach(m=>m.classList.remove('open'));
    render();
  });
}
bindForm('bill','form-bill','bills');
bindForm('inc','form-inc','income');
bindForm('spd','form-spd','petty');

function bindDel(btnId, arrName) {
  document.getElementById(btnId).addEventListener('click', () => {
    if (!editing.id) return;
    if (!confirm('Delete this item?')) return;
    state[arrName] = state[arrName].filter(x=>x.id!==editing.id);
    save();
    document.querySelectorAll('.modal-bg').forEach(m=>m.classList.remove('open'));
    render();
  });
}
bindDel('bill-del','bills');
bindDel('inc-del','income');
bindDel('spd-del','petty');

// ── Seed demo data only when storage is fully empty ──
if (!localStorage.getItem(KEY) || (state.income.length===0 && state.bills.length===0 && state.petty.length===0)) {

  const pastM = (n) => { const d=new Date(t); d.setDate(d.getDate()-n); return iso(d); };
  state.petty.push({ id:uid(), amount:48, category:'food', note:'Grocery', date:pastM(0) });

  save();
}

render();
