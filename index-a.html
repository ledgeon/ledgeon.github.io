<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>LEDGEON</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════════════
   BRUTALIST GRID · ported verbatim from the preview
   ════════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: #fff;
  color: #000;
  font-family: 'IBM Plex Mono', ui-monospace, monospace;
  font-size: 13px;
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
  min-height: 100%;
}
body {
  display: flex; flex-direction: column;
  min-height: 100vh; min-height: 100dvh;
  padding-bottom: calc(48px + env(safe-area-inset-bottom));
  max-width: 720px;
  margin: 0 auto;
  border-left: 3px solid #000;
  border-right: 3px solid #000;
}
@media (max-width: 720px) {
  body { border-left: none; border-right: none; }
}
button { cursor: pointer; font: inherit; color: inherit; background: none; border: none; padding: 0; }
input, select, textarea { font: inherit; color: inherit; }

main { flex: 1; }

/* ────────── HEADER ────────── */
.mhdr {
  padding: 14px 16px 12px;
  padding-top: calc(14px + env(safe-area-inset-top));
  border-bottom: 3px solid #000;
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
  background: #fff;
  position: sticky; top: 0; z-index: 50;
}
.mtitle { font-size: 22px; font-weight: 700; letter-spacing: -1px; line-height: 0.9; text-transform: uppercase; display: flex; align-items: center; }
.mtitle::after { content: '█'; color: #ff2b3a; margin-left: 2px; font-size: 18px; line-height: 1; }
.mhdr-r { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.mmeta {
  font-size: 10px;
  background: #000; color: #fff;
  padding: 3px 7px;
  letter-spacing: 1.5px; text-transform: uppercase;
  font-weight: 600;
  white-space: nowrap;
}
.mhdr-menu-btn {
  width: 28px; height: 28px;
  border: 1.5px solid #000;
  background: #fff; color: #000;
  font-size: 18px; font-weight: 700;
  line-height: 1;
  display: inline-flex; align-items: center; justify-content: center;
  padding: 0;
}
.mhdr-menu-btn:hover { background: #000; color: #fff; }

.mhdr-menu {
  position: fixed;
  top: calc(60px + env(safe-area-inset-top));
  right: 16px;
  z-index: 60;
  background: #fff;
  border: 3px solid #000;
  box-shadow: 6px 6px 0 #000;
  display: flex; flex-direction: column;
  min-width: 160px;
}
.mhdr-menu[hidden] { display: none; }
.mhdr-menu button {
  padding: 11px 14px;
  border: none;
  border-bottom: 2px solid #000;
  background: #fff; color: #000;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; font-weight: 700;
  letter-spacing: 1.4px; text-transform: uppercase;
  text-align: left;
  cursor: pointer;
}
.mhdr-menu button:last-child { border-bottom: none; }
.mhdr-menu button:hover { background: #000; color: #fff; }
.mhdr-menu button.danger { color: #ff2b3a; }
.mhdr-menu button.danger:hover { background: #ff2b3a; color: #fff; }

/* ────────── SECTION HEADER (msec) ────────── */
.msec {
  padding: 10px 16px 8px;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 2px;
  background: #000; color: #fff;
  display: flex; align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.msec .meta-r {
  margin-left: auto;
  opacity: 0.6;
  letter-spacing: 1px;
  font-weight: 500;
  font-size: 9.5px;
}
.msec .add {
  margin-left: auto;
  padding: 3px 7px;
  background: #ff2b3a; color: #fff;
  font-size: 9px; font-weight: 700;
  letter-spacing: 1.4px; text-transform: uppercase;
  border: 1.5px solid #ff2b3a;
  min-height: 22px;
  display: inline-flex; align-items: center;
  text-decoration: none;
}
.msec:has(.meta-r) .add { margin-left: 8px; }
.msec .add:hover { background: #fff; color: #ff2b3a; }
.msec .month-nav {
  margin-left: auto;
  display: inline-flex; align-items: center; gap: 1px;
  flex-shrink: 0;
}
.msec .month-nav .nav-arrow {
  width: 20px; height: 20px;
  background: transparent;
  color: #fff;
  border: 1px solid rgba(255,255,255,0.35);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 14px;
  line-height: 1;
  padding: 0;
}
.msec .month-nav .nav-arrow:hover { background: #fff; color: #000; border-color: #fff; }
.msec .month-nav .label {
  padding: 0 8px;
  font-weight: 700;
  letter-spacing: 1px;
  font-size: 9.5px;
  opacity: 0.75;
}
.msec .month-nav .today-btn {
  width: 20px; height: 20px;
  background: #fff;
  color: #000;
  border: 1px solid #fff;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 11px;
  line-height: 1;
  padding: 0;
  margin-left: 4px;
}
.msec .month-nav .today-btn:hover { background: #ff2b3a; color: #fff; border-color: #ff2b3a; }

/* ────────── ROWS WRAPPER ────────── */
.rows { padding: 0 16px; }
.rows.pad-b { padding-bottom: 10px; border-bottom: 3px solid #000; }

/* ────────── KEY/VALUE ROWS ────────── */
.kv { display: flex; align-items: baseline; padding: 5px 0; font-size: 12px; gap: 4px; }
.kv .kv-l { text-transform: uppercase; letter-spacing: 0.6px; font-weight: 500; }
.kv .kv-d { flex: 1; border-bottom: 1px dotted #000; margin: 0 4px; height: 0; align-self: end; margin-bottom: 4px; }
.kv .kv-v { font-weight: 700; font-variant-numeric: tabular-nums; white-space: nowrap; }
.kv .kv-v.bad, .kv .kv-v.warn { color: #ff2b3a; }
.kv.big { font-size: 13px; padding-top: 9px; border-top: 1px solid #000; margin-top: 4px; font-weight: 700; }
.kv.big .kv-v { background: #ff2b3a; color: #fff; padding: 1px 6px; }
.kv.big.ok .kv-v { background: #000; color: #fff; }
.kv.yel .kv-v { background: #ffd400; color: #000; padding: 1px 6px; }

/* indented sub-items */
.kv.sub {
  position: relative;
  padding-left: 20px;
  background: #e6e6e6;
  margin-left: -16px;
  margin-right: -16px;
  padding-right: 16px;
}
.kv.sub::before { content: ''; position: absolute; left: 12px; top: 0; bottom: 0; border-left: 2px solid #000; }
.kv.sub .kv-l { font-size: 10.5px; color: #555; }
.kv.sub .kv-v { font-size: 11.5px; }

/* ────────── LIST ITEM (li) ────────── */
.li {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 4px 12px;
  padding: 10px 16px;
  border-bottom: 2px solid #000;
  font-size: 12.5px; font-weight: 500;
  align-items: center;
}
.li.last { border-bottom: 3px solid #000; }
.li.dim { background: #f0f0f0; }
.li-info { min-width: 0; }
.li-n {
  text-transform: uppercase; letter-spacing: 0.3px;
  font-size: 12.5px; font-weight: 600;
  word-break: break-word;
}
.li.dim .li-n { color: #555; text-decoration: line-through; }
.li-meta {
  font-size: 9.5px; text-transform: uppercase; letter-spacing: 1.4px;
  color: #555;
  margin-top: 3px;
  display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
}
.li-meta .dot { color: #ccc; }
.li-r {
  display: flex; flex-direction: column; align-items: end; gap: 5px;
  flex-shrink: 0;
}
.li-v { font-weight: 700; font-variant-numeric: tabular-nums; font-size: 13px; }
.li-v.in { color: #000; }
.li-v.paid { color: #555; text-decoration: line-through; }
.li.dim .li-v { color: #555; }
.li-acts { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
.li-acts button {
  font-size: 9px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  padding: 4px 7px;
  border: 1.5px solid #000;
  background: #fff; color: #000;
  min-height: 24px;
  display: inline-flex; align-items: center;
}
.li-acts button:hover { background: #000; color: #fff; }
.li-acts button.ok { background: #000; color: #fff; }
.li-acts button.ok:hover { background: #ff2b3a; border-color: #ff2b3a; }
.li-acts button.err { color: #ff2b3a; border-color: #ff2b3a; }
.li-acts button.err:hover { background: #ff2b3a; color: #fff; }

/* ────────── BADGES (bdg) ────────── */
.bdg {
  display: inline-block;
  font-size: 8.5px; font-weight: 700;
  letter-spacing: 1.4px; padding: 1px 5px;
  text-transform: uppercase; line-height: 1.4;
}
.bdg.b-red { background: #ff2b3a; color: #fff; }
.bdg.b-blk { background: #000; color: #fff; }
.bdg.b-yel { background: #ffd400; color: #000; }
.bdg.b-out { border: 1.5px solid #000; padding: 0 4px; background: #fff; color: #000; }

/* ────────── BAR CHART (income trend) ────────── */
.bchart { padding: 12px 16px 14px; border-bottom: 3px solid #000; }
.bars { display: grid; gap: 4px; align-items: end; height: 78px; }
.bar { background: #000; display: flex; align-items: end; justify-content: center; position: relative; min-height: 4px; }
.bar.cur { background: #ff2b3a; }
.bars-foot { display: grid; gap: 4px; margin-top: 8px; font-size: 8.5px; font-weight: 700; text-align: center; letter-spacing: 0.6px; }
.bchart-empty {
  padding: 16px;
  text-align: center;
  font-size: 10px; font-weight: 600;
  letter-spacing: 1.4px;
  color: #555;
}

/* ────────── CATEGORY BARS (cat) ────────── */
.cat {
  display: grid;
  grid-template-columns: 80px 1fr 64px;
  gap: 8px; align-items: center;
  padding: 6px 0;
  font-size: 10.5px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.6px;
  border-bottom: 1px dotted #000;
}
.cat:last-child { border-bottom: none; }
.cat-bar { height: 8px; background: #fff; border: 1.5px solid #000; }
.cat-fill { height: 100%; background: #000; transition: width 0.25s ease; }
.cat-v { text-align: right; font-variant-numeric: tabular-nums; }

/* ────────── GOAL ────────── */
.goal { padding: 12px 16px; border-bottom: 2px solid #000; }
.goal.last { border-bottom: 3px solid #000; }
.goal-h {
  display: flex; justify-content: space-between;
  font-size: 10.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 6px;
}
.goal-bar { height: 10px; background: #fff; border: 2px solid #000; overflow: hidden; }
.goal-fill { height: 100%; background: #000; transition: width 0.3s ease; }
.goal-meta {
  font-size: 9.5px; margin-top: 6px;
  letter-spacing: 1.2px; text-transform: uppercase;
  color: #555;
}
.goal-meta .req { color: #ff2b3a; font-weight: 700; }
.goal-acts { display: flex; gap: 4px; margin-top: 8px; justify-content: flex-end; flex-wrap: wrap; }
.goal-acts button {
  font-size: 9px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  padding: 4px 7px;
  border: 1.5px solid #000;
  background: #fff; color: #000;
  min-height: 24px;
}
.goal-acts button:hover { background: #000; color: #fff; }
.goal-acts button.ok { background: #000; color: #fff; }
.goal-acts button.ok:hover { background: #ff2b3a; border-color: #ff2b3a; }
.goal-acts button.err { color: #ff2b3a; border-color: #ff2b3a; }
.goal-acts button.err:hover { background: #ff2b3a; color: #fff; }

/* ────────── TASK (task) ────────── */
.task {
  display: grid;
  grid-template-columns: 16px 1fr auto;
  gap: 9px; align-items: center;
  padding: 9px 16px;
  border-bottom: 2px solid #000;
  font-size: 12.5px; font-weight: 500;
}
.task.last { border-bottom: 3px solid #000; }
.task-cb {
  width: 14px; height: 14px;
  border: 2px solid #000;
  display: inline-block; position: relative;
  cursor: pointer;
}
.task-cb.done { background: #000; }
.task-cb.done::after {
  content: '✕'; color: #fff;
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; line-height: 1; font-weight: 700;
}
.task-info { min-width: 0; }
.task-n { text-transform: uppercase; letter-spacing: 0.3px; }
.task.done .task-n { color: #777; text-decoration: line-through; }
.task-meta {
  font-size: 9.5px; text-transform: uppercase; letter-spacing: 1.2px;
  color: #555; margin-top: 3px;
  display: flex; gap: 6px; align-items: center; flex-wrap: wrap;
}
.task-acts { display: flex; flex-direction: column; gap: 4px; align-items: end; }
.task-acts button {
  font-size: 9px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
  padding: 3px 6px;
  border: 1.5px solid #000;
  background: #fff; color: #000;
  min-height: 22px;
}
.task-acts button:hover { background: #000; color: #fff; }
.task-acts button.err { color: #ff2b3a; border-color: #ff2b3a; }
.task-acts button.err:hover { background: #ff2b3a; color: #fff; }

/* ────────── NOTE / EMPTY ────────── */
.note {
  font-size: 9.5px;
  padding: 8px 16px 10px;
  color: #555;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 500;
  background: #f0f0f0;
  border-bottom: 2px solid #000;
}
.empty {
  padding: 18px 16px;
  text-align: center;
  font-size: 10.5px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase;
  color: #555;
  border-bottom: 3px solid #000;
}
.empty .lnk {
  color: #ff2b3a; cursor: pointer;
  text-decoration: underline; text-underline-offset: 3px;
  font-weight: 700; font-style: normal;
}
.empty .lnk:hover { background: #ff2b3a; color: #fff; text-decoration: none; padding: 1px 4px; }

/* ────────── TAX PCT INPUT ────────── */
.tax-pct-input {
  width: 40px; background: #fff;
  border: 1.5px solid #000;
  color: #000; padding: 1px 4px;
  font: inherit; font-size: 11px; font-weight: 700;
  text-align: center; outline: none;
}
.tax-pct-input:focus { background: #ffd400; }

/* ────────── BOTTOM NAV (mnav) ────────── */
nav.mnav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  max-width: 720px; margin: 0 auto;
  display: grid; grid-template-columns: repeat(5, 1fr);
  background: #fff;
  border-top: 3px solid #000;
  border-left: 3px solid #000;
  border-right: 3px solid #000;
  padding-bottom: env(safe-area-inset-bottom);
}
@media (max-width: 720px) {
  nav.mnav { border-left: none; border-right: none; }
}
nav.mnav button {
  background: #fff;
  border: none;
  border-right: 2px solid #000;
  color: #000;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; font-weight: 700;
  letter-spacing: 1.4px; text-transform: uppercase;
  padding: 14px 4px;
  min-height: 48px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; white-space: nowrap;
  position: relative;
}
nav.mnav button:last-child { border-right: none; }
nav.mnav button.active { background: #000; color: #fff; }
nav.mnav button:hover:not(.active) { background: #f0f0f0; }
nav.mnav button .badge {
  display: inline-block; min-width: 16px;
  background: #ff2b3a; color: #fff;
  font-size: 9px; font-weight: 700;
  padding: 0 4px; margin-left: 4px;
  line-height: 1.4; letter-spacing: 0;
}
nav.mnav button.active .badge { background: #fff; color: #000; }

/* ────────── MODALS ────────── */
.modal {
  display: none; position: fixed; inset: 0; z-index: 100;
  align-items: center; justify-content: center; padding: 14px;
}
.modal.open { display: flex; }
.modal-bd { position: absolute; inset: 0; background: rgba(0,0,0,0.65); }
.modal-c {
  position: relative; background: #fff;
  border: 3px solid #000;
  width: 100%; max-width: 440px;
  max-height: 88vh; overflow-y: auto;
  box-shadow: 8px 8px 0 #000;
}
.modal-t {
  background: #000; color: #fff;
  padding: 12px 16px;
  font-size: 11px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
}
.modal-t::before { content: '$'; color: #ff2b3a; font-weight: 700; }
.modal form { padding: 16px; }
.modal #preset-list { padding: 12px 16px; }
.modal-c > div[style*="font-size"] { padding: 12px 16px 0; color: #555; }

.frow { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.fcol { flex: 1; min-width: 130px; }
.flbl {
  display: block; color: #000;
  font-size: 9.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.4px;
  margin-bottom: 5px;
}

.input, .select, textarea {
  width: 100%; background: #fff;
  border: 2px solid #000;
  color: #000;
  font: inherit; font-size: 13px;
  padding: 8px 10px;
  outline: none; border-radius: 0;
}
.input:focus, .select:focus, textarea:focus { background: #ffd400; }
.input::placeholder { color: #b8b8b8; }

.hours-input {
  display: flex; align-items: center; gap: 6px;
  background: #fff; border: 2px solid #000;
  color: #000; padding: 0 10px; height: 36px;
}
.hours-input:focus-within { background: #ffd400; }
.hours-input input {
  background: transparent; border: none; color: #000;
  font: inherit; font-size: 13px; padding: 0; outline: none;
  width: 32px; text-align: center;
  font-variant-numeric: tabular-nums; font-weight: 600;
  -moz-appearance: textfield;
}
.hours-input input::-webkit-outer-spin-button,
.hours-input input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.hours-input span {
  color: #555; font-size: 10px; font-weight: 700;
  letter-spacing: 1.2px; text-transform: uppercase;
}

.tip-box { background: #f0f0f0; padding: 10px 12px; border: 2px solid #000; margin-bottom: 12px; }
.tip-toggle {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.6px; text-transform: uppercase;
  color: #000; cursor: pointer;
}
.tip-toggle input[type="checkbox"] { width: 14px; height: 14px; accent-color: #000; cursor: pointer; }
.tip-input-grp { display: none; gap: 8px; align-items: center; margin-top: 10px; opacity: 0; transition: opacity 0.2s; }
.tip-input-grp input { width: 64px; padding: 4px 6px; font-size: 12px; }
.tip-input-grp select { width: 60px; padding: 4px 6px; font-size: 12px; }

.factions {
  display: flex; justify-content: flex-end; gap: 8px;
  margin-top: 14px; padding-top: 12px;
  border-top: 2px solid #000;
}
.factions button {
  padding: 8px 14px;
  border: 2px solid #000;
  background: #fff; color: #000;
  font-size: 10.5px; font-weight: 700;
  letter-spacing: 1.4px; text-transform: uppercase;
  min-height: 34px; transition: 0.1s;
}
.factions button:hover { background: #000; color: #fff; }
.factions button.primary { background: #000; color: #fff; }
.factions button.primary:hover { background: #ff2b3a; border-color: #ff2b3a; }
.factions button:disabled { opacity: 0.35; cursor: not-allowed; }
.factions button:disabled:hover { background: #fff; color: #000; }

.preset-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border: 2px solid #000;
  margin-bottom: 6px; cursor: pointer;
  font-size: 11.5px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.6px;
  background: #fff;
}
.preset-row:hover { background: #f0f0f0; }
.preset-row .box {
  width: 14px; height: 14px;
  border: 2px solid #000; background: #fff;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.preset-row.sel { background: #000; color: #fff; }
.preset-row.sel .box { background: #ffd400; border-color: #fff; }
.preset-row.sel .box::after {
  content: '✕'; color: #000; font-size: 11px;
  font-weight: 700; line-height: 1;
}
.preset-row.exists { opacity: 0.35; pointer-events: none; background: #f0f0f0; }
.preset-row .nm { flex: 1; }
.preset-row .pct { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-align: right; opacity: 0.7; }

/* hide stray legacy CSS-vars references (no-op aliases) */
.empty .lnk { padding: 1px 0; }

main > * { animation: fadeIn 0.12s ease-out; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ════════════════════════════════════════════════════════════════
   MOBILE
   ════════════════════════════════════════════════════════════════ */
@media (max-width: 640px) {
  .mhdr-menu { right: 10px; top: calc(54px + env(safe-area-inset-top)); }
  .mhdr-menu-btn { width: 30px; height: 30px; font-size: 18px; }

<script>
'use strict';

// ──── Constants ──────────────────────────────────────────────
const ART = `

       ▄▄
      ████
     ██████
$$$  ██████
     ██████
     ██████
      ████
       ▀▀

     ledgeon`;

const STORAGE_KEY = 'ledgeon-state-v4';
const TAB_KEY = 'ledgeon-tab';
const TAX_KEY = 'ledgeon-tax-pct';
const TABS = ['overview', 'income', 'expenses', 'budget', 'tasks'];

const CATEGORIES = {
  housing:   { label: 'housing',   color: '#d4a574' },
  utilities: { label: 'utilities', color: '#7eb6f0' },
  transport: { label: 'transport', color: '#b08bc7' },
  insurance: { label: 'insurance', color: '#e57373' },
  food:      { label: 'food',      color: '#86c98a' },
  media:     { label: 'media',     color: '#f5c890' },
  debt:      { label: 'debt',      color: '#ff8a65' },
  health:    { label: 'health',    color: '#c8a2ff' },
  other:     { label: 'other',     color: '#6b7280' },
};

const PRESET_BILLS = [
  { name: 'Housing (Rent/Mortgage)',     recurring: 'monthly', category: 'housing',   pct: 30 },
  { name: 'Utilities & Internet',        recurring: 'monthly', category: 'utilities', pct: 5 },
  { name: 'Groceries',                   recurring: 'monthly', category: 'food',      pct: 15 },
  { name: 'Transportation',              recurring: 'monthly', category: 'transport', pct: 10 },
  { name: 'Insurance',                   recurring: 'monthly', category: 'insurance', pct: 5 },
  { name: 'Subscriptions & Media',       recurring: 'monthly', category: 'media',     pct: 2 },
  { name: 'Debt Repayment',              recurring: 'monthly', category: 'debt',      pct: 10 },
];

// ──── State ──────────────────────────────────────────────────
let state = { tasks: [], bills: [], events: [], income: [], goals: [], petty: [], payments: [] };
const possibleKeys = ['ledgeon-state-v5', 'ledgeon-state-v4', 'ledgeon-prompt-v1', 'ledgeon-state-v3'];
for (const k of possibleKeys) {
  try {
    const raw = localStorage.getItem(k);
    if (raw) {
      const v = JSON.parse(raw);
      if (Array.isArray(v.bills) || Array.isArray(v.income)) {
        state = {
          tasks:    Array.isArray(v.tasks)    ? v.tasks    : [],
          bills:    Array.isArray(v.bills)    ? v.bills    : [],
          events:   Array.isArray(v.events)   ? v.events   : [],
          income:   Array.isArray(v.income)   ? v.income   : [],
          goals:    Array.isArray(v.goals)    ? v.goals    : [],
          petty:    Array.isArray(v.petty)    ? v.petty    : [],
          payments: Array.isArray(v.payments) ? v.payments : [],
        };
        break;
      }
    }
  } catch {}
}

// migrate income data
state.income.forEach(i => {
  if (i.hoursWorked !== undefined && i.hours === undefined) { i.hours = i.hoursWorked; delete i.hoursWorked; }
  if (i.cashTipPct || i.cashTipAmount) {
    const base = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
    i.baseAmount = base; i.tipsEnabled = true;
    if (i.cashTipPct) {
      i.tipsType = 'percent'; i.tipsValue = Number(i.cashTipPct);
      i.amount = base + (base * Number(i.cashTipPct) / 100);
    } else if (i.cashTipAmount) {
      i.tipsType = 'amount'; i.tipsValue = Number(i.cashTipAmount);
      i.amount = base + Number(i.cashTipAmount);
    }
    delete i.cashTipPct; delete i.cashTipAmount;
  }
  if (i.baseAmount === undefined) {
    i.baseAmount = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
  }
});

let currentTab = localStorage.getItem(TAB_KEY) || 'overview';
if (!TABS.includes(currentTab)) currentTab = 'overview';
let editingItem = null;
let viewMonth = null;

function getTaxPct() { const v = parseFloat(localStorage.getItem(TAX_KEY)); return isNaN(v) ? 25 : v; }
function setTaxPct(v) { localStorage.setItem(TAX_KEY, String(v)); }

// ──── Helpers ────────────────────────────────────────────────
function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); updateBadges(); } catch {} }
function nextId(col) {
  const pfx = { tasks: 't', bills: 'b', events: 'e', income: 'i', goals: 'g', petty: 'p', payments: 'pm' }[col];
  let max = 0;
  for (const item of state[col]) { const n = parseInt(item.id?.slice(1), 10); if (!isNaN(n) && n > max) max = n; }
  return pfx + (max + 1);
}
function startOfDay(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }
function todayStart() { return startOfDay(new Date()); }
function isoDate(d) { const x = startOfDay(d); return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`; }
function formatDate(s) {
  if (!s) return '—';
  const d = new Date(s + (s.includes('T') ? '' : 'T00:00:00'));
  if (isNaN(d)) return s;
  const diff = Math.round((d - todayStart()) / 86400000);
  if (diff === 0) return 'today';
  if (diff === 1) return 'tomorrow';
  if (diff === -1) return 'yesterday';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toLowerCase();
}
function isOverdue(s) { return s && new Date(s + (s.includes('T') ? '' : 'T00:00:00')) < todayStart(); }
function isTodayDate(s) { return s && +new Date(s + (s.includes('T') ? '' : 'T00:00:00')) === +todayStart(); }
function fmtMoney(n, opts = {}) {
  const v = parseFloat(String(n).replace(/[^\d.-]/g, '')) || 0;
  const abs = Math.abs(v).toLocaleString('en-US', { minimumFractionDigits: opts.round ? 0 : 2, maximumFractionDigits: opts.round ? 0 : 2 });
  return (v < 0 ? '−$' : (opts.sign && v > 0 ? '+$' : '$')) + abs;
}
function fmtHM(decimal) {
  if (decimal == null || isNaN(decimal)) return '—';
  if (decimal === 0) return '0h';
  const totalMin = Math.round(decimal * 60);
  const h = Math.floor(totalMin / 60); const m = totalMin % 60;
  if (h === 0) return `${m}m`; if (m === 0) return `${h}h`;
  return `${h}h${m}m`;
}
function escHTML(s) { return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function sparkline(values) {
  if (!values || values.length === 0) return '─'.repeat(8);
  const chars = ['▁','▂','▃','▄','▅','▆','▇','█'];
  const min = Math.min(...values); const max = Math.max(...values);
  if (max === min) return (max > 0 ? '▄' : '▁').repeat(values.length);
  return values.map(v => {
    if (v <= 0) return '▁';
    const idx = Math.round(((v - min) / (max - min)) * (chars.length - 1));
    return chars[Math.max(0, Math.min(chars.length - 1, idx))];
  }).join('');
}
function asciiBar(pct, width = 20) {
  const f = Math.max(0, Math.min(width, Math.round(width * (pct / 100))));
  return `<span class="f">${'█'.repeat(f)}</span><span class="e">${'░'.repeat(width - f)}</span>`;
}
function monthlyEq(amount, freq) {
  const val = parseFloat(String(amount).replace(/[^\d.-]/g, '')) || 0;
  if (!val) return 0;
  switch (freq || 'monthly') {
    case 'weekly': return val * 4.333;
    case 'biweekly': return val * 2.166;
    case 'monthly': return val;
    case 'yearly': return val / 12;
    default: return 0;
  }
}
function getViewMonth() { if (viewMonth) return viewMonth; const d = new Date(); return { year: d.getFullYear(), month: d.getMonth() }; }

// ──── Calculations ───────────────────────────────────────────
function getMonthlyStats(year, month) {
  let income = 0; let bills = 0; let tips = 0;
  for (const i of state.income) {
    const isOnce = i.frequency === 'once' || !i.frequency;
    const amt = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
    let base = i.baseAmount !== undefined ? parseFloat(String(i.baseAmount).replace(/[^\d.-]/g, '')) || 0 : amt;
    const tipAmt = Math.max(0, amt - base);
    if (isOnce) {
      const dateStr = i.receivedAt || i.createdAt || isoDate(todayStart());
      const d = new Date(dateStr + (dateStr.includes('T') ? '' : 'T00:00:00'));
      if (d.getFullYear() === year && d.getMonth() === month) { income += amt; tips += tipAmt; }
    } else { income += monthlyEq(amt, i.frequency); tips += monthlyEq(tipAmt, i.frequency); }
  }
  for (const b of state.bills) {
    const amt = parseFloat(String(b.amount).replace(/[^\d.-]/g, '')) || 0;
    const isOnce = !b.recurring || b.recurring === 'once';
    if (!isOnce) bills += monthlyEq(amt, b.recurring);
    else {
      const dateStr = b.dueDate || b.createdAt || isoDate(todayStart());
      const d = new Date(dateStr + (dateStr.includes('T') ? '' : 'T00:00:00'));
      if (d.getFullYear() === year && d.getMonth() === month) bills += amt;
    }
  }
  return { income, bills, net: income - bills, tips };
}

function getMonthlyHistory(monthsBack = 6) {
  const now = new Date(); const out = [];
  for (let i = monthsBack - 1; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const stats = getMonthlyStats(d.getFullYear(), d.getMonth());
    out.push({ label: d.toLocaleString('en-US', { month: 'short' }).toLowerCase(), income: stats.income, bills: stats.bills });
  }
  return out;
}

// jan through dec of the current calendar year
function getCalendarYearHistory() {
  const now = new Date();
  const year = now.getFullYear();
  const curMonth = now.getMonth();
  const out = [];
  for (let m = 0; m < 12; m++) {
    const stats = getMonthlyStats(year, m);
    out.push({
      label: new Date(year, m).toLocaleString('en-US', { month: 'short' }).toLowerCase(),
      income: stats.income,
      bills: stats.bills,
      current: m === curMonth,
    });
  }
  return out;
}

function getIncomeStats() {
  const now = new Date(); const curY = now.getFullYear(); const curM = now.getMonth();
  let rawInc = []; let rawBills = [];
  for (let i = 1; i <= 12; i++) {
    let m = curM - i; let y = curY; if (m < 0) { m += 12; y -= 1; }
    const st = getMonthlyStats(y, m);
    if (st.income > 0) rawInc.push(st.income);
    if (st.bills > 0) rawBills.push(st.bills);
  }
  let validInc = rawInc.length > 1 ? rawInc.filter(inc => inc >= Math.max(...rawInc) * 0.5) : rawInc;
  if (validInc.length === 0) { const cur = getMonthlyStats(curY, curM); if (cur.income > 0) validInc.push(cur.income); }
  const avgMonthly = validInc.length ? validInc.reduce((a,b)=>a+b,0) / validInc.length : 0;
  const projAnnual = avgMonthly * 12;

  let validBills = rawBills;
  if (validBills.length === 0) { const cur = getMonthlyStats(curY, curM); if (cur.bills > 0) validBills.push(cur.bills); }
  const avgMonthlyBills = validBills.length ? validBills.reduce((a,b)=>a+b,0) / validBills.length : 0;
  const projAnnualBills = avgMonthlyBills * 12;

  let ytdIncome = 0; let ytdHours = 0; let ytdTips = 0;
  const daysInCurMonth = new Date(curY, curM + 1, 0).getDate(); const daysElapsed = now.getDate();
  const monthsElapsedThisYear = curM + (daysElapsed / daysInCurMonth);

  for (const i of state.income) {
    const effective = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
    const base = i.baseAmount !== undefined ? parseFloat(String(i.baseAmount).replace(/[^\d.-]/g, '')) || 0 : effective;
    const tip = Math.max(0, effective - base);
    const h = Number(i.hours) || 0; const isOnce = i.frequency === 'once' || !i.frequency;
    if (isOnce) {
      const dateStr = i.receivedAt || i.createdAt || isoDate(todayStart());
      const d = new Date(dateStr + (dateStr.includes('T') ? '' : 'T00:00:00'));
      if (d.getFullYear() === curY) { ytdIncome += effective; ytdHours += h; ytdTips += tip; }
    } else {
      const dt = i.createdAt ? new Date(i.createdAt) : now;
      const startY = dt.getFullYear(); const startM = dt.getMonth();
      let startMonthsElapsed = 0;
      if (startY < curY) startMonthsElapsed = 0;
      else if (startY === curY) {
        const daysInStartMonth = new Date(startY, startM + 1, 0).getDate();
        const startFraction = (daysInStartMonth - dt.getDate() + 1) / daysInStartMonth;
        startMonthsElapsed = startM + (1 - startFraction);
      } else continue;
      const activeMonthsThisYear = Math.max(0, monthsElapsedThisYear - startMonthsElapsed);
      const monthlyInc = monthlyEq(effective, i.frequency); const monthlyTip = monthlyEq(tip, i.frequency);
      const f = i.frequency === 'weekly' ? 4.33333 : i.frequency === 'biweekly' ? 2.16667 : i.frequency === 'monthly' ? 1 : i.frequency === 'yearly' ? (1/12) : 0;
      ytdIncome += monthlyInc * activeMonthsThisYear; ytdTips += monthlyTip * activeMonthsThisYear; ytdHours += (h * f) * activeMonthsThisYear;
    }
  }
  return { ytdIncome, ytdHours, ytdHourly: ytdHours > 0 ? ytdIncome / ytdHours : 0, ytdTips, avgMonthly, projAnnual, avgMonthlyBills, projAnnualBills };
}

function getReferenceMonth() {
  const now = new Date();
  for (let i = 0; i < 12; i++) {
    let m = now.getMonth() - i; let y = now.getFullYear();
    while (m < 0) { m += 12; y -= 1; }
    const s = getMonthlyStats(y, m);
    if (s.income > 0) return { year: y, month: m, ...s, label: new Date(y, m).toLocaleString('en-US', { month: 'short' }).toLowerCase() };
  }
  return null;
}

function aggregateBillsByCategory(bills, year, month) {
  const byCat = {};
  for (const b of bills) {
    const amt = parseFloat(String(b.amount).replace(/[^\d.-]/g, '')) || 0;
    const isOnce = !b.recurring || b.recurring === 'once';
    const mo = isOnce ? ((b.dueDate || b.createdAt || isoDate(todayStart())).startsWith(`${year}-${String(month+1).padStart(2,'0')}`) ? amt : 0) : monthlyEq(amt, b.recurring);
    if (mo <= 0) continue;
    const cat = b.category || 'other';
    if (!byCat[cat]) byCat[cat] = { total: 0, names: [] };
    byCat[cat].total += mo; byCat[cat].names.push(b.name);
  }
  return Object.entries(byCat).map(([cat, v]) => ({
    cat, total: v.total, names: v.names,
    label: CATEGORIES[cat]?.label || cat,
    color: CATEGORIES[cat]?.color || '#6b7280',
  })).sort((a,b) => b.total - a.total);
}

function getSavingsTarget() {
  let total = 0; const breakdown = [];
  for (const g of state.goals) {
    const target = parseFloat(g.targetAmount) || 0;
    const saved = parseFloat(g.currentAmount) || 0;
    const remaining = Math.max(0, target - saved);
    if (remaining === 0 || !g.targetDate) continue;
    const td = new Date(g.targetDate + 'T00:00:00');
    if (td <= todayStart()) continue;
    const monthsLeft = Math.max(1, (td - todayStart()) / (30.44 * 86400000));
    const monthly = remaining / monthsLeft;
    total += monthly; breakdown.push({ name: g.name, monthly });
  }
  return { total, breakdown };
}

function getPettyThisWeek() {
  const today = todayStart();
  const dow = (today.getDay() + 6) % 7;
  const monday = new Date(today.getTime() - dow * 86400000);
  const sunday = new Date(monday.getTime() + 6 * 86400000);
  const startIso = isoDate(monday); const endIso = isoDate(sunday);
  return state.petty.filter(p => p.date && p.date >= startIso && p.date <= endIso)
    .sort((a,b) => b.date.localeCompare(a.date));
}

function getMonthlyHoursHistory(year, month, monthsBack = 6) {
  const out = [];
  for (let i = monthsBack - 1; i >= 0; i--) {
    const d = new Date(year, month - i, 1);
    const y = d.getFullYear(); const m = d.getMonth();
    let mh = 0;
    for (const inc of state.income) {
      const h = Number(inc.hours) || 0;
      const isOnce = inc.frequency === 'once' || !inc.frequency;
      if (isOnce) {
        const ds = inc.receivedAt || inc.createdAt;
        if (ds) {
          const dd = new Date(ds + (ds.includes('T') ? '' : 'T00:00:00'));
          if (dd.getFullYear() === y && dd.getMonth() === m) mh += h;
        }
      } else {
        const f = inc.frequency === 'weekly' ? 4.33 : inc.frequency === 'biweekly' ? 2.17 : inc.frequency === 'monthly' ? 1 : inc.frequency === 'yearly' ? (1/12) : 0;
        mh += h * f;
      }
    }
    out.push(mh);
  }
  return out;
}

function getWeeklyPettyHistory(weeksBack = 6) {
  const today = todayStart();
  const out = [];
  for (let w = weeksBack - 1; w >= 0; w--) {
    const wkStart = new Date(today.getTime() - ((today.getDay() + 6) % 7 + 7 * w) * 86400000);
    const wkEnd = new Date(wkStart.getTime() + 6 * 86400000);
    const startIso = isoDate(wkStart); const endIso = isoDate(wkEnd);
    const spent = state.petty.filter(p => p.date && p.date >= startIso && p.date <= endIso)
      .reduce((s, p) => s + (parseFloat(String(p.amount).replace(/[^\d.-]/g, '')) || 0), 0);
    out.push(spent);
  }
  return out;
}

// unified transaction feed: petty + bill payments + one-time income
function getRecentTransactions() {
  const out = [];

  for (const p of state.petty) {
    out.push({
      kind: 'petty',
      refType: 'petty',
      refId: p.id,
      name: p.note || '—',
      amount: parseFloat(String(p.amount).replace(/[^\d.-]/g, '')) || 0,
      category: p.category || 'other',
      date: p.date || p.createdAt,
      sign: 'out',
      canEdit: true,
    });
  }

  for (const p of (state.payments || [])) {
    out.push({
      kind: 'payment',
      refType: 'payments',
      refId: p.id,
      billId: p.billId,
      name: p.name || '—',
      amount: parseFloat(String(p.amount).replace(/[^\d.-]/g, '')) || 0,
      category: p.category || 'other',
      date: p.date || p.createdAt,
      recurring: p.recurring,
      sign: 'out',
      canEdit: false,
    });
  }

  for (const i of state.income) {
    const isOnce = i.frequency === 'once' || !i.frequency;
    if (!isOnce) continue; // recurring income is a source, not a discrete event
    out.push({
      kind: 'income',
      refType: 'income',
      refId: i.id,
      name: i.source || '—',
      amount: parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0,
      category: 'income',
      date: i.receivedAt || i.createdAt,
      sign: 'in',
      canEdit: true,
    });
  }

  return out.sort((a, b) => {
    const ad = a.date || '0000';
    const bd = b.date || '0000';
    return bd.localeCompare(ad);
  });
}

// ──── UI helpers (preview-matching HTML) ────────────────────
// kv row: <div class="kv"><span class="kv-l">L</span><span class="kv-d"></span><span class="kv-v">V</span></div>
function kv(label, value, valColor = '', cls = '') {
  return `<div class="kv ${cls}"><span class="kv-l">${label}</span><span class="kv-d"></span><span class="kv-v ${valColor}">${value}</span></div>`;
}
function kvSub(label, value, valColor = '') {
  return `<div class="kv sub"><span class="kv-l">${label}</span><span class="kv-d"></span><span class="kv-v ${valColor}">${value}</span></div>`;
}
// section header: <div class="msec">NAME <span class="meta-r">META</span> [+ ADD] [month-nav]</div>
function sec(name, opts = {}) {
  const meta = (opts.meta && opts.meta.length) ? `<span class="meta-r">${opts.meta}</span>` : '';
  const add = opts.add ? `<button class="add" data-action="${opts.add.action}"${opts.add.type ? ` data-type="${opts.add.type}"` : ''}>${opts.add.label}</button>` : '';
  const monthN = opts.monthNav ? opts.monthNav : '';
  return `<div class="msec">${name}${meta}${add}${monthN}</div>`;
}
// rows wrapper (gives the kv rows the gray summary block treatment)
function rowsWrap(content, opts = {}) {
  return `<div class="rows${opts.padB ? ' pad-b' : ''}">${content}</div>`;
}

function monthNav(year, month) {
  const isCurr = year === new Date().getFullYear() && month === new Date().getMonth();
  const lbl = new Date(year, month).toLocaleString('en-US',{month:'long'}).toUpperCase();
  return `<span class="month-nav">` +
    `<button class="nav-arrow" data-action="prev-month" aria-label="Previous month">‹</button>` +
    `<span class="label">${lbl}</span>` +
    `<button class="nav-arrow" data-action="next-month" aria-label="Next month">›</button>` +
    (!isCurr ? `<button class="today-btn" data-action="curr-month" aria-label="Current month">⌂</button>` : '') +
  `</span>`;
}

// vertical bar chart (income trend)
function renderBarChart(data) {
  if (!data || data.length === 0) return '';
  const filtered = data.filter(d => (d.value || 0) > 0);
  if (filtered.length === 0) {
    return `<div class="bchart"><div class="bchart-empty">NO INCOME RECORDED THIS YEAR YET</div></div>`;
  }
  const maxVal = Math.max(...filtered.map(d => d.value));
  const bars = filtered.map(d => {
    const h = maxVal > 0 ? Math.max(4, (d.value / maxVal) * 100) : 0;
    return `<div class="bar ${d.current ? 'cur' : ''}" style="height:${h}%"></div>`;
  }).join('');
  const labels = filtered.map(d => `<div>${d.label.toUpperCase()}</div>`).join('');
  const n = filtered.length;
  return `<div class="bchart">
    <div class="bars" style="grid-template-columns: repeat(${n}, 1fr);">${bars}</div>
    <div class="bars-foot" style="grid-template-columns: repeat(${n}, 1fr);">${labels}</div>
  </div>`;
}

// horizontal category bars (preview .cat structure)
function renderCategoryChart(catData, _incTot) {
  if (!catData || catData.length === 0) return '';
  const maxVal = Math.max(...catData.map(c => c.total));
  return catData.map(c => {
    const barPct = maxVal > 0 ? Math.max(2, (c.total / maxVal) * 100) : 0;
    return `<div class="cat">
      <div>${(c.label || '').toUpperCase()}</div>
      <div class="cat-bar"><div class="cat-fill" style="width:${barPct}%"></div></div>
      <div class="cat-v">${fmtMoney(c.total, {round:true})}</div>
    </div>`;
  }).join('');
}

// build a .li row in preview structure
// fields: { name, badges:[{cls,text}], metaParts:[text], amt, amtCls, acts:[{cls,action,id,type,label}] }
function liRow(fields, isLast = false) {
  const badges = (fields.badges || []).map(b => `<span class="bdg ${b.cls}">${b.text}</span>`).join('');
  const metaTexts = (fields.metaParts || []).filter(Boolean).map(t => `<span>${t}</span>`).join('<span class="dot">·</span>');
  const metaInner = badges + (badges && metaTexts ? '<span class="dot">·</span>' : '') + metaTexts;
  const acts = (fields.acts || []).map(a =>
    `<button class="${a.cls || ''}" data-action="${a.action}"${a.id ? ` data-id="${a.id}"` : ''}${a.type ? ` data-type="${a.type}"` : ''}>${a.label}</button>`
  ).join('');
  return `<div class="li${isLast ? ' last' : ''}${fields.dim ? ' dim' : ''}">
    <div class="li-info">
      <div class="li-n">${fields.name}</div>
      ${metaInner ? `<div class="li-meta">${metaInner}</div>` : ''}
    </div>
    <div class="li-r">
      ${fields.amt != null ? `<div class="li-v ${fields.amtCls || ''}">${fields.amt}</div>` : ''}
      ${acts ? `<div class="li-acts">${acts}</div>` : ''}
    </div>
  </div>`;
}

// ──── Render: overview ─────────────────────────────────────
function renderOverview() {
  const { year, month } = getViewMonth();
  const cur = getMonthlyStats(year, month);
  const monthKey = `${year}-${String(month+1).padStart(2,'0')}`;
  const pettySpent = state.petty.filter(p => p.date && p.date.startsWith(monthKey))
    .reduce((s, p) => s + (parseFloat(String(p.amount).replace(/[^\d.-]/g, '')) || 0), 0);
  const net = cur.income - cur.bills - pettySpent;
  const savingsPct = cur.income > 0 ? Math.max(0, (cur.income - cur.bills - pettySpent) / cur.income * 100) : 0;

  const yearHistory = getCalendarYearHistory();
  const avgMonthly = getIncomeStats().avgMonthly;
  const catData = aggregateBillsByCategory(state.bills, year, month);

  const upcIso = isoDate(new Date(Date.now() + 14 * 86400000));
  const upcoming = state.bills.filter(b => b.dueDate && b.dueDate <= upcIso && !b.paid)
    .sort((a,b) => a.dueDate.localeCompare(b.dueDate));

  const openTasks = state.tasks.filter(t => !t.done).sort((a,b) => {
    const ad = a.dueDate || '9999'; const bd = b.dueDate || '9999';
    return ad.localeCompare(bd);
  });

  const summary = rowsWrap(`
    ${kv('Income', fmtMoney(cur.income, {round:true}))}
    ${kv('Expenses', fmtMoney(cur.bills, {round:true}))}
    ${kv('Savings', `${savingsPct.toFixed(0)}%`)}
    ${kv('Net', fmtMoney(net, {sign:true, round:true}), '', net >= 0 ? 'big ok' : 'big')}
    ${pettySpent > 0 ? kvSub('petty spent this month', fmtMoney(pettySpent, {round:true}), 'warn') : ''}
  `, { padB: true });

  const incomeTrendHTML = state.income.length > 0
    ? `${sec('Income Trend', { meta: String(new Date().getFullYear()) })}${renderBarChart(yearHistory.map(h => ({ label: h.label, value: h.income, current: h.current })))}`
    : '';

  const catChartHTML = (catData.length && cur.bills > 0)
    ? `${sec('Expenses By Category', { meta: '% OF MAX' })}<div class="rows pad-b">${renderCategoryChart(catData, avgMonthly)}</div>`
    : '';

  let upcomingHTML = '';
  if (upcoming.length) {
    const items = upcoming.slice(0, 6);
    upcomingHTML = items.map((b, i, arr) => {
      const overdue = isOverdue(b.dueDate); const today = isTodayDate(b.dueDate);
      const isLast = i === arr.length - 1 && upcoming.length <= 6;
      const dateLabel = formatDate(b.dueDate).toUpperCase();
      const badges = [];
      if (overdue) badges.push({ cls: 'b-red', text: 'OVERDUE · ' + dateLabel });
      else if (today) badges.push({ cls: 'b-blk', text: 'DUE TODAY' });
      else badges.push({ cls: 'b-out', text: dateLabel });
      return liRow({
        name: escHTML(b.name),
        badges,
        metaParts: [(CATEGORIES[b.category]||CATEGORIES.other).label.toUpperCase()],
        amt: fmtMoney(b.amount, {round:true}),
        acts: [{ cls: 'ok', action: 'pay-bill', id: b.id, label: 'PAY' }],
      }, isLast);
    }).join('');
    if (upcoming.length > 6) upcomingHTML += `<div class="note">+ ${upcoming.length - 6} MORE · <span class="lnk" data-action="goto" data-tab="expenses">VIEW ALL</span></div>`;
  } else {
    upcomingHTML = `<div class="empty">NO UPCOMING BILLS</div>`;
  }

  let tasksHTML = '';
  if (openTasks.length) {
    const items = openTasks.slice(0, 5);
    tasksHTML = items.map((t, i, arr) => {
      const overdue = t.dueDate && isOverdue(t.dueDate);
      const today = t.dueDate && isTodayDate(t.dueDate);
      const pri = t.priority || '';
      const priCls = pri === 'high' ? 'b-red' : pri === 'med' ? 'b-blk' : 'b-out';
      const isLast = i === arr.length - 1 && openTasks.length <= 5;
      const badges = [];
      if (pri) badges.push({ cls: priCls, text: pri.toUpperCase() });
      if (t.dueDate) {
        const dt = formatDate(t.dueDate).toUpperCase();
        if (overdue) badges.push({ cls: 'b-red', text: 'OVERDUE' });
        else if (today) badges.push({ cls: 'b-blk', text: 'TODAY' });
        else badges.push({ cls: 'b-out', text: dt });
      }
      return liRow({
        name: escHTML(t.text),
        badges,
        acts: [{ cls: 'ok', action: 'toggle-task', id: t.id, label: 'DONE' }],
      }, isLast);
    }).join('');
    if (openTasks.length > 5) tasksHTML += `<div class="note">+ ${openTasks.length - 5} MORE · <span class="lnk" data-action="goto" data-tab="tasks">VIEW ALL</span></div>`;
  } else {
    tasksHTML = `<div class="empty">NO OPEN TASKS · <span class="lnk" data-action="open-modal" data-type="tasks">ADD ONE</span></div>`;
  }

  return `
    ${sec('Summary', { monthNav: monthNav(year, month) })}
    ${summary}
    ${incomeTrendHTML}
    ${catChartHTML}
    ${sec('Upcoming Bills', { meta: '14 DAYS' })}
    ${upcomingHTML}
    ${sec('Task Queue', { meta: openTasks.length + ' OPEN' })}
    ${tasksHTML}
  `;
}

// ──── Render: income ───────────────────────────────────────
function renderIncome() {
  const stats = getIncomeStats();
  const taxPct = getTaxPct();
  const taxSetaside = stats.ytdTips * taxPct / 100;
  const sources = state.income.slice().sort((a,b) => monthlyEq(b.amount, b.frequency) - monthlyEq(a.amount, a.frequency));
  const yearHistory = getCalendarYearHistory();

  const summary = rowsWrap(`
    ${kv('YTD Income', fmtMoney(stats.ytdIncome, {round:true}))}
    ${stats.ytdTips > 0 ? kv('YTD Tips', fmtMoney(stats.ytdTips, {round:true})) : ''}
    ${kv('YTD Hours', fmtHM(stats.ytdHours))}
    ${kv('Avg Hourly', '$' + stats.ytdHourly.toFixed(2))}
    ${kv('Avg Monthly', fmtMoney(stats.avgMonthly, {round:true}), '', 'yel')}
  `, { padB: true });

  const taxSection = stats.ytdTips > 0 ? `
    ${sec('Tax Setaside', { meta: 'ESTIMATED' })}
    ${rowsWrap(kv('Owed (' + taxPct + '% of cash tips)', fmtMoney(taxSetaside, {round:true}), 'warn'), { padB: false })}
    <div class="note">SET ASIDE <input type="number" class="tax-pct-input" id="tax-pct-input" value="${taxPct}" min="0" max="100" step="1" />% OF CASH TIP INCOME FOR TAXES</div>
  ` : '';

  let sourcesHTML = '';
  if (sources.length === 0) {
    sourcesHTML = `<div class="empty">NO INCOME TRACKED · <span class="lnk" data-action="open-modal" data-type="income">ADD INCOME</span></div>`;
  } else {
    sourcesHTML = sources.map((i, idx) => {
      const amt = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
      const base = i.baseAmount !== undefined ? i.baseAmount : amt;
      const hrs = Number(i.hours) || 0;
      const monthly = i.frequency === 'once' ? amt : monthlyEq(amt, i.frequency);
      const isLast = idx === sources.length - 1;
      const badges = [];
      if (i.tipsEnabled && amt > base) badges.push({ cls: 'b-yel', text: '+TIPS' });
      const metaParts = [(i.frequency || 'once').toUpperCase()];
      if (hrs > 0) metaParts.push(fmtHM(hrs).toUpperCase());
      if (i.frequency !== 'once') metaParts.push(fmtMoney(monthly,{round:true}) + '/MO');
      return liRow({
        name: escHTML(i.source),
        badges,
        metaParts,
        amt: fmtMoney(amt, {round:true}),
        acts: [
          { action: 'edit', type: 'income', id: i.id, label: 'EDIT' },
          { cls: 'err', action: 'rm', type: 'income', id: i.id, label: 'RM' },
        ],
      }, isLast);
    }).join('');
  }

  return `
    ${sec('YTD Stats', { meta: String(new Date().getFullYear()) })}
    ${summary}
    ${sec('Income Trend', { meta: '6 MONTHS' })}
    ${renderBarChart(yearHistory.map(h => ({ label: h.label, value: h.income, current: h.current })))}
    ${taxSection}
    ${sec('Sources', { meta: sources.length + ' SOURCES', add: { action: 'open-modal', type: 'income', label: '+ ADD' } })}
    ${sourcesHTML}
  `;
}

// ──── Render: expenses ─────────────────────────────────────
function renderExpenses() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const cur = getMonthlyStats(year, month);
  const total = cur.bills;
  const incTot = getIncomeStats().avgMonthly;
  const catData = aggregateBillsByCategory(state.bills, year, month);
  const paidCount = state.bills.filter(b => b.paid).length;
  const unpaidCount = state.bills.filter(b => !b.paid).length;

  const recurring = state.bills.filter(b => b.recurring && b.recurring !== 'once').map(b => {
    const amt = parseFloat(String(b.amount).replace(/[^\d.-]/g, '')) || 0;
    const annual = b.recurring === 'weekly' ? amt * 52 : b.recurring === 'biweekly' ? amt * 26 : b.recurring === 'monthly' ? amt * 12 : amt;
    return { ...b, _annual: annual };
  });
  const totalAnnual = recurring.reduce((s, b) => s + b._annual, 0);

  const billsSorted = state.bills.slice().sort((a, b) => {
    if (a.paid !== b.paid) return a.paid ? 1 : -1;
    const ad = a.dueDate || '9999'; const bd = b.dueDate || '9999';
    return ad.localeCompare(bd);
  });

  const pctOfIncome = incTot > 0 ? (total / incTot) * 100 : 0;
  const summary = rowsWrap(`
    ${kv('Monthly Total', fmtMoney(total, {round:true}))}
    ${kv('% Of Income', incTot > 0 ? pctOfIncome.toFixed(0)+'%' : '—', pctOfIncome > 60 ? 'warn' : '')}
    ${kv('Annual Total', fmtMoney(totalAnnual, {round:true}))}
    ${kv('Paid / Total', `${paidCount} / ${paidCount+unpaidCount}`)}
  `, { padB: true });

  const catBreakdown = (catData.length && total > 0)
    ? `${sec('By Category', { meta: '% OF MAX' })}<div class="rows pad-b">${renderCategoryChart(catData, incTot)}</div>`
    : '';

  let billsHTML = '';
  if (state.bills.length === 0) {
    if (incTot > 0) {
      billsHTML = `<div class="empty"><span class="lnk" data-action="open-presets">ADD PRESETS</span> · <span class="lnk" data-action="open-modal" data-type="expenses">ADD MANUALLY</span></div>`;
    } else {
      billsHTML = `<div class="empty">ADD INCOME FIRST</div>`;
    }
  } else {
    billsHTML = billsSorted.map((b, i, arr) => {
      const isPaid = !!b.paid;
      const overdue = b.dueDate && !b.paid && isOverdue(b.dueDate);
      const today = b.dueDate && !b.paid && isTodayDate(b.dueDate);
      const isLast = i === arr.length - 1;
      const cat = (CATEGORIES[b.category] || CATEGORIES.other);
      const dateLabel = b.dueDate ? formatDate(b.dueDate).toUpperCase() : '';
      const badges = [];
      if (isPaid) badges.push({ cls: 'b-blk', text: 'PAID' });
      else if (overdue) badges.push({ cls: 'b-red', text: 'OVERDUE · ' + dateLabel });
      else if (today) badges.push({ cls: 'b-blk', text: 'DUE TODAY' });
      else if (b.dueDate) badges.push({ cls: 'b-out', text: dateLabel });
      const metaParts = [(b.recurring || 'once').toUpperCase(), cat.label.toUpperCase()];
      return liRow({
        name: escHTML(b.name),
        badges,
        metaParts,
        amt: fmtMoney(b.amount, {round:true}),
        amtCls: isPaid ? 'paid' : '',
        dim: isPaid,
        acts: [
          isPaid
            ? { action: 'unpay-bill', id: b.id, label: 'UNDO' }
            : { cls: 'ok', action: 'pay-bill', id: b.id, label: 'PAY' },
          { action: 'edit', type: 'expenses', id: b.id, label: 'EDIT' },
          { cls: 'err', action: 'rm', type: 'expenses', id: b.id, label: 'RM' },
        ],
      }, isLast);
    }).join('');
  }

  return `
    ${sec('Summary', { meta: 'FIXED · MONTHLY' })}
    ${summary}
    ${catBreakdown}
    ${sec('Bills', { meta: state.bills.length + ' BILLS', add: { action: 'open-modal', type: 'expenses', label: '+ ADD' } })}
    ${billsHTML}
  `;
}

// ──── Render: budget ───────────────────────────────────────
function renderBudget() {
  let { year, month } = getViewMonth();
  let cur = getMonthlyStats(year, month);
  let inc = cur.income; let fixed = cur.bills;
  let basisLabel = null;
  if (inc === 0) {
    const ref = getReferenceMonth();
    if (ref) { year = ref.year; month = ref.month; inc = ref.income; fixed = ref.bills; basisLabel = ref.label; }
    else { const s = getIncomeStats(); if (s.avgMonthly > 0) { inc = s.avgMonthly; basisLabel = 'avg'; } }
  }

  if (inc === 0) {
    return `
      ${sec('Budget')}
      <div class="empty">NO INCOME DATA · <span class="lnk" data-action="open-modal" data-type="income">ADD INCOME</span></div>
    `;
  }

  const savingsInfo = getSavingsTarget();
  const savings = savingsInfo.total;
  state.goals.forEach(g => {
    const rem = Math.max(0, (parseFloat(g.targetAmount) || 0) - (parseFloat(g.currentAmount) || 0));
    if (rem > 0 && g.targetDate) {
      const td = new Date(g.targetDate + 'T00:00:00');
      if (td > todayStart()) g._reqMo = rem / Math.max(1, (td - todayStart()) / (30.44 * 86400000));
      else g._reqMo = 0;
    } else g._reqMo = 0;
  });

  const monthlyAllowance = Math.max(0, inc - fixed - savings);
  const weeklyAllowance = monthlyAllowance / 4.333;
  const dailyAllowance = monthlyAllowance / 30;
  const weekEntries = getPettyThisWeek();
  const weekSpent = weekEntries.reduce((s, e) => s + (parseFloat(String(e.amount).replace(/[^\d.-]/g, '')) || 0), 0);
  const weekPct = weeklyAllowance > 0 ? (weekSpent / weeklyAllowance) * 100 : 0;
  const sevenDayCutoff = isoDate(new Date(todayStart().getTime() - 6 * 86400000));
  const txns = getRecentTransactions().filter(t => t.date && t.date >= sevenDayCutoff);

  const allocation = rowsWrap(`
    ${kv('Income', fmtMoney(inc, {round:true}))}
    ${kv('− Fixed Bills', fmtMoney(fixed, {round:true}))}
    ${savings > 0 ? kv('− Savings Goals', fmtMoney(savings, {round:true})) : ''}
    ${kv('= Available', fmtMoney(monthlyAllowance, {round:true}), '', 'yel')}
  `, { padB: true });

  const discretionary = rowsWrap(`
    ${kv('Weekly Allowance', fmtMoney(weeklyAllowance, {round:true}))}
    ${kv('Daily Allowance', fmtMoney(dailyAllowance, {round:true}))}
    ${kv('This Week Spent', `${fmtMoney(weekSpent, {round:true})} (${weekPct.toFixed(0)}%)`, weekPct >= 100 ? 'bad' : weekPct >= 75 ? 'warn' : '')}
  `, { padB: true });

  let txnHTML = '';
  if (txns.length === 0) {
    txnHTML = `<div class="empty">NONE IN THE LAST 7 DAYS · <span class="lnk" data-action="open-modal" data-type="petty">LOG ONE</span></div>`;
  } else {
    txnHTML = txns.map((t, i, arr) => {
      const isLast = i === arr.length - 1;
      const cat = t.kind === 'income'
        ? { label: 'income' }
        : (CATEGORIES[t.category] || CATEGORIES.other);
      const isInc = t.sign === 'in';
      const amtCls = isInc ? 'in' : '';
      const sign = isInc ? '+' : '−';
      const badge = t.kind === 'payment'
        ? { cls: 'b-blk', text: 'BILL' + (t.recurring && t.recurring !== 'once' ? ' · ' + t.recurring.toUpperCase() : '') }
        : t.kind === 'income'
          ? { cls: 'b-yel', text: 'IN' }
          : { cls: 'b-out', text: 'PETTY' };
      const dateLabel = t.date ? formatDate(t.date).toUpperCase() : '—';
      return liRow({
        name: escHTML(t.name),
        badges: [badge],
        metaParts: [cat.label.toUpperCase(), dateLabel],
        amt: sign + fmtMoney(t.amount, {round:true}).replace('−', '').replace('+', ''),
        amtCls: amtCls,
        acts: [
          ...(t.canEdit ? [{ action: 'edit', type: t.refType, id: t.refId, label: 'EDIT' }] : []),
          { cls: 'err', action: 'rm', type: t.refType, id: t.refId, label: 'RM' },
        ],
      }, isLast);
    }).join('');
  }

  let goalsHTML = '';
  if (state.goals.length === 0) {
    goalsHTML = `<div class="empty">NO GOALS SET · <span class="lnk" data-action="open-modal" data-type="goals">ADD ONE</span></div>`;
  } else {
    goalsHTML = state.goals.map((g, i, arr) => {
      const target = parseFloat(g.targetAmount) || 0;
      const saved = parseFloat(g.currentAmount) || 0;
      const p = target > 0 ? Math.min(100, (saved / target) * 100) : 0;
      const isLast = i === arr.length - 1;
      const dateStr = g.targetDate ? ' · BY ' + formatDate(g.targetDate).toUpperCase() : '';
      const reqStr = g._reqMo > 0 ? ` · <span class="req">${fmtMoney(g._reqMo, {round:true})}/MO NEEDED</span>` : '';
      return `<div class="goal${isLast ? ' last' : ''}">
        <div class="goal-h"><span>${escHTML(g.name).toUpperCase()}</span><span>${p.toFixed(0)}%</span></div>
        <div class="goal-bar"><div class="goal-fill" style="width:${p}%"></div></div>
        <div class="goal-meta">${fmtMoney(saved, {round:true})} / ${fmtMoney(target, {round:true})}${dateStr}${reqStr}</div>
        <div class="goal-acts">
          <button class="ok" data-action="goal-add" data-id="${g.id}">+ FUND</button>
          <button data-action="edit" data-type="goals" data-id="${g.id}">EDIT</button>
          <button class="err" data-action="rm" data-type="goals" data-id="${g.id}">RM</button>
        </div>
      </div>`;
    }).join('');
  }

  return `
    ${sec('Budget', { meta: basisLabel ? 'BASIS: ' + basisLabel.toUpperCase() : '', monthNav: monthNav(year, month) })}
    ${allocation}
    ${sec('Discretionary')}
    ${discretionary}
    ${sec('Transactions', { meta: 'LAST 7 DAYS · ' + txns.length, add: { action: 'open-modal', type: 'petty', label: '+ LOG' } })}
    ${txnHTML}
    ${sec('Savings Goals', { meta: state.goals.length + ' GOALS', add: { action: 'open-modal', type: 'goals', label: '+ ADD' } })}
    ${goalsHTML}
  `;
}

// ──── Render: tasks ────────────────────────────────────────
function renderTasks() {
  const total = state.tasks.length;
  const open = state.tasks.filter(t => !t.done);
  const done = state.tasks.filter(t => t.done);
  const overdue = state.tasks.filter(t => !t.done && isOverdue(t.dueDate));
  const todayCnt = state.tasks.filter(t => !t.done && isTodayDate(t.dueDate));
  const completionPct = total > 0 ? (done.length / total) * 100 : 0;

  const sorted = state.tasks.slice().sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    const ad = a.dueDate || '9999'; const bd = b.dueDate || '9999';
    return ad.localeCompare(bd);
  });

  const summary = rowsWrap(`
    ${kv('Open', String(open.length))}
    ${overdue.length > 0 ? kv('Overdue', String(overdue.length), 'bad') : ''}
    ${todayCnt.length > 0 ? kv('Due Today', String(todayCnt.length), 'warn') : ''}
    ${kv('Completion', `${done.length} / ${total} (${completionPct.toFixed(0)}%)`)}
  `, { padB: true });

  let listHTML = '';
  if (sorted.length === 0) {
    listHTML = `<div class="empty">NO TASKS · <span class="lnk" data-action="open-modal" data-type="tasks">ADD ONE</span></div>`;
  } else {
    listHTML = sorted.map((t, i, arr) => {
      const isOver = !t.done && isOverdue(t.dueDate);
      const isToday = !t.done && isTodayDate(t.dueDate);
      const pri = t.priority || '';
      const priCls = pri === 'high' ? 'b-red' : pri === 'med' ? 'b-blk' : 'b-out';
      const isLast = i === arr.length - 1;
      const dateLabel = t.dueDate ? formatDate(t.dueDate).toUpperCase() : '';
      const badges = [];
      if (pri) badges.push(`<span class="bdg ${priCls}">${pri.toUpperCase()}</span>`);
      if (t.dueDate) {
        if (isOver) badges.push(`<span class="bdg b-red">OVERDUE · ${dateLabel}</span>`);
        else if (isToday) badges.push(`<span class="bdg b-blk">TODAY</span>`);
        else badges.push(`<span>${dateLabel}</span>`);
      }
      if (t.done) badges.push(`<span>DONE</span>`);
      return `<div class="task${isLast ? ' last' : ''}${t.done ? ' done' : ''}">
        <span class="task-cb ${t.done ? 'done' : ''}" data-action="toggle-task" data-id="${t.id}"></span>
        <div class="task-info">
          <div class="task-n">${escHTML(t.text)}</div>
          ${badges.length ? `<div class="task-meta">${badges.join('')}</div>` : ''}
        </div>
        <div class="task-acts">
          <button data-action="edit" data-type="tasks" data-id="${t.id}">EDIT</button>
          <button class="err" data-action="rm" data-type="tasks" data-id="${t.id}">RM</button>
        </div>
      </div>`;
    }).join('');
  }

  return `
    ${sec('Summary')}
    ${summary}
    ${sec('All Tasks', { meta: total + ' TOTAL', add: { action: 'open-modal', type: 'tasks', label: '+ ADD' } })}
    ${listHTML}
  `;
}

// ──── Master render ──────────────────────────────────────────
function updateBadges() {
  const e = state.bills.filter(b => !b.paid).length;
  const t = state.tasks.filter(t => !t.done).length;
  const set = (cls, v) => document.querySelectorAll(cls).forEach(el => {
    el.textContent = v; el.style.display = v > 0 ? 'inline-block' : 'none';
  });
  set('.badge-e', e); set('.badge-t', t);
}

function updateHeader() {
  const titleEl = document.getElementById('mtitle');
  const metaEl = document.getElementById('mmeta');
  if (!titleEl || !metaEl) return;
  const v = getViewMonth();
  const monthTag = new Date(v.year, v.month).toLocaleString('en-US',{month:'short'}).toUpperCase() + " '" + String(v.year).slice(-2);
  let title = 'LEDGEON';
  let meta = monthTag;
  if (currentTab === 'income') { title = 'INCOME'; meta = 'YTD'; }
  else if (currentTab === 'expenses') { title = 'BILLS'; }
  else if (currentTab === 'budget') { title = 'BUDGET'; }
  else if (currentTab === 'tasks') {
    title = 'TASKS';
    const open = state.tasks.filter(t => !t.done).length;
    meta = open + ' OPEN';
  }
  titleEl.textContent = title;
  metaEl.textContent = meta;
}

function render() {
  updateBadges();
  updateHeader();
  document.querySelectorAll('nav.mnav button').forEach(b => b.classList.toggle('active', b.dataset.tab === currentTab));
  const main = document.getElementById('content');
  if (currentTab === 'overview') main.innerHTML = renderOverview();
  else if (currentTab === 'income') main.innerHTML = renderIncome();
  else if (currentTab === 'expenses') main.innerHTML = renderExpenses();
  else if (currentTab === 'budget') main.innerHTML = renderBudget();
  else if (currentTab === 'tasks') main.innerHTML = renderTasks();
  window.scrollTo({ top: 0, behavior: 'instant' });
}

// ──── Event handlers ─────────────────────────────────────────
document.addEventListener('click', e => {
  // close header menu when clicking outside it (and outside its toggle)
  const _menu = document.getElementById('header-menu');
  if (_menu && !_menu.hidden) {
    if (!e.target.closest('#header-menu') && !e.target.closest('[data-action="toggle-menu"]')) {
      _menu.hidden = true;
    }
  }

  const tab = e.target.closest('nav.mnav button[data-tab]');
  if (tab) { currentTab = tab.dataset.tab; localStorage.setItem(TAB_KEY, currentTab); render(); return; }

  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const act = btn.dataset.action;

  if (act === 'toggle-menu') { if (_menu) _menu.hidden = !_menu.hidden; return; }
  if (_menu && (act === 'import' || act === 'export' || act === 'reset')) _menu.hidden = true;

  if (act === 'goto') { currentTab = btn.dataset.tab; localStorage.setItem(TAB_KEY, currentTab); render(); }
  else if (act === 'open-modal') { openModal(btn.dataset.type); if (btn.dataset.type === 'petty') document.getElementById('petty-date-input').value = isoDate(todayStart()); }
  else if (act === 'close-modal') document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
  else if (act === 'rm') {
    if (confirm('Delete?')) {
      const t = btn.dataset.type === 'expenses' ? 'bills' : btn.dataset.type;
      if (t === 'payments') {
        // undo the bill payment when removing a payment log entry
        const pay = state.payments.find(x => x.id === btn.dataset.id);
        if (pay) {
          const bill = state.bills.find(b => b.id === pay.billId);
          if (bill) {
            if (bill.recurring && bill.recurring !== 'once' && bill.dueDate) {
              const d = new Date(bill.dueDate + 'T00:00:00');
              if (bill.recurring === 'monthly') d.setMonth(d.getMonth() - 1);
              else if (bill.recurring === 'weekly') d.setDate(d.getDate() - 7);
              else if (bill.recurring === 'yearly') d.setFullYear(d.getFullYear() - 1);
              bill.dueDate = isoDate(d);
            } else {
              bill.paid = false;
            }
          }
        }
      } else if (t === 'bills') {
        // clean up orphan payment logs for the deleted bill
        state.payments = state.payments.filter(p => p.billId !== btn.dataset.id);
      }
      state[t] = state[t].filter(x => x.id !== btn.dataset.id);
      saveState(); render();
    }
  }
  else if (act === 'edit') openModal(btn.dataset.type, btn.dataset.id);
  else if (act === 'pay-bill') {
    const b = state.bills.find(x => x.id === btn.dataset.id);
    if (b) {
      // log the payment to the transaction history
      state.payments.push({
        id: nextId('payments'),
        billId: b.id,
        name: b.name,
        amount: parseFloat(String(b.amount).replace(/[^\d.-]/g, '')) || 0,
        category: b.category,
        recurring: b.recurring,
        date: isoDate(todayStart()),
        createdAt: isoDate(todayStart()),
      });
      if (b.recurring && b.recurring !== 'once' && b.dueDate) {
        const d = new Date(b.dueDate);
        if (b.recurring === 'monthly') d.setMonth(d.getMonth()+1);
        else if (b.recurring === 'weekly') d.setDate(d.getDate()+7);
        else if (b.recurring === 'yearly') d.setFullYear(d.getFullYear()+1);
        b.dueDate = isoDate(d);
      } else b.paid = true;
      saveState(); render();
    }
  }
  else if (act === 'unpay-bill') {
    const b = state.bills.find(x => x.id === btn.dataset.id);
    if (b) {
      b.paid = false;
      // also remove the most recent payment log for this bill
      let mostRecentIdx = -1;
      let mostRecentKey = '';
      state.payments.forEach((p, i) => {
        if (p.billId !== b.id) return;
        const key = (p.date || p.createdAt || '');
        if (key >= mostRecentKey) { mostRecentIdx = i; mostRecentKey = key; }
      });
      if (mostRecentIdx >= 0) state.payments.splice(mostRecentIdx, 1);
      saveState(); render();
    }
  }
  else if (act === 'toggle-task') { const t = state.tasks.find(x => x.id === btn.dataset.id); if (t) { t.done = !t.done; saveState(); render(); } }
  else if (act === 'goal-add') {
    const g = state.goals.find(x => x.id === btn.dataset.id);
    if (g) { const a = parseFloat(prompt(`Fund "${g.name}":`)); if (a > 0) { g.currentAmount = (parseFloat(g.currentAmount) || 0) + a; saveState(); render(); } }
  }
  else if (act === 'prev-month') { const v = getViewMonth(); viewMonth = { year: v.month === 0 ? v.year - 1 : v.year, month: v.month === 0 ? 11 : v.month - 1 }; render(); }
  else if (act === 'next-month') { const v = getViewMonth(); viewMonth = { year: v.month === 11 ? v.year + 1 : v.year, month: v.month === 11 ? 0 : v.month + 1 }; render(); }
  else if (act === 'curr-month') { viewMonth = null; render(); }
  else if (act === 'open-presets') openPresetPicker();
  else if (act === 'export') {
    const b = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const u = URL.createObjectURL(b); const a = document.createElement('a');
    a.href = u; a.download = 'ledgeon.json'; a.click(); URL.revokeObjectURL(u);
  }
  else if (act === 'import') document.getElementById('file-import').click();
  else if (act === 'reset') { if (confirm('Wipe all data?')) { state = { tasks:[], bills:[], events:[], income:[], goals:[], petty:[], payments:[] }; saveState(); render(); } }
});

document.getElementById('file-import').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const imp = JSON.parse(ev.target.result);
      if (confirm('Import data? Replaces current.')) {
        state = {
          tasks: imp.tasks||[], bills: imp.bills||[], events: imp.events||[],
          income: imp.income||[], goals: imp.goals||[], petty: imp.petty||[],
          payments: imp.payments||[]
        };
        saveState(); render();
      }
    } catch { alert('Error importing.'); }
  };
  r.readAsText(f); e.target.value = '';
});

document.addEventListener('change', e => {
  if (e.target.id === 'tipsEnabled') {
    const g = document.getElementById('tipsInputGroup');
    if (e.target.checked) { g.style.display = 'flex'; setTimeout(() => g.style.opacity = '1', 10); }
    else { g.style.opacity = '0'; setTimeout(() => g.style.display = 'none', 200); }
  }
  else if (e.target.id === 'tax-pct-input') {
    const v = parseFloat(e.target.value);
    if (!isNaN(v) && v >= 0 && v <= 100) { setTaxPct(v); render(); }
  }
});

function openModal(type, id = null) {
  document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
  const f = document.querySelector(`#modal-${type} form`);
  if (!f) return;
  f.reset();
  editingItem = id ? { type, id } : null;
  const tArr = type === 'expenses' ? state.bills : state[type];
  if (id) {
    const item = tArr.find(x => x.id === id);
    if (item) {
      Object.keys(item).forEach(k => { if (f.elements[k]) f.elements[k].value = item[k]; });
      if (type === 'income') {
        f.elements['amount'].value = item.baseAmount !== undefined ? item.baseAmount : item.amount;
        if (item.hours != null && !isNaN(item.hours) && item.hours > 0) {
          const totalMin = Math.round(Number(item.hours) * 60);
          const h = Math.floor(totalMin / 60); const m = totalMin % 60;
          f.elements['hours'].value = h ? h : '';
          f.elements['minutes'].value = m ? m : '';
        } else { f.elements['hours'].value = ''; f.elements['minutes'].value = ''; }
        f.elements['tipsEnabled'].checked = !!item.tipsEnabled;
        f.elements['tipsValue'].value = item.tipsValue || 6;
        f.elements['tipsType'].value = item.tipsType || 'percent';
        f.elements['tipsEnabled'].dispatchEvent(new Event('change', { bubbles: true }));
      }
    }
  }
  document.getElementById('modal-' + type).classList.add('open');
  setTimeout(() => f.querySelector('input')?.focus(), 50);
}

document.querySelectorAll('form[data-type]').forEach(f => {
  f.addEventListener('submit', e => {
    e.preventDefault();
    const fd = new FormData(f); const type = f.dataset.type;
    const isEdit = editingItem && editingItem.type === type;
    const tArr = type === 'expenses' ? state.bills : state[type];
    const item = isEdit ? tArr.find(x => x.id === editingItem.id) : { id: nextId(type === 'expenses' ? 'bills' : type), createdAt: isoDate(todayStart()) };
    const pAmt = v => { const n = parseFloat(String(v).replace(/[$,\s]/g, '')); return isNaN(n) ? 0 : n; };

    if (type === 'income') {
      item.source = fd.get('source');
      const base = pAmt(fd.get('amount'));
      item.baseAmount = base;
      const hVal = parseFloat(fd.get('hours')) || 0; const mVal = parseFloat(fd.get('minutes')) || 0;
      const totalHours = hVal + mVal / 60;
      item.hours = totalHours > 0 ? totalHours : null;
      item.tipsEnabled = f.elements['tipsEnabled'].checked;
      item.tipsType = f.elements['tipsType'].value;
      let final = base;
      if (item.tipsEnabled) {
        let tv = pAmt(f.elements['tipsValue'].value);
        if (tv === 0) tv = 6;
        item.tipsValue = tv;
        final += item.tipsType === 'percent' ? base * (tv / 100) : tv;
      } else item.tipsValue = 0;
      item.amount = final;
      item.frequency = fd.get('frequency') || 'monthly';
      item.receivedAt = fd.get('receivedAt') || null;
    } else if (type === 'expenses') {
      item.name = fd.get('name'); item.amount = pAmt(fd.get('amount'));
      item.category = fd.get('category'); item.recurring = fd.get('recurring') || 'monthly';
      item.dueDate = fd.get('date') || null; if (!isEdit) item.paid = false;
    } else if (type === 'tasks') {
      item.text = fd.get('text'); item.priority = fd.get('priority');
      item.dueDate = fd.get('date') || null; if (!isEdit) item.done = false;
    } else if (type === 'goals') {
      item.name = fd.get('name'); item.targetAmount = pAmt(fd.get('targetAmount'));
      item.currentAmount = pAmt(fd.get('currentAmount')); item.targetDate = fd.get('targetDate') || null;
    } else if (type === 'petty') {
      item.amount = pAmt(fd.get('amount')); item.category = fd.get('category');
      item.note = fd.get('note'); item.date = fd.get('date');
    }

    if (!isEdit) tArr.push(item);

    if (!isEdit && type === 'income' && state.bills.length === 0) {
      if (confirm('Add starter budget based on this income?')) {
        const iMo = monthlyEq(item.amount, item.frequency);
        PRESET_BILLS.forEach(p => state.bills.push({
          id: nextId('bills'), name: p.name, amount: Math.round(iMo*(p.pct/100)),
          category: p.category, recurring: p.recurring, paid: false,
          createdAt: isoDate(todayStart())
        }));
        currentTab = 'expenses'; localStorage.setItem(TAB_KEY, currentTab);
      }
    }

    saveState();
    document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
    render();
  });
});

let presetSel = new Set();
function openPresetPicker() {
  presetSel.clear();
  const { year, month } = getViewMonth();
  const { income: inc } = getMonthlyStats(year, month);
  const list = document.getElementById('preset-list');
  if (inc === 0) list.innerHTML = `<div class="empty">add income first</div>`;
  else {
    const ex = new Set(state.bills.map(b => b.name.toLowerCase()));
    list.innerHTML = PRESET_BILLS.map((p, i) => `<div class="preset-row ${ex.has(p.name.toLowerCase())?'exists':''}" data-idx="${i}"><div class="box"></div><div class="nm">${p.name}</div><div class="pct">${fmtMoney(inc*(p.pct/100),{round:true})} · ${p.pct}%</div></div>`).join('');
    list.querySelectorAll('.preset-row:not(.exists)').forEach(r => r.addEventListener('click', () => {
      const i = parseInt(r.dataset.idx);
      if (presetSel.has(i)) { presetSel.delete(i); r.classList.remove('sel'); }
      else { presetSel.add(i); r.classList.add('sel'); }
      document.getElementById('preset-apply-btn').disabled = presetSel.size === 0;
    }));
  }
  document.getElementById('modal-presets').classList.add('open');
}

document.getElementById('preset-apply-btn').addEventListener('click', () => {
  const { year, month } = getViewMonth();
  const { income: inc } = getMonthlyStats(year, month);
  presetSel.forEach(idx => {
    const p = PRESET_BILLS[idx];
    state.bills.push({
      id: nextId('bills'), name: p.name, amount: Math.round(inc*(p.pct/100)),
      category: p.category, recurring: p.recurring, paid: false,
      createdAt: isoDate(todayStart())
    });
  });
  saveState();
  document.getElementById('modal-presets').classList.remove('open');
  render();
});

render();
</script>
</body>
</html>
