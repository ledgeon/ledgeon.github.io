<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0f">
<title>ledgeon · cli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── CLI dot-leader palette ───────────────────────────── */
:root {
  --bg: #0f0f0f; --bg-soft: #161616; --bg-deep: #0a0a0a; --bg-input: #1a1a1a;
  --line: #1e1e1e; --line-soft: #161616; --line-strong: #2a2a2a;
  --t: #c0c0c0; --t-bright: #ffffff; --t-dim: #a0a0a0; --t-faint: #6a6a6a; --t-mute: #4a4a4a;
  --warm: #d4a574; --lime: #a5d645; --lime-soft: rgba(165,214,69,0.13);
  --ok: #6cd06c; --bad: #e88060; --warn: #e3b341; --err: #f0604c; --cyan: #6dd0d0;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg); color: var(--t);
  font-family: 'JetBrains Mono', ui-monospace, monospace;
  font-size: 13px; line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100%;
}
body {
  display: flex; flex-direction: column;
  min-height: 100vh; min-height: 100dvh;
  padding-bottom: calc(46px + env(safe-area-inset-bottom));
}
button { cursor: pointer; font: inherit; color: inherit; background: none; border: none; padding: 0; }
input, select, textarea { font: inherit; color: inherit; }

/* ── prompt header (top) ──────────────────────────────── */
header.prompt {
  position: sticky; top: 0; z-index: 50;
  padding: 8px 14px; padding-top: calc(8px + env(safe-area-inset-top));
  background: var(--bg);
  border-bottom: 1px dashed var(--line-strong);
  font-size: 12px;
  display: flex; align-items: baseline; gap: 8px;
  flex-wrap: wrap;
}
header.prompt .ps { color: var(--lime); font-weight: 600; }
header.prompt .cmd { color: var(--t-bright); }
header.prompt .actions { margin-left: auto; display: flex; gap: 8px; }
header.prompt .actions button {
  color: var(--t-faint); font-size: 11px;
  padding: 2px 0;
}
header.prompt .actions button:hover { color: var(--lime); }
header.prompt .actions button.danger:hover { color: var(--err); }

/* ── main content ─────────────────────────────────────── */
main {
  flex: 1; padding: 14px 16px 16px;
  max-width: 720px; margin: 0 auto; width: 100%;
}

/* section headers ── name ───────────────── */
.sec {
  display: flex; align-items: baseline; gap: 6px;
  margin: 16px 0 6px;
  color: var(--warm);
  font-size: 11px;
  text-transform: lowercase;
  letter-spacing: 0.5px;
  font-weight: 600;
}
.sec:first-child { margin-top: 0; }
.sec::before {
  content: '──';
  color: var(--line-strong);
  letter-spacing: -1px;
  font-weight: 400;
}
.sec::after {
  content: '';
  flex: 1;
  border-bottom: 1px dashed var(--line-strong);
  align-self: center;
  margin-left: 4px;
}
.sec .key { color: var(--lime); margin-right: 4px; font-weight: 600; }
.sec .meta { color: var(--t-faint); font-size: 10.5px; font-weight: 400; text-transform: lowercase; letter-spacing: 0; margin-left: 4px; }
.sec .add {
  margin-left: auto; padding: 0 8px;
  color: var(--cyan); font-size: 10.5px;
  font-weight: 400;
  text-decoration: underline dotted;
  text-underline-offset: 2px;
}
.sec .add:hover { color: var(--lime); }

/* dot-leader row: label.....................value */
.kv {
  display: flex; align-items: baseline;
  padding: 1px 0;
  gap: 4px;
  font-size: 12px;
}
.kv .l { color: var(--cyan); white-space: nowrap; }
.kv .l.dim { color: var(--t-faint); }
.kv .dot {
  flex: 1;
  border-bottom: 1px dotted var(--t-mute);
  margin: 0 2px;
  align-self: end;
  height: 0; min-height: 0;
  position: relative; top: -3px;
}
.kv .v { color: var(--t-bright); font-variant-numeric: tabular-nums; white-space: nowrap; }
.kv .v.ok { color: var(--ok); }
.kv .v.bad { color: var(--bad); }
.kv .v.warm { color: var(--warm); }
.kv .v.lime { color: var(--lime); }
.kv .v.warn { color: var(--warn); }
.kv .v.cyan { color: var(--cyan); }

/* indented sub-items */
.kv.sub { padding-left: 18px; position: relative; font-size: 11.5px; }
.kv.sub::before {
  content: '├─';
  position: absolute; left: 0;
  color: var(--t-mute);
  font-size: 12px;
  top: -1px;
}
.kv.sub:last-child::before { content: '└─'; }
.kv.sub .l { color: var(--t-dim); }

/* tree-list row (no dots, just hierarchy) */
.li {
  padding: 2px 0;
  padding-left: 18px;
  position: relative;
  font-size: 12px;
  display: flex; align-items: baseline; gap: 6px;
  flex-wrap: wrap;
  min-height: 22px;
}
.li::before {
  content: '├─';
  position: absolute; left: 0;
  color: var(--t-mute);
  top: 1px;
  font-size: 12px;
}
.li.last::before { content: '└─'; }
.li .nm { color: var(--t-bright); }
.li .cat { color: var(--t-faint); font-size: 10.5px; }
.li .amt { color: var(--bad); font-variant-numeric: tabular-nums; margin-left: auto; }
.li .amt.ok { color: var(--ok); }
.li .amt.warm { color: var(--warm); }
.li .due { color: var(--t-faint); font-size: 10.5px; font-variant-numeric: tabular-nums; }
.li .due.over { color: var(--err); }
.li .due.today { color: var(--warn); }
.li .id { color: var(--t-mute); font-size: 10px; font-family: inherit; }
.li.dim { opacity: 0.45; }
.li.dim .nm { text-decoration: line-through; }

.li .acts {
  margin-left: auto; display: flex; gap: 8px;
  flex-shrink: 0;
}
.li .acts button {
  color: var(--cyan); font-size: 10.5px;
  text-decoration: underline dotted;
  text-underline-offset: 2px;
  padding: 0;
}
.li .acts button:hover { color: var(--lime); }
.li .acts button.err { color: var(--bad); }
.li .acts button.err:hover { color: var(--err); }
.li .acts button.ok { color: var(--ok); }

.tag {
  display: inline-block; padding: 0 3px;
  font-size: 10px; text-transform: lowercase;
  letter-spacing: 0.3px;
  border-radius: 1px;
  font-weight: 500;
}
.tag.ok { color: var(--ok); }
.tag.warn { color: var(--warn); }
.tag.err { color: var(--err); }
.tag.info { color: var(--cyan); }

/* mini bar inline */
.bar-i {
  display: inline-block;
  letter-spacing: -1px;
  line-height: 1;
  font-size: 13px;
  margin: 0 4px;
}
.bar-i .f { color: var(--lime); }
.bar-i .e { color: var(--line-strong); }
.bar-i.ok .f { color: var(--ok); }
.bar-i.bad .f { color: var(--bad); }
.bar-i.warm .f { color: var(--warm); }
.bar-i.warn .f { color: var(--warn); }
.bar-i.cyan .f { color: var(--cyan); }

.spark {
  letter-spacing: -2px; font-size: 14px;
  line-height: 1; vertical-align: -1px;
  margin: 0 4px;
}
.spark.ok { color: var(--ok); }
.spark.bad { color: var(--bad); }
.spark.warm { color: var(--warm); }
.spark.cyan { color: var(--cyan); }

/* ── chart: vertical bars (income trend) ──────────────── */
.bchart {
  margin: 6px 0 12px;
  padding-left: 18px;
  position: relative;
}
.bchart::before {
  content: '└─';
  position: absolute; left: 0; top: 13px;
  color: var(--t-mute); font-size: 12px;
}
.bchart-head {
  display: flex; justify-content: space-between;
  align-items: baseline;
  font-size: 10px; color: var(--t-faint);
  padding-bottom: 4px;
}
.bchart-head .lbl { color: var(--t-mute); margin-right: 3px; }
.bchart-head .v {
  color: var(--t-dim);
  font-variant-numeric: tabular-nums;
}
.bchart-bars {
  display: flex; gap: 5px;
  align-items: flex-end;
  height: 92px;
  border-bottom: 1px dashed var(--line-strong);
  border-left: 1px dashed var(--line-strong);
  padding: 14px 2px 0 2px;
}
.bchart-col {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  height: 100%; min-width: 0;
  position: relative;
}
.bchart-bar {
  width: 78%; max-width: 28px;
  background: var(--lime);
  min-height: 0;
  opacity: 0.85;
  transition: opacity 0.15s;
}
.bchart-col:hover .bchart-bar { opacity: 1; }
.bchart-bar.bad { background: var(--bad); }
.bchart-bar.warm { background: var(--warm); }
.bchart-bar.cyan { background: var(--cyan); }
.bchart-amt {
  font-size: 9.5px; color: var(--t-bright);
  position: absolute; bottom: 100%;
  background: var(--bg-soft);
  border: 1px dashed var(--line-strong);
  padding: 1px 5px;
  border-radius: 2px;
  white-space: nowrap;
  opacity: 0; transition: opacity 0.15s;
  pointer-events: none;
  margin-bottom: 3px;
  z-index: 3;
  font-variant-numeric: tabular-nums;
}
.bchart-col:hover .bchart-amt { opacity: 1; }
.bchart-labels {
  display: flex; gap: 5px;
  margin-top: 4px;
  padding: 0 2px;
  font-size: 10px; color: var(--t-faint);
}
.bchart-labels > div {
  flex: 1; text-align: center;
  text-transform: lowercase;
}

/* ── chart: horizontal bars (category breakdown) ──────── */
.hcat {
  display: grid;
  grid-template-columns: 64px 1fr 56px 32px;
  gap: 6px;
  align-items: center;
  padding: 3px 0;
  padding-left: 18px;
  position: relative;
  font-size: 11px;
  min-height: 22px;
}
.hcat::before {
  content: '├─';
  position: absolute; left: 0; top: 3px;
  color: var(--t-mute); font-size: 12px;
}
.hcat.last::before { content: '└─'; }
.hcat-lbl {
  text-transform: lowercase;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  font-size: 11px;
}
.hcat-bar {
  height: 9px;
  background: var(--bg-input);
  border: 1px dashed var(--line);
  border-radius: 1px;
  overflow: hidden;
  position: relative;
}
.hcat-fill {
  height: 100%;
  min-width: 0;
  opacity: 0.85;
  transition: width 0.3s ease;
}
.hcat-val {
  text-align: right;
  font-size: 11px;
  color: var(--t-bright);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.hcat-pct {
  text-align: right;
  font-size: 10.5px;
  color: var(--t-faint);
  font-variant-numeric: tabular-nums;
}

.month-nav {
  display: inline-flex; align-items: center; gap: 8px;
  margin-left: auto;
  font-size: 11px;
}
.month-nav button {
  color: var(--cyan); font-size: 10.5px;
  text-decoration: underline dotted;
  text-underline-offset: 2px;
}
.month-nav button:hover { color: var(--lime); }
.month-nav .label { color: var(--warm); font-weight: 500; }

/* note row (commentary) */
.note {
  color: var(--t-faint);
  font-size: 11px;
  font-style: italic;
  padding: 2px 0;
}
.note::before { content: '# '; color: var(--t-mute); }

/* empty state */
.empty {
  color: var(--t-mute); font-size: 11.5px; font-style: italic;
  padding: 6px 0; padding-left: 18px;
  position: relative;
}
.empty::before {
  content: '└─';
  position: absolute; left: 0; top: 6px;
  color: var(--t-mute); font-size: 12px;
}
.empty .lnk { color: var(--cyan); cursor: pointer; text-decoration: underline dotted; text-underline-offset: 2px; font-style: normal; }
.empty .lnk:hover { color: var(--lime); }

/* tax pct input */
.tax-pct-input {
  width: 36px; background: var(--bg-input);
  border: 1px dashed var(--line-strong);
  color: var(--t-bright); padding: 0 3px; border-radius: 2px;
  font: inherit; font-size: 11.5px; text-align: center; outline: none;
}
.tax-pct-input:focus { border-color: var(--lime); border-style: solid; }

.btn-pri {
  display: inline-block; padding: 3px 10px;
  background: var(--lime-soft); border: 1px dashed var(--lime);
  color: var(--lime); border-radius: 3px;
  font-size: 11px; cursor: pointer;
}
.btn-pri:hover { background: var(--lime); color: var(--bg-deep); border-style: solid; }

/* goal block */
.goal {
  padding: 4px 0 6px 18px;
  position: relative;
  border-bottom: 1px dotted var(--line-strong);
}
.goal:last-child { border-bottom: none; }
.goal::before {
  content: '├─';
  position: absolute; left: 0; top: 5px;
  color: var(--t-mute);
}
.goal.last::before { content: '└─'; }
.goal .h { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; flex-wrap: wrap; font-size: 12px; }
.goal .h .nm { color: var(--t-bright); }
.goal .h .nm .by { color: var(--t-faint); font-size: 10.5px; margin-left: 6px; }
.goal .h .pct { color: var(--lime); font-variant-numeric: tabular-nums; font-size: 11.5px; }
.goal .b { letter-spacing: -1px; line-height: 1; font-size: 13px; margin: 3px 0; }
.goal .b .f { color: var(--lime); }
.goal .b .e { color: var(--line-strong); }
.goal .m {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 10.5px; color: var(--t-faint); flex-wrap: wrap; gap: 4px;
}
.goal .m .req { color: var(--warn); }
.goal .m .acts { display: flex; gap: 8px; }
.goal .m .acts button {
  color: var(--cyan); font-size: 10.5px;
  text-decoration: underline dotted;
  text-underline-offset: 2px;
}
.goal .m .acts button:hover { color: var(--lime); }
.goal .m .acts button.err { color: var(--bad); }
.goal .m .acts button.err:hover { color: var(--err); }
.goal .m .acts button.ok { color: var(--ok); }

/* ── bottom tab list ──────────────────────────────────── */
nav.btm {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
  border-top: 1px dashed var(--line-strong);
  font-size: 11.5px;
  gap: 4px;
  flex-wrap: wrap;
}
nav.btm button {
  padding: 4px 10px;
  color: var(--t-faint);
  font-size: 11px;
  position: relative;
  white-space: nowrap;
}
nav.btm button::before { content: '['; color: var(--t-mute); margin-right: 2px; }
nav.btm button::after { content: ']'; color: var(--t-mute); margin-left: 2px; }
nav.btm button.active {
  color: var(--lime);
}
nav.btm button.active::before, nav.btm button.active::after { color: var(--lime); }
nav.btm button:hover { color: var(--lime); }
nav.btm button .badge {
  display: inline-block; min-width: 14px;
  background: var(--err); color: var(--bg-deep);
  font-size: 9px; font-weight: 600;
  padding: 0 4px; border-radius: 999px;
  margin-left: 4px; line-height: 1.4;
}

/* ── modals ───────────────────────────────────────────── */
.modal { display: none; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; padding: 14px; }
.modal.open { display: flex; }
.modal-bd { position: absolute; inset: 0; background: rgba(15,15,15,0.85); backdrop-filter: blur(3px); }
.modal-c {
  position: relative; background: var(--bg-soft);
  border: 1px dashed var(--line-strong); border-radius: 3px;
  width: 100%; max-width: 440px; padding: 16px 18px 18px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.5); max-height: 85vh; overflow-y: auto;
}
.modal-t {
  color: var(--warm); font-size: 11px; text-transform: lowercase;
  letter-spacing: 1px; font-weight: 600; margin-bottom: 14px;
  display: flex; align-items: baseline; gap: 6px;
}
.modal-t::before { content: '$'; color: var(--lime); }
.frow { display: flex; gap: 10px; margin-bottom: 11px; flex-wrap: wrap; }
.fcol { flex: 1; min-width: 130px; }
.flbl { display: block; color: var(--cyan); font-size: 10.5px; text-transform: lowercase; margin-bottom: 4px; letter-spacing: 0.5px; }
.input, .select, textarea {
  width: 100%; background: var(--bg-input); border: 1px dashed var(--line-strong);
  color: var(--t-bright); font: inherit; font-size: 12.5px; padding: 6px 9px;
  border-radius: 2px; outline: none;
}
.input:focus, .select:focus, textarea:focus { border-color: var(--lime); border-style: solid; }
.input::placeholder { color: var(--t-mute); }
.hours-input { display: flex; align-items: center; gap: 6px; background: var(--bg-input); border: 1px dashed var(--line-strong); color: var(--t-bright); border-radius: 2px; padding: 0 9px; height: 31px; }
.hours-input:focus-within { border-color: var(--lime); border-style: solid; }
.hours-input input { background: transparent; border: none; color: var(--t-bright); font: inherit; font-size: 12.5px; padding: 0; outline: none; width: 30px; text-align: center; font-variant-numeric: tabular-nums; -moz-appearance: textfield; }
.hours-input input::-webkit-outer-spin-button, .hours-input input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.hours-input span { color: var(--t-faint); font-size: 11px; }
.tip-box { background: var(--bg-input); padding: 10px 12px; border-radius: 3px; border: 1px dashed var(--line-strong); margin-bottom: 11px; }
.tip-toggle { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--t-bright); cursor: pointer; }
.tip-input-grp { display: none; gap: 8px; align-items: center; margin-top: 8px; opacity: 0; transition: opacity 0.2s; }
.tip-input-grp input { width: 60px; padding: 4px 6px; }
.tip-input-grp select { width: 56px; padding: 4px; }
.factions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; padding-top: 11px; border-top: 1px dashed var(--line-strong); }
.factions button { padding: 5px 13px; border: 1px dashed var(--line-strong); color: var(--t-dim); border-radius: 2px; font-size: 11.5px; transition: 0.15s; text-transform: lowercase; }
.factions button:hover { color: var(--t-bright); border-color: var(--t-dim); border-style: solid; }
.factions button.primary { color: var(--lime); border-color: var(--lime); }
.factions button.primary:hover { background: var(--lime-soft); border-style: solid; }
.preset-row { display: flex; align-items: center; gap: 10px; padding: 6px 9px; border: 1px solid transparent; border-radius: 2px; cursor: pointer; font-size: 11.5px; }
.preset-row:hover { background: var(--bg-input); border-color: var(--line); }
.preset-row .box { width: 13px; height: 13px; border: 1px solid var(--t-faint); border-radius: 2px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.preset-row.sel .box { background: var(--lime); border-color: var(--lime); }
.preset-row.sel .box::after { content: ''; width: 6px; height: 3px; border-left: 2px solid var(--bg-deep); border-bottom: 2px solid var(--bg-deep); transform: rotate(-45deg) translate(0,-1px); }
.preset-row.exists { opacity: 0.4; pointer-events: none; }
.preset-row .nm { flex: 1; color: var(--t); }
.preset-row .pct { color: var(--t-faint); font-size: 10.5px; text-align: right; }

main > * { animation: fadeIn 0.2s ease-out; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

</style>
</head>
<body>

<input type="file" id="file-import" style="display:none" accept=".json">

<header class="prompt">
  <span class="ps">$</span>
  <span class="cmd">ledgeon</span>
  <span class="actions">
    <button data-action="import">--import</button>
    <button data-action="export">--export</button>
    <button class="danger" data-action="reset">--reset</button>
  </span>
</header>

<main id="content"></main>

<nav class="btm" id="tabs">
  <button data-tab="overview">overview</button>
  <button data-tab="income">income</button>
  <button data-tab="expenses">expenses<span class="badge badge-e" style="display:none">0</span></button>
  <button data-tab="budget">budget</button>
  <button data-tab="tasks">tasks<span class="badge badge-t" style="display:none">0</span></button>
</nav>

<!-- modals -->
<div class="modal" id="modal-income">
  <div class="modal-bd" data-action="close-modal"></div>
  <div class="modal-c">
    <div class="modal-t">add income</div>
    <form data-type="income">
      <div class="frow">
        <div class="fcol"><label class="flbl">source</label><input type="text" class="input" name="source" required></div>
        <div class="fcol" style="min-width: 100px;"><label class="flbl">base amount</label><input type="text" class="input" name="amount" placeholder="0.00" required></div>
      </div>
      <div class="frow">
        <div class="fcol"><label class="flbl">frequency</label>
          <select class="select" name="frequency">
            <option value="monthly" selected>monthly</option><option value="biweekly">biweekly</option><option value="weekly">weekly</option><option value="yearly">yearly</option><option value="once">one-time</option>
          </select>
        </div>
        <div class="fcol"><label class="flbl">hours worked</label>
          <div class="hours-input">
            <input type="text" name="hours" placeholder="0" inputmode="numeric" maxlength="3"><span>h</span>

<script>
'use strict';

// ──── Constants ──────────────────────────────────────────────
const ART = `

       ▄▄
      ████
     ██████
$$$  ██████
     ██████
     ██████
      ████
       ▀▀

     ledgeon`;

const STORAGE_KEY = 'ledgeon-state-v4';
const TAB_KEY = 'ledgeon-tab';
const TAX_KEY = 'ledgeon-tax-pct';
const TABS = ['overview', 'income', 'expenses', 'budget', 'tasks'];

const CATEGORIES = {
  housing:   { label: 'housing',   color: '#d4a574' },
  utilities: { label: 'utilities', color: '#7eb6f0' },
  transport: { label: 'transport', color: '#b08bc7' },
  insurance: { label: 'insurance', color: '#e57373' },
  food:      { label: 'food',      color: '#86c98a' },
  media:     { label: 'media',     color: '#f5c890' },
  debt:      { label: 'debt',      color: '#ff8a65' },
  health:    { label: 'health',    color: '#c8a2ff' },
  other:     { label: 'other',     color: '#6b7280' },
};

const PRESET_BILLS = [
  { name: 'Housing (Rent/Mortgage)',     recurring: 'monthly', category: 'housing',   pct: 30 },
  { name: 'Utilities & Internet',        recurring: 'monthly', category: 'utilities', pct: 5 },
  { name: 'Groceries',                   recurring: 'monthly', category: 'food',      pct: 15 },
  { name: 'Transportation',              recurring: 'monthly', category: 'transport', pct: 10 },
  { name: 'Insurance',                   recurring: 'monthly', category: 'insurance', pct: 5 },
  { name: 'Subscriptions & Media',       recurring: 'monthly', category: 'media',     pct: 2 },
  { name: 'Debt Repayment',              recurring: 'monthly', category: 'debt',      pct: 10 },
];

// ──── State ──────────────────────────────────────────────────
let state = { tasks: [], bills: [], events: [], income: [], goals: [], petty: [] };
const possibleKeys = ['ledgeon-state-v5', 'ledgeon-state-v4', 'ledgeon-prompt-v1', 'ledgeon-state-v3'];
for (const k of possibleKeys) {
  try {
    const raw = localStorage.getItem(k);
    if (raw) {
      const v = JSON.parse(raw);
      if (Array.isArray(v.bills) || Array.isArray(v.income)) {
        state = {
          tasks:  Array.isArray(v.tasks)  ? v.tasks  : [],
          bills:  Array.isArray(v.bills)  ? v.bills  : [],
          events: Array.isArray(v.events) ? v.events : [],
          income: Array.isArray(v.income) ? v.income : [],
          goals:  Array.isArray(v.goals)  ? v.goals  : [],
          petty:  Array.isArray(v.petty)  ? v.petty  : [],
        };
        break;
      }
    }
  } catch {}
}

// migrate income data
state.income.forEach(i => {
  if (i.hoursWorked !== undefined && i.hours === undefined) { i.hours = i.hoursWorked; delete i.hoursWorked; }
  if (i.cashTipPct || i.cashTipAmount) {
    const base = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
    i.baseAmount = base; i.tipsEnabled = true;
    if (i.cashTipPct) {
      i.tipsType = 'percent'; i.tipsValue = Number(i.cashTipPct);
      i.amount = base + (base * Number(i.cashTipPct) / 100);
    } else if (i.cashTipAmount) {
      i.tipsType = 'amount'; i.tipsValue = Number(i.cashTipAmount);
      i.amount = base + Number(i.cashTipAmount);
    }
    delete i.cashTipPct; delete i.cashTipAmount;
  }
  if (i.baseAmount === undefined) {
    i.baseAmount = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
  }
});

let currentTab = localStorage.getItem(TAB_KEY) || 'overview';
if (!TABS.includes(currentTab)) currentTab = 'overview';
let editingItem = null;
let viewMonth = null;

function getTaxPct() { const v = parseFloat(localStorage.getItem(TAX_KEY)); return isNaN(v) ? 25 : v; }
function setTaxPct(v) { localStorage.setItem(TAX_KEY, String(v)); }

// ──── Helpers ────────────────────────────────────────────────
function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); updateBadges(); } catch {} }
function nextId(col) {
  const pfx = { tasks: 't', bills: 'b', events: 'e', income: 'i', goals: 'g', petty: 'p' }[col];
  let max = 0;
  for (const item of state[col]) { const n = parseInt(item.id?.slice(1), 10); if (!isNaN(n) && n > max) max = n; }
  return pfx + (max + 1);
}
function startOfDay(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }
function todayStart() { return startOfDay(new Date()); }
function isoDate(d) { const x = startOfDay(d); return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`; }
function formatDate(s) {
  if (!s) return '—';
  const d = new Date(s + (s.includes('T') ? '' : 'T00:00:00'));
  if (isNaN(d)) return s;
  const diff = Math.round((d - todayStart()) / 86400000);
  if (diff === 0) return 'today';
  if (diff === 1) return 'tomorrow';
  if (diff === -1) return 'yesterday';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toLowerCase();
}
function isOverdue(s) { return s && new Date(s + (s.includes('T') ? '' : 'T00:00:00')) < todayStart(); }
function isTodayDate(s) { return s && +new Date(s + (s.includes('T') ? '' : 'T00:00:00')) === +todayStart(); }
function fmtMoney(n, opts = {}) {
  const v = parseFloat(String(n).replace(/[^\d.-]/g, '')) || 0;
  const abs = Math.abs(v).toLocaleString('en-US', { minimumFractionDigits: opts.round ? 0 : 2, maximumFractionDigits: opts.round ? 0 : 2 });
  return (v < 0 ? '−$' : (opts.sign && v > 0 ? '+$' : '$')) + abs;
}
function fmtHM(decimal) {
  if (decimal == null || isNaN(decimal)) return '—';
  if (decimal === 0) return '0h';
  const totalMin = Math.round(decimal * 60);
  const h = Math.floor(totalMin / 60); const m = totalMin % 60;
  if (h === 0) return `${m}m`; if (m === 0) return `${h}h`;
  return `${h}h${m}m`;
}
function escHTML(s) { return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function sparkline(values) {
  if (!values || values.length === 0) return '─'.repeat(8);
  const chars = ['▁','▂','▃','▄','▅','▆','▇','█'];
  const min = Math.min(...values); const max = Math.max(...values);
  if (max === min) return (max > 0 ? '▄' : '▁').repeat(values.length);
  return values.map(v => {
    if (v <= 0) return '▁';
    const idx = Math.round(((v - min) / (max - min)) * (chars.length - 1));
    return chars[Math.max(0, Math.min(chars.length - 1, idx))];
  }).join('');
}
function asciiBar(pct, width = 20) {
  const f = Math.max(0, Math.min(width, Math.round(width * (pct / 100))));
  return `<span class="f">${'█'.repeat(f)}</span><span class="e">${'░'.repeat(width - f)}</span>`;
}
function monthlyEq(amount, freq) {
  const val = parseFloat(String(amount).replace(/[^\d.-]/g, '')) || 0;
  if (!val) return 0;
  switch (freq || 'monthly') {
    case 'weekly': return val * 4.333;
    case 'biweekly': return val * 2.166;
    case 'monthly': return val;
    case 'yearly': return val / 12;
    default: return 0;
  }
}
function getViewMonth() { if (viewMonth) return viewMonth; const d = new Date(); return { year: d.getFullYear(), month: d.getMonth() }; }

// ──── Calculations ───────────────────────────────────────────
function getMonthlyStats(year, month) {
  let income = 0; let bills = 0; let tips = 0;
  for (const i of state.income) {
    const isOnce = i.frequency === 'once' || !i.frequency;
    const amt = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
    let base = i.baseAmount !== undefined ? parseFloat(String(i.baseAmount).replace(/[^\d.-]/g, '')) || 0 : amt;
    const tipAmt = Math.max(0, amt - base);
    if (isOnce) {
      const dateStr = i.receivedAt || i.createdAt || isoDate(todayStart());
      const d = new Date(dateStr + (dateStr.includes('T') ? '' : 'T00:00:00'));
      if (d.getFullYear() === year && d.getMonth() === month) { income += amt; tips += tipAmt; }
    } else { income += monthlyEq(amt, i.frequency); tips += monthlyEq(tipAmt, i.frequency); }
  }
  for (const b of state.bills) {
    const amt = parseFloat(String(b.amount).replace(/[^\d.-]/g, '')) || 0;
    const isOnce = !b.recurring || b.recurring === 'once';
    if (!isOnce) bills += monthlyEq(amt, b.recurring);
    else {
      const dateStr = b.dueDate || b.createdAt || isoDate(todayStart());
      const d = new Date(dateStr + (dateStr.includes('T') ? '' : 'T00:00:00'));
      if (d.getFullYear() === year && d.getMonth() === month) bills += amt;
    }
  }
  return { income, bills, net: income - bills, tips };
}

function getMonthlyHistory(monthsBack = 6) {
  const now = new Date(); const out = [];
  for (let i = monthsBack - 1; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const stats = getMonthlyStats(d.getFullYear(), d.getMonth());
    out.push({ label: d.toLocaleString('en-US', { month: 'short' }).toLowerCase(), income: stats.income, bills: stats.bills });
  }
  return out;
}

function getIncomeStats() {
  const now = new Date(); const curY = now.getFullYear(); const curM = now.getMonth();
  let rawInc = []; let rawBills = [];
  for (let i = 1; i <= 12; i++) {
    let m = curM - i; let y = curY; if (m < 0) { m += 12; y -= 1; }
    const st = getMonthlyStats(y, m);
    if (st.income > 0) rawInc.push(st.income);
    if (st.bills > 0) rawBills.push(st.bills);
  }
  let validInc = rawInc.length > 1 ? rawInc.filter(inc => inc >= Math.max(...rawInc) * 0.5) : rawInc;
  if (validInc.length === 0) { const cur = getMonthlyStats(curY, curM); if (cur.income > 0) validInc.push(cur.income); }
  const avgMonthly = validInc.length ? validInc.reduce((a,b)=>a+b,0) / validInc.length : 0;
  const projAnnual = avgMonthly * 12;

  let validBills = rawBills;
  if (validBills.length === 0) { const cur = getMonthlyStats(curY, curM); if (cur.bills > 0) validBills.push(cur.bills); }
  const avgMonthlyBills = validBills.length ? validBills.reduce((a,b)=>a+b,0) / validBills.length : 0;
  const projAnnualBills = avgMonthlyBills * 12;

  let ytdIncome = 0; let ytdHours = 0; let ytdTips = 0;
  const daysInCurMonth = new Date(curY, curM + 1, 0).getDate(); const daysElapsed = now.getDate();
  const monthsElapsedThisYear = curM + (daysElapsed / daysInCurMonth);

  for (const i of state.income) {
    const effective = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
    const base = i.baseAmount !== undefined ? parseFloat(String(i.baseAmount).replace(/[^\d.-]/g, '')) || 0 : effective;
    const tip = Math.max(0, effective - base);
    const h = Number(i.hours) || 0; const isOnce = i.frequency === 'once' || !i.frequency;
    if (isOnce) {
      const dateStr = i.receivedAt || i.createdAt || isoDate(todayStart());
      const d = new Date(dateStr + (dateStr.includes('T') ? '' : 'T00:00:00'));
      if (d.getFullYear() === curY) { ytdIncome += effective; ytdHours += h; ytdTips += tip; }
    } else {
      const dt = i.createdAt ? new Date(i.createdAt) : now;
      const startY = dt.getFullYear(); const startM = dt.getMonth();
      let startMonthsElapsed = 0;
      if (startY < curY) startMonthsElapsed = 0;
      else if (startY === curY) {
        const daysInStartMonth = new Date(startY, startM + 1, 0).getDate();
        const startFraction = (daysInStartMonth - dt.getDate() + 1) / daysInStartMonth;
        startMonthsElapsed = startM + (1 - startFraction);
      } else continue;
      const activeMonthsThisYear = Math.max(0, monthsElapsedThisYear - startMonthsElapsed);
      const monthlyInc = monthlyEq(effective, i.frequency); const monthlyTip = monthlyEq(tip, i.frequency);
      const f = i.frequency === 'weekly' ? 4.33333 : i.frequency === 'biweekly' ? 2.16667 : i.frequency === 'monthly' ? 1 : i.frequency === 'yearly' ? (1/12) : 0;
      ytdIncome += monthlyInc * activeMonthsThisYear; ytdTips += monthlyTip * activeMonthsThisYear; ytdHours += (h * f) * activeMonthsThisYear;
    }
  }
  return { ytdIncome, ytdHours, ytdHourly: ytdHours > 0 ? ytdIncome / ytdHours : 0, ytdTips, avgMonthly, projAnnual, avgMonthlyBills, projAnnualBills };
}

function getReferenceMonth() {
  const now = new Date();
  for (let i = 0; i < 12; i++) {
    let m = now.getMonth() - i; let y = now.getFullYear();
    while (m < 0) { m += 12; y -= 1; }
    const s = getMonthlyStats(y, m);
    if (s.income > 0) return { year: y, month: m, ...s, label: new Date(y, m).toLocaleString('en-US', { month: 'short' }).toLowerCase() };
  }
  return null;
}

function aggregateBillsByCategory(bills, year, month) {
  const byCat = {};
  for (const b of bills) {
    const amt = parseFloat(String(b.amount).replace(/[^\d.-]/g, '')) || 0;
    const isOnce = !b.recurring || b.recurring === 'once';
    const mo = isOnce ? ((b.dueDate || b.createdAt || isoDate(todayStart())).startsWith(`${year}-${String(month+1).padStart(2,'0')}`) ? amt : 0) : monthlyEq(amt, b.recurring);
    if (mo <= 0) continue;
    const cat = b.category || 'other';
    if (!byCat[cat]) byCat[cat] = { total: 0, names: [] };
    byCat[cat].total += mo; byCat[cat].names.push(b.name);
  }
  return Object.entries(byCat).map(([cat, v]) => ({
    cat, total: v.total, names: v.names,
    label: CATEGORIES[cat]?.label || cat,
    color: CATEGORIES[cat]?.color || '#6b7280',
  })).sort((a,b) => b.total - a.total);
}

function getSavingsTarget() {
  let total = 0; const breakdown = [];
  for (const g of state.goals) {
    const target = parseFloat(g.targetAmount) || 0;
    const saved = parseFloat(g.currentAmount) || 0;
    const remaining = Math.max(0, target - saved);
    if (remaining === 0 || !g.targetDate) continue;
    const td = new Date(g.targetDate + 'T00:00:00');
    if (td <= todayStart()) continue;
    const monthsLeft = Math.max(1, (td - todayStart()) / (30.44 * 86400000));
    const monthly = remaining / monthsLeft;
    total += monthly; breakdown.push({ name: g.name, monthly });
  }
  return { total, breakdown };
}

function getPettyThisWeek() {
  const today = todayStart();
  const dow = (today.getDay() + 6) % 7;
  const monday = new Date(today.getTime() - dow * 86400000);
  const sunday = new Date(monday.getTime() + 6 * 86400000);
  const startIso = isoDate(monday); const endIso = isoDate(sunday);
  return state.petty.filter(p => p.date && p.date >= startIso && p.date <= endIso)
    .sort((a,b) => b.date.localeCompare(a.date));
}

function getMonthlyHoursHistory(year, month, monthsBack = 6) {
  const out = [];
  for (let i = monthsBack - 1; i >= 0; i--) {
    const d = new Date(year, month - i, 1);
    const y = d.getFullYear(); const m = d.getMonth();
    let mh = 0;
    for (const inc of state.income) {
      const h = Number(inc.hours) || 0;
      const isOnce = inc.frequency === 'once' || !inc.frequency;
      if (isOnce) {
        const ds = inc.receivedAt || inc.createdAt;
        if (ds) {
          const dd = new Date(ds + (ds.includes('T') ? '' : 'T00:00:00'));
          if (dd.getFullYear() === y && dd.getMonth() === m) mh += h;
        }
      } else {
        const f = inc.frequency === 'weekly' ? 4.33 : inc.frequency === 'biweekly' ? 2.17 : inc.frequency === 'monthly' ? 1 : inc.frequency === 'yearly' ? (1/12) : 0;
        mh += h * f;
      }
    }
    out.push(mh);
  }
  return out;
}

function getWeeklyPettyHistory(weeksBack = 6) {
  const today = todayStart();
  const out = [];
  for (let w = weeksBack - 1; w >= 0; w--) {
    const wkStart = new Date(today.getTime() - ((today.getDay() + 6) % 7 + 7 * w) * 86400000);
    const wkEnd = new Date(wkStart.getTime() + 6 * 86400000);
    const startIso = isoDate(wkStart); const endIso = isoDate(wkEnd);
    const spent = state.petty.filter(p => p.date && p.date >= startIso && p.date <= endIso)
      .reduce((s, p) => s + (parseFloat(String(p.amount).replace(/[^\d.-]/g, '')) || 0), 0);
    out.push(spent);
  }
  return out;
}

// ──── UI helpers (cli) ───────────────────────────────────────
// dot-leader row: label.....................value
function kv(label, value, valColor = '', dim = false) {
  return `<div class="kv"><span class="l${dim ? ' dim' : ''}">${label}</span><span class="dot"></span><span class="v ${valColor}">${value}</span></div>`;
}
// indented sub-item
function kvSub(label, value, valColor = '') {
  return `<div class="kv sub"><span class="l">${label}</span><span class="dot"></span><span class="v ${valColor}">${value}</span></div>`;
}
// section header with optional add button, key, and meta
function sec(name, opts = {}) {
  const k = opts.key ? `<span class="key">${opts.key}</span>` : '';
  const meta = opts.meta ? `<span class="meta">· ${opts.meta}</span>` : '';
  const add = opts.add ? `<button class="add" data-action="${opts.add.action}"${opts.add.type ? ` data-type="${opts.add.type}"` : ''}>${opts.add.label}</button>` : '';
  const monthN = opts.monthNav ? opts.monthNav : '';
  return `<div class="sec">${k}${name}${meta}${monthN}${add}</div>`;
}

function monthNav(year, month) {
  const isCurr = year === new Date().getFullYear() && month === new Date().getMonth();
  return `<span class="month-nav"><button data-action="prev-month">‹ prev</button><span class="label">${new Date(year, month).toLocaleString('en-US',{month:'short',year:'numeric'}).toLowerCase()}</span><button data-action="next-month">next ›</button>${!isCurr ? '<button data-action="curr-month">~ today</button>' : ''}</span>`;
}

// vertical bar chart with hover-amount tooltip
function renderBarChart(data, opts = {}) {
  if (!data || data.length === 0) return '';
  const colorClass = opts.color || '';
  const values = data.map(d => d.value || 0);
  const max = Math.max(...values, 1);
  const nonZero = values.filter(v => v > 0);
  const avg = nonZero.length ? nonZero.reduce((a,b)=>a+b,0) / nonZero.length : 0;

  const bars = data.map(d => {
    const v = d.value || 0;
    const pct = v > 0 ? Math.max(2, (v / max) * 100) : 0;
    return `<div class="bchart-col">
      ${v > 0 ? `<span class="bchart-amt">${fmtMoney(v, {round:true})}</span>` : ''}
      <div class="bchart-bar ${colorClass}" style="height: ${pct}%;"></div>
    </div>`;
  }).join('');

  const labels = data.map(d => `<div>${d.label}</div>`).join('');

  return `
    <div class="bchart">
      <div class="bchart-head">
        <span><span class="lbl">peak</span><span class="v">${fmtMoney(max, {round:true})}</span></span>
        <span><span class="lbl">avg</span><span class="v">${fmtMoney(avg, {round:true})}</span></span>
      </div>
      <div class="bchart-bars">${bars}</div>
      <div class="bchart-labels">${labels}</div>
    </div>
  `;
}

// ──── Render: overview (cli) ─────────────────────────────────
function renderOverview() {
  const { year, month } = getViewMonth();
  const cur = getMonthlyStats(year, month);
  const monthKey = `${year}-${String(month+1).padStart(2,'0')}`;
  const pettySpent = state.petty.filter(p => p.date && p.date.startsWith(monthKey))
    .reduce((s, p) => s + (parseFloat(String(p.amount).replace(/[^\d.-]/g, '')) || 0), 0);
  const net = cur.income - cur.bills - pettySpent;
  const savingsPct = cur.income > 0 ? Math.max(0, (cur.income - cur.bills - pettySpent) / cur.income * 100) : 0;
  const history = getMonthlyHistory(6);
  const incSeries = history.map(h => h.income);
  const billSeries = history.map(h => h.bills);

  const upcIso = isoDate(new Date(Date.now() + 14 * 86400000));
  const upcoming = state.bills.filter(b => b.dueDate && b.dueDate <= upcIso && !b.paid)
    .sort((a,b) => a.dueDate.localeCompare(b.dueDate));

  const openTasks = state.tasks.filter(t => !t.done).sort((a,b) => {
    const ad = a.dueDate || '9999'; const bd = b.dueDate || '9999';
    return ad.localeCompare(bd);
  });

  const summary = `
    ${kv('income',   `<span class="spark ok">${sparkline(incSeries)}</span> ${fmtMoney(cur.income, {round:true})}`,  'ok')}
    ${kv('expenses', `<span class="spark bad">${sparkline(billSeries)}</span> ${fmtMoney(cur.bills, {round:true})}`,   'bad')}
    ${kv('savings',  `${savingsPct.toFixed(0)}% (${fmtMoney(cur.income - cur.bills - pettySpent, {round:true})})`, 'warm')}
    ${kv('net',      fmtMoney(net, {sign:true, round:true}), net >= 0 ? 'ok' : 'bad')}
    ${pettySpent > 0 ? kvSub('petty spent this month', fmtMoney(pettySpent, {round:true}), 'warn') : ''}
  `;

  let upcomingHTML = '';
  if (upcoming.length) {
    upcomingHTML = upcoming.slice(0, 6).map((b, i, arr) => {
      const overdue = isOverdue(b.dueDate); const today = isTodayDate(b.dueDate);
      const isLast = i === arr.length - 1 && upcoming.length <= 6;
      return `<div class="li${isLast ? ' last' : ''}">
        <span class="nm">${escHTML(b.name)}</span>
        <span class="cat">${(CATEGORIES[b.category]||CATEGORIES.other).label}</span>
        <span class="due ${overdue ? 'over' : today ? 'today' : ''}">${formatDate(b.dueDate)}</span>
        <span class="amt">${fmtMoney(b.amount, {round:true})}</span>
        <span class="acts"><button class="ok" data-action="pay-bill" data-id="${b.id}">pay</button></span>
      </div>`;
    }).join('');
    if (upcoming.length > 6) upcomingHTML += `<div class="note">+ ${upcoming.length - 6} more · <span class="lnk" data-action="goto" data-tab="expenses">view all</span></div>`;
  } else {
    upcomingHTML = `<div class="empty">no upcoming bills</div>`;
  }

  let tasksHTML = '';
  if (openTasks.length) {
    tasksHTML = openTasks.slice(0, 5).map((t, i, arr) => {
      const overdue = t.dueDate && isOverdue(t.dueDate);
      const today = t.dueDate && isTodayDate(t.dueDate);
      const pri = t.priority || '';
      const priCls = pri === 'high' ? 'err' : pri === 'med' ? 'warn' : 'info';
      const isLast = i === arr.length - 1 && openTasks.length <= 5;
      return `<div class="li${isLast ? ' last' : ''}">
        <span class="nm">${escHTML(t.text)}</span>
        ${pri ? `<span class="tag ${priCls}">${pri}</span>` : ''}
        ${t.dueDate ? `<span class="due ${overdue ? 'over' : today ? 'today' : ''}">${formatDate(t.dueDate)}</span>` : ''}
        <span class="acts"><button class="ok" data-action="toggle-task" data-id="${t.id}">done</button></span>
      </div>`;
    }).join('');
    if (openTasks.length > 5) tasksHTML += `<div class="note">+ ${openTasks.length - 5} more · <span class="lnk" data-action="goto" data-tab="tasks">view all</span></div>`;
  } else {
    tasksHTML = `<div class="empty">no open tasks · <span class="lnk" data-action="open-modal" data-type="tasks">add one</span></div>`;
  }

  return `
    ${sec('overview', { meta: new Date(year, month).toLocaleString('en-US',{month:'long',year:'numeric'}).toLowerCase(), monthNav: monthNav(year, month) })}
    ${summary}
    ${sec('upcoming bills', { meta: '14 days' })}
    ${upcomingHTML}
    ${sec('task queue', { meta: openTasks.length + ' open' })}
    ${tasksHTML}
  `;
}

// ──── Render: income (cli) ───────────────────────────────────
function renderIncome() {
  const stats = getIncomeStats();
  const taxPct = getTaxPct();
  const taxSetaside = stats.ytdTips * taxPct / 100;
  const sources = state.income.slice().sort((a,b) => monthlyEq(b.amount, b.frequency) - monthlyEq(a.amount, a.frequency));
  const history = getMonthlyHistory(6);
  const incSeries = history.map(h => h.income);
  const hoursHistory = getMonthlyHoursHistory(6);

  const summary = `
    ${kv('ytd income',   `<span class="spark ok">${sparkline(incSeries)}</span> ${fmtMoney(stats.ytdIncome, {round:true})}`, 'ok')}
    ${stats.ytdTips > 0 ? kv('ytd tips', fmtMoney(stats.ytdTips, {round:true}), 'lime') : ''}
    ${kv('ytd hours',    `<span class="spark cyan">${sparkline(hoursHistory)}</span> ${fmtHM(stats.ytdHours)}`, 'cyan')}
    ${kv('avg hourly',   '$' + stats.ytdHourly.toFixed(2), 'warm')}
    ${kv('avg monthly',  fmtMoney(stats.avgMonthly, {round:true}), 'warm')}
  `;

  const taxSection = stats.ytdTips > 0 ? `
    ${sec('tax setaside', { meta: 'estimated' })}
    ${kv('owed (' + taxPct + '% of cash tips)', fmtMoney(taxSetaside, {round:true}), 'warn')}
    <div class="note">set aside <input type="number" class="tax-pct-input" id="tax-pct-input" value="${taxPct}" min="0" max="100" step="1" />% of cash tip income for taxes</div>
  ` : '';

  let sourcesHTML = '';
  if (sources.length === 0) {
    sourcesHTML = `<div class="empty">no income tracked · <span class="lnk" data-action="open-modal" data-type="income">add income</span></div>`;
  } else {
    sourcesHTML = sources.map((i, idx) => {
      const amt = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
      const base = i.baseAmount !== undefined ? i.baseAmount : amt;
      const hrs = Number(i.hours) || 0;
      const monthly = i.frequency === 'once' ? amt : monthlyEq(amt, i.frequency);
      const tipBadge = i.tipsEnabled && amt > base ? ` <span class="tag info">+tip</span>` : '';
      const isLast = idx === sources.length - 1;
      return `<div class="li${isLast ? ' last' : ''}">
        <span class="nm">${escHTML(i.source)}</span>${tipBadge}
        <span class="cat">${i.frequency || 'once'}${hrs > 0 ? ` · ${fmtHM(hrs)}` : ''}${i.frequency !== 'once' ? ` · ${fmtMoney(monthly,{round:true})}/mo` : ''}</span>
        <span class="amt ok">${fmtMoney(amt, {round:true})}</span>
        <span class="acts">
          <button data-action="edit" data-type="income" data-id="${i.id}">edit</button>
          <button class="err" data-action="rm" data-type="income" data-id="${i.id}">rm</button>
        </span>
      </div>`;
    }).join('');
  }

  return `
    ${sec('ytd · income stats')}
    ${summary}
    ${sec('income trend', { meta: '6 months' })}
    ${renderBarChart(history.map(h => ({ label: h.label, value: h.income })))}
    ${taxSection}
    ${sec('income sources', { meta: sources.length + ' sources', add: { action: 'open-modal', type: 'income', label: '+ add' } })}
    ${sourcesHTML}
  `;
}

// ──── Render: expenses (cli) ─────────────────────────────────
function renderExpenses() {
  const { year, month } = getViewMonth();
  const cur = getMonthlyStats(year, month);
  const total = cur.bills; const incTot = cur.income;
  const catData = aggregateBillsByCategory(state.bills, year, month);
  const billsHistory = getMonthlyHistory(6).map(h => h.bills);
  const paidCount = state.bills.filter(b => b.paid).length;
  const unpaidCount = state.bills.filter(b => !b.paid).length;

  const recurring = state.bills.filter(b => b.recurring && b.recurring !== 'once').map(b => {
    const amt = parseFloat(String(b.amount).replace(/[^\d.-]/g, '')) || 0;
    const annual = b.recurring === 'weekly' ? amt * 52 : b.recurring === 'biweekly' ? amt * 26 : b.recurring === 'monthly' ? amt * 12 : amt;
    return { ...b, _annual: annual };
  });
  const totalAnnual = recurring.reduce((s, b) => s + b._annual, 0);

  const billsSorted = state.bills.slice().sort((a, b) => {
    if (a.paid !== b.paid) return a.paid ? 1 : -1;
    const ad = a.dueDate || '9999'; const bd = b.dueDate || '9999';
    return ad.localeCompare(bd);
  });

  const summary = `
    ${kv('total this month', `<span class="spark bad">${sparkline(billsHistory)}</span> ${fmtMoney(total, {round:true})}`, 'bad')}
    ${kv('% of income', incTot > 0 ? (total/incTot*100).toFixed(0)+'%' : '—', total/incTot > 0.6 ? 'warn' : '')}
    ${kv('annual total', fmtMoney(totalAnnual, {round:true}), 'warm')}
    ${kv('paid / total', `${paidCount}/${paidCount+unpaidCount}`, 'ok')}
  `;

  let catBreakdown = '';
  if (catData.length && total > 0) {
    catBreakdown = `${sec('by category', { meta: '% of income' })}
      ${catData.map((c, i, arr) => {
        const pct = incTot > 0 ? (c.total / incTot) * 100 : 0;
        const barPct = Math.max(1, Math.min(100, pct));
        const isLast = i === arr.length - 1;
        return `<div class="hcat${isLast ? ' last' : ''}">
          <div class="hcat-lbl" style="color: ${c.color};">${c.label}</div>
          <div class="hcat-bar"><div class="hcat-fill" style="width: ${barPct}%; background: ${c.color};"></div></div>
          <div class="hcat-val">${fmtMoney(c.total, {round:true})}</div>
          <div class="hcat-pct">${incTot > 0 ? pct.toFixed(0) + '%' : '—'}</div>
        </div>`;
      }).join('')}
    `;
  }

  let billsHTML = '';
  if (state.bills.length === 0) {
    if (incTot > 0) {
      billsHTML = `<div class="empty"><span class="lnk" data-action="open-presets">add presets</span> · <span class="lnk" data-action="open-modal" data-type="expenses">add manually</span></div>`;
    } else {
      billsHTML = `<div class="empty">add income first</div>`;
    }
  } else {
    billsHTML = billsSorted.map((b, i, arr) => {
      const isPaid = !!b.paid;
      const overdue = b.dueDate && !b.paid && isOverdue(b.dueDate);
      const today = b.dueDate && !b.paid && isTodayDate(b.dueDate);
      const isLast = i === arr.length - 1;
      const cat = (CATEGORIES[b.category] || CATEGORIES.other);
      return `<div class="li${isLast ? ' last' : ''}${isPaid ? ' dim' : ''}">
        <span class="nm">${escHTML(b.name)}</span>
        <span class="cat">${b.recurring || 'once'} · ${cat.label}</span>
        ${b.dueDate ? `<span class="due ${overdue ? 'over' : today ? 'today' : ''}">${formatDate(b.dueDate)}</span>` : ''}
        ${isPaid ? '<span class="tag ok">paid</span>' : ''}
        <span class="amt">${fmtMoney(b.amount, {round:true})}</span>
        <span class="acts">
          ${!isPaid ? `<button class="ok" data-action="pay-bill" data-id="${b.id}">pay</button>` : `<button data-action="unpay-bill" data-id="${b.id}">undo</button>`}
          <button data-action="edit" data-type="expenses" data-id="${b.id}">edit</button>
          <button class="err" data-action="rm" data-type="expenses" data-id="${b.id}">rm</button>
        </span>
      </div>`;
    }).join('');
  }

  return `
    ${sec('expenses', { meta: new Date(year, month).toLocaleString('en-US',{month:'long',year:'numeric'}).toLowerCase(), monthNav: monthNav(year, month) })}
    ${summary}
    ${catBreakdown}
    ${sec('bills', { meta: state.bills.length + ' bills', add: { action: 'open-modal', type: 'expenses', label: '+ add' } })}
    ${billsHTML}
  `;
}

// ──── Render: budget (cli) ───────────────────────────────────
function renderBudget() {
  let { year, month } = getViewMonth();
  let cur = getMonthlyStats(year, month);
  let inc = cur.income; let fixed = cur.bills;
  let basisLabel = null;
  if (inc === 0) {
    const ref = getReferenceMonth();
    if (ref) { year = ref.year; month = ref.month; inc = ref.income; fixed = ref.bills; basisLabel = ref.label; }
    else { const s = getIncomeStats(); if (s.avgMonthly > 0) { inc = s.avgMonthly; basisLabel = 'avg'; } }
  }

  if (inc === 0) {
    return `
      ${sec('budget')}
      <div class="empty">no income data · <span class="lnk" data-action="open-modal" data-type="income">add income</span></div>
    `;
  }

  const savingsInfo = getSavingsTarget();
  const savings = savingsInfo.total;
  state.goals.forEach(g => {
    const rem = Math.max(0, (parseFloat(g.targetAmount) || 0) - (parseFloat(g.currentAmount) || 0));
    if (rem > 0 && g.targetDate) {
      const td = new Date(g.targetDate + 'T00:00:00');
      if (td > todayStart()) g._reqMo = rem / Math.max(1, (td - todayStart()) / (30.44 * 86400000));
      else g._reqMo = 0;
    } else g._reqMo = 0;
  });

  const monthlyAllowance = Math.max(0, inc - fixed - savings);
  const weeklyAllowance = monthlyAllowance / 4.333;
  const dailyAllowance = monthlyAllowance / 30;
  const weekEntries = getPettyThisWeek();
  const weekSpent = weekEntries.reduce((s, e) => s + (parseFloat(String(e.amount).replace(/[^\d.-]/g, '')) || 0), 0);
  const weekPct = weeklyAllowance > 0 ? (weekSpent / weeklyAllowance) * 100 : 0;
  const monthKey = `${year}-${String(month+1).padStart(2,'0')}`;
  const pettyAll = state.petty.slice().sort((a, b) => {
    const ad = a.date || a.createdAt || '0000';
    const bd = b.date || b.createdAt || '0000';
    return bd.localeCompare(ad);
  });
  const weekHistory = getWeeklyPettyHistory(6);

  const allocation = `
    ${kv('income', fmtMoney(inc, {round:true}), 'ok')}
    ${kv('− fixed bills', fmtMoney(fixed, {round:true}), 'bad')}
    ${savings > 0 ? kv('− savings goals', fmtMoney(savings, {round:true}), 'cyan') : ''}
    ${kv('= available', fmtMoney(monthlyAllowance, {round:true}), 'warm')}
  `;

  const discretionary = `
    ${kv('weekly allowance', fmtMoney(weeklyAllowance, {round:true}), 'lime')}
    ${kv('daily allowance', fmtMoney(dailyAllowance, {round:true}), 'lime')}
    ${kv('this week spent', `<span class="spark warn">${sparkline(weekHistory)}</span> ${fmtMoney(weekSpent, {round:true})} (${weekPct.toFixed(0)}%)`, weekPct >= 100 ? 'bad' : weekPct >= 75 ? 'warn' : 'ok')}
  `;

  let pettyHTML = '';
  if (pettyAll.length === 0) {
    pettyHTML = `<div class="empty">no transactions logged · <span class="lnk" data-action="open-modal" data-type="petty">log one</span></div>`;
  } else {
    pettyHTML = pettyAll.map((p, i, arr) => {
      const cat = (CATEGORIES[p.category] || CATEGORIES.other);
      const isLast = i === arr.length - 1;
      const dateStr = p.date || p.createdAt;
      return `<div class="li${isLast ? ' last' : ''}">
        <span class="nm">${escHTML(p.note || '—')}</span>
        <span class="cat" style="color:${cat.color};">${cat.label}</span>
        <span class="due">${dateStr ? formatDate(dateStr) : '—'}</span>
        <span class="amt">${fmtMoney(p.amount, {round:true})}</span>
        <span class="acts">
          <button data-action="edit" data-type="petty" data-id="${p.id}">edit</button>
          <button class="err" data-action="rm" data-type="petty" data-id="${p.id}">rm</button>
        </span>
      </div>`;
    }).join('');
  }

  let goalsHTML = '';
  if (state.goals.length === 0) {
    goalsHTML = `<div class="empty">no goals set · <span class="lnk" data-action="open-modal" data-type="goals">add one</span></div>`;
  } else {
    goalsHTML = state.goals.map((g, i, arr) => {
      const target = parseFloat(g.targetAmount) || 0;
      const saved = parseFloat(g.currentAmount) || 0;
      const p = target > 0 ? Math.min(100, (saved / target) * 100) : 0;
      const isLast = i === arr.length - 1;
      return `<div class="goal${isLast ? ' last' : ''}">
        <div class="h">
          <span class="nm">${escHTML(g.name)}${g.targetDate ? `<span class="by">by ${formatDate(g.targetDate)}</span>` : ''}</span>
          <span class="pct">${p.toFixed(0)}%</span>
        </div>
        <div class="b">${asciiBar(p, 30)}</div>
        <div class="m">
          <span>${fmtMoney(saved, {round:true})} / ${fmtMoney(target, {round:true})}${g._reqMo > 0 ? ` · <span class="req">${fmtMoney(g._reqMo, {round:true})}/mo needed</span>` : ''}</span>
          <span class="acts">
            <button class="ok" data-action="goal-add" data-id="${g.id}">+ fund</button>
            <button data-action="edit" data-type="goals" data-id="${g.id}">edit</button>
            <button class="err" data-action="rm" data-type="goals" data-id="${g.id}">rm</button>
          </span>
        </div>
      </div>`;
    }).join('');
  }

  return `
    ${sec('budget', { meta: new Date(year, month).toLocaleString('en-US',{month:'long',year:'numeric'}).toLowerCase() + (basisLabel ? ' · basis: ' + basisLabel : ''), monthNav: monthNav(year, month) })}
    ${allocation}
    ${sec('discretionary')}
    ${discretionary}
    ${sec('petty transactions', { meta: pettyAll.length + ' total', add: { action: 'open-modal', type: 'petty', label: '+ log' } })}
    ${pettyHTML}
    ${sec('savings goals', { meta: state.goals.length + ' goals', add: { action: 'open-modal', type: 'goals', label: '+ add' } })}
    ${goalsHTML}
  `;
}

// ──── Render: tasks (cli) ────────────────────────────────────
function renderTasks() {
  const total = state.tasks.length;
  const open = state.tasks.filter(t => !t.done);
  const done = state.tasks.filter(t => t.done);
  const overdue = state.tasks.filter(t => !t.done && isOverdue(t.dueDate));
  const todayCnt = state.tasks.filter(t => !t.done && isTodayDate(t.dueDate));
  const completionPct = total > 0 ? (done.length / total) * 100 : 0;

  const sorted = state.tasks.slice().sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    const ad = a.dueDate || '9999'; const bd = b.dueDate || '9999';
    return ad.localeCompare(bd);
  });

  const summary = `
    ${kv('open', String(open.length), 'warm')}
    ${overdue.length > 0 ? kv('overdue', String(overdue.length), 'bad') : ''}
    ${todayCnt.length > 0 ? kv('due today', String(todayCnt.length), 'warn') : ''}
    ${kv('completion', `${done.length}/${total} (${completionPct.toFixed(0)}%)`, 'ok')}
  `;

  let listHTML = '';
  if (sorted.length === 0) {
    listHTML = `<div class="empty">no tasks · <span class="lnk" data-action="open-modal" data-type="tasks">add one</span></div>`;
  } else {
    listHTML = sorted.map((t, i, arr) => {
      const isOver = !t.done && isOverdue(t.dueDate);
      const isToday = !t.done && isTodayDate(t.dueDate);
      const pri = t.priority || '';
      const priCls = pri === 'high' ? 'err' : pri === 'med' ? 'warn' : 'info';
      const isLast = i === arr.length - 1;
      const checkbox = t.done ? '[x]' : '[ ]';
      return `<div class="li${isLast ? ' last' : ''}${t.done ? ' dim' : ''}">
        <span class="nm">${checkbox} ${escHTML(t.text)}</span>
        ${pri ? `<span class="tag ${priCls}">${pri}</span>` : ''}
        ${t.dueDate ? `<span class="due ${isOver ? 'over' : isToday ? 'today' : ''}">${formatDate(t.dueDate)}</span>` : ''}
        <span class="acts">
          <button class="ok" data-action="toggle-task" data-id="${t.id}">${t.done ? 'undo' : 'done'}</button>
          <button data-action="edit" data-type="tasks" data-id="${t.id}">edit</button>
          <button class="err" data-action="rm" data-type="tasks" data-id="${t.id}">rm</button>
        </span>
      </div>`;
    }).join('');
  }

  return `
    ${sec('tasks · summary')}
    ${summary}
    ${sec('all tasks', { meta: total + ' total', add: { action: 'open-modal', type: 'tasks', label: '+ add' } })}
    ${listHTML}
  `;
}


// ──── Master render ──────────────────────────────────────────
function updateBadges() {
  const e = state.bills.filter(b => !b.paid).length;
  const t = state.tasks.filter(t => !t.done).length;
  const set = (cls, v) => document.querySelectorAll(cls).forEach(el => {
    el.textContent = v; el.style.display = v > 0 ? 'inline-block' : 'none';
  });
  set('.badge-e', e); set('.badge-t', t);
}

function render() {
  updateBadges();
  document.querySelectorAll('nav.btm button').forEach(b => b.classList.toggle('active', b.dataset.tab === currentTab));
  const main = document.getElementById('content');
  if (currentTab === 'overview') main.innerHTML = renderOverview();
  else if (currentTab === 'income') main.innerHTML = renderIncome();
  else if (currentTab === 'expenses') main.innerHTML = renderExpenses();
  else if (currentTab === 'budget') main.innerHTML = renderBudget();
  else if (currentTab === 'tasks') main.innerHTML = renderTasks();
  window.scrollTo({ top: 0, behavior: 'instant' });
}

// ──── Event handlers ─────────────────────────────────────────
document.addEventListener('click', e => {
  const tab = e.target.closest('nav.btm button[data-tab]');
  if (tab) { currentTab = tab.dataset.tab; localStorage.setItem(TAB_KEY, currentTab); render(); return; }

  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const act = btn.dataset.action;

  if (act === 'goto') { currentTab = btn.dataset.tab; localStorage.setItem(TAB_KEY, currentTab); render(); }
  else if (act === 'open-modal') { openModal(btn.dataset.type); if (btn.dataset.type === 'petty') document.getElementById('petty-date-input').value = isoDate(todayStart()); }
  else if (act === 'close-modal') document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
  else if (act === 'rm') {
    if (confirm('Delete?')) {
      const t = btn.dataset.type === 'expenses' ? 'bills' : btn.dataset.type;
      state[t] = state[t].filter(x => x.id !== btn.dataset.id);
      saveState(); render();
    }
  }
  else if (act === 'edit') openModal(btn.dataset.type, btn.dataset.id);
  else if (act === 'pay-bill') {
    const b = state.bills.find(x => x.id === btn.dataset.id);
    if (b) {
      if (b.recurring && b.recurring !== 'once' && b.dueDate) {
        const d = new Date(b.dueDate);
        if (b.recurring === 'monthly') d.setMonth(d.getMonth()+1);
        else if (b.recurring === 'weekly') d.setDate(d.getDate()+7);
        else if (b.recurring === 'yearly') d.setFullYear(d.getFullYear()+1);
        b.dueDate = isoDate(d);
      } else b.paid = true;
      saveState(); render();
    }
  }
  else if (act === 'unpay-bill') { const b = state.bills.find(x => x.id === btn.dataset.id); if (b) { b.paid = false; saveState(); render(); } }
  else if (act === 'toggle-task') { const t = state.tasks.find(x => x.id === btn.dataset.id); if (t) { t.done = !t.done; saveState(); render(); } }
  else if (act === 'goal-add') {
    const g = state.goals.find(x => x.id === btn.dataset.id);
    if (g) { const a = parseFloat(prompt(`Fund "${g.name}":`)); if (a > 0) { g.currentAmount = (parseFloat(g.currentAmount) || 0) + a; saveState(); render(); } }
  }
  else if (act === 'prev-month') { const v = getViewMonth(); viewMonth = { year: v.month === 0 ? v.year - 1 : v.year, month: v.month === 0 ? 11 : v.month - 1 }; render(); }
  else if (act === 'next-month') { const v = getViewMonth(); viewMonth = { year: v.month === 11 ? v.year + 1 : v.year, month: v.month === 11 ? 0 : v.month + 1 }; render(); }
  else if (act === 'curr-month') { viewMonth = null; render(); }
  else if (act === 'open-presets') openPresetPicker();
  else if (act === 'export') {
    const b = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const u = URL.createObjectURL(b); const a = document.createElement('a');
    a.href = u; a.download = 'ledgeon.json'; a.click(); URL.revokeObjectURL(u);
  }
  else if (act === 'import') document.getElementById('file-import').click();
  else if (act === 'reset') { if (confirm('Wipe all data?')) { state = { tasks:[], bills:[], events:[], income:[], goals:[], petty:[] }; saveState(); render(); } }
});

document.getElementById('file-import').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const imp = JSON.parse(ev.target.result);
      if (confirm('Import data? Replaces current.')) {
        state = {
          tasks: imp.tasks||[], bills: imp.bills||[], events: imp.events||[],
          income: imp.income||[], goals: imp.goals||[], petty: imp.petty||[]
        };
        saveState(); render();
      }
    } catch { alert('Error importing.'); }
  };
  r.readAsText(f); e.target.value = '';
});

document.addEventListener('change', e => {
  if (e.target.id === 'tipsEnabled') {
    const g = document.getElementById('tipsInputGroup');
    if (e.target.checked) { g.style.display = 'flex'; setTimeout(() => g.style.opacity = '1', 10); }
    else { g.style.opacity = '0'; setTimeout(() => g.style.display = 'none', 200); }
  }
  else if (e.target.id === 'tax-pct-input') {
    const v = parseFloat(e.target.value);
    if (!isNaN(v) && v >= 0 && v <= 100) { setTaxPct(v); render(); }
  }
});

function openModal(type, id = null) {
  document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
  const f = document.querySelector(`#modal-${type} form`);
  if (!f) return;
  f.reset();
  editingItem = id ? { type, id } : null;
  const tArr = type === 'expenses' ? state.bills : state[type];
  if (id) {
    const item = tArr.find(x => x.id === id);
    if (item) {
      Object.keys(item).forEach(k => { if (f.elements[k]) f.elements[k].value = item[k]; });
      if (type === 'income') {
        f.elements['amount'].value = item.baseAmount !== undefined ? item.baseAmount : item.amount;
        if (item.hours != null && !isNaN(item.hours) && item.hours > 0) {
          const totalMin = Math.round(Number(item.hours) * 60);
          const h = Math.floor(totalMin / 60); const m = totalMin % 60;
          f.elements['hours'].value = h ? h : '';
          f.elements['minutes'].value = m ? m : '';
        } else { f.elements['hours'].value = ''; f.elements['minutes'].value = ''; }
        f.elements['tipsEnabled'].checked = !!item.tipsEnabled;
        f.elements['tipsValue'].value = item.tipsValue || 6;
        f.elements['tipsType'].value = item.tipsType || 'percent';
        f.elements['tipsEnabled'].dispatchEvent(new Event('change', { bubbles: true }));
      }
    }
  }
  document.getElementById('modal-' + type).classList.add('open');
  setTimeout(() => f.querySelector('input')?.focus(), 50);
}

document.querySelectorAll('form[data-type]').forEach(f => {
  f.addEventListener('submit', e => {
    e.preventDefault();
    const fd = new FormData(f); const type = f.dataset.type;
    const isEdit = editingItem && editingItem.type === type;
    const tArr = type === 'expenses' ? state.bills : state[type];
    const item = isEdit ? tArr.find(x => x.id === editingItem.id) : { id: nextId(type === 'expenses' ? 'bills' : type), createdAt: isoDate(todayStart()) };
    const pAmt = v => { const n = parseFloat(String(v).replace(/[$,\s]/g, '')); return isNaN(n) ? 0 : n; };

    if (type === 'income') {
      item.source = fd.get('source');
      const base = pAmt(fd.get('amount'));
      item.baseAmount = base;
      const hVal = parseFloat(fd.get('hours')) || 0; const mVal = parseFloat(fd.get('minutes')) || 0;
      const totalHours = hVal + mVal / 60;
      item.hours = totalHours > 0 ? totalHours : null;
      item.tipsEnabled = f.elements['tipsEnabled'].checked;
      item.tipsType = f.elements['tipsType'].value;
      let final = base;
      if (item.tipsEnabled) {
        let tv = pAmt(f.elements['tipsValue'].value);
        if (tv === 0) tv = 6;
        item.tipsValue = tv;
        final += item.tipsType === 'percent' ? base * (tv / 100) : tv;
      } else item.tipsValue = 0;
      item.amount = final;
      item.frequency = fd.get('frequency') || 'monthly';
      item.receivedAt = fd.get('receivedAt') || null;
    } else if (type === 'expenses') {
      item.name = fd.get('name'); item.amount = pAmt(fd.get('amount'));
      item.category = fd.get('category'); item.recurring = fd.get('recurring') || 'monthly';
      item.dueDate = fd.get('date') || null; if (!isEdit) item.paid = false;
    } else if (type === 'tasks') {
      item.text = fd.get('text'); item.priority = fd.get('priority');
      item.dueDate = fd.get('date') || null; if (!isEdit) item.done = false;
    } else if (type === 'goals') {
      item.name = fd.get('name'); item.targetAmount = pAmt(fd.get('targetAmount'));
      item.currentAmount = pAmt(fd.get('currentAmount')); item.targetDate = fd.get('targetDate') || null;
    } else if (type === 'petty') {
      item.amount = pAmt(fd.get('amount')); item.category = fd.get('category');
      item.note = fd.get('note'); item.date = fd.get('date');
    }

    if (!isEdit) tArr.push(item);

    if (!isEdit && type === 'income' && state.bills.length === 0) {
      if (confirm('Add starter budget based on this income?')) {
        const iMo = monthlyEq(item.amount, item.frequency);
        PRESET_BILLS.forEach(p => state.bills.push({
          id: nextId('bills'), name: p.name, amount: Math.round(iMo*(p.pct/100)),
          category: p.category, recurring: p.recurring, paid: false,
          createdAt: isoDate(todayStart())
        }));
        currentTab = 'expenses'; localStorage.setItem(TAB_KEY, currentTab);
      }
    }

    saveState();
    document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
    render();
  });
});

let presetSel = new Set();
function openPresetPicker() {
  presetSel.clear();
  const { year, month } = getViewMonth();
  const { income: inc } = getMonthlyStats(year, month);
  const list = document.getElementById('preset-list');
  if (inc === 0) list.innerHTML = `<div class="empty">add income first</div>`;
  else {
    const ex = new Set(state.bills.map(b => b.name.toLowerCase()));
    list.innerHTML = PRESET_BILLS.map((p, i) => `<div class="preset-row ${ex.has(p.name.toLowerCase())?'exists':''}" data-idx="${i}"><div class="box"></div><div class="nm">${p.name}</div><div class="pct">${fmtMoney(inc*(p.pct/100),{round:true})} · ${p.pct}%</div></div>`).join('');
    list.querySelectorAll('.preset-row:not(.exists)').forEach(r => r.addEventListener('click', () => {
      const i = parseInt(r.dataset.idx);
      if (presetSel.has(i)) { presetSel.delete(i); r.classList.remove('sel'); }
      else { presetSel.add(i); r.classList.add('sel'); }
      document.getElementById('preset-apply-btn').disabled = presetSel.size === 0;
    }));
  }
  document.getElementById('modal-presets').classList.add('open');
}

document.getElementById('preset-apply-btn').addEventListener('click', () => {
  const { year, month } = getViewMonth();
  const { income: inc } = getMonthlyStats(year, month);
  presetSel.forEach(idx => {
    const p = PRESET_BILLS[idx];
    state.bills.push({
      id: nextId('bills'), name: p.name, amount: Math.round(inc*(p.pct/100)),
      category: p.category, recurring: p.recurring, paid: false,
      createdAt: isoDate(todayStart())
    });
  });
  saveState();
  document.getElementById('modal-presets').classList.remove('open');
  render();
});

render();
</script>
