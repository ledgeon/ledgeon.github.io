<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>Ledgeon</title>
<style>
:root {
  --bg:            #ffffff;
  --bg-subtle:     #f7f7f8;
  --bg-hover:      #f2f2f4;
  --border:        #e5e5ea;
  --border-light:  #efeff2;
  --ink:           #1c1c1e;
  --ink-2:         #48484a;
  --ink-3:         #8e8e93;
  --ink-4:         #aeaeb2;
  --accent:        #2563eb;
  --accent-soft:   #eff5ff;
  --positive:      #16a34a;
  --positive-soft: #ecfdf3;
  --negative:      #dc2626;
  --negative-soft: #fef2f2;
  --warning:       #d97706;
  --warning-soft:  #fef3e2;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg); color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI Variable Text', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  font-size: 15px; line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  min-height: 100%;
}
body {
  display: flex; flex-direction: column;
  min-height: 100vh; min-height: 100dvh;
  padding-bottom: calc(56px + env(safe-area-inset-bottom));
  max-width: 720px;
  margin: 0 auto;
}
button { cursor: pointer; font: inherit; color: inherit; background: none; border: none; padding: 0; }
input, select, textarea { font: inherit; color: inherit; }
main { flex: 1; }

/* ── HEADER ─────────────────────────────────────────────── */
.mhdr {
  padding: 13px 16px;
  padding-top: calc(13px + env(safe-area-inset-top));
  border-bottom: 0.5px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
  background: var(--bg);
  position: sticky; top: 0; z-index: 50;
}
.mtitle {
  font-size: 17px; font-weight: 600;
  letter-spacing: -0.3px;
  color: var(--ink);
}
.mhdr-r { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.mmeta {
  font-size: 13px;
  color: var(--ink-3);
  font-weight: 400;
}
.mhdr-menu-btn {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: var(--bg-subtle);
  color: var(--ink-2);
  font-size: 16px;
  line-height: 1;
  display: inline-flex; align-items: center; justify-content: center;
}
.mhdr-menu-btn:hover { background: var(--bg-hover); }

.mhdr-menu {
  position: fixed;
  top: calc(50px + env(safe-area-inset-top));
  right: 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  z-index: 60;
  min-width: 180px;
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08), 0 0 0 0.5px var(--border);
  padding: 4px;
}
.mhdr-menu[hidden] { display: none; }
.mhdr-menu button {
  padding: 9px 12px;
  background: none;
  color: var(--ink);
  font-size: 14px;
  font-weight: 500;
  text-align: left;
  width: 100%;
  border-radius: 6px;
}
.mhdr-menu button:hover { background: var(--bg-subtle); }
.mhdr-menu button.danger { color: var(--negative); }
.mhdr-menu button.danger:hover { background: var(--negative-soft); }

/* ── HERO BLOCK ─────────────────────────────────────────── */
.blk {
  padding: 18px 16px;
  border-bottom: 0.5px solid var(--border-light);
}
.blk + .blk { border-top: none; }
.blk-l {
  font-size: 13px;
  color: var(--ink-3);
  font-weight: 500;
  letter-spacing: 0.1px;
}
.blk-v {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -0.8px;
  color: var(--ink);
  margin-top: 4px;
  font-variant-numeric: tabular-nums;
  line-height: 1.1;
  word-break: break-word;
}
.blk-v.positive { color: var(--positive); }
.blk-v.negative { color: var(--negative); }
.blk-v.warning { color: var(--warning); }
.blk-v.med { font-size: 26px; }
.blk-v .dim { color: var(--ink-3); font-size: 0.65em; font-weight: 500; }
.blk-s {
  font-size: 13px;
  color: var(--ink-3);
  margin-top: 4px;
}
.blk-s .lnk { color: var(--accent); cursor: pointer; font-weight: 500; }
.blk-s .lnk:hover { text-decoration: underline; }

/* ── SECTION HEADER ─────────────────────────────────────── */
.sh {
  padding: 18px 16px 8px;
  display: flex; align-items: baseline;
  gap: 10px; flex-wrap: wrap;
}
.sh h3 {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-2);
  letter-spacing: 0.1px;
}
.sh .sh-meta {
  font-size: 13px;
  color: var(--ink-3);
  font-weight: 400;
  margin-left: 0;
}
.sh .add {
  background: var(--bg-subtle);
  color: var(--accent);
  font-size: 13px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 6px;
  margin-left: auto;
}
.sh .add:hover { background: var(--accent-soft); }
.sh .month-nav {
  margin-left: auto;
  display: inline-flex; align-items: center;
  gap: 1px;
  background: var(--bg-subtle);
  border-radius: 7px;
  padding: 2px;
}
.sh .month-nav .nav-arrow {
  background: none;
  color: var(--ink-2);
  font-size: 13px;
  font-weight: 600;
  padding: 0;
  width: 22px; height: 22px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 5px;
}
.sh .month-nav .nav-arrow:hover { background: var(--bg-hover); color: var(--ink); }
.sh .month-nav .label {
  font-size: 12.5px;
  font-weight: 600;
  color: var(--ink);
  padding: 0 6px;
  letter-spacing: 0.2px;
}
.sh .month-nav .today-btn {
  background: var(--accent);
  color: white;
  font-size: 11.5px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 4px;
  margin-left: 4px;
}

/* ── ROW (label : value) ────────────────────────────────── */
.row {
  display: grid;
  grid-template-columns: 1fr auto;
  padding: 9px 16px;
  font-size: 15px;
  border-bottom: 0.5px solid var(--border-light);
  align-items: center;
  gap: 10px;
}
.row .l { color: var(--ink-2); }
.row .v {
  font-variant-numeric: tabular-nums;
  font-weight: 500;
  color: var(--ink);
  white-space: nowrap;
}
.row .v.positive { color: var(--positive); }
.row .v.negative { color: var(--negative); }
.row .v.muted { color: var(--ink-3); text-decoration: line-through; }
.row.strong .v { font-weight: 600; }
.row.strong .l { color: var(--ink); font-weight: 500; }

/* ── LIST ITEM (editable: name + meta + value + actions) ── */
.li {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  padding: 11px 16px;
  border-bottom: 0.5px solid var(--border-light);
  align-items: center;
}
.li.muted { opacity: 0.55; }
.li-info { min-width: 0; }
.li-n {
  font-size: 15px;
  font-weight: 500;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: flex; align-items: center; gap: 6px;
}
.li.muted .li-n { color: var(--ink-3); text-decoration: line-through; }
.li-meta {
  font-size: 13px;
  color: var(--ink-3);
  margin-top: 2px;
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  align-items: center;
}
.li-meta .dot { color: var(--ink-4); }
.li-meta .neg { color: var(--negative); font-weight: 500; }
.li-meta .warn { color: var(--warning); font-weight: 500; }
.li-meta .pos { color: var(--positive); font-weight: 500; }
.li-r { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
.li-v {
  font-size: 15px;
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  color: var(--ink);
  white-space: nowrap;
}
.li-v.positive { color: var(--positive); }
.li-v.negative { color: var(--negative); }
.li-v.muted { color: var(--ink-3); text-decoration: line-through; }
.li-acts { display: flex; gap: 4px; }
.li-acts button {
  background: var(--bg-subtle);
  color: var(--ink-2);
  font-size: 12.5px;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 5px;
  min-height: 24px;
}
.li-acts button:hover { background: var(--bg-hover); color: var(--ink); }
.li-acts button.primary { background: var(--accent-soft); color: var(--accent); }
.li-acts button.primary:hover { background: #e0ebff; }
.li-acts button.danger { color: var(--ink-2); }
.li-acts button.danger:hover { background: var(--negative-soft); color: var(--negative); }

/* status pill for inline meta */
.pill {
  display: inline-block;
  padding: 1px 7px;
  border-radius: 10px;
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: 0.1px;
}
.pill.neg { background: var(--negative-soft); color: var(--negative); }
.pill.warn { background: var(--warning-soft); color: var(--warning); }
.pill.pos { background: var(--positive-soft); color: var(--positive); }
.pill.info { background: var(--accent-soft); color: var(--accent); }
.pill.muted { background: var(--bg-subtle); color: var(--ink-3); }

/* ── CATEGORY BAR / METER ───────────────────────────────── */
.meter {
  display: grid;
  grid-template-columns: 96px 1fr 56px;
  gap: 12px;
  padding: 8px 16px;
  align-items: center;
  font-size: 13.5px;
  border-bottom: 0.5px solid var(--border-light);
}
.meter-l {
  color: var(--ink-2);
  font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.meter-b {
  height: 8px;
  background: var(--bg-hover);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}
.meter-f {
  height: 100%;
  background: var(--accent);
  border-radius: 4px;
}
.meter-f.warn { background: var(--warning); }
.meter-f.neg { background: var(--negative); }
.meter-v {
  color: var(--ink);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  font-size: 13.5px;
  text-align: right;
}

/* ── INCOME TREND BAR CHART ─────────────────────────────── */
.chart {
  padding: 12px 16px 16px;
  border-bottom: 0.5px solid var(--border-light);
}
.chart-bars {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 4px;
  align-items: end;
  height: 64px;
  margin-bottom: 6px;
}
.chart-bar {
  background: var(--accent);
  border-radius: 3px 3px 0 0;
  min-height: 3px;
  width: 100%;
}
.chart-bar.current { background: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
.chart-bar.empty { background: transparent; min-height: 0; }
.chart-labels {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 4px;
  font-size: 11px;
  text-align: center;
  color: var(--ink-3);
  letter-spacing: 0.2px;
}
.chart-labels .current { color: var(--accent); font-weight: 600; }
.chart-empty {
  padding: 28px 16px;
  text-align: center;
  font-size: 13px;
  color: var(--ink-3);
  border-bottom: 0.5px solid var(--border-light);
}

/* ── GOAL ───────────────────────────────────────────────── */
.goal {
  padding: 12px 16px;
  border-bottom: 0.5px solid var(--border-light);
}
.goal-h {
  display: flex; justify-content: space-between;
  font-size: 14px;
  margin-bottom: 6px;
  align-items: baseline;
}
.goal-h .n { color: var(--ink); font-weight: 500; }
.goal-h .p { color: var(--accent); font-weight: 600; font-size: 13px; }
.goal-bar {
  height: 6px;
  background: var(--bg-hover);
  border-radius: 3px;
  overflow: hidden;
}
.goal-bar-f {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
}
.goal-meta {
  font-size: 12.5px;
  color: var(--ink-3);
  margin-top: 6px;
  display: flex; gap: 6px; flex-wrap: wrap;
  align-items: center;
}
.goal-meta .req { color: var(--warning); font-weight: 500; }
.goal-acts {
  display: flex; gap: 6px;
  margin-top: 10px;
  justify-content: flex-end;
}
.goal-acts button {
  background: var(--bg-subtle);
  color: var(--ink-2);
  font-size: 12.5px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 6px;
  min-height: 26px;
}
.goal-acts button.primary { background: var(--accent-soft); color: var(--accent); }
.goal-acts button.primary:hover { background: #e0ebff; }
.goal-acts button.danger:hover { background: var(--negative-soft); color: var(--negative); }
.goal-acts button:hover:not(.primary):not(.danger) { background: var(--bg-hover); color: var(--ink); }

/* ── TASK ───────────────────────────────────────────────── */
.task {
  display: grid;
  grid-template-columns: 18px 1fr auto;
  gap: 12px;
  padding: 11px 16px;
  border-bottom: 0.5px solid var(--border-light);
  align-items: center;
}
.task-cb {
  width: 18px; height: 18px;
  border: 1.5px solid var(--ink-4);
  border-radius: 5px;
  position: relative;
  cursor: pointer;
  flex-shrink: 0;
  background: var(--bg);
  transition: all 0.12s;
}
.task-cb:hover { border-color: var(--accent); }
.task-cb.done { background: var(--accent); border-color: var(--accent); }
.task-cb.done::after {
  content: '';
  position: absolute;
  left: 5px; top: 2.5px;
  width: 5px; height: 9px;
  border: solid white;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}
.task-info { min-width: 0; }
.task-n {
  font-size: 15px;
  color: var(--ink);
  font-weight: 500;
}
.task.done .task-n { color: var(--ink-3); text-decoration: line-through; }
.task-meta {
  font-size: 13px;
  color: var(--ink-3);
  margin-top: 2px;
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  align-items: center;
}
.task-meta .pri-h { color: var(--negative); font-weight: 500; }
.task-meta .pri-m { color: var(--warning); font-weight: 500; }
.task-meta .overdue { color: var(--negative); font-weight: 500; }
.task-meta .today { color: var(--warning); font-weight: 500; }
.task-meta .dot { color: var(--ink-4); }
.task-acts { display: flex; gap: 4px; flex-shrink: 0; }
.task-acts button {
  background: var(--bg-subtle);
  color: var(--ink-2);
  font-size: 12.5px;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 5px;
  min-height: 24px;
}
.task-acts button:hover { background: var(--bg-hover); color: var(--ink); }
.task-acts button.danger:hover { background: var(--negative-soft); color: var(--negative); }

/* ── NOTE / EMPTY ───────────────────────────────────────── */
.note {
  font-size: 13.5px;
  padding: 10px 16px;
  color: var(--ink-3);
  background: var(--bg-subtle);
  border-bottom: 0.5px solid var(--border-light);
}
.note .lnk { color: var(--accent); cursor: pointer; font-weight: 500; }
.note .lnk:hover { text-decoration: underline; }
.empty {
  padding: 28px 16px;
  text-align: center;
  font-size: 13.5px;
  color: var(--ink-3);
  border-bottom: 0.5px solid var(--border-light);
}
.empty .lnk { color: var(--accent); cursor: pointer; font-weight: 500; }
.empty .lnk:hover { text-decoration: underline; }

.tax-pct-input {
  width: 44px;
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: 5px;
  color: var(--ink);
  padding: 2px 6px;
  font: inherit; font-size: 13px; font-weight: 600;
  text-align: center;
  outline: none;
  font-variant-numeric: tabular-nums;
}
.tax-pct-input:focus { border-color: var(--accent); }

/* ── BOTTOM NAV ─────────────────────────────────────────── */
nav.mnav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  max-width: 720px; margin: 0 auto;
  display: grid; grid-template-columns: repeat(5, 1fr);
  background: var(--bg);
  border-top: 0.5px solid var(--border);
  padding-bottom: env(safe-area-inset-bottom);
}
nav.mnav button {
  background: none;
  color: var(--ink-3);
  font-size: 11.5px;
  font-weight: 500;
  padding: 9px 4px 11px;
  min-height: 56px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px;
  letter-spacing: 0.1px;
  position: relative;
}
nav.mnav button .nav-ic {
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  color: currentColor;
}
nav.mnav button .nav-ic svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
nav.mnav button.active { color: var(--accent); font-weight: 600; }
nav.mnav button.active .nav-ic svg { stroke-width: 2; }
nav.mnav button .badge {
  position: absolute;
  top: 6px;
  left: calc(50% + 5px);
  background: var(--negative);
  color: white;
  font-size: 10px;
  font-weight: 700;
  padding: 0 5px;
  min-width: 16px; height: 16px;
  border-radius: 8px;
  display: inline-flex; align-items: center; justify-content: center;
  letter-spacing: 0;
}

/* ── MODAL ──────────────────────────────────────────────── */
.modal { display: none; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; padding: 14px; }
.modal.open { display: flex; }
.modal-bd { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.4); }
.modal-c {
  position: relative;
  background: var(--bg);
  border-radius: 14px;
  width: 100%; max-width: 460px;
  max-height: 88vh; overflow-y: auto;
  box-shadow: 0 24px 60px rgba(0, 0, 0, 0.15);
}
.modal-t {
  padding: 16px 18px;
  font-size: 17px;
  font-weight: 600;
  color: var(--ink);
  border-bottom: 0.5px solid var(--border);
  letter-spacing: -0.2px;
}
.modal form { padding: 16px 18px; }
.modal #preset-list { padding: 14px 18px; }
.modal-c > div[style*="font-size"] { padding: 14px 18px 0 !important; color: var(--ink-3); font-size: 13.5px !important; }

.frow { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
.fcol { flex: 1; min-width: 130px; }
.flbl {
  display: block;
  color: var(--ink-2);
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 5px;
}

.input, .select, textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--ink);
  font-size: 15px;
  padding: 9px 12px;
  outline: none;
  transition: border-color 0.12s, box-shadow 0.12s;
}
.input:focus, .select:focus, textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.input::placeholder { color: var(--ink-4); }

.hours-input {
  display: flex; align-items: center; gap: 7px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--ink);
  padding: 0 11px; height: 38px;
}
.hours-input:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.hours-input input {
  background: transparent;
  border: none;
  color: var(--ink);
  font: inherit; font-size: 15px;
  padding: 0; outline: none;
  width: 30px; text-align: center;
  font-variant-numeric: tabular-nums;
  font-weight: 500;
  -moz-appearance: textfield;
}
.hours-input input::-webkit-outer-spin-button,
.hours-input input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.hours-input span {
  color: var(--ink-3);
  font-size: 13px;
}

.tip-box {
  background: var(--bg-subtle);
  padding: 11px 13px;
  border-radius: 9px;
  margin-bottom: 12px;
}
.tip-toggle {
  display: flex; align-items: center; gap: 8px;
  font-size: 14px;
  color: var(--ink);
  cursor: pointer;
}
.tip-toggle input[type="checkbox"] {
  width: 16px; height: 16px;
  accent-color: var(--accent);
  cursor: pointer;
}
.tip-input-grp {
  display: none; gap: 7px; align-items: center;
  margin-top: 9px;
  opacity: 0; transition: opacity 0.2s;
}
.tip-input-grp input { width: 68px; padding: 6px 9px; font-size: 14px; }
.tip-input-grp select { width: 72px; padding: 6px 9px; font-size: 14px; }

.factions {
  display: flex; justify-content: flex-end; gap: 8px;
  margin-top: 14px; padding-top: 12px;
  border-top: 0.5px solid var(--border);
}
.factions button {
  padding: 8px 16px;
  border-radius: 8px;
  background: var(--bg-subtle);
  color: var(--ink);
  font-size: 14px;
  font-weight: 500;
}
.factions button:hover { background: var(--bg-hover); }
.factions button.primary {
  background: var(--accent);
  color: white;
}
.factions button.primary:hover { background: #1d4fd6; }
.factions button:disabled { opacity: 0.4; cursor: not-allowed; }

<script>
'use strict';

// ──── Constants ──────────────────────────────────────────────
const ART = `

       ▄▄
      ████
     ██████
$$$  ██████
     ██████
     ██████
      ████
       ▀▀

     ledgeon`;

const STORAGE_KEY = 'ledgeon-state-v4';
const TAB_KEY = 'ledgeon-tab';
const TAX_KEY = 'ledgeon-tax-pct';
const TABS = ['overview', 'income', 'expenses', 'budget', 'tasks'];

const CATEGORIES = {
  housing:   { label: 'housing',   color: '#d4a574' },
  utilities: { label: 'utilities', color: '#7eb6f0' },
  transport: { label: 'transport', color: '#b08bc7' },
  insurance: { label: 'insurance', color: '#e57373' },
  food:      { label: 'food',      color: '#86c98a' },
  media:     { label: 'media',     color: '#f5c890' },
  debt:      { label: 'debt',      color: '#ff8a65' },
  health:    { label: 'health',    color: '#c8a2ff' },
  other:     { label: 'other',     color: '#6b7280' },
};

const PRESET_BILLS = [
  { name: 'Housing (Rent/Mortgage)',     recurring: 'monthly', category: 'housing',   pct: 30 },
  { name: 'Utilities & Internet',        recurring: 'monthly', category: 'utilities', pct: 5 },
  { name: 'Groceries',                   recurring: 'monthly', category: 'food',      pct: 15 },
  { name: 'Transportation',              recurring: 'monthly', category: 'transport', pct: 10 },
  { name: 'Insurance',                   recurring: 'monthly', category: 'insurance', pct: 5 },
  { name: 'Subscriptions & Media',       recurring: 'monthly', category: 'media',     pct: 2 },
  { name: 'Debt Repayment',              recurring: 'monthly', category: 'debt',      pct: 10 },
];

// ──── State ──────────────────────────────────────────────────
let state = { tasks: [], bills: [], events: [], income: [], goals: [], petty: [], payments: [] };
const possibleKeys = ['ledgeon-state-v5', 'ledgeon-state-v4', 'ledgeon-prompt-v1', 'ledgeon-state-v3'];
for (const k of possibleKeys) {
  try {
    const raw = localStorage.getItem(k);
    if (raw) {
      const v = JSON.parse(raw);
      if (Array.isArray(v.bills) || Array.isArray(v.income)) {
        state = {
          tasks:    Array.isArray(v.tasks)    ? v.tasks    : [],
          bills:    Array.isArray(v.bills)    ? v.bills    : [],
          events:   Array.isArray(v.events)   ? v.events   : [],
          income:   Array.isArray(v.income)   ? v.income   : [],
          goals:    Array.isArray(v.goals)    ? v.goals    : [],
          petty:    Array.isArray(v.petty)    ? v.petty    : [],
          payments: Array.isArray(v.payments) ? v.payments : [],
        };
        break;
      }
    }
  } catch {}
}

// migrate income data
state.income.forEach(i => {
  if (i.hoursWorked !== undefined && i.hours === undefined) { i.hours = i.hoursWorked; delete i.hoursWorked; }
  if (i.cashTipPct || i.cashTipAmount) {
    const base = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
    i.baseAmount = base; i.tipsEnabled = true;
    if (i.cashTipPct) {
      i.tipsType = 'percent'; i.tipsValue = Number(i.cashTipPct);
      i.amount = base + (base * Number(i.cashTipPct) / 100);
    } else if (i.cashTipAmount) {
      i.tipsType = 'amount'; i.tipsValue = Number(i.cashTipAmount);
      i.amount = base + Number(i.cashTipAmount);
    }
    delete i.cashTipPct; delete i.cashTipAmount;
  }
  if (i.baseAmount === undefined) {
    i.baseAmount = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
  }
});

let currentTab = localStorage.getItem(TAB_KEY) || 'overview';
if (!TABS.includes(currentTab)) currentTab = 'overview';
let editingItem = null;
let viewMonth = null;

function getTaxPct() { const v = parseFloat(localStorage.getItem(TAX_KEY)); return isNaN(v) ? 25 : v; }
function setTaxPct(v) { localStorage.setItem(TAX_KEY, String(v)); }

// ──── Helpers ────────────────────────────────────────────────
function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); updateBadges(); } catch {} }
function nextId(col) {
  const pfx = { tasks: 't', bills: 'b', events: 'e', income: 'i', goals: 'g', petty: 'p', payments: 'pm' }[col];
  let max = 0;
  for (const item of state[col]) { const n = parseInt(item.id?.slice(1), 10); if (!isNaN(n) && n > max) max = n; }
  return pfx + (max + 1);
}
function startOfDay(d) { const x = new Date(d); x.setHours(0,0,0,0); return x; }
function todayStart() { return startOfDay(new Date()); }
function isoDate(d) { const x = startOfDay(d); return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`; }
function formatDate(s) {
  if (!s) return '—';
  const d = new Date(s + (s.includes('T') ? '' : 'T00:00:00'));
  if (isNaN(d)) return s;
  const diff = Math.round((d - todayStart()) / 86400000);
  if (diff === 0) return 'today';
  if (diff === 1) return 'tomorrow';
  if (diff === -1) return 'yesterday';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toLowerCase();
}
function isOverdue(s) { return s && new Date(s + (s.includes('T') ? '' : 'T00:00:00')) < todayStart(); }
function isTodayDate(s) { return s && +new Date(s + (s.includes('T') ? '' : 'T00:00:00')) === +todayStart(); }
function fmtMoney(n, opts = {}) {
  const v = parseFloat(String(n).replace(/[^\d.-]/g, '')) || 0;
  const abs = Math.abs(v).toLocaleString('en-US', { minimumFractionDigits: opts.round ? 0 : 2, maximumFractionDigits: opts.round ? 0 : 2 });
  return (v < 0 ? '−$' : (opts.sign && v > 0 ? '+$' : '$')) + abs;
}
function fmtHM(decimal) {
  if (decimal == null || isNaN(decimal)) return '—';
  if (decimal === 0) return '0h';
  const totalMin = Math.round(decimal * 60);
  const h = Math.floor(totalMin / 60); const m = totalMin % 60;
  if (h === 0) return `${m}m`; if (m === 0) return `${h}h`;
  return `${h}h${m}m`;
}
function escHTML(s) { return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function sparkline(values) {
  if (!values || values.length === 0) return '─'.repeat(8);
  const chars = ['▁','▂','▃','▄','▅','▆','▇','█'];
  const min = Math.min(...values); const max = Math.max(...values);
  if (max === min) return (max > 0 ? '▄' : '▁').repeat(values.length);
  return values.map(v => {
    if (v <= 0) return '▁';
    const idx = Math.round(((v - min) / (max - min)) * (chars.length - 1));
    return chars[Math.max(0, Math.min(chars.length - 1, idx))];
  }).join('');
}
function asciiBar(pct, width = 20) {
  const f = Math.max(0, Math.min(width, Math.round(width * (pct / 100))));
  return `<span class="f">${'█'.repeat(f)}</span><span class="e">${'░'.repeat(width - f)}</span>`;
}
function monthlyEq(amount, freq) {
  const val = parseFloat(String(amount).replace(/[^\d.-]/g, '')) || 0;
  if (!val) return 0;
  switch (freq || 'monthly') {
    case 'weekly': return val * 4.333;
    case 'biweekly': return val * 2.166;
    case 'monthly': return val;
    case 'yearly': return val / 12;
    default: return 0;
  }
}
function getViewMonth() { if (viewMonth) return viewMonth; const d = new Date(); return { year: d.getFullYear(), month: d.getMonth() }; }

// ──── Calculations ───────────────────────────────────────────
function getMonthlyStats(year, month) {
  let income = 0; let bills = 0; let tips = 0;
  for (const i of state.income) {
    const isOnce = i.frequency === 'once' || !i.frequency;
    const amt = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
    let base = i.baseAmount !== undefined ? parseFloat(String(i.baseAmount).replace(/[^\d.-]/g, '')) || 0 : amt;
    const tipAmt = Math.max(0, amt - base);
    if (isOnce) {
      const dateStr = i.receivedAt || i.createdAt || isoDate(todayStart());
      const d = new Date(dateStr + (dateStr.includes('T') ? '' : 'T00:00:00'));
      if (d.getFullYear() === year && d.getMonth() === month) { income += amt; tips += tipAmt; }
    } else { income += monthlyEq(amt, i.frequency); tips += monthlyEq(tipAmt, i.frequency); }
  }
  for (const b of state.bills) {
    const amt = parseFloat(String(b.amount).replace(/[^\d.-]/g, '')) || 0;
    const isOnce = !b.recurring || b.recurring === 'once';
    if (!isOnce) bills += monthlyEq(amt, b.recurring);
    else {
      const dateStr = b.dueDate || b.createdAt || isoDate(todayStart());
      const d = new Date(dateStr + (dateStr.includes('T') ? '' : 'T00:00:00'));
      if (d.getFullYear() === year && d.getMonth() === month) bills += amt;
    }
  }
  return { income, bills, net: income - bills, tips };
}

function getMonthlyHistory(monthsBack = 6) {
  const now = new Date(); const out = [];
  for (let i = monthsBack - 1; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const stats = getMonthlyStats(d.getFullYear(), d.getMonth());
    out.push({ label: d.toLocaleString('en-US', { month: 'short' }).toLowerCase(), income: stats.income, bills: stats.bills });
  }
  return out;
}

// jan through dec of the current calendar year
function getCalendarYearHistory() {
  const now = new Date();
  const year = now.getFullYear();
  const curMonth = now.getMonth();
  const out = [];
  for (let m = 0; m < 12; m++) {
    const stats = getMonthlyStats(year, m);
    out.push({
      label: new Date(year, m).toLocaleString('en-US', { month: 'short' }).toLowerCase(),
      income: stats.income,
      bills: stats.bills,
      current: m === curMonth,
    });
  }
  return out;
}

function getIncomeStats() {
  const now = new Date(); const curY = now.getFullYear(); const curM = now.getMonth();
  let rawInc = []; let rawBills = [];
  for (let i = 1; i <= 12; i++) {
    let m = curM - i; let y = curY; if (m < 0) { m += 12; y -= 1; }
    const st = getMonthlyStats(y, m);
    if (st.income > 0) rawInc.push(st.income);
    if (st.bills > 0) rawBills.push(st.bills);
  }
  let validInc = rawInc.length > 1 ? rawInc.filter(inc => inc >= Math.max(...rawInc) * 0.5) : rawInc;
  if (validInc.length === 0) { const cur = getMonthlyStats(curY, curM); if (cur.income > 0) validInc.push(cur.income); }
  const avgMonthly = validInc.length ? validInc.reduce((a,b)=>a+b,0) / validInc.length : 0;
  const projAnnual = avgMonthly * 12;

  let validBills = rawBills;
  if (validBills.length === 0) { const cur = getMonthlyStats(curY, curM); if (cur.bills > 0) validBills.push(cur.bills); }
  const avgMonthlyBills = validBills.length ? validBills.reduce((a,b)=>a+b,0) / validBills.length : 0;
  const projAnnualBills = avgMonthlyBills * 12;

  let ytdIncome = 0; let ytdHours = 0; let ytdTips = 0;
  const daysInCurMonth = new Date(curY, curM + 1, 0).getDate(); const daysElapsed = now.getDate();
  const monthsElapsedThisYear = curM + (daysElapsed / daysInCurMonth);

  for (const i of state.income) {
    const effective = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
    const base = i.baseAmount !== undefined ? parseFloat(String(i.baseAmount).replace(/[^\d.-]/g, '')) || 0 : effective;
    const tip = Math.max(0, effective - base);
    const h = Number(i.hours) || 0; const isOnce = i.frequency === 'once' || !i.frequency;
    if (isOnce) {
      const dateStr = i.receivedAt || i.createdAt || isoDate(todayStart());
      const d = new Date(dateStr + (dateStr.includes('T') ? '' : 'T00:00:00'));
      if (d.getFullYear() === curY) { ytdIncome += effective; ytdHours += h; ytdTips += tip; }
    } else {
      const dt = i.createdAt ? new Date(i.createdAt) : now;
      const startY = dt.getFullYear(); const startM = dt.getMonth();
      let startMonthsElapsed = 0;
      if (startY < curY) startMonthsElapsed = 0;
      else if (startY === curY) {
        const daysInStartMonth = new Date(startY, startM + 1, 0).getDate();
        const startFraction = (daysInStartMonth - dt.getDate() + 1) / daysInStartMonth;
        startMonthsElapsed = startM + (1 - startFraction);
      } else continue;
      const activeMonthsThisYear = Math.max(0, monthsElapsedThisYear - startMonthsElapsed);
      const monthlyInc = monthlyEq(effective, i.frequency); const monthlyTip = monthlyEq(tip, i.frequency);
      const f = i.frequency === 'weekly' ? 4.33333 : i.frequency === 'biweekly' ? 2.16667 : i.frequency === 'monthly' ? 1 : i.frequency === 'yearly' ? (1/12) : 0;
      ytdIncome += monthlyInc * activeMonthsThisYear; ytdTips += monthlyTip * activeMonthsThisYear; ytdHours += (h * f) * activeMonthsThisYear;
    }
  }
  return { ytdIncome, ytdHours, ytdHourly: ytdHours > 0 ? ytdIncome / ytdHours : 0, ytdTips, avgMonthly, projAnnual, avgMonthlyBills, projAnnualBills };
}

function getReferenceMonth() {
  const now = new Date();
  for (let i = 0; i < 12; i++) {
    let m = now.getMonth() - i; let y = now.getFullYear();
    while (m < 0) { m += 12; y -= 1; }
    const s = getMonthlyStats(y, m);
    if (s.income > 0) return { year: y, month: m, ...s, label: new Date(y, m).toLocaleString('en-US', { month: 'short' }).toLowerCase() };
  }
  return null;
}

function aggregateBillsByCategory(bills, year, month) {
  const byCat = {};
  for (const b of bills) {
    const amt = parseFloat(String(b.amount).replace(/[^\d.-]/g, '')) || 0;
    const isOnce = !b.recurring || b.recurring === 'once';
    const mo = isOnce ? ((b.dueDate || b.createdAt || isoDate(todayStart())).startsWith(`${year}-${String(month+1).padStart(2,'0')}`) ? amt : 0) : monthlyEq(amt, b.recurring);
    if (mo <= 0) continue;
    const cat = b.category || 'other';
    if (!byCat[cat]) byCat[cat] = { total: 0, names: [] };
    byCat[cat].total += mo; byCat[cat].names.push(b.name);
  }
  return Object.entries(byCat).map(([cat, v]) => ({
    cat, total: v.total, names: v.names,
    label: CATEGORIES[cat]?.label || cat,
    color: CATEGORIES[cat]?.color || '#6b7280',
  })).sort((a,b) => b.total - a.total);
}

function getSavingsTarget() {
  let total = 0; const breakdown = [];
  for (const g of state.goals) {
    const target = parseFloat(g.targetAmount) || 0;
    const saved = parseFloat(g.currentAmount) || 0;
    const remaining = Math.max(0, target - saved);
    if (remaining === 0 || !g.targetDate) continue;
    const td = new Date(g.targetDate + 'T00:00:00');
    if (td <= todayStart()) continue;
    const monthsLeft = Math.max(1, (td - todayStart()) / (30.44 * 86400000));
    const monthly = remaining / monthsLeft;
    total += monthly; breakdown.push({ name: g.name, monthly });
  }
  return { total, breakdown };
}

function getPettyThisWeek() {
  const today = todayStart();
  const dow = (today.getDay() + 6) % 7;
  const monday = new Date(today.getTime() - dow * 86400000);
  const sunday = new Date(monday.getTime() + 6 * 86400000);
  const startIso = isoDate(monday); const endIso = isoDate(sunday);
  return state.petty.filter(p => p.date && p.date >= startIso && p.date <= endIso)
    .sort((a,b) => b.date.localeCompare(a.date));
}

function getMonthlyHoursHistory(year, month, monthsBack = 6) {
  const out = [];
  for (let i = monthsBack - 1; i >= 0; i--) {
    const d = new Date(year, month - i, 1);
    const y = d.getFullYear(); const m = d.getMonth();
    let mh = 0;
    for (const inc of state.income) {
      const h = Number(inc.hours) || 0;
      const isOnce = inc.frequency === 'once' || !inc.frequency;
      if (isOnce) {
        const ds = inc.receivedAt || inc.createdAt;
        if (ds) {
          const dd = new Date(ds + (ds.includes('T') ? '' : 'T00:00:00'));
          if (dd.getFullYear() === y && dd.getMonth() === m) mh += h;
        }
      } else {
        const f = inc.frequency === 'weekly' ? 4.33 : inc.frequency === 'biweekly' ? 2.17 : inc.frequency === 'monthly' ? 1 : inc.frequency === 'yearly' ? (1/12) : 0;
        mh += h * f;
      }
    }
    out.push(mh);
  }
  return out;
}

function getWeeklyPettyHistory(weeksBack = 6) {
  const today = todayStart();
  const out = [];
  for (let w = weeksBack - 1; w >= 0; w--) {
    const wkStart = new Date(today.getTime() - ((today.getDay() + 6) % 7 + 7 * w) * 86400000);
    const wkEnd = new Date(wkStart.getTime() + 6 * 86400000);
    const startIso = isoDate(wkStart); const endIso = isoDate(wkEnd);
    const spent = state.petty.filter(p => p.date && p.date >= startIso && p.date <= endIso)
      .reduce((s, p) => s + (parseFloat(String(p.amount).replace(/[^\d.-]/g, '')) || 0), 0);
    out.push(spent);
  }
  return out;
}

// unified transaction feed: petty + bill payments + one-time income
function getRecentTransactions() {
  const out = [];

  for (const p of state.petty) {
    out.push({
      kind: 'petty',
      refType: 'petty',
      refId: p.id,
      name: p.note || '—',
      amount: parseFloat(String(p.amount).replace(/[^\d.-]/g, '')) || 0,
      category: p.category || 'other',
      date: p.date || p.createdAt,
      sign: 'out',
      canEdit: true,
    });
  }

  for (const p of (state.payments || [])) {
    out.push({
      kind: 'payment',
      refType: 'payments',
      refId: p.id,
      billId: p.billId,
      name: p.name || '—',
      amount: parseFloat(String(p.amount).replace(/[^\d.-]/g, '')) || 0,
      category: p.category || 'other',
      date: p.date || p.createdAt,
      recurring: p.recurring,
      sign: 'out',
      canEdit: false,
    });
  }

  for (const i of state.income) {
    const isOnce = i.frequency === 'once' || !i.frequency;
    if (!isOnce) continue; // recurring income is a source, not a discrete event
    out.push({
      kind: 'income',
      refType: 'income',
      refId: i.id,
      name: i.source || '—',
      amount: parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0,
      category: 'income',
      date: i.receivedAt || i.createdAt,
      sign: 'in',
      canEdit: true,
    });
  }

  return out.sort((a, b) => {
    const ad = a.date || '0000';
    const bd = b.date || '0000';
    return bd.localeCompare(ad);
  });
}

// ──── UI helpers ─────────────────────────────────────────
function sh(title, opts = {}) {
  const meta = opts.meta ? `<span class="sh-meta">${opts.meta}</span>` : '';
  const add = opts.add ? `<button class="add" data-action="${opts.add.action}"${opts.add.type ? ` data-type="${opts.add.type}"` : ''}>${opts.add.label}</button>` : '';
  const monthN = opts.monthNav || '';
  return `<div class="sh"><h3>${title}</h3>${meta}${add}${monthN}</div>`;
}
function row(label, value, valCls = '', opts = {}) {
  const cls = opts.strong ? 'row strong' : 'row';
  return `<div class="${cls}"><span class="l">${label}</span><span class="v ${valCls}">${value}</span></div>`;
}
function blk(label, value, sub, opts = {}) {
  const valCls = (opts.color || '') + (opts.size === 'med' ? ' med' : '');
  return `<div class="blk"><div class="blk-l">${label}</div><div class="blk-v ${valCls}">${value}</div>${sub ? `<div class="blk-s">${sub}</div>` : ''}</div>`;
}
function pill(text, type) {
  return `<span class="pill ${type || ''}">${text}</span>`;
}
function monthNav(year, month) {
  const isCurr = year === new Date().getFullYear() && month === new Date().getMonth();
  const lbl = new Date(year, month).toLocaleString('en-US',{month:'short', year:'2-digit'});
  return `<span class="month-nav">` +
    `<button class="nav-arrow" data-action="prev-month">‹</button>` +
    `<span class="label">${lbl}</span>` +
    `<button class="nav-arrow" data-action="next-month">›</button>` +
    (!isCurr ? `<button class="today-btn" data-action="curr-month">Today</button>` : '') +
  `</span>`;
}
function compactDate(iso) {
  if (!iso) return '';
  const t = todayStart();
  const d = new Date(iso + 'T00:00:00');
  const diff = Math.round((d - t) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  if (diff === -1) return 'Yesterday';
  if (diff > 0 && diff <= 14) return `In ${diff} days`;
  if (diff < 0 && diff >= -14) return `${Math.abs(diff)} days ago`;
  return d.toLocaleString('en-US', { month: 'short', day: 'numeric' });
}

function liItem(fields, opts = {}) {
  const metaParts = (fields.metaParts || []).filter(Boolean);
  const metaInner = metaParts.map((p, i) => {
    const isObj = typeof p === 'object';
    if (isObj && p.pill) return p.html || pill(p.text, p.pill);
    const text = isObj ? p.text : p;
    const cls = isObj ? (p.cls || '') : '';
    return (i > 0 ? '<span class="dot">·</span>' : '') + `<span class="${cls}">${text}</span>`;
  }).join('');
  const acts = (fields.acts || []).map(a =>
    `<button class="${a.cls || ''}" data-action="${a.action}"${a.id ? ` data-id="${a.id}"` : ''}${a.type ? ` data-type="${a.type}"` : ''}>${a.label}</button>`
  ).join('');
  const dimCls = opts.dim ? ' muted' : '';
  return `<div class="li${dimCls}">
    <div class="li-info">
      <div class="li-n">${fields.name}${fields.pill ? ' ' + fields.pill : ''}</div>
      ${metaInner ? `<div class="li-meta">${metaInner}</div>` : ''}
    </div>
    <div class="li-r">
      ${fields.amt != null ? `<div class="li-v ${fields.amtCls || ''}">${fields.amt}</div>` : ''}
      ${acts ? `<div class="li-acts">${acts}</div>` : ''}
    </div>
  </div>`;
}

// ──── Render: overview ─────────────────────────────────────
function renderOverview() {
  const { year, month } = getViewMonth();
  const cur = getMonthlyStats(year, month);
  const stats = getIncomeStats();
  const monthKey = `${year}-${String(month+1).padStart(2,'0')}`;
  const pettySpent = state.petty.filter(p => p.date && p.date.startsWith(monthKey))
    .reduce((s, p) => s + (parseFloat(String(p.amount).replace(/[^\d.-]/g, '')) || 0), 0);
  const net = cur.income - cur.bills - pettySpent;

  const avgIn = stats.avgMonthly;
  const avgOut = stats.avgMonthlyBills > 0 ? stats.avgMonthlyBills : (state.bills.length > 0 ? cur.bills : 0);
  const avgSurplus = avgIn - avgOut;

  const upcIso = isoDate(new Date(Date.now() + 14 * 86400000));
  const upcoming = state.bills.filter(b => b.dueDate && b.dueDate <= upcIso && !b.paid)
    .sort((a,b) => a.dueDate.localeCompare(b.dueDate));
  const openTasks = state.tasks.filter(t => !t.done).sort((a,b) => {
    const ad = a.dueDate || '9999'; const bd = b.dueDate || '9999';
    return ad.localeCompare(bd);
  });

  // hero: net for this month
  const heroNet = blk(
    'Net this month',
    (net >= 0 ? '+' : '−') + fmtMoney(Math.abs(net), {round:true}),
    `${fmtMoney(cur.income, {round:true})} in · ${fmtMoney(cur.bills + pettySpent, {round:true})} out`,
    { color: net >= 0 ? 'positive' : 'negative' }
  );

  // hero: monthly average
  let avgBlock = '';
  if (avgIn > 0) {
    avgBlock = blk(
      'Monthly average',
      (avgSurplus >= 0 ? '+' : '−') + fmtMoney(Math.abs(avgSurplus), {round:true}),
      `${fmtMoney(avgIn, {round:true})} in · ${fmtMoney(avgOut, {round:true})} out`,
      { size: 'med', color: avgSurplus >= 0 ? 'positive' : 'negative' }
    );
  }

  // upcoming bills section
  let queueHTML = '';
  if (upcoming.length > 0) {
    const items = upcoming.slice(0, 5);
    queueHTML = sh('Upcoming bills', { meta: `${upcoming.length} due in 14 days` }) +
      items.map(b => {
        const overdue = isOverdue(b.dueDate);
        const today = isTodayDate(b.dueDate);
        const cat = (CATEGORIES[b.category] || CATEGORIES.other);
        const dateLabel = compactDate(b.dueDate);
        const datePill = overdue ? pill(dateLabel, 'neg') : today ? pill(dateLabel, 'warn') : `<span>${dateLabel}</span>`;
        return `<div class="row">
          <span class="l">${escHTML(b.name)} <span style="color: var(--ink-3); font-weight: 400; font-size: 13px;">· ${cat.label}</span></span>
          <span class="v ${overdue ? 'negative' : ''}">${fmtMoney(b.amount, {round:true})}</span>
        </div>`;
      }).join('') +
      (upcoming.length > 5 ? `<div class="note">+${upcoming.length - 5} more · <span class="lnk" data-action="goto" data-tab="expenses">view all</span></div>` : '');
  }

  // upcoming tasks
  let tasksHTML = '';
  if (openTasks.length > 0) {
    const items = openTasks.slice(0, 4);
    tasksHTML = sh('Open tasks', { meta: `${openTasks.length} total` }) +
      items.map(t => {
        const overdue = t.dueDate && isOverdue(t.dueDate);
        const today = t.dueDate && isTodayDate(t.dueDate);
        const pri = t.priority || '';
        const meta = [];
        if (overdue) meta.push(pill('Overdue', 'neg'));
        else if (today) meta.push(pill('Today', 'warn'));
        else if (t.dueDate) meta.push(`<span>${compactDate(t.dueDate)}</span>`);
        if (pri === 'high') meta.push(pill('High', 'neg'));
        else if (pri === 'med') meta.push(pill('Medium', 'warn'));
        const metaHTML = meta.length ? `<div class="task-meta">${meta.join(' ')}</div>` : '';
        return `<div class="row">
          <span class="l">${escHTML(t.text)}</span>
          <span class="v">${metaHTML || '—'}</span>
        </div>`;
      }).join('') +
      (openTasks.length > 4 ? `<div class="note">+${openTasks.length - 4} more · <span class="lnk" data-action="goto" data-tab="tasks">view all</span></div>` : '');
  }

  return `
    ${heroNet}
    ${avgBlock}
    ${sh('Period', { monthNav: monthNav(year, month) })}
    ${row('Income', '+' + fmtMoney(cur.income, {round:true}), 'positive')}
    ${row('Expenses', '−' + fmtMoney(cur.bills, {round:true}), 'negative')}
    ${pettySpent > 0 ? row('Petty cash', '−' + fmtMoney(pettySpent, {round:true}), 'negative') : ''}
    ${row('Net', (net >= 0 ? '+' : '−') + fmtMoney(Math.abs(net), {round:true}), net >= 0 ? 'positive' : 'negative', { strong: true })}
    ${queueHTML}
    ${tasksHTML}
  `;
}

// ──── Render: income ───────────────────────────────────────
function renderIncome() {
  const stats = getIncomeStats();
  const sources = state.income.slice().sort((a,b) => monthlyEq(b.amount, b.frequency) - monthlyEq(a.amount, a.frequency));
  const yearHist = getCalendarYearHistory();
  const monthsWithData = yearHist.filter(h => h.income > 0);
  const maxVal = monthsWithData.length > 0 ? Math.max(...monthsWithData.map(h => h.income)) : 0;

  const ytdBlock = blk(
    'Year to date',
    fmtMoney(stats.ytdIncome, {round:true}),
    stats.ytdHours > 0
      ? `${fmtHM(stats.ytdHours)} · $${stats.ytdHourly.toFixed(2)}/hr${stats.ytdTips > 0 ? ' · tips ' + fmtMoney(stats.ytdTips, {round:true}) : ''}`
      : 'No hours logged'
  );
  const avgBlock = blk(
    'Monthly average',
    fmtMoney(stats.avgMonthly, {round:true}),
    null,
    { size: 'med' }
  );
  const projBlock = blk(
    'Projected annual',
    fmtMoney(stats.projAnnual, {round:true}),
    'Based on year to date',
    { size: 'med', color: 'warning' }
  );

  // chart
  let chartHTML;
  if (monthsWithData.length === 0) {
    chartHTML = `<div class="chart-empty">No income recorded yet this year</div>`;
  } else {
    const bars = yearHist.map(h => {
      if (h.income <= 0) return `<div class="chart-bar empty"></div>`;
      const heightPct = maxVal > 0 ? Math.max(5, (h.income / maxVal) * 100) : 0;
      const cls = h.current ? ' current' : '';
      return `<div class="chart-bar${cls}" style="height:${heightPct}%"></div>`;
    }).join('');
    const labels = yearHist.map(h => {
      const cls = h.current ? ' class="current"' : '';
      return `<div${cls}>${h.label}</div>`;
    }).join('');
    chartHTML = `<div class="chart">
      <div class="chart-bars">${bars}</div>
      <div class="chart-labels">${labels}</div>
    </div>`;
  }

  // sources list
  let sourcesHTML;
  if (sources.length === 0) {
    sourcesHTML = `<div class="empty"><span class="lnk" data-action="open-modal" data-type="income">Add your first income source</span></div>`;
  } else {
    sourcesHTML = sources.map(i => {
      const amt = parseFloat(String(i.amount).replace(/[^\d.-]/g, '')) || 0;
      const base = i.baseAmount !== undefined ? i.baseAmount : amt;
      const hrs = Number(i.hours) || 0;
      const freq = i.frequency || 'once';
      const monthly = freq === 'once' ? amt : monthlyEq(amt, freq);
      const metaParts = [freq.charAt(0).toUpperCase() + freq.slice(1)];
      if (hrs > 0) metaParts.push(fmtHM(hrs));
      if (freq !== 'once') metaParts.push(`${fmtMoney(monthly, {round:true})}/mo`);
      if (i.tipsEnabled && amt > base) metaParts.push({ text: `+tips`, cls: 'pos' });
      return liItem({
        name: escHTML(i.source),
        metaParts,
        amt: fmtMoney(amt, {round:true}),
        amtCls: 'positive',
        acts: [
          { action: 'edit', type: 'income', id: i.id, label: 'Edit' },
          { cls: 'danger', action: 'rm', type: 'income', id: i.id, label: 'Delete' },
        ],
      });
    }).join('');
  }

  return `
    ${ytdBlock}
    ${avgBlock}
    ${projBlock}
    ${sh('Income trend', { meta: `${new Date().getFullYear()}` })}
    ${chartHTML}
    ${sh('Sources', { meta: sources.length + (sources.length === 1 ? ' source' : ' sources'), add: { action: 'open-modal', type: 'income', label: '+ Add' } })}
    ${sourcesHTML}
  `;
}

// ──── Render: expenses ─────────────────────────────────────
function renderExpenses() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const cur = getMonthlyStats(year, month);
  const total = cur.bills;
  const incTot = getIncomeStats().avgMonthly;
  const catData = aggregateBillsByCategory(state.bills, year, month);
  const paidCount = state.bills.filter(b => b.paid).length;
  const unpaidCount = state.bills.filter(b => !b.paid).length;

  const weekIso = isoDate(new Date(Date.now() + 7 * 86400000));
  const dueThisWeek = state.bills.filter(b => b.dueDate && b.dueDate <= weekIso && !b.paid)
    .reduce((s, b) => s + (parseFloat(String(b.amount).replace(/[^\d.-]/g, '')) || 0), 0);
  const dueCount = state.bills.filter(b => b.dueDate && b.dueDate <= weekIso && !b.paid).length;

  const recurring = state.bills.filter(b => b.recurring && b.recurring !== 'once').map(b => {
    const amt = parseFloat(String(b.amount).replace(/[^\d.-]/g, '')) || 0;
    const annual = b.recurring === 'weekly' ? amt * 52 : b.recurring === 'biweekly' ? amt * 26 : b.recurring === 'monthly' ? amt * 12 : amt;
    return { ...b, _annual: annual };
  });
  const totalAnnual = recurring.reduce((s, b) => s + b._annual, 0);
  const pctOfIncome = incTot > 0 ? (total / incTot) * 100 : 0;

  const totalBlock = blk(
    'This month',
    fmtMoney(total, {round:true}),
    incTot > 0
      ? `${pctOfIncome.toFixed(0)}% of income · ${paidCount}/${paidCount + unpaidCount} paid`
      : `${paidCount}/${paidCount + unpaidCount} paid`,
    { color: 'negative' }
  );
  const weekBlock = dueCount > 0
    ? blk('Due this week', fmtMoney(dueThisWeek, {round:true}), `${dueCount} expense${dueCount > 1 ? 's' : ''}`, { size: 'med', color: 'warning' })
    : blk('Annual total', fmtMoney(totalAnnual, {round:true}), 'Projected recurring', { size: 'med', color: 'warning' });

  // categories
  let catHTML = '';
  if (catData.length && total > 0) {
    catHTML = sh('By category', { meta: '% of income' }) +
      catData.map(c => {
        const rawPct = incTot > 0 ? (c.total / incTot) * 100 : 0;
        const widthPct = Math.min(100, rawPct);
        const pctTxt = incTot > 0 ? rawPct.toFixed(0) + '%' : '—';
        const fillCls = rawPct > 30 ? 'neg' : rawPct > 15 ? 'warn' : '';
        return `<div class="meter">
          <span class="meter-l">${c.label}</span>
          <span class="meter-b"><span class="meter-f ${fillCls}" style="width:${widthPct}%"></span></span>
          <span class="meter-v">${pctTxt}</span>
        </div>`;
      }).join('');
  }

  // bills list
  const billsSorted = state.bills.slice().sort((a, b) => {
    if (a.paid !== b.paid) return a.paid ? 1 : -1;
    const ad = a.dueDate || '9999'; const bd = b.dueDate || '9999';
    return ad.localeCompare(bd);
  });

  let billsHTML;
  if (state.bills.length === 0) {
    if (incTot > 0) {
      billsHTML = `<div class="empty"><span class="lnk" data-action="open-presets">Load presets</span> or <span class="lnk" data-action="open-modal" data-type="expenses">add manually</span></div>`;
    } else {
      billsHTML = `<div class="empty">Add income first</div>`;
    }
  } else {
    billsHTML = billsSorted.map(b => {
      const isPaid = !!b.paid;
      const overdue = b.dueDate && !b.paid && isOverdue(b.dueDate);
      const today = b.dueDate && !b.paid && isTodayDate(b.dueDate);
      const cat = (CATEGORIES[b.category] || CATEGORIES.other);
      const metaParts = [cat.label, b.recurring || 'once'];
      if (b.dueDate) {
        if (isPaid) metaParts.push({ text: 'Paid', cls: 'pos' });
        else if (overdue) metaParts.push({ text: 'Overdue', cls: 'neg' });
        else if (today) metaParts.push({ text: 'Today', cls: 'warn' });
        else metaParts.push(compactDate(b.dueDate));
      }
      let pillHTML = '';
      if (isPaid) pillHTML = pill('Paid', 'pos');
      else if (overdue) pillHTML = pill('Overdue', 'neg');
      else if (today) pillHTML = pill('Today', 'warn');
      return liItem({
        name: escHTML(b.name),
        pill: pillHTML,
        metaParts,
        amt: fmtMoney(b.amount, {round:true}),
        amtCls: isPaid ? 'muted' : overdue ? 'negative' : '',
        acts: [
          isPaid
            ? { action: 'unpay-bill', id: b.id, label: 'Undo' }
            : { cls: 'primary', action: 'pay-bill', id: b.id, label: 'Mark paid' },
          { action: 'edit', type: 'expenses', id: b.id, label: 'Edit' },
          { cls: 'danger', action: 'rm', type: 'expenses', id: b.id, label: 'Delete' },
        ],
      }, { dim: isPaid });
    }).join('');
  }

  return `
    ${totalBlock}
    ${weekBlock}
    ${catHTML}
    ${sh('Expenses', { meta: state.bills.length + (state.bills.length === 1 ? ' expense' : ' expenses'), add: { action: 'open-modal', type: 'expenses', label: '+ Add' } })}
    ${billsHTML}
  `;
}

// ──── Render: budget ───────────────────────────────────────
function renderBudget() {
  let { year, month } = getViewMonth();
  let cur = getMonthlyStats(year, month);
  const stats = getIncomeStats();
  let inc = stats.avgMonthly;
  let fixed = cur.bills;
  let basisLabel = inc > 0 ? 'Monthly average' : null;
  if (inc === 0) {
    inc = cur.income;
    if (inc === 0) {
      const ref = getReferenceMonth();
      if (ref) { year = ref.year; month = ref.month; inc = ref.income; fixed = ref.bills; basisLabel = ref.label; }
    }
  }

  if (inc === 0) {
    return `${blk('Budget', 'No data', `<span class="lnk" data-action="open-modal" data-type="income">Add income</span> to get started`)}`;
  }

  const savingsInfo = getSavingsTarget();
  const savings = savingsInfo.total;
  state.goals.forEach(g => {
    const rem = Math.max(0, (parseFloat(g.targetAmount) || 0) - (parseFloat(g.currentAmount) || 0));
    if (rem > 0 && g.targetDate) {
      const td = new Date(g.targetDate + 'T00:00:00');
      if (td > todayStart()) g._reqMo = rem / Math.max(1, (td - todayStart()) / (30.44 * 86400000));
      else g._reqMo = 0;
    } else g._reqMo = 0;
  });

  const monthlyAllowance = Math.max(0, inc - fixed - savings);
  const weeklyAllowance = monthlyAllowance / 4.333;
  const dailyAllowance = monthlyAllowance / 30;
  const weekEntries = getPettyThisWeek();
  const weekSpent = weekEntries.reduce((s, e) => s + (parseFloat(String(e.amount).replace(/[^\d.-]/g, '')) || 0), 0);
  const weekPct = weeklyAllowance > 0 ? (weekSpent / weeklyAllowance) * 100 : 0;
  const sevenDayCutoff = isoDate(new Date(todayStart().getTime() - 6 * 86400000));
  const txns = getRecentTransactions().filter(t => t.date && t.date >= sevenDayCutoff);

  const availBlock = blk(
    'Available',
    fmtMoney(monthlyAllowance, {round:true}),
    `${fmtMoney(weeklyAllowance, {round:true})}/wk · ${fmtMoney(dailyAllowance, {round:true})}/day`
  );

  const weekBlock = blk(
    'This week',
    fmtMoney(weekSpent, {round:true}),
    `of ${fmtMoney(weeklyAllowance, {round:true})} allowance · ${weekPct.toFixed(0)}% used`,
    { size: 'med', color: weekPct > 100 ? 'negative' : weekPct > 80 ? 'warning' : '' }
  );

  const allocationHTML =
    row('Income', '+' + fmtMoney(inc, {round:true}), 'positive') +
    row('Expenses', '−' + fmtMoney(fixed, {round:true}), 'negative') +
    (savings > 0 ? row('Savings goals', '−' + fmtMoney(savings, {round:true}), 'negative') : '') +
    row('Available', fmtMoney(monthlyAllowance, {round:true}), 'positive', { strong: true });

  let txnHTML = '';
  if (txns.length === 0) {
    txnHTML = `<div class="empty">No activity in the last 7 days · <span class="lnk" data-action="open-modal" data-type="petty">Log an expense</span></div>`;
  } else {
    txnHTML = txns.map(t => {
      const cat = t.kind === 'income' ? { label: 'Income' } : (CATEGORIES[t.category] || CATEGORIES.other);
      const isInc = t.sign === 'in';
      const sign = isInc ? '+' : '−';
      const dateLabel = t.date ? compactDate(t.date) : '—';
      return liItem({
        name: escHTML(t.name),
        metaParts: [cat.label, dateLabel],
        amt: sign + fmtMoney(t.amount, {round:true}).replace('−', '').replace('+', ''),
        amtCls: isInc ? 'positive' : 'negative',
        acts: [
          ...(t.canEdit ? [{ action: 'edit', type: t.refType, id: t.refId, label: 'Edit' }] : []),
          { cls: 'danger', action: 'rm', type: t.refType, id: t.refId, label: 'Delete' },
        ],
      });
    }).join('');
  }

  let goalsHTML = '';
  if (state.goals.length === 0) {
    goalsHTML = `<div class="empty">No savings goals · <span class="lnk" data-action="open-modal" data-type="goals">Add one</span></div>`;
  } else {
    goalsHTML = state.goals.map(g => {
      const target = parseFloat(g.targetAmount) || 0;
      const saved = parseFloat(g.currentAmount) || 0;
      const p = target > 0 ? Math.min(100, (saved / target) * 100) : 0;
      const dateStr = g.targetDate ? ` · By ${compactDate(g.targetDate)}` : '';
      const reqStr = g._reqMo > 0 ? ` · <span class="req">${fmtMoney(g._reqMo, {round:true})}/mo to reach</span>` : '';
      return `<div class="goal">
        <div class="goal-h"><span class="n">${escHTML(g.name)}</span><span class="p">${p.toFixed(0)}%</span></div>
        <div class="goal-bar"><div class="goal-bar-f" style="width:${p}%"></div></div>
        <div class="goal-meta"><span>${fmtMoney(saved, {round:true})} of ${fmtMoney(target, {round:true})}</span>${dateStr ? `<span class="dot">·</span><span>By ${g.targetDate ? compactDate(g.targetDate) : '—'}</span>` : ''}${reqStr ? `<span class="dot">·</span>${reqStr}` : ''}</div>
        <div class="goal-acts">
          <button class="primary" data-action="goal-add" data-id="${g.id}">Add funds</button>
          <button data-action="edit" data-type="goals" data-id="${g.id}">Edit</button>
          <button class="danger" data-action="rm" data-type="goals" data-id="${g.id}">Delete</button>
        </div>
      </div>`;
    }).join('');
  }

  return `
    ${availBlock}
    ${weekBlock}
    ${sh('Allocation', { meta: basisLabel, monthNav: monthNav(year, month) })}
    ${allocationHTML}
    ${sh('Recent activity', { meta: `Last 7 days · ${txns.length}`, add: { action: 'open-modal', type: 'petty', label: '+ Log' } })}
    ${txnHTML}
    ${sh('Savings goals', { meta: state.goals.length + (state.goals.length === 1 ? ' goal' : ' goals'), add: { action: 'open-modal', type: 'goals', label: '+ Add' } })}
    ${goalsHTML}
  `;
}

// ──── Render: tasks ────────────────────────────────────────
function renderTasks() {
  const total = state.tasks.length;
  const open = state.tasks.filter(t => !t.done);
  const done = state.tasks.filter(t => t.done);
  const overdue = state.tasks.filter(t => !t.done && isOverdue(t.dueDate));
  const todayCnt = state.tasks.filter(t => !t.done && isTodayDate(t.dueDate));
  const completionPct = total > 0 ? (done.length / total) * 100 : 0;

  const sorted = state.tasks.slice().sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    const ad = a.dueDate || '9999'; const bd = b.dueDate || '9999';
    return ad.localeCompare(bd);
  });

  const openBlock = blk(
    'Open tasks',
    String(open.length),
    total > 0 ? `${done.length} of ${total} done · ${completionPct.toFixed(0)}%` : 'Add a task to start',
    { color: open.length === 0 ? 'positive' : '' }
  );

  let urgentBlock = '';
  if (overdue.length > 0) {
    urgentBlock = blk('Overdue', String(overdue.length), todayCnt.length > 0 ? `${todayCnt.length} due today` : 'Needs attention', { color: 'negative', size: 'med' });
  } else if (todayCnt.length > 0) {
    urgentBlock = blk('Due today', String(todayCnt.length), 'Tap to mark complete', { color: 'warning', size: 'med' });
  } else if (open.length > 0) {
    urgentBlock = blk('On track', 'All caught up', 'Nothing overdue or due today', { color: 'positive', size: 'med' });
  }

  let listHTML;
  if (sorted.length === 0) {
    listHTML = `<div class="empty">No tasks yet · <span class="lnk" data-action="open-modal" data-type="tasks">Add one</span></div>`;
  } else {
    listHTML = sorted.map(t => {
      const isOver = !t.done && isOverdue(t.dueDate);
      const isToday = !t.done && isTodayDate(t.dueDate);
      const pri = t.priority || '';
      const metaParts = [];
      if (isOver) metaParts.push({ text: 'Overdue', cls: 'overdue' });
      else if (isToday) metaParts.push({ text: 'Today', cls: 'today' });
      else if (t.dueDate) metaParts.push(compactDate(t.dueDate));
      if (pri === 'high') metaParts.push({ text: 'High', cls: 'pri-h' });
      else if (pri === 'med') metaParts.push({ text: 'Medium', cls: 'pri-m' });
      if (t.done) metaParts.push('Done');
      const metaInner = metaParts.map((p, i) => {
        const isObj = typeof p === 'object';
        const text = isObj ? p.text : p;
        const cls = isObj ? p.cls : '';
        return (i > 0 ? '<span class="dot">·</span>' : '') + `<span class="${cls}">${text}</span>`;
      }).join('');
      return `<div class="task${t.done ? ' done' : ''}">
        <span class="task-cb ${t.done ? 'done' : ''}" data-action="toggle-task" data-id="${t.id}"></span>
        <div class="task-info">
          <div class="task-n">${escHTML(t.text)}</div>
          ${metaInner ? `<div class="task-meta">${metaInner}</div>` : ''}
        </div>
        <div class="task-acts">
          <button data-action="edit" data-type="tasks" data-id="${t.id}">Edit</button>
          <button class="danger" data-action="rm" data-type="tasks" data-id="${t.id}">Delete</button>
        </div>
      </div>`;
    }).join('');
  }

  return `
    ${openBlock}
    ${urgentBlock}
    ${sh('All tasks', { meta: total + (total === 1 ? ' task' : ' tasks'), add: { action: 'open-modal', type: 'tasks', label: '+ Add' } })}
    ${listHTML}
  `;
}

// ──── Master render ──────────────────────────────────────────
function updateBadges() {
  const e = state.bills.filter(b => !b.paid).length;
  const t = state.tasks.filter(t => !t.done).length;
  const set = (cls, v) => document.querySelectorAll(cls).forEach(el => {
    el.textContent = v; el.style.display = v > 0 ? 'inline-block' : 'none';
  });
  set('.badge-e', e); set('.badge-t', t);
}

function updateHeader() {
  const titleEl = document.getElementById('mtitle');
  const metaEl = document.getElementById('mmeta');
  if (!titleEl || !metaEl) return;
  const v = getViewMonth();
  const monthName = new Date(v.year, v.month).toLocaleString('en-US',{month:'long'});
  let title = 'Ledgeon';
  let meta = monthName;
  if (currentTab === 'income') { title = 'Income'; meta = 'Year to date'; }
  else if (currentTab === 'expenses') { title = 'Expenses'; meta = monthName; }
  else if (currentTab === 'budget') { title = 'Budget'; meta = 'Monthly average'; }
  else if (currentTab === 'tasks') {
    title = 'Tasks';
    const o = state.tasks.filter(t => !t.done).length;
    meta = o + (o === 1 ? ' open' : ' open');
  }
  titleEl.textContent = title;
  metaEl.textContent = meta;
}

function render() {
  updateBadges();
  updateHeader();
  document.querySelectorAll('nav.mnav button').forEach(b => b.classList.toggle('active', b.dataset.tab === currentTab));
  const main = document.getElementById('content');
  if (currentTab === 'overview') main.innerHTML = renderOverview();
  else if (currentTab === 'income') main.innerHTML = renderIncome();
  else if (currentTab === 'expenses') main.innerHTML = renderExpenses();
  else if (currentTab === 'budget') main.innerHTML = renderBudget();
  else if (currentTab === 'tasks') main.innerHTML = renderTasks();
  window.scrollTo({ top: 0, behavior: 'instant' });
}

// ──── Event handlers ─────────────────────────────────────────
document.addEventListener('click', e => {
  // close header menu when clicking outside it (and outside its toggle)
  const _menu = document.getElementById('header-menu');
  if (_menu && !_menu.hidden) {
    if (!e.target.closest('#header-menu') && !e.target.closest('[data-action="toggle-menu"]')) {
      _menu.hidden = true;
    }
  }

  const tab = e.target.closest('nav.mnav button[data-tab]');
  if (tab) { currentTab = tab.dataset.tab; localStorage.setItem(TAB_KEY, currentTab); render(); return; }

  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const act = btn.dataset.action;

  if (act === 'toggle-menu') { if (_menu) _menu.hidden = !_menu.hidden; return; }
  if (_menu && (act === 'import' || act === 'export' || act === 'reset')) _menu.hidden = true;

  if (act === 'goto') { currentTab = btn.dataset.tab; localStorage.setItem(TAB_KEY, currentTab); render(); }
  else if (act === 'open-modal') { openModal(btn.dataset.type); if (btn.dataset.type === 'petty') document.getElementById('petty-date-input').value = isoDate(todayStart()); }
  else if (act === 'close-modal') document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
  else if (act === 'rm') {
    if (confirm('Delete?')) {
      const t = btn.dataset.type === 'expenses' ? 'bills' : btn.dataset.type;
      if (t === 'payments') {
        // undo the bill payment when removing a payment log entry
        const pay = state.payments.find(x => x.id === btn.dataset.id);
        if (pay) {
          const bill = state.bills.find(b => b.id === pay.billId);
          if (bill) {
            if (bill.recurring && bill.recurring !== 'once' && bill.dueDate) {
              const d = new Date(bill.dueDate + 'T00:00:00');
              if (bill.recurring === 'monthly') d.setMonth(d.getMonth() - 1);
              else if (bill.recurring === 'weekly') d.setDate(d.getDate() - 7);
              else if (bill.recurring === 'yearly') d.setFullYear(d.getFullYear() - 1);
              bill.dueDate = isoDate(d);
            } else {
              bill.paid = false;
            }
          }
        }
      } else if (t === 'bills') {
        // clean up orphan payment logs for the deleted bill
        state.payments = state.payments.filter(p => p.billId !== btn.dataset.id);
      }
      state[t] = state[t].filter(x => x.id !== btn.dataset.id);
      saveState(); render();
    }
  }
  else if (act === 'edit') openModal(btn.dataset.type, btn.dataset.id);
  else if (act === 'pay-bill') {
    const b = state.bills.find(x => x.id === btn.dataset.id);
    if (b) {
      // log the payment to the transaction history
      state.payments.push({
        id: nextId('payments'),
        billId: b.id,
        name: b.name,
        amount: parseFloat(String(b.amount).replace(/[^\d.-]/g, '')) || 0,
        category: b.category,
        recurring: b.recurring,
        date: isoDate(todayStart()),
        createdAt: isoDate(todayStart()),
      });
      if (b.recurring && b.recurring !== 'once' && b.dueDate) {
        const d = new Date(b.dueDate);
        if (b.recurring === 'monthly') d.setMonth(d.getMonth()+1);
        else if (b.recurring === 'weekly') d.setDate(d.getDate()+7);
        else if (b.recurring === 'yearly') d.setFullYear(d.getFullYear()+1);
        b.dueDate = isoDate(d);
      } else b.paid = true;
      saveState(); render();
    }
  }
  else if (act === 'unpay-bill') {
    const b = state.bills.find(x => x.id === btn.dataset.id);
    if (b) {
      b.paid = false;
      // also remove the most recent payment log for this bill
      let mostRecentIdx = -1;
      let mostRecentKey = '';
      state.payments.forEach((p, i) => {
        if (p.billId !== b.id) return;
        const key = (p.date || p.createdAt || '');
        if (key >= mostRecentKey) { mostRecentIdx = i; mostRecentKey = key; }
      });
      if (mostRecentIdx >= 0) state.payments.splice(mostRecentIdx, 1);
      saveState(); render();
    }
  }
  else if (act === 'toggle-task') { const t = state.tasks.find(x => x.id === btn.dataset.id); if (t) { t.done = !t.done; saveState(); render(); } }
  else if (act === 'goal-add') {
    const g = state.goals.find(x => x.id === btn.dataset.id);
    if (g) { const a = parseFloat(prompt(`Fund "${g.name}":`)); if (a > 0) { g.currentAmount = (parseFloat(g.currentAmount) || 0) + a; saveState(); render(); } }
  }
  else if (act === 'prev-month') { const v = getViewMonth(); viewMonth = { year: v.month === 0 ? v.year - 1 : v.year, month: v.month === 0 ? 11 : v.month - 1 }; render(); }
  else if (act === 'next-month') { const v = getViewMonth(); viewMonth = { year: v.month === 11 ? v.year + 1 : v.year, month: v.month === 11 ? 0 : v.month + 1 }; render(); }
  else if (act === 'curr-month') { viewMonth = null; render(); }
  else if (act === 'open-presets') openPresetPicker();
  else if (act === 'export') {
    const b = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
    const u = URL.createObjectURL(b); const a = document.createElement('a');
    a.href = u; a.download = 'ledgeon.json'; a.click(); URL.revokeObjectURL(u);
  }
  else if (act === 'import') document.getElementById('file-import').click();
  else if (act === 'reset') { if (confirm('Wipe all data?')) { state = { tasks:[], bills:[], events:[], income:[], goals:[], petty:[], payments:[] }; saveState(); render(); } }
});

document.getElementById('file-import').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try {
      const imp = JSON.parse(ev.target.result);
      if (confirm('Import data? Replaces current.')) {
        state = {
          tasks: imp.tasks||[], bills: imp.bills||[], events: imp.events||[],
          income: imp.income||[], goals: imp.goals||[], petty: imp.petty||[],
          payments: imp.payments||[]
        };
        saveState(); render();
      }
    } catch { alert('Error importing.'); }
  };
  r.readAsText(f); e.target.value = '';
});

document.addEventListener('change', e => {
  if (e.target.id === 'tipsEnabled') {
    const g = document.getElementById('tipsInputGroup');
    if (e.target.checked) { g.style.display = 'flex'; setTimeout(() => g.style.opacity = '1', 10); }
    else { g.style.opacity = '0'; setTimeout(() => g.style.display = 'none', 200); }
  }
  else if (e.target.id === 'tax-pct-input') {
    const v = parseFloat(e.target.value);
    if (!isNaN(v) && v >= 0 && v <= 100) { setTaxPct(v); render(); }
  }
});

function openModal(type, id = null) {
  document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
  const f = document.querySelector(`#modal-${type} form`);
  if (!f) return;
  f.reset();
  editingItem = id ? { type, id } : null;
  const tArr = type === 'expenses' ? state.bills : state[type];
  if (id) {
    const item = tArr.find(x => x.id === id);
    if (item) {
      Object.keys(item).forEach(k => { if (f.elements[k]) f.elements[k].value = item[k]; });
      if (type === 'income') {
        f.elements['amount'].value = item.baseAmount !== undefined ? item.baseAmount : item.amount;
        if (item.hours != null && !isNaN(item.hours) && item.hours > 0) {
          const totalMin = Math.round(Number(item.hours) * 60);
          const h = Math.floor(totalMin / 60); const m = totalMin % 60;
          f.elements['hours'].value = h ? h : '';
          f.elements['minutes'].value = m ? m : '';
        } else { f.elements['hours'].value = ''; f.elements['minutes'].value = ''; }
        f.elements['tipsEnabled'].checked = !!item.tipsEnabled;
        f.elements['tipsValue'].value = item.tipsValue || 6;
        f.elements['tipsType'].value = item.tipsType || 'percent';
        f.elements['tipsEnabled'].dispatchEvent(new Event('change', { bubbles: true }));
      }
    }
  }
  document.getElementById('modal-' + type).classList.add('open');
  setTimeout(() => f.querySelector('input')?.focus(), 50);
}

document.querySelectorAll('form[data-type]').forEach(f => {
  f.addEventListener('submit', e => {
    e.preventDefault();
    const fd = new FormData(f); const type = f.dataset.type;
    const isEdit = editingItem && editingItem.type === type;
    const tArr = type === 'expenses' ? state.bills : state[type];
    const item = isEdit ? tArr.find(x => x.id === editingItem.id) : { id: nextId(type === 'expenses' ? 'bills' : type), createdAt: isoDate(todayStart()) };
    const pAmt = v => { const n = parseFloat(String(v).replace(/[$,\s]/g, '')); return isNaN(n) ? 0 : n; };

    if (type === 'income') {
      item.source = fd.get('source');
      const base = pAmt(fd.get('amount'));
      item.baseAmount = base;
      const hVal = parseFloat(fd.get('hours')) || 0; const mVal = parseFloat(fd.get('minutes')) || 0;
      const totalHours = hVal + mVal / 60;
      item.hours = totalHours > 0 ? totalHours : null;
      item.tipsEnabled = f.elements['tipsEnabled'].checked;
      item.tipsType = f.elements['tipsType'].value;
      let final = base;
      if (item.tipsEnabled) {
        let tv = pAmt(f.elements['tipsValue'].value);
        if (tv === 0) tv = 6;
        item.tipsValue = tv;
        final += item.tipsType === 'percent' ? base * (tv / 100) : tv;
      } else item.tipsValue = 0;
      item.amount = final;
      item.frequency = fd.get('frequency') || 'monthly';
      item.receivedAt = fd.get('receivedAt') || null;
    } else if (type === 'expenses') {
      item.name = fd.get('name'); item.amount = pAmt(fd.get('amount'));
      item.category = fd.get('category'); item.recurring = fd.get('recurring') || 'monthly';
      item.dueDate = fd.get('date') || null; if (!isEdit) item.paid = false;
    } else if (type === 'tasks') {
      item.text = fd.get('text'); item.priority = fd.get('priority');
      item.dueDate = fd.get('date') || null; if (!isEdit) item.done = false;
    } else if (type === 'goals') {
      item.name = fd.get('name'); item.targetAmount = pAmt(fd.get('targetAmount'));
      item.currentAmount = pAmt(fd.get('currentAmount')); item.targetDate = fd.get('targetDate') || null;
    } else if (type === 'petty') {
      item.amount = pAmt(fd.get('amount')); item.category = fd.get('category');
      item.note = fd.get('note'); item.date = fd.get('date');
    }

    if (!isEdit) tArr.push(item);

    if (!isEdit && type === 'income' && state.bills.length === 0) {
      if (confirm('Add starter budget based on this income?')) {
        const iMo = monthlyEq(item.amount, item.frequency);
        PRESET_BILLS.forEach(p => state.bills.push({
          id: nextId('bills'), name: p.name, amount: Math.round(iMo*(p.pct/100)),
          category: p.category, recurring: p.recurring, paid: false,
          createdAt: isoDate(todayStart())
        }));
        currentTab = 'expenses'; localStorage.setItem(TAB_KEY, currentTab);
      }
    }

    saveState();
    document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
    render();
  });
});

let presetSel = new Set();
function openPresetPicker() {
  presetSel.clear();
  const { year, month } = getViewMonth();
  const { income: inc } = getMonthlyStats(year, month);
  const list = document.getElementById('preset-list');
  if (inc === 0) list.innerHTML = `<div class="empty">add income first</div>`;
  else {
    const ex = new Set(state.bills.map(b => b.name.toLowerCase()));
    list.innerHTML = PRESET_BILLS.map((p, i) => `<div class="preset-row ${ex.has(p.name.toLowerCase())?'exists':''}" data-idx="${i}"><div class="box"></div><div class="nm">${p.name}</div><div class="pct">${fmtMoney(inc*(p.pct/100),{round:true})} · ${p.pct}%</div></div>`).join('');
    list.querySelectorAll('.preset-row:not(.exists)').forEach(r => r.addEventListener('click', () => {
      const i = parseInt(r.dataset.idx);
      if (presetSel.has(i)) { presetSel.delete(i); r.classList.remove('sel'); }
      else { presetSel.add(i); r.classList.add('sel'); }
      document.getElementById('preset-apply-btn').disabled = presetSel.size === 0;
    }));
  }
  document.getElementById('modal-presets').classList.add('open');
}

document.getElementById('preset-apply-btn').addEventListener('click', () => {
  const { year, month } = getViewMonth();
  const { income: inc } = getMonthlyStats(year, month);
  presetSel.forEach(idx => {
    const p = PRESET_BILLS[idx];
    state.bills.push({
      id: nextId('bills'), name: p.name, amount: Math.round(inc*(p.pct/100)),
      category: p.category, recurring: p.recurring, paid: false,
      createdAt: isoDate(todayStart())
    });
  });
  saveState();
  document.getElementById('modal-presets').classList.remove('open');
  render();
});

render();
</script>
</body>
</html>
